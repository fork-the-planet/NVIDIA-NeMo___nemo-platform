# CLI Configuration for NeMo Platform CLI
# This file configures CLI-specific behavior like table column display for listing entities.

# Default columns when no specific config exists
defaults:
  list:
    columns:
    - name
    - workspace
    - created_at
  get_logs:
    columns:
    - timestamp
    - message

# Root `nemo --help` metadata for generated API commands.
top_level:
  adapters:
    panel: Core plugins
    help: Manage adapters.
    hidden: true
  audit:
    panel: Functional plugins
  files:
    panel: Core plugins
    help: Manage files.
  guardrail:
    panel: Functional plugins
    help: Manage guardrails.
  iam:
    panel: Core plugins
    help: IAM operations.
    hidden: true
  inference:
    panel: Core plugins
    help: Inference operations.
  intake:
    panel: Functional plugins
    help: Intake operations.
    hidden: true
  jobs:
    panel: Core plugins
    help: Manage jobs.
  models:
    panel: Core plugins
    help: Manage models.
  projects:
    panel: Core plugins
    help: Manage projects.
    hidden: true
  secrets:
    panel: Core plugins
    help: Manage secrets.
  workspaces:
    panel: Core plugins
    help: Manage workspaces.

# Resource-specific configurations
config:
- resource: [models]
  methods:
    list:
      columns:
      - name
      - description
- resource: [workspaces, members]
  methods:
    list:
      columns:
      - principal
      - roles
      - granted_by
      - granted_at
- resource: [workspaces]
  methods:
    list:
      columns:
      - name
      - description
      - created_at
- resource: [datasets]
  methods:
    list:
      columns:
      - name
      - description
      - format
      - files_url
      - created_at
- resource: [projects]
  methods:
    list:
      columns:
      - name
      - description
      - created_at
- resource: [evaluation, configs]
  methods:
    list:
      columns:
      - name
      - description
      - created_at
- resource: [evaluation, jobs]
  methods:
    list:
      columns:
      - name
      - description
      - config.type
      - status
      - status_details.progress
      - status_details.samples_processed
      - created_at
- resource: [evaluation, targets]
  methods:
    list:
      columns:
      - name
      - description
      - created_at
- resource: [evaluation, results]
  methods:
    list:
      columns:
      - name
      - description
      - status
      - created_at
- resource: [deployment, configs]
  methods:
    list:
      columns:
      - name
      - description
      - created_at
- resource: [deployment, model_deployments]
  methods:
    list:
      columns:
      - name
      - description
      - field: '{workspace}/{name}'
        header: openai_path (workspace/name)
      - status
      - created_at
- resource: [guardrail, configs]
  methods:
    list:
      columns:
      - name
      - description
      - created_at
- resource: [jobs]
  methods:
    list:
      columns:
      - name
      - description
      - status
      - created_at
    list_execution_profiles:
      columns:
      - profile
      - backend
      - provider
      - config
- resource: [models]
  methods:
    list:
      columns:
      - name
      - description
      - created_at
- resource: [evaluation, jobs]
  methods:
    list:
      columns:
      - name
      - description
      - status
      - created_at
- resource: [evaluation, jobs, logs]
  methods:
    list:
      columns:
      - timestamp
      - message
- resource: [inference, deployment_configs]
  methods:
    list:
      columns:
      - name
      - description
      - created_at
    list_workspace:
      columns:
      - name
      - description
      - created_at
- resource: [inference, deployments]
  methods:
    create:
      wait:
        type: inference_deployment
        resource_label: deployment
    list:
      columns:
      - name
      - status
      - created_at
    list_workspace:
      columns:
      - name
      - status
      - created_at
- resource: [inference, providers]
  methods:
    list:
      columns:
      - name
      - description
      - created_at
    list_workspace:
      columns:
      - name
      - description
      - created_at
- resource: [inference, models]
  methods:
    list:
      columns:
      - id
      - owned_by
      - created
- resource: [audit]
  help: Auditor operations.
- resource: [audit, configs]
  methods:
    list:
      columns:
      - name
      - description
      - created_at
- resource: [audit, targets]
  methods:
    list:
      columns:
      - name
      - description
      - created_at
- resource: [audit, jobs]
  methods:
    list:
      columns:
      - name
      - description
      - status
      - created_at

- resource: [safe_synthesizer]
  skip: true

- resource: [guardrail]
  methods:
    check:
      operation_type: create

- resource: [entities]
  skip: true
  methods:
    list:
      param_help:
        entity_type: "Entity type to list. Known types: {{ENTITY_TYPES}}"

- resource: [evaluation]
  skip: true
  methods:
    live:
      skip: true
    live_global:
      skip: true

# Experiments are in the OpenAPI spec and SDK (for the frontend) but not yet exposed
# as CLI commands; drop the skip once the feature is production-ready.
- resource: [evaluations]
  skip: true

- resource: [experiment_groups]
  skip: true

- resource: [secrets]
  methods:
    create:
      override: secrets/create.py
    update:
      override: secrets/update.py

# Gateway proxy commands: `name` is a workspace query param, not a resource identifier
- resource: [inference, gateway, model]
  methods:
    delete:
      name_positional: false
    get:
      name_positional: false
    patch:
      name_positional: false
- resource: [inference, gateway, provider]
  methods:
    delete:
      name_positional: false
    get:
      name_positional: false
    patch:
      name_positional: false

# High-level file operations at the `nmp files` level
- resource: [files]
  additional_methods:
    upload:
      override: files/upload.py
    download:
      override: files/download.py
    list:
      override: files/list.py
    delete:
      override: files/delete.py

# High-level inference operations at the `nemo inference` level
- resource: [inference]
  additional_methods:
    get-url:
      override: inference/get_url.py
