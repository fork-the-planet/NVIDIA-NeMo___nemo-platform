# License Overrides for osv-scanner
#
# This file provides manual license overrides for packages where osv-scanner
# cannot automatically determine the correct license OR for licenses that
# use formats not in our standard list:
#    "MIT"  # https://opensource.org/licenses/MIT
#    "BSD-3-CLAUSE"  # https://opensource.org/licenses/BSD-3-Clause
#    "BSD-2-CLAUSE"  #  https://opensource.org/license/BSD-2-Clause
#    "APACHE-2.0"  # (https://www.apache.org/licenses/LICENSE-2.0
#    "ISC"  #  https://opensource.org/licenses/ISC
#    "ZLIB"  # https://opensource.org/license/zlib/
#    "NVIDIA PROPRIETARY SOFTWARE"  # Us
#
# Use SPDX identifiers: https://spdx.org/licenses/
#
# You can generate entries for this file by running:
#   nemo-platform-sdk-tools license discover-overrides
#
# That script will fetch licenses from PyPI for packages with UNKNOWN or
# NON-STANDARD licenses. Review all changes before committing.
#
# Format:
#   package-name: SPDX-LICENSE  # Optional comment about source

overrides:
  # Machine Learning / AI Libraries
  accelerate: Apache-2.0 # HuggingFace - https://github.com/huggingface/accelerate
  bitsandbytes: MIT # https://github.com/TimDettmers/bitsandbytes
  flash-attn: BSD-3-Clause # https://github.com/Dao-AILab/flash-attention
  flashinfer-jit-cache: Apache-2.0 # https://github.com/flashinfer-ai/flashinfer/tree/main/flashinfer-jit-cache
  huggingface-hub: Apache-2.0 # https://github.com/huggingface/huggingface_hub
  peft: Apache-2.0 # HuggingFace Parameter-Efficient Fine-Tuning
  safetensors: Apache-2.0 # HuggingFace safe tensor storage - https://github.com/safetensors/safetensors/blob/main/LICENSE — osv-scanner reports non-standard for 0.8.0rc1
  tiktoken: MIT # OpenAI tokenizer
  tokenizers: Apache-2.0 # HuggingFace tokenizers
  trl: Apache-2.0

  # PyTorch Ecosystem
  torch: BSD-3-Clause # https://github.com/pytorch/pytorch
  torchaudio: BSD-3-Clause # https://github.com/pytorch/audio
  torchvision: BSD-3-Clause # https://github.com/pytorch/vision
  xformers: BSD-3-Clause

  # Apple MLX Framework

  mlx: MIT
  mlx-metal: MIT

  # Scientific Computing
  numpy: BSD-3-Clause # https://numpy.org/
  scipy: BSD-3-Clause # https://scipy.org/
  pandas: BSD-3-Clause # https://pandas.pydata.org/
  scikit-learn: BSD-3-Clause # https://scikit-learn.org/
  scikit-network: BSD-3-Clause # https://github.com/sknetwork-team/scikit-network
  matplotlib: PSF-2.0 # https://matplotlib.org/
  seaborn: BSD-3-Clause # Statistical data visualization
  statsmodels: BSD-3-Clause # Statistical models
  sympy: BSD-3-Clause # Symbolic mathematics

  # Data Visualization
  plotly: MIT # https://plotly.com/python/
  contourpy: BSD-3-Clause # Contour line generation
  cycler: BSD-3-Clause # Matplotlib color cycling
  kiwisolver: BSD-3-Clause # Constraint solver for matplotlib

  # NVIDIA Proprietary Libraries
  cuda-bindings: LicenseRef-NVIDIA-SOFTWARE-LICENSE
  cuda-python: LicenseRef-NVIDIA-SOFTWARE-LICENSE
  nvidia-cublas-cu12: NVIDIA Proprietary Software
  nvidia-cuda-cupti-cu12: NVIDIA Proprietary Software
  nvidia-cuda-nvrtc-cu12: NVIDIA Proprietary Software
  nvidia-cuda-runtime-cu12: NVIDIA Proprietary Software
  nvidia-cudnn-cu12: NVIDIA Proprietary Software
  nvidia-cufft-cu12: NVIDIA Proprietary Software
  nvidia-cufile-cu12: NVIDIA Proprietary Software
  nvidia-curand-cu12: NVIDIA Proprietary Software
  nvidia-cusolver-cu12: NVIDIA Proprietary Software
  nvidia-cusparse-cu12: NVIDIA Proprietary Software
  nvidia-cusparselt-cu12: NVIDIA Proprietary Software
  nvidia-nvjitlink-cu12: NVIDIA Proprietary Software
  nvidia-ml-py: BSD-3-Clause # Python bindings for NVML
  nemollm: NVIDIA Proprietary Software
  nvidia-cudnn-frontend: NVIDIA Proprietary Software
  nvidia-nvshmem-cu12: NVIDIA Proprietary Software
  triton: MIT

  # ONNX Runtime
  onnxruntime: MIT # https://github.com/microsoft/onnxruntime

  # Jupyter Ecosystem

  # Web/HTTP Libraries
  h2: MIT # HTTP/2 protocol
  hpack: MIT # HTTP/2 header compression
  hyperframe: MIT # HTTP/2 framing layer

  # Database / Message Queue
  amqp: BSD-3-Clause # AMQP protocol implementation
  billiard: BSD-3-Clause # Multiprocessing pool (used by Celery)
  flower: BSD-3-Clause # Celery monitoring tool
  psycopg2-binary: LGPL # PostgreSQL adapter
  pyarrow: Apache-2.0 # Apache Arrow Python bindings
  vine: BSD-3-Clause # Promises/futures library for Celery

  # Configuration / Parsing
  expandvars: MIT # Shell-style env var expansion
  ply: BSD-3-Clause # Python Lex-Yacc (parsing)

  # CLI / Terminal
  click-plugins: BSD-3-Clause # Click plugin system
  colorama: BSD-3-Clause # Cross-platform colored terminal text
  libcst: MIT # Parser used by vendor_package
  prompt-toolkit: BSD-3-Clause # Library for building interactive CLIs
  shellingham: ISC # Detect shell type

  # Date/Time
  dateparser: BSD-3-Clause # Parse human-readable dates
  python-dateutil: Apache-2.0 # Extensions to datetime module
  isodate: BSD-3-Clause

  # Testing

  # Text Processing
  chardet: LGPL-2.1-or-later # Character encoding detection
  defusedxml: PSF-2.0 # PyPI metadata reports PSFL / Python Software Foundation License
  flashtext: MIT # Fast keyword extraction
  json-repair: MIT # Repair invalid JSON
  python-stdnum: LGPL-2.1-or-later # Validate/format standard numbers

  # Template Engines
  jinja2: BSD-3-Clause # Template engine
  markupsafe: BSD-3-Clause # HTML escaping for Jinja2
  itsdangerous: BSD-3-Clause # Token signing — Flask/Jinja ecosystem

  # Validation

  # Data Formats
  jsonpatch: BSD-3-Clause # Apply JSON patches
  jsonpointer: BSD-3-Clause # Resolve JSON pointers
  python-json-logger: BSD-3-Clause # JSON logging formatter

  # Compression / Hashing
  lz4: BSD-3-Clause # https://github.com/python-lz4/python-lz4
  mmh3: MIT # MurmurHash3 hashing
  xxhash: BSD-3-Clause # xxHash hashing algorithm

  # Async / Concurrency
  cloudpickle: BSD-3-Clause # https://github.com/cloudpipe/cloudpickle/blob/master/LICENSE
  nest-asyncio: BSD-3-Clause # Patch asyncio to allow nested event loops
  nest-asyncio2: BSD-3-Clause # Forked nest-asyncio used by nvidia-nat-core

  # Git
  gitdb: BSD-3-Clause # Git object database

  # Monitoring / Logging
  wandb: MIT # https://github.com/wandb/wandb/blob/main/LICENSE

  # Networking / Encoding
  idna: BSD-3-Clause # Internationalized domain names
  oci: UPL-1.0 OR Apache-2.0 # Oracle Cloud Infrastructure SDK
  oci-openai: UPL-1.0 # Oracle OpenAI-compatible OCI SDK
  pyasn1-modules: BSD-3-Clause # ASN.1 data structures
  pyzmq: BSD-3-Clause # ZeroMQ bindings

  # NLP / AI Evaluation
  fastembed: Apache-2.0 # Fast text embedding
  langchain-oci: MIT # LangChain Oracle Cloud Infrastructure integration
  ragas: Apache-2.0 # RAG evaluation framework
  range-regex: BSD-3-Clause # Regex for ranges
  ratelimit: MIT # API rate limiting
  rouge-score: Apache-2.0 # ROUGE metric for text summarization
  sacrebleu: Apache-2.0 # Machine translation metrics

  # Python Compilation / Optimization
  llvmlite: BSD-3-Clause # Lightweight LLVM Python binding
  numba: BSD-3-Clause # JIT compiler for Python
  ninja: Apache-2.0 # Small build system

  # System / OS
  cached-property: BSD-3-Clause # Decorator for caching properties
  importlib-metadata: Apache-2.0 # Read metadata from Python packages
  importlib-resources: Apache-2.0 # Read resources from Python packages
  mpmath: BSD-3-Clause # Python library for arbitrary-precision arithmetic
  packaging: Apache-2.0 # Core utilities for Python packages
  patsy: BSD-3-Clause # Statistical model formulas
  sqlfluff: MIT # SQL linter
  wrapt: BSD-3-Clause # Module for decorators and wrappers
  python-on-whales: MIT # Docker SDK for Python

  # Specialized
  betterproto: MIT # Better protobuf support
  cut-cross-entropy: APSL-2.0 # https://github.com/unslothai/cut-cross-entropy/blob/main/LICENSE, but it appears to be unsloth's fork https://pypi.org/project/cut-cross-entropy/

  # Miscellaneous
  hf-transfer: Apache-2.0 # HuggingFace transfer library https://github.com/huggingface/hf_transfer/blob/main/LICENSE
  jsonpath-rust-bindings: MIT # See https://github.com/besok/jsonpath-rust/blob/main/LICENSE
  milvus-lite: Apache-2.0 # https://github.com/milvus-io/milvus-lite/blob/main/LICENSE
  pymilvus: Apache-2.0 # https://github.com/milvus-io/pymilvus/blob/master/LICENSE
  openai-harmony: Apache-2.0 # https://github.com/openai/harmony/blob/main/LICENSE
  prv-accountant: MIT # https://github.com/microsoft/prv_accountant/blob/main/LICENSE
  py-rust-stemmers: MIT # https://github.com/qdrant/py-rust-stemmers/blob/master/LICENSE
  sentencepiece: Apache-2.0 # https://github.com/google/sentencepiece/blob/master/LICENSE
  torchao: BSD-3-Clause # https://github.com/pytorch/ao?tab=readme-ov-file#-citation
  ujson: BSD-3-Clause # https://github.com/ultrajson/ultrajson/blob/main/LICENSE.txt

  # garak specific licenses
  ecoji: Apache-2.0
  fsspec: BSD-3-Clause
  langdetect: Apache-2.0
  mistralai: Apache-2.0 # https://github.com/mistralai/client-python/blob/main/LICENSE
  networkx: BSD-3-Clause
  pyperclip: BSD-3-Clause
  pyreadline3: BSD-3-Clause
  python-magic-bin: MIT
  rapidfuzz: MIT
  replicate: Apache-2.0
  uritemplate: BSD 3-Clause OR Apache-2.0
  wavedrom: MIT
  zalgolib: MIT

  # Licenses not automatically approved
  aiohappyeyeballs: PSF-2.0
  certifi: LGPL
  datetime: ZPL-2.0
  email-validator: Unlicense
  filelock: Unlicense
  nvidia-cutlass-dsl: NVIDIA-Software-End-User-License-Agreement
  pathspec: LGPL
  pillow: MIT-CMU
  pycountry: LGPL-2.1
  python-gitlab: LGPL-3.0
  supervisor: BSD-3-Clause
  typing-extensions: PSF-2.0
  unsloth-zoo: LGPL-3.0-or-later
  zope-interface: ZPL-2.0

  # Files service
  types-awscrt: MIT

  backports-zstd: PSF-2.0
  dspy: MIT
  narwhals: MIT
  rpds-py: MIT
  uuid-utils: BSD-3-Clause

  # Auth service
  wasmtime: APACHE-2.0 WITH LLVM-EXCEPTION

  # MCP Server
  beartype: MIT
  docutils: BSD-3-Clause
  lupa: MIT
  py-key-value-aio: Apache-2.0
  py-key-value-shared: Apache-2.0
  pydocket: MIT

  nemo-safe-synthesizer: Apache-2.0
  nemo-relay: Apache-2.0  # https://github.com/NVIDIA/NeMo-Relay (ships Apache-2.0 LICENSE; osv reports UNKNOWN)
  nemoguardrails: Apache-2.0
  fastuuid: BSD-3-Clause
  orjson: Apache-2.0
  prettytable: BSD-3-Clause
  nvidia-cutlass-dsl-libs-base: BSD-3-Clause
  fastmcp: Apache-2.0
  caio: Apache-2.0 # https://github.com/mosquito/caio/?tab=Apache-2.0-1-ov-file
  pyleak: Apache-2.0 # https://github.com/deepankarm/pyleak
  uncalled-for: MIT # https://pypi.org/project/uncalled-for/
  torch-c-dlpack-ext: Apache-2.0
  quack-kernels: Apache-2.0 # https://github.com/Dao-AILab/quack/blob/main/LICENSE
  crc32c: LGPL-2.1-or-later # https://pypi.org/project/crc32c/
  detect-installer: 0BSD # https://pypi.org/project/detect-installer/

  databricks-sdk: Apache-2.0  # https://github.com/databricks/databricks-sdk-py/blob/main/LICENSE
  mlflow-skinny: Apache-2.0  # https://github.com/mlflow/mlflow/blob/master/LICENSE.txt
  sqlparse: BSD-3-Clause  # https://github.com/andialbrecht/sqlparse/blob/master/LICENSE
