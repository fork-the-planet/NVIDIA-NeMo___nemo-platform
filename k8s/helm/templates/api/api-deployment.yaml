{{- if .Values.api.enabled }}
{{- $imagePullSecrets := include "nemo-common.imagepullsecrets" . }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "nmp-api.api-servicename" . }}
  labels:
    app.kubernetes.io/component: nmp-api
    {{- include "nemo-platform.labels" . | nindent 4 }}
  annotations:
    {{- with .Values.api.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  {{- if not .Values.api.autoscaling.enabled }}
  replicas: {{ .Values.api.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      app.kubernetes.io/component: nmp-api
      {{- include "nemo-platform.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        {{- with .Values.api.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
        {{- include "nemo-platform.podAnnotations" . | nindent 8 }}
      labels:
        app.kubernetes.io/component: nmp-api
        {{- include "nemo-platform.labels" . | nindent 8 }}
        {{- with .Values.api.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
{{- if $imagePullSecrets }}
      imagePullSecrets:
{{- $imagePullSecrets | nindent 8 }}
{{- end }}
      serviceAccountName: {{ include "nmp-api.apiServiceAccountName" . }}
      securityContext:
        {{- include "nemo-common.podSecurityContext" (dict "global" .Values.podSecurityContext "local" .Values.api.podSecurityContext) | nindent 8 }}
      containers:
        - name: nmp-api
          securityContext:
            {{- include "nemo-common.securityContext" (dict "global" .Values.securityContext "local" .Values.api.securityContext) | nindent 12 }}
          image: {{ include "nmp-api.image" . | quote }}
          imagePullPolicy: {{ .Values.api.image.pullPolicy }}
          args:
            - "--service-group=all"
            - "--host={{ include "nemo-platform.bindHost" . }}"
            - "--port={{ .Values.api.service.port }}"
            {{- range .Values.api.extraArgs }}
            - {{ . | quote }}
            {{- end }}
          envFrom:
            - secretRef:
                name: {{ include "nemo-platform.apiEnvSecretName" . }}
          env:
            - name: NMP_CONFIG_FILE_PATH
              value: /etc/nmp/config.yaml
            - name: NMP_BASE_URL
              {{- if include "nemo-platform.embeddedPdpEnabled" . }}
              value: {{ include "nemo-platform.apiLoopbackBaseUrl" . | quote }}
              {{- else }}
              value: {{ include "nemo-platform.internalBaseUrl" . | quote }}
              {{- end }}
            {{- if include "nemo-platform.embeddedPdpEnabled" . }}
            - name: NMP_AUTH_POLICY_DECISION_POINT_BASE_URL
              value: {{ include "nemo-platform.apiLoopbackBaseUrl" . | quote }}
            {{- end }}
            - name: OTEL_SERVICE_NAME
              value: {{ include "nmp-api.api-servicename" . }}
            {{- include "nemo-common.otel-env" (dict "root" $ "local" .Values) | indent 12 }}
            {{- if ( and .Values.externalDatabase.uriSecret.name .Values.externalDatabase.uriSecret.key ) }}
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.externalDatabase.uriSecret.name }}
                  key: {{ .Values.externalDatabase.uriSecret.key }}
            {{- else }}
            - name: DATABASE_DIALECT
              value: "postgresql"
            - name: DATABASE_USER
              value: {{ include "nemo-common.postgresql.user" . }}
            - name: DATABASE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "nemo-common.postgresql.secret-name" . }}
                  key: {{ include "nemo-common.postgresql.password-key" . }}
            - name: DATABASE_NAME
              value: "{{ include "nemo-common.postgresql.name" . }}"
            - name: DATABASE_HOST
              value: "{{ include "nemo-common.postgresql.host" . }}"
            - name: DATABASE_PORT
              value: "{{ include "nemo-common.postgresql.port" . }}"
            {{- end }}
            - name: NGC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.existingSecret | default "ngc-api" }}
                  key: NGC_API_KEY
            {{ include "nemo-platform.env" . | nindent 12 | trim }}
            {{ include "nemo-platform.api.env" . | nindent 12 | trim }}
          ports:
            - name: http
              containerPort: {{ .Values.api.service.port }}
              protocol: TCP
          startupProbe:
            {{- toYaml .Values.api.startupProbe | nindent 12 }}
          livenessProbe:
            {{- toYaml .Values.api.livenessProbe | nindent 12 }}
          readinessProbe:
            {{- toYaml .Values.api.readinessProbe | nindent 12 }}
          resources:
            {{- toYaml .Values.api.resources | nindent 12 }}
          volumeMounts:
            - name: config
              mountPath:  /etc/nmp/config.yaml
              subPath: config.yaml
            - name: data-designer-tmp
              mountPath: /app/data/data-designer
            {{- if eq ( include "nmp-core.localStorageEnabled" . ) "true" }}
            - name: files-storage
              mountPath: {{ include "nmp-core.localStoragePath" . }}
            {{- end }}
      volumes:
        - name: data-designer-tmp
          emptyDir: {}
        - name: config
          configMap:
            name: {{ include "nemo-platform.platform-configmap" . }}
        {{- if eq ( include "nmp-core.localStorageEnabled" . ) "true" }}
        - name: files-storage
          persistentVolumeClaim:
            claimName: {{ include "nmp-core.persistentVolumeClaim" . }}
        {{- end }}
      {{- with .Values.api.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.api.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.api.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.api.topologySpreadConstraints }}
      topologySpreadConstraints:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
