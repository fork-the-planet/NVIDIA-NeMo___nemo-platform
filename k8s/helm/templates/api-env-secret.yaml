{{- if not .Values.envFromSecret }}
{{- if include "nemo-platform.defaultEncryptionKeyExistingSecretName" . }}
{{- /* User provided the default-encryption-key Secret. */ -}}
{{- else if .Values.secrets.defaultEncryptionKey.value }}
{{- $secretName := include "nemo-platform.apiEnvSecretName" . -}}
{{- $keyName := include "nemo-platform.defaultEncryptionKeyEnvName" . -}}
{{- $keyValue := required (printf "secrets.defaultEncryptionKey.value is required to populate Secret %s key %s" $secretName $keyName) (.Values.secrets.defaultEncryptionKey.value | toString) -}}
{{- $base64Pattern := `^(?:[A-Za-z0-9+/]{4})*(?:[A-Za-z0-9+/]{4}|[A-Za-z0-9+/]{3}=|[A-Za-z0-9+/]{2}==)$` -}}
{{- if not (regexMatch $base64Pattern $keyValue) -}}
{{- fail (printf "secrets.defaultEncryptionKey.value for Secret %s key %s must be valid standard base64" $secretName $keyName) -}}
{{- end -}}
{{- $decodedKey := b64dec $keyValue -}}
{{- if lt (len $decodedKey) 32 -}}
{{- fail (printf "secrets.defaultEncryptionKey.value for Secret %s key %s must decode to at least 32 bytes" $secretName $keyName) -}}
{{- end }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  labels:
    {{- include "nemo-platform.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{ $keyName }}: {{ $keyValue | quote }}
{{- else if include "nemo-platform.generateDefaultEncryptionKey" . }}
{{- /* The pre-install hook creates the API env Secret with a generated key. */ -}}
{{- else if include "nemo-platform.requireExistingGeneratedDefaultEncryptionKey" . }}
{{- /* The upgrade guard verifies the existing generated Secret. */ -}}
{{- else if and (not .Release.IsInstall) (not .Release.IsUpgrade) }}
{{- /* helm lint evaluates templates without install or upgrade mode. */ -}}
{{- else }}
{{- fail "set envFromSecret, secrets.defaultEncryptionKey.existingSecret.name, secrets.defaultEncryptionKey.value, or enable secrets.defaultEncryptionKey.generated.enabled" }}
{{- end }}
{{- end }}
