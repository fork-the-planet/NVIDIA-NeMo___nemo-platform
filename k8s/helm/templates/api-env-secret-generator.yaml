{{- if include "nemo-platform.generateDefaultEncryptionKey" . }}
{{- $imagePullSecrets := include "nemo-common.imagepullsecrets" . }}
{{- $hookAnnotations := dict "helm.sh/hook" "pre-install" "helm.sh/hook-weight" "-20" "helm.sh/hook-delete-policy" "before-hook-creation,hook-succeeded" -}}
{{- $rbacAnnotations := dict "helm.sh/hook" "pre-install" "helm.sh/hook-weight" "-30" "helm.sh/hook-delete-policy" "before-hook-creation,hook-succeeded" -}}
{{- if .Values.secrets.defaultEncryptionKey.generated.serviceAccount.create }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "nemo-platform.defaultEncryptionKeyGeneratorServiceAccountName" . }}
  labels:
    app.kubernetes.io/component: api-env-keygen
    {{- include "nemo-platform.labels" . | nindent 4 }}
  annotations:
    {{- toYaml (mergeOverwrite (deepCopy $rbacAnnotations) (.Values.secrets.defaultEncryptionKey.generated.serviceAccount.annotations | default dict)) | nindent 4 }}
automountServiceAccountToken: true
{{- end }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "nemo-platform.defaultEncryptionKeyGeneratorName" . }}
  labels:
    app.kubernetes.io/component: api-env-keygen
    {{- include "nemo-platform.labels" . | nindent 4 }}
  annotations:
    {{- toYaml $rbacAnnotations | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "nemo-platform.defaultEncryptionKeyGeneratorName" . }}
  labels:
    app.kubernetes.io/component: api-env-keygen
    {{- include "nemo-platform.labels" . | nindent 4 }}
  annotations:
    {{- toYaml $rbacAnnotations | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "nemo-platform.defaultEncryptionKeyGeneratorName" . }}
subjects:
  - kind: ServiceAccount
    name: {{ include "nemo-platform.defaultEncryptionKeyGeneratorServiceAccountName" . }}
    namespace: {{ .Release.Namespace }}
---
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "nemo-platform.defaultEncryptionKeyGeneratorName" . }}
  labels:
    app.kubernetes.io/component: api-env-keygen
    {{- include "nemo-platform.labels" . | nindent 4 }}
  annotations:
    {{- toYaml $hookAnnotations | nindent 4 }}
spec:
  ttlSecondsAfterFinished: {{ .Values.secrets.defaultEncryptionKey.generated.ttlSecondsAfterFinished }}
  backoffLimit: {{ .Values.secrets.defaultEncryptionKey.generated.backoffLimit }}
  activeDeadlineSeconds: {{ .Values.secrets.defaultEncryptionKey.generated.activeDeadlineSeconds }}
  template:
    metadata:
      labels:
        app.kubernetes.io/component: api-env-keygen
        {{- include "nemo-platform.selectorLabels" . | nindent 8 }}
    spec:
      restartPolicy: Never
      automountServiceAccountToken: true
      serviceAccountName: {{ include "nemo-platform.defaultEncryptionKeyGeneratorServiceAccountName" . }}
{{- if $imagePullSecrets }}
      imagePullSecrets:
{{- $imagePullSecrets | nindent 8 }}
{{- end }}
      securityContext:
        {{- include "nemo-common.podSecurityContext" (dict "global" .Values.podSecurityContext "local" .Values.secrets.defaultEncryptionKey.generated.podSecurityContext) | default "{}" | nindent 8 }}
      containers:
        - name: api-env-keygen
          image: "{{ .Values.secrets.defaultEncryptionKey.generated.image.repository }}:{{ .Values.secrets.defaultEncryptionKey.generated.image.tag }}"
          imagePullPolicy: {{ .Values.secrets.defaultEncryptionKey.generated.image.pullPolicy }}
          securityContext:
            {{- include "nemo-common.securityContext" (dict "global" .Values.securityContext "local" .Values.secrets.defaultEncryptionKey.generated.securityContext) | default "{}" | nindent 12 }}
          command:
            - python
            - -c
          args:
            - |
              import base64
              import json
              import os
              import ssl
              import sys
              import urllib.error
              import urllib.request

              secret_name = os.environ["SECRET_NAME"]
              key_name = os.environ["SECRET_KEY"]
              namespace = os.environ["POD_NAMESPACE"]
              api_host = os.environ["KUBERNETES_SERVICE_HOST"]
              api_port = os.environ.get("KUBERNETES_SERVICE_PORT", "443")
              token_path = "/var/run/secrets/kubernetes.io/serviceaccount/token"
              ca_path = "/var/run/secrets/kubernetes.io/serviceaccount/ca.crt"

              with open(token_path, encoding="utf-8") as token_file:
                  token = token_file.read().strip()

              context = ssl.create_default_context(cafile=ca_path)

              def api_request(path, method="GET", body=None):
                  data = None
                  headers = {
                      "Authorization": "Bearer " + token,
                      "Accept": "application/json",
                  }
                  if body is not None:
                      data = json.dumps(body).encode("utf-8")
                      headers["Content-Type"] = "application/json"
                  request = urllib.request.Request(
                      "https://{}:{}{}".format(api_host, api_port, path),
                      data=data,
                      headers=headers,
                      method=method,
                  )
                  return urllib.request.urlopen(request, context=context, timeout=30)

              secret_path = "/api/v1/namespaces/{}/secrets/{}".format(namespace, secret_name)
              try:
                  with api_request(secret_path) as response:
                      secret = json.load(response)
              except urllib.error.HTTPError as exc:
                  if exc.code != 404:
                      raise
                  secret = None

              if secret is not None:
                  if secret.get("data", {}).get(key_name):
                      print(
                          "Secret {}/{} already contains {}; leaving it unchanged.".format(
                              namespace,
                              secret_name,
                              key_name,
                          )
                      )
                      sys.exit(0)
                  print(
                      "Secret {}/{} exists but does not contain {}; refusing to rotate or patch KEK.".format(
                          namespace,
                          secret_name,
                          key_name,
                      ),
                      file=sys.stderr,
                  )
                  sys.exit(1)

              key = base64.b64encode(os.urandom(32)).decode("ascii")
              body = {
                  "apiVersion": "v1",
                  "kind": "Secret",
                  "metadata": {
                      "name": secret_name,
                      "namespace": namespace,
                      "labels": {
                          "app.kubernetes.io/managed-by": {{ .Release.Service | quote }},
                          "app.kubernetes.io/name": {{ include "nemo-platform.name" . | quote }},
                          "app.kubernetes.io/instance": {{ .Release.Name | quote }},
                          "app.kubernetes.io/part-of": "nemo-platform",
                      },
                      "annotations": {
                          "helm.sh/resource-policy": "keep",
                      },
                  },
                  "type": "Opaque",
                  "stringData": {
                      key_name: key,
                  },
              }

              try:
                  with api_request("/api/v1/namespaces/{}/secrets".format(namespace), method="POST", body=body) as response:
                      if response.status not in (200, 201):
                          raise RuntimeError("unexpected create Secret response {}".format(response.status))
              except urllib.error.HTTPError as exc:
                  if exc.code != 409:
                      raise
                  with api_request(secret_path) as response:
                      secret = json.load(response)
                  if secret.get("data", {}).get(key_name):
                      print(
                          "Secret {}/{} already contains {}; leaving it unchanged.".format(
                              namespace,
                              secret_name,
                              key_name,
                          )
                      )
                      sys.exit(0)
                  raise

              print("Created Secret {}/{} with generated {}.".format(namespace, secret_name, key_name))
          env:
            - name: SECRET_NAME
              value: {{ include "nemo-platform.apiEnvSecretName" . | quote }}
            - name: SECRET_KEY
              value: {{ include "nemo-platform.defaultEncryptionKeyEnvName" . | quote }}
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          resources:
            {{- toYaml .Values.secrets.defaultEncryptionKey.generated.resources | nindent 12 }}
      {{- with .Values.secrets.defaultEncryptionKey.generated.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.secrets.defaultEncryptionKey.generated.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.secrets.defaultEncryptionKey.generated.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
