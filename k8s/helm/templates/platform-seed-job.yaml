{{- if and .Values.api.enabled .Values.platformSeedJob.enabled }}
{{- $imagePullSecrets := include "nemo-common.imagepullsecrets" . }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "nemo-platform.fullname" . }}-platform-seed
  labels:
    app.kubernetes.io/component: platform-seed
    {{- include "nemo-platform.labels" . | nindent 4 }}
  annotations:
    # Run after install and upgrade so seeding runs on fresh installs and can be re-triggered on no-op upgrade.
    helm.sh/hook: post-install,post-upgrade
    helm.sh/hook-weight: "5"
    # Delete previous Job before creating the new one on upgrade (allows re-trigger on no-op upgrade).
    helm.sh/hook-delete-policy: before-hook-creation
spec:
  ttlSecondsAfterFinished: {{ .Values.platformSeedJob.ttlSecondsAfterFinished }}
  backoffLimit: {{ .Values.platformSeedJob.backoffLimit }}
  activeDeadlineSeconds: {{ .Values.platformSeedJob.activeDeadlineSeconds }}
  template:
    metadata:
      labels:
        app.kubernetes.io/component: platform-seed
        {{- include "nemo-platform.selectorLabels" . | nindent 8 }}
        {{- with .Values.platformSeedJob.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      restartPolicy: OnFailure
{{- if $imagePullSecrets }}
      imagePullSecrets:
{{- $imagePullSecrets | nindent 8 }}
{{- end }}
      serviceAccountName: {{ include "nmp-api.apiServiceAccountName" . }}
      securityContext:
        {{- include "nemo-common.podSecurityContext" (dict "global" .Values.podSecurityContext "local" .Values.platformSeedJob.podSecurityContext) | nindent 8 }}
      containers:
        - name: platform-seed
          securityContext:
            {{- include "nemo-common.securityContext" (dict "global" .Values.securityContext "local" .Values.platformSeedJob.securityContext) | nindent 12 }}
          image: {{ include "nmp-api.image" . | quote }}
          imagePullPolicy: {{ .Values.api.image.pullPolicy }}
          command:
            - nemo-platform
          args:
            - run
            - task
            - --task
            - nmp.platform_seed
          envFrom:
            - secretRef:
                name: {{ include "nemo-platform.apiEnvSecretName" . }}
          env:
            - name: NMP_CONFIG_FILE_PATH
              value: /etc/nmp/config.yaml
            - name: OTEL_SERVICE_NAME
              value: {{ include "nemo-platform.fullname" . }}-platform-seed
            {{ include "nemo-platform.env" . | nindent 12 | trim }}
            {{- with .Values.platformSeedJob.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          volumeMounts:
            - name: config
              mountPath: /etc/nmp/config.yaml
              subPath: config.yaml
          resources:
            {{- toYaml .Values.platformSeedJob.resources | nindent 12 }}
      volumes:
        - name: config
          configMap:
            name: {{ include "nemo-platform.platform-configmap" . }}
      {{- with .Values.platformSeedJob.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.platformSeedJob.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.platformSeedJob.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
