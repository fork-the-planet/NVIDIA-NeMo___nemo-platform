# yaml-language-server: $schema=https://app.stainlessapi.com/config-internal.schema.json
organization:
  name: NeMo Platform
  docs: https://docs.nvidia.com/nemo/microservices/latest/about/index.html
  contact: ""

custom_casings:
  nemo:
    snake: nemo
    pascal: NeMo
    capital: NeMo
    camel: nemo
  nim:
    initialism: true
  ner:
    initialism: true
  pii:
    initialism: true
  llm:
    initialism: true
  url:
    initialism: true
  rag:
    initialism: true
  ngc:
    initialism: true

targets:
  #  typescript:
  #    _skip_running_tests: false
  #    package_name: nemo-platform-v1
  #    publish:
  #      npm: false
  #    skip: false
  #    options:
  #      mcp_server:
  #        package_name: nemo-platform-v1-mcp
  #        enable_all_resources: true

  python:
    # [docs]: https://www.stainless.com/docs/reference/editions
    edition: python.2025-11-20
    project_name: nemo-platform-sdk
    package_name: nemo_platform
    production_repo:
    publish:
      pypi: false
    options:
      disable_pydantic_namespace_protection: true
      # Stainless does not support a 3.11 lower bound yet: setting
      # python_version_range to ">= 3.11" updates project.requires-python but
      # leaves .python-version pinned to 3.9.18, which breaks remote bootstrap.
      use_uv: true

# `environments` are a map of the name of the environment (e.g. "sandbox",
# "production") to the corresponding url to use.
environments:
  production: http://nemo.test/

query_settings:
  nested_format: "brackets"

settings:
  # All generated integration tests that hit the prism mock http server are marked
  # as skipped. Removing this setting or setting it to false enables tests, but
  # doing so may result in test failures due to bugs in the test server.
  #
  # [prism mock http server]: https://stoplight.io/open-source/prism
  disable_mock_tests: true
  license: Apache-2.0

# `client_settings` define settings for the API client, such as extra constructor
# arguments (used for authentication), retry behavior, idempotency, etc.
client_settings:
  opts:
    workspace:
      type: string
      nullable: true
      send_as_path_param: workspace

# `pagination` defines [pagination schemes] which provides a template to match
# endpoints and generate next-page and auto-pagination helpers in the SDKs.
pagination:
- name: default_pagination
  type: page_number
  request:
    page:
      type: integer
      x-stainless-pagination-property:
        purpose: page_number_param
    page_size:
      type: integer
  response:
    data:
      type: array
      x-stainless-pagination-property:
        purpose: items
      items:
        type: object
        additionalProperties: true
    pagination:
      type: object
      properties:
        page:
          type: integer
          title: Page
          description: The current page number.
          x-stainless-pagination-property:
            purpose: current_page_number_field
        page_size:
          type: integer
          title: Page Size
          description: The page size used for the query.
        current_page_size:
          type: integer
          title: Current Page Size
          description: The size for the current page.
        total_pages:
          type: integer
          title: Total Pages
          description: The total number of pages.
          x-stainless-pagination-property:
            purpose: total_page_count_field
        total_results:
          type: integer
          title: Total Results
          description: The total number of results.
      required:
      - page
      - page_size
      - total_pages
      - total_results
      - current_page_size
- name: logs_pagination
  type: cursor
  request:
    limit:
      type: integer
    page_cursor:
      type: string
      x-stainless-pagination-property:
        purpose: next_cursor_param
  response:
    data:
      type: array
      x-stainless-pagination-property:
        purpose: items
      items:
        type: object
        additionalProperties: true
    next_page:
      type: string
      x-stainless-pagination-property:
        purpose: next_cursor_field

streaming:
  on_event:
  - data_starts_with: "[DONE]"
    handle: done
  - event_type: error
    handle: error
  - event_type:
    handle: yield

readme:
  example_requests:
    default:
      type: request
      endpoint: get /apis/entities/v2/workspaces
      params: {}
    headline:
      type: request
      endpoint: get /apis/entities/v2/workspaces
      params: {}
    pagination:
      type: request
      endpoint: get /apis/audit/v2/workspaces/{workspace}/jobs
      params: {}

# security_schemes:
