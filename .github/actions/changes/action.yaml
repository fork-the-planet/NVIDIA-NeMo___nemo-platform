name: "Changes"
description: >
  Detect which file categories changed using dorny/paths-filter.
  Outputs boolean flags that downstream jobs use to decide whether to run.

outputs:
  openapi:
    description: "'true' if any file under openapi/ changed"
    value: ${{ steps.filter.outputs.openapi }}
  test:
    description: "'true' if any file under tests/ or pytest.ini changed"
    value: ${{ steps.filter.outputs.tests }}
  deps:
    description: "'true' if any dependency-related files changed"
    value: ${{ steps.filter.outputs.deps }}
  e2e:
    description: "'true' if any e2e test files changed"
    value: ${{ steps.filter.outputs.e2e }}
  docs:
    description: "'true' if any documentation files changed"
    value: ${{ steps.filter.outputs.docs }}
  tools:
    description: "'true' if any files under tools/ changed"
    value: ${{ steps.filter.outputs.tools }}
  web-studio:
    description: "'true' if any web files changed"
    value: ${{ steps.filter.outputs.web-studio }}
  docker:
    description: "'true' if any Docker build files changed"
    value: ${{ steps.filter.outputs.docker }}
  docker-scripts:
    description: "'true' if scripts directly invoked by Docker builds changed"
    value: ${{ steps.filter.outputs.docker-scripts }}
  helm:
    description: "'true' if any Helm chart files changed"
    value: ${{ steps.filter.outputs.helm }}
  python-runtime:
    description: "'true' if Python runtime packages, services, plugins, or SDK files changed"
    value: ${{ steps.filter.outputs.python-runtime }}
  k8s-smoke:
    description: "'true' if Kubernetes smoke test support files changed"
    value: ${{ steps.filter.outputs.k8s-smoke }}
  cpu-smoke:
    description: "'true' if CPU smoke image or Kubernetes smoke test inputs changed"
    value: ${{ steps.filter.outputs.deps == 'true' || steps.filter.outputs.docker == 'true' || steps.filter.outputs.docker-scripts == 'true' || steps.filter.outputs.helm == 'true' || steps.filter.outputs.openapi == 'true' || steps.filter.outputs.python-runtime == 'true' || steps.filter.outputs.web-studio == 'true' || steps.filter.outputs.k8s-smoke == 'true' }}

runs:
  using: "composite"
  steps:
    # Requires actions/checkout to have been run first so that
    # (a) this action.yml can be found, and
    # (b) dorny/paths-filter can diff against git history on push events.
    - name: Detect changed paths
      id: filter
      uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d
      with:
        filters: |
          openapi:
            - 'openapi/**'
            - 'plugins/*/openapi/**'
          tests:
            - 'tests/**'
            - 'pytest.ini'
          deps:
            - 'pyproject.toml'
            - 'uv.lock'
            - '.pre-commit-config.yaml'
          e2e:
            - 'e2e/**'
          docs:
            - 'docs/**'
            - 'sdk/python/nemo-platform/src/**'
          tools:
            - 'tools/**'
          web-studio:
            - 'web/**'
          docker:
            - 'docker-bake.hcl'
            - 'docker/**'
            - 'Makefile'
          docker-scripts:
            - 'script/install_duckdb_extensions.sh'
            - 'script/build_policy_wasm.sh'
          helm:
            - 'k8s/**'
            - 'tools/lint/lint-helm.sh'
            - '.github/workflows/ci.yaml'
            - '.github/actions/changes/action.yaml'
            - '.pre-commit-config.yaml'
          python-runtime:
            - 'packages/**'
            - 'services/**'
            - 'plugins/**'
            - 'sdk/python/nemo-platform/**'
          k8s-smoke:
            - 'e2e/k8s/scripts/**'
            - 'e2e/k8s/values/**'
            - 'e2e/test_jobs.py'
            - '.github/actions/free-disk-space/action.yaml'
