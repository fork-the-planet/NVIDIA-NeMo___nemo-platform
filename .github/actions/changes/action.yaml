name: "Changes"
description: >
  Detect which file categories changed using dorny/paths-filter.
  Outputs boolean flags that downstream jobs use to decide whether to run.

outputs:
  openapi:
    description: "'true' if any file under openapi/ changed"
    value: ${{ steps.filter.outputs.openapi }}
  test:
    description: "'true' if any file under tests/ or pytest.ini changed"
    value: ${{ steps.filter.outputs.tests }}
  deps:
    description: "'true' if any dependency-related files changed"
    value: ${{ steps.filter.outputs.deps }}
  e2e:
    description: "'true' if any e2e test files changed"
    value: ${{ steps.filter.outputs.e2e }}
  docs:
    description: "'true' if any documentation files changed"
    value: ${{ steps.filter.outputs.docs }}
  tools:
    description: "'true' if any files under tools/ changed"
    value: ${{ steps.filter.outputs.tools }}
  web-studio:
    description: "'true' if any Studio, common, or SDK package files changed"
    value: ${{ steps.filter.outputs.web-studio }}

runs:
  using: "composite"
  steps:
    # Requires actions/checkout to have been run first so that
    # (a) this action.yml can be found, and
    # (b) dorny/paths-filter can diff against git history on push events.
    - name: Detect changed paths
      id: filter
      uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d
      with:
        filters: |
          openapi:
            - 'openapi/**'
          tests:
            - 'tests/**'
            - 'pytest.ini'
          deps:
            - 'pyproject.toml'
            - 'uv.lock'
            - '.pre-commit-config.yaml'
          e2e:
            - 'e2e/**'
          docs:
            - 'docs/**'
            - 'sdk/python/nemo-platform/src/**'
          tools:
            - 'tools/**'
          web-studio:
            - 'web/packages/studio/**'
            - 'web/packages/common/**'
            - 'web/packages/sdk/**'
