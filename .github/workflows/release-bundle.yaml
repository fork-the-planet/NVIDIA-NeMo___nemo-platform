name: Release Bundle

on:
  workflow_call:
    inputs:
      cadence:
        description: "Release cadence: nightly, rc, or release."
        required: true
        type: string
      source_sha:
        description: "Expected source commit SHA for RC/stable releases."
        required: false
        type: string
        default: ""
      version:
        description: "SemVer core version for RC or stable releases, for example 1.0.0."
        required: false
        type: string
        default: ""
      release_date:
        description: "Optional. Provide only for first-time registration of this release version. Leave blank for reruns or when this release version is already registered. Format: YYYY-MM-DD."
        required: false
        type: string
        default: ""
      release_scope:
        description: "Release artifact scope: sdks or custom."
        required: false
        type: string
        default: "sdks"
      sdk_ids:
        description: "Comma-separated SDK IDs for custom releases."
        required: false
        type: string
        default: ""
    secrets:
      CI_DISPATCH_TOKEN:
        description: "Token with access to send repository dispatch events to the dispatch repo."
        required: true
      CI_DISPATCH_REPO:
        description: "Repository that receives release bundle handoff dispatch events."
        required: true
permissions:
  contents: read

jobs:
  plan-release:
    name: Plan release
    runs-on: ubuntu-latest
    # Normalize nightly and RC/stable planner results into one contract for downstream jobs.
    # Later jobs should read needs.plan-release.outputs.* without caring which cadence produced them.
    outputs:
      source_repo: ${{ inputs.cadence == 'nightly' && steps.resolve-nightly-source.outputs.source_repo || github.repository }}
      source_ref: ${{ inputs.cadence == 'nightly' && steps.resolve-nightly-source.outputs.source_ref || steps.resolve-release-metadata.outputs.source_ref }}
      release_label: ${{ inputs.cadence == 'nightly' && steps.resolve-nightly-source.outputs.release_label || steps.resolve-release-metadata.outputs.release_label }}
      nightly_timestamp: ${{ steps.resolve-nightly-source.outputs.nightly_timestamp }}
      selected_artifacts_json: ${{ steps.plan-assets.outputs.selected_artifacts_json }}
      sdk_count: ${{ steps.plan-assets.outputs.sdk_count }}
      sdk_matrix: ${{ steps.plan-assets.outputs.sdk_matrix }}
      release_tag: ${{ inputs.cadence == 'nightly' && steps.resolve-nightly-source.outputs.release_tag || steps.resolve-release-metadata.outputs.release_tag }}
      release_date_json: ${{ inputs.cadence == 'nightly' && steps.resolve-nightly-source.outputs.release_date_json || steps.resolve-release-metadata.outputs.release_date_json }}
      source_sha: ${{ inputs.cadence == 'nightly' && steps.resolve-nightly-source.outputs.source_sha || inputs.source_sha }}
      # Previous stable tag that bounds the generated release notes range (RC/stable only; empty for nightly).
      notes_start_tag: ${{ steps.resolve-release-metadata.outputs.notes_start_tag }}
    steps:
      # Fetch tags so RC auto-increment can use plain local Git.
      - name: Checkout workflow code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
          fetch-tags: true

      # Fail fast on cadence-specific inputs before source lookup or asset planning:
      # nightly may pin an exact source SHA, while RC/stable require source SHA and version.
      - name: Validate cadence contract
        shell: bash
        env:
          CADENCE: ${{ inputs.cadence }}
          SOURCE_SHA: ${{ inputs.source_sha }}
          VERSION: ${{ inputs.version }}
          RELEASE_DATE: ${{ inputs.release_date }}
        run: |
          set -euo pipefail

          case "${CADENCE}" in
            nightly)
              if [[ -n "${VERSION}" || -n "${RELEASE_DATE}" ]]; then
                echo "::error::nightly releases must not provide version or release_date inputs"
                exit 1
              fi
              ;;
            rc | release)
              if [[ -z "${SOURCE_SHA}" || -z "${VERSION}" ]]; then
                echo "::error::rc and stable releases require source_sha and version inputs"
                exit 1
              fi
              ;;
            *)
              echo "::error::Unknown release cadence: ${CADENCE}"
              exit 1
              ;;
          esac

          if [[ -n "${SOURCE_SHA}" && ! "${SOURCE_SHA}" =~ ^[0-9a-fA-F]{40}$ ]]; then
            echo "::error::source_sha must be a full 40-character commit SHA"
            exit 1
          fi

      # Nightly defaults to the repository default branch, but may pin an exact source SHA.
      - name: Resolve nightly source
        id: resolve-nightly-source
        if: inputs.cadence == 'nightly'
        shell: bash
        env:
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          SOURCE_SHA: ${{ inputs.source_sha }}
        run: |
          set -euo pipefail

          timestamp="$(date -u +%Y%m%d%H%M%S)"

          if [[ -n "${SOURCE_SHA}" ]]; then
            source_ref="${SOURCE_SHA}"
            source_sha="${SOURCE_SHA}"
          else
            [[ -n "${DEFAULT_BRANCH}" ]] || { echo "::error::repository default branch is empty"; exit 1; }
            source_ref="refs/heads/${DEFAULT_BRANCH}"
            git fetch --no-tags --depth=1 origin "${source_ref}"
            source_sha="$(git rev-parse --verify "FETCH_HEAD^{commit}")"
          fi

          {
            printf 'source_repo=%s\n' "${GITHUB_REPOSITORY}"
            printf 'source_ref=%s\n' "${source_ref}"
            printf 'source_sha=%s\n' "${source_sha}"
            printf 'nightly_timestamp=%s\n' "${timestamp}"
            printf 'release_label=nightly-%s\n' "${timestamp}"
            printf 'release_tag=\n'
            printf 'release_date_json=null\n'
          } >>"${GITHUB_OUTPUT}"

      # RC/stable use the selected workflow branch plus manual version inputs:
      # compute the release label/tag, auto-increment RC tags, and format release_date.
      - name: Resolve RC/stable metadata
        id: resolve-release-metadata
        if: inputs.cadence != 'nightly'
        shell: bash
        env:
          CADENCE: ${{ inputs.cadence }}
          SOURCE_SHA: ${{ inputs.source_sha }}
          VERSION: ${{ inputs.version }}
          RELEASE_DATE: ${{ inputs.release_date }}
        run: |
          set -euo pipefail

          if [[ "${GITHUB_REF}" != refs/heads/* ]]; then
            echo "::error::rc and stable releases must run from a branch ref"
            exit 1
          fi

          if ! git cat-file -e "${SOURCE_SHA}^{commit}" 2>/dev/null; then
            echo "::error::source_sha is not a commit in this repository: ${SOURCE_SHA}"
            exit 1
          fi

          if ! git merge-base --is-ancestor "${SOURCE_SHA}" "${GITHUB_SHA}"; then
            echo "::error::source_sha must be reachable from the selected workflow branch"
            exit 1
          fi

          if [[ ! "${VERSION}" =~ ^(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)$ ]]; then
            echo "::error::version must be SemVer core MAJOR.MINOR.PATCH, for example 1.0.0"
            exit 1
          fi

          if [[ "${CADENCE}" == "rc" ]]; then
            rc_prefix="${VERSION}-rc"
            existing_rcs="$(git tag -l "${rc_prefix}*" | grep -E "^${rc_prefix}[0-9]+$" | sort -V || true)"

            if [[ -z "${existing_rcs}" ]]; then
              next_rc=0
            else
              last_rc="$(echo "${existing_rcs}" | tail -n 1)"
              last_rc_number="${last_rc#"${rc_prefix}"}"
              next_rc=$((10#${last_rc_number} + 1))
            fi

            release_label="${rc_prefix}${next_rc}"
          else
            release_label="${VERSION}"
          fi

          release_date_json="null"
          if [[ -n "${RELEASE_DATE}" ]]; then
            if [[ ! "${RELEASE_DATE}" =~ ^[0-9]{4}-[0-9]{2}-[0-9]{2}$ ]]; then
              echo "::error::release_date must use YYYY-MM-DD format"
              exit 1
            fi
            if [[ "$(date -u -d "${RELEASE_DATE}" +%Y-%m-%d 2>/dev/null)" != "${RELEASE_DATE}" ]]; then
              echo "::error::release_date must be a valid calendar date"
              exit 1
            fi
            release_date_json="\"${RELEASE_DATE}\""
          fi

          # Generated release notes span from the previous stable release so RC and stable both
          # show the full delta since the last stable. Empty when no prior stable tag exists.
          # Hardened for `set -euo pipefail`: `|| true` covers the no-stable-tags case, and awk
          # reads to EOF (no early `exit`/`head`) so `sort` is never killed by SIGPIPE.
          notes_start_tag=""
          prev_stable="$(
            { git tag -l | grep -E '^(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)$' || true; printf '%s\n' "${VERSION}"; } \
              | sort -V -u \
              | awk -v v="${VERSION}" '$0==v{print prev} {prev=$0}'
          )"
          if [[ -n "${prev_stable}" && "${prev_stable}" != "${VERSION}" ]]; then
            notes_start_tag="${prev_stable}"
          fi

          {
            printf 'source_ref=%s\n' "${GITHUB_REF}"
            printf 'release_label=%s\n' "${release_label}"
            printf 'release_tag=%s\n' "${release_label}"
            printf 'release_date_json=%s\n' "${release_date_json}"
            printf 'notes_start_tag=%s\n' "${notes_start_tag}"
          } >>"${GITHUB_OUTPUT}"

      - name: Checkout selected source
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          repository: ${{ github.repository }}
          ref: ${{ inputs.cadence == 'nightly' && steps.resolve-nightly-source.outputs.source_sha || inputs.source_sha }}
          path: source

      # Plan SDK-only V1 artifacts before any release side effects:
      # sdks selects every catalog SDK; custom selects listed sdk_ids.
      - name: Plan release assets
        id: plan-assets
        shell: bash
        env:
          RELEASE_SCOPE: ${{ inputs.release_scope }}
          SDK_IDS: ${{ inputs.sdk_ids }}
        run: |
          set -euo pipefail

          catalog="source/release/assets.yaml"
          [[ -f "${catalog}" ]] || { echo "::error::release asset catalog is missing: ${catalog}"; exit 1; }

          sdk_catalog="$(yq -o=json '.sdk' "${catalog}" | jq -c 'if type == "array" then map(.id) else . end')"
          if ! jq -e 'type == "array" and all(.[]; type == "string" and length > 0)' <<<"${sdk_catalog}" >/dev/null; then
            echo "::error::release/assets.yaml sdk must contain non-empty string id values"
            exit 1
          fi

          if ! jq -e 'length == (unique | length)' <<<"${sdk_catalog}" >/dev/null; then
            echo "::error::release/assets.yaml sdk contains duplicate ids"
            exit 1
          fi

          case "${RELEASE_SCOPE}" in
            sdks | custom)
              ;;
            *)
              echo "::error::Unknown release_scope: ${RELEASE_SCOPE}"
              exit 1
              ;;
          esac

          if [[ "${RELEASE_SCOPE}" != "custom" && -n "${SDK_IDS}" ]]; then
            echo "::error::sdk_ids can only be used when release_scope is custom"
            exit 1
          fi

          case "${RELEASE_SCOPE}" in
            sdks)
              selected_sdk_ids="${sdk_catalog}"
              ;;
            custom)
              if [[ -z "${SDK_IDS}" ]]; then
                echo "::error::custom release_scope requires sdk_ids"
                exit 1
              fi
              custom_sdk_ids="$(jq -Rnc --arg value "${SDK_IDS}" '$value | split(",") | map(gsub("^\\s+|\\s+$"; ""))')"
              if jq -e 'any(.[]; length == 0)' <<<"${custom_sdk_ids}" >/dev/null; then
                echo "::error::sdk_ids contains an empty entry"
                exit 1
              fi
              if ! jq -e 'length == (unique | length)' <<<"${custom_sdk_ids}" >/dev/null; then
                echo "::error::sdk_ids contains duplicate entries"
                exit 1
              fi
              unknown="$(jq -nc --argjson selected "${custom_sdk_ids}" --argjson catalog "${sdk_catalog}" '$selected - $catalog')"
              if [[ "${unknown}" != "[]" ]]; then
                echo "::error::unknown sdk id(s): $(jq -r 'join(", ")' <<<"${unknown}")"
                exit 1
              fi
              selected_sdk_ids="${custom_sdk_ids}"
              ;;
          esac

          if [[ "$(jq 'length' <<<"${selected_sdk_ids}")" == "0" ]]; then
            echo "::error::release selection must include at least one supported SDK artifact"
            exit 1
          fi

          sdk_artifacts_json="$(jq -nc --argjson ids "${selected_sdk_ids}" '$ids | map({type: "sdk", id: .})')"
          selected_artifacts_json="${sdk_artifacts_json}"
          sdk_matrix="$(jq -nc --argjson artifacts "${sdk_artifacts_json}" '{include: $artifacts}')"
          sdk_count="$(jq -r 'length' <<<"${selected_sdk_ids}")"

          {
            printf 'selected_artifacts_json=%s\n' "${selected_artifacts_json}"
            printf 'sdk_count=%s\n' "${sdk_count}"
            printf 'sdk_matrix=%s\n' "${sdk_matrix}"
          } >>"${GITHUB_OUTPUT}"

          echo "Planned SDK release artifacts: $(jq -r 'join(", ")' <<<"${selected_sdk_ids}")"

  reserve-release-tag:
    name: Reserve release tag
    needs: plan-release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout source at release SHA
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ needs.plan-release.outputs.source_sha }}
          fetch-tags: true

      # Reserve the tag before build jobs so a tagged RC attempt consumes its RC number.
      - name: Create and push tag
        shell: bash
        env:
          CADENCE: ${{ inputs.cadence }}
          RELEASE_TAG: ${{ needs.plan-release.outputs.release_tag }}
          SOURCE_SHA: ${{ needs.plan-release.outputs.source_sha }}
        run: |
          set -euo pipefail

          if [[ "${CADENCE}" == "nightly" ]]; then
            echo "Nightly cadence: no release tag to reserve."
            exit 0
          fi

          [[ -n "${RELEASE_TAG}" ]] || { echo "::error::release_tag is required"; exit 1; }
          [[ -n "${SOURCE_SHA}" ]] || { echo "::error::source_sha is required"; exit 1; }

          if git show-ref --tags --verify --quiet "refs/tags/${RELEASE_TAG}"; then
            existing_sha="$(git rev-list -n 1 "refs/tags/${RELEASE_TAG}")"
            if [[ "${existing_sha}" == "${SOURCE_SHA}" ]]; then
              echo "Release tag '${RELEASE_TAG}' already points at '${SOURCE_SHA}'."
              exit 0
            fi

            echo "::error::release tag '${RELEASE_TAG}' already points at '${existing_sha}', not '${SOURCE_SHA}'"
            exit 1
          fi

          git tag "${RELEASE_TAG}"
          git push origin "refs/tags/${RELEASE_TAG}"
          echo "Created release tag '${RELEASE_TAG}' at '${SOURCE_SHA}'."

  build-sdks:
    name: Build SDK (${{ matrix.id }})
    needs: [plan-release, reserve-release-tag]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.plan-release.outputs.sdk_matrix) }}
    steps:
      - name: Checkout workflow code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          path: workflow

      - name: Checkout source
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          repository: ${{ needs.plan-release.outputs.source_repo }}
          ref: ${{ needs.plan-release.outputs.source_sha }}
          path: source

      # Toolchain setup + version stamp + `uv build` are factored into the
      # composite action, which ci.yaml's wheel-test job also calls so the
      # test wheel and the published wheel come out of one code path. The
      # action runs out of the workflow checkout above, not the
      # release-target source checkout.
      - name: Build SDK wheel
        id: build-sdk-wheel
        uses: ./workflow/.github/actions/build-nemo-platform-wheel
        with:
          package: ${{ matrix.id }}
          source-root: source
          out-dir: ${{ github.workspace }}/release-sdk-wheel
          cadence: ${{ inputs.cadence }}
          release-label: ${{ needs.plan-release.outputs.release_label }}
          nightly-timestamp: ${{ needs.plan-release.outputs.nightly_timestamp }}

      - name: Upload SDK wheel
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-sdk-${{ matrix.id }}
          path: ${{ steps.build-sdk-wheel.outputs.wheel-path }}
          if-no-files-found: error
          overwrite: true
          retention-days: 1

  assemble-release-bundle:
    name: Assemble release bundle
    needs: [plan-release, build-sdks]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      # Selects the consumer's fetch path: nightly/RC = Actions artifact, stable = GitHub Release asset.
      source: ${{ inputs.cadence != 'release' && 'artifact' || 'release' }}
      bundle_artifact_id: ${{ steps.upload-release-bundle.outputs.artifact-id }}
      bundle_artifact_name: release-bundle-${{ needs.plan-release.outputs.release_label }}
      bundle_artifact_digest: ${{ steps.upload-release-bundle.outputs.artifact-digest }}
      release_tag: ${{ steps.upload-release.outputs.release_tag }}
      release_checksums_digest: ${{ steps.upload-release.outputs.checksums_digest }}
    steps:
      - name: Checkout workflow code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Download SDK wheels
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: release-sdk-*
          path: downloaded-sdk-artifacts
          merge-multiple: false

      - name: Install uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7.6.0
        with:
          python-version: "3.11"

      - name: Write release bundle metadata
        shell: bash
        env:
          CADENCE: ${{ inputs.cadence }}
          RELEASE_LABEL: ${{ needs.plan-release.outputs.release_label }}
          RELEASE_DATE_JSON: ${{ needs.plan-release.outputs.release_date_json }}
          SELECTED_ARTIFACTS_JSON: ${{ needs.plan-release.outputs.selected_artifacts_json }}
          SOURCE_SHA: ${{ needs.plan-release.outputs.source_sha }}
        run: |
          set -euo pipefail

          uv run --no-project python .github/scripts/write_release_bundle_metadata.py \
            --sdk-artifacts-dir downloaded-sdk-artifacts \
            --bundle-dir release-bundle \
            --selected-artifacts-json "${SELECTED_ARTIFACTS_JSON}" \
            --cadence "${CADENCE}" \
            --release-label "${RELEASE_LABEL}" \
            --release-date-json "${RELEASE_DATE_JSON}" \
            --source-sha "${SOURCE_SHA}"

      - name: Verify release bundle checksums
        shell: bash
        run: |
          set -euo pipefail

          cd release-bundle
          sha256sum -c checksums.txt

      # Nightly/RC: hand off via an Actions artifact. RCs still reserve a git tag, but do
      # not create a GitHub Release page until the RC release-page flow is settled.
      - name: Upload release bundle artifact
        id: upload-release-bundle
        if: inputs.cadence != 'release'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-bundle-${{ needs.plan-release.outputs.release_label }}
          path: release-bundle/
          if-no-files-found: error
          overwrite: true

      # Stable: attach each artifact as its own asset on the tag reserve-release-tag pushed, so
      # users can grab a single file instead of one opaque blob.
      - name: Upload release bundle to release
        id: upload-release
        if: inputs.cadence == 'release'
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ needs.plan-release.outputs.release_tag }}
          CADENCE: ${{ inputs.cadence }}
          NOTES_START_TAG: ${{ needs.plan-release.outputs.notes_start_tag }}
        run: |
          set -euo pipefail

          [[ -n "${RELEASE_TAG}" ]] || { echo "::error::release_tag is required for ${CADENCE} releases"; exit 1; }

          # checksums.txt covers release-manifest.json + every wheel, so its digest anchors the
          # whole release. The dispatch carries it; the consumer re-verifies with sha256sum -c.
          checksums_digest="$(sha256sum release-bundle/checksums.txt | cut -d' ' -f1)"

          # Categorized notes are generated by GitHub from .github/release.yml (merged PRs grouped
          # by their conventional-commit label). NOTES_START_TAG pins the range to the previous
          # stable tag; when empty (no prior stable) GitHub falls back to its default previous-tag
          # detection.
          notes_range=()
          if [[ -n "${NOTES_START_TAG:-}" ]]; then
            notes_range=(--notes-start-tag "${NOTES_START_TAG}")
          fi

          # Upload each artifact as its own asset. GitHub flattens asset names to basenames; the
          # consumer restores wheels/ from the manifest paths. Re-run model: if a release already
          # exists for this tag the command fails ("a release with the same tag name already
          # exists"); delete it (gh release delete "${RELEASE_TAG}") to redo.
          # Body is GitHub's generated, categorized notes (.github/release.yml); --title keeps the
          # tag as the release name so no auto-title is generated.
          gh release create "${RELEASE_TAG}" \
            release-bundle/release-manifest.json \
            release-bundle/checksums.txt \
            release-bundle/wheels/*.whl \
            --title "${RELEASE_TAG}" \
            --generate-notes \
            "${notes_range[@]}"

          {
            printf 'release_tag=%s\n' "${RELEASE_TAG}"
            printf 'checksums_digest=%s\n' "${checksums_digest}"
          } >>"${GITHUB_OUTPUT}"

  dispatch-release-bundle:
    name: Dispatch release bundle
    needs: assemble-release-bundle
    runs-on: ubuntu-latest
    steps:
      - name: Send release bundle pointer
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.CI_DISPATCH_TOKEN }}
          DISPATCH_REPO: ${{ secrets.CI_DISPATCH_REPO }}
          BUNDLE_REPO: ${{ github.repository }}
          SOURCE: ${{ needs.assemble-release-bundle.outputs.source }}
          BUNDLE_WORKFLOW_RUN_ID: ${{ github.run_id }}
          BUNDLE_WORKFLOW_RUN_ATTEMPT: ${{ github.run_attempt }}
          BUNDLE_ARTIFACT_ID: ${{ needs.assemble-release-bundle.outputs.bundle_artifact_id }}
          BUNDLE_ARTIFACT_NAME: ${{ needs.assemble-release-bundle.outputs.bundle_artifact_name }}
          BUNDLE_ARTIFACT_DIGEST: ${{ needs.assemble-release-bundle.outputs.bundle_artifact_digest }}
          RELEASE_TAG: ${{ needs.assemble-release-bundle.outputs.release_tag }}
          RELEASE_CHECKSUMS_DIGEST: ${{ needs.assemble-release-bundle.outputs.release_checksums_digest }}
        run: |
          set -euo pipefail

          [[ -n "${GH_TOKEN:-}" ]] || { echo "::error::CI_DISPATCH_TOKEN must be set"; exit 1; }
          [[ -n "${DISPATCH_REPO:-}" ]] || { echo "::error::CI_DISPATCH_REPO must be set"; exit 1; }
          [[ -n "${BUNDLE_REPO:-}" ]] || { echo "::error::bundle repo is required"; exit 1; }

          # assemble-release-bundle picks the storage backend by cadence (nightly/RC -> Actions
          # artifact, stable -> GitHub Release asset) and reports it as `source`. The consumer uses
          # this same field to fail-closed select its fetch path.
          case "${SOURCE}" in
            artifact)
              [[ -n "${BUNDLE_ARTIFACT_ID:-}" ]] || { echo "::error::bundle artifact id is required"; exit 1; }
              [[ -n "${BUNDLE_ARTIFACT_NAME:-}" ]] || { echo "::error::bundle artifact name is required"; exit 1; }
              [[ -n "${BUNDLE_ARTIFACT_DIGEST:-}" ]] || { echo "::error::bundle artifact digest is required"; exit 1; }
              bundle="$(jq -n \
                --arg repo "${BUNDLE_REPO}" \
                --arg workflow_run_id "${BUNDLE_WORKFLOW_RUN_ID}" \
                --arg workflow_run_attempt "${BUNDLE_WORKFLOW_RUN_ATTEMPT}" \
                --arg artifact_id "${BUNDLE_ARTIFACT_ID}" \
                --arg artifact_name "${BUNDLE_ARTIFACT_NAME}" \
                --arg artifact_digest "${BUNDLE_ARTIFACT_DIGEST}" \
                '{
                  source: "artifact",
                  repo: $repo,
                  workflow_run_id: $workflow_run_id,
                  workflow_run_attempt: $workflow_run_attempt,
                  artifact_id: $artifact_id,
                  artifact_name: $artifact_name,
                  artifact_digest: $artifact_digest
                }')"
              ;;
            release)
              [[ -n "${RELEASE_TAG:-}" ]] || { echo "::error::release tag is required"; exit 1; }
              [[ -n "${RELEASE_CHECKSUMS_DIGEST:-}" ]] || { echo "::error::release checksums digest is required"; exit 1; }
              bundle="$(jq -n \
                --arg repo "${BUNDLE_REPO}" \
                --arg workflow_run_id "${BUNDLE_WORKFLOW_RUN_ID}" \
                --arg tag "${RELEASE_TAG}" \
                --arg checksums_digest "${RELEASE_CHECKSUMS_DIGEST}" \
                '{
                  source: "release",
                  repo: $repo,
                  workflow_run_id: $workflow_run_id,
                  tag: $tag,
                  checksums_digest: $checksums_digest
                }')"
              ;;
            *)
              echo "::error::unknown bundle source: '${SOURCE}'"
              exit 1
              ;;
          esac

          jq -n --argjson bundle "${bundle}" \
            '{event_type: "release-bundle-produced", client_payload: {bundle: $bundle}}' \
          | gh api -X POST "/repos/${DISPATCH_REPO}/dispatches" --input -
