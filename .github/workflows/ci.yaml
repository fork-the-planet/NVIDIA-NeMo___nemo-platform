name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  merge_group:
    types: [checks_requested]
  workflow_dispatch:

permissions:
  actions: read
  contents: read
  pull-requests: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  changes:
    name: Detect Path Changes
    runs-on: ubuntu-latest
    outputs:
      openapi: ${{ steps.changes.outputs.openapi }}
      test: ${{ steps.changes.outputs.test }}
      deps: ${{ steps.changes.outputs.deps }}
      e2e: ${{ steps.changes.outputs.e2e }}
      docs: ${{ steps.changes.outputs.docs }}
      web-studio: ${{ steps.changes.outputs.web-studio }}
      tools: ${{ steps.changes.outputs.tools }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: ./.github/actions/changes
        id: changes

  actionlint:
    name: Run actionlint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Install actionlint
        shell: bash
        run: |
          mkdir -p "${RUNNER_TEMP}/actionlint"
          curl -fsSL \
            -o "${RUNNER_TEMP}/actionlint.tar.gz" \
            "https://github.com/rhysd/actionlint/releases/download/v1.7.12/actionlint_1.7.12_linux_amd64.tar.gz"
          echo "8aca8db96f1b94770f1b0d72b6dddcb1ebb8123cb3712530b08cc387b349a3d8  ${RUNNER_TEMP}/actionlint.tar.gz" \
            | sha256sum -c -
          tar -xzf "${RUNNER_TEMP}/actionlint.tar.gz" -C "${RUNNER_TEMP}/actionlint"
      - name: Lint GitHub workflows and actions
        shell: bash
        run: |
          "${RUNNER_TEMP}/actionlint/actionlint"

  lint:
    name: Lint all
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Install uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7.6.0
        with:
          enable-cache: true
          python-version: "3.11"
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'
      - name: Install pnpm via corepack
        run: npm i -g corepack@0.31.0 && corepack enable pnpm
      - name: Install web dependencies
        working-directory: web
        run: pnpm install --frozen-lockfile
      - name: Install scanner dependencies
        shell: bash
        run: script/install_osv_scanner.sh
      - name: Run lint
        run: tools/lint/lint-all.sh
        shell: bash
        env:
          CI_PROJECT_DIR: ${{ github.workspace }}
      - name: Upload lint artifacts
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: lint-artifacts
          retention-days: 7
          path: |
            third_party/
            openapi/openapi.yaml
            openapi/ga/openapi.yaml
            openapicheck/openapi.yaml
            openapicheck/openapi.ga.yaml
            docs/set-up/config-reference.md
            python-sdk-lint/
            web/packages/sdk/generated/
            diff.txt

  policy-wasm:
    name: Build OPA policy WASM
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: ./.github/actions/build-policy-wasm
      - name: Upload policy WASM
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: policy-wasm
          retention-days: 1
          path: services/core/auth/src/nmp/core/auth/assets/policy.wasm

  python-unit-test-tools:
    name: Python unit tests (tools)
    needs: [changes]
    if: >
      !cancelled() && (
        github.event_name == 'workflow_dispatch' ||
        needs.changes.outputs.tools == 'true'
      )
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Install uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7.6.0
        with:
          python-version: "3.11"
          enable-cache: true
      - name: Run tools unit tests
        run: uv run pytest tools -v --junit-xml=report.xml
      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: python-unit-test-tools-results
          retention-days: 30
          path: report.xml

  python-unit-test:
    name: Python unit tests
    needs: [policy-wasm]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Download policy WASM
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: policy-wasm
          path: services/core/auth/src/nmp/core/auth/assets
      - name: Install uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7.6.0
        with:
          python-version: "3.11"
          enable-cache: true
      - name: Run unit tests
        run: make test-unit-ci
        env:
          EXTRA: cpu
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          PYTEST_WORKERS: "4"
          _TYPER_FORCE_DISABLE_TERMINAL: "1"
      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: python-unit-test-results
          retention-days: 30
          path: |
            report.xml
            coverage.xml
            coverage.json
            coverage-html/

  python-integration-test:
    name: Python integration tests
    needs: [policy-wasm]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Free disk space
        uses: ./.github/actions/free-disk-space
      - name: Download policy WASM
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: policy-wasm
          path: services/core/auth/src/nmp/core/auth/assets
      - name: Install uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7.6.0
        with:
          python-version: "3.11"
          enable-cache: true
      - name: Log in to Docker Hub
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          username: ${{ vars.AIRE_DOCKERHUB_USERNAME }}
          password: ${{ secrets.AIRE_DOCKERHUB_ACCESS_TOKEN }}
      - name: Pull mock base images
        run: |
          docker pull nginx:1.29.4-alpine-slim
          docker pull alpine:3.23
        shell: bash
      - name: Run integration tests
        run: make test-integration-ci
        env:
          EXTRA: cpu
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          PYTEST_WORKERS: "4"
          _TYPER_FORCE_DISABLE_TERMINAL: "1"
      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: python-integration-test-results
          retention-days: 30
          path: |
            report.xml
            coverage.xml
            coverage.json

  # Build wheels for all packages × python versions. Downstream jobs
  # (wheel-test, python-e2e-test) download these artifacts instead
  # of rebuilding.
  wheel-build:
    name: ${{ matrix.package }} wheel build (py${{ matrix.python-version }})
    needs: [policy-wasm]
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        package: [nemo-platform, nemo-platform-plugin]
        python-version: ["3.11", "3.12", "3.13", "3.14"]
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Download policy WASM
        if: matrix.package == 'nemo-platform'
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: policy-wasm
          path: services/core/auth/src/nmp/core/auth/assets
      - name: Build ${{ matrix.package }} wheel
        id: build
        uses: ./.github/actions/build-nemo-platform-wheel
        with:
          package: ${{ matrix.package }}
          out-dir: ${{ github.workspace }}/dist
          cadence: nightly
          # Sentinel epoch — the wheel version is meaningless for a CI test
          # build, but stamp_sdk_version.py requires \d{14}.
          nightly-timestamp: "19700101000000"
          python-version: ${{ matrix.python-version }}
      - name: Upload wheel
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ matrix.package }}-wheel-py${{ matrix.python-version }}
          path: ${{ steps.build.outputs.wheel-path }}
          retention-days: 7
          if-no-files-found: error

  # Test each wheel: install from the artifact and run basic CLI /
  # import checks.
  wheel-test:
    name: ${{ matrix.package }} wheel build + test (py${{ matrix.python-version }})
    needs: [wheel-build]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        package: [nemo-platform, nemo-platform-plugin]
        python-version: ["3.11", "3.12", "3.13", "3.14"]
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Install uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7.6.0
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: true
      - name: Download wheel
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ${{ matrix.package }}-wheel-py${{ matrix.python-version }}
          path: ${{ runner.temp }}/wheelcheck

      - name: Install + test nemo-platform CLI
        if: matrix.package == 'nemo-platform'
        shell: bash
        env:
          PYTHON_VERSION: ${{ matrix.python-version }}
          NMP_DATA_DIR: ${{ runner.temp }}/nemo-data
          NMP_AUTH_ENABLED: "false"
          _TYPER_FORCE_DISABLE_TERMINAL: "1"
        run: |
          set -euo pipefail
          shopt -s nullglob
          wheels=("${RUNNER_TEMP}"/wheelcheck/*.whl)
          if [[ "${#wheels[@]}" -ne 1 ]]; then
            echo "::error::Expected exactly one wheel, found ${#wheels[@]}"
            exit 1
          fi
          WHEEL="${wheels[0]}"
          uv tool install --force --python "${PYTHON_VERSION}" "${WHEEL}[services]"
          cd "${RUNNER_TEMP}/wheelcheck"
          unset PYTHONPATH VIRTUAL_ENV
          bash "${GITHUB_WORKSPACE}/script/test-nemo-cli.sh"

      - name: Install + test nemo-platform-plugin
        if: matrix.package == 'nemo-platform-plugin'
        shell: bash
        env:
          PYTHON_VERSION: ${{ matrix.python-version }}
        run: |
          set -euo pipefail
          shopt -s nullglob
          wheels=("${RUNNER_TEMP}"/wheelcheck/*.whl)
          if [[ "${#wheels[@]}" -ne 1 ]]; then
            echo "::error::Expected exactly one wheel, found ${#wheels[@]}"
            exit 1
          fi
          WHEEL="${wheels[0]}"
          cd "${RUNNER_TEMP}/wheelcheck"
          uv venv .venv --python "${PYTHON_VERSION}"
          uv pip install --python .venv/bin/python "${WHEEL}"
          unset PYTHONPATH VIRTUAL_ENV
          # Import the package + a couple of representative submodules
          # (cli, commands). These are the surfaces a plugin author would
          # touch first; if any of them fail to import, the wheel is
          # broken in a way that surfaces immediately on day one.
          .venv/bin/python -c "
          import nemo_platform_plugin
          import nemo_platform_plugin.cli
          import nemo_platform_plugin.commands
          print('nemo_platform_plugin', getattr(nemo_platform_plugin, '__version__', '<no __version__>'))
          "

  # E2E tests: start services from the workspace venv and run the e2e
  # suite against the real process.
  python-e2e-test:
    name: Python e2e tests
    needs: [policy-wasm]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Download policy WASM
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: policy-wasm
          path: services/core/auth/src/nmp/core/auth/assets
      - name: Install uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7.6.0
        with:
          python-version: "3.13"
          enable-cache: true
      - name: Run e2e tests
        run: make test-e2e
        env:
          _TYPER_FORCE_DISABLE_TERMINAL: "1"
          E2E_SERVICES_LOG_DIR: ${{ runner.temp }}/e2e-services-logs
          NGC_API_KEY: ${{ secrets.NGC_REGISTRY_READ_TOKEN }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
      - name: Dump server logs
        if: always()
        run: |
          echo "::group::Server logs"
          for f in "${{ runner.temp }}/e2e-services-logs"/*.log; do
            [ -f "$f" ] && echo "--- $(basename "$f") ---" && cat "$f" || echo "No server logs found"
          done
          echo "::endgroup::"
      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: python-e2e-test-results
          retention-days: 30
          path: |
            report.xml
            ${{ runner.temp }}/e2e-services-logs/

  web-typecheck:
    name: Web typecheck
    needs: [changes]
    if: >
      !cancelled() && (
        github.event_name == 'workflow_dispatch' ||
        needs.changes.outputs.web-studio == 'true'
      )
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
        shell: bash
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
      - name: Install pnpm via corepack
        run: npm i -g corepack@0.31.0 && corepack enable pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Typecheck changed packages
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            git fetch origin "${{ github.base_ref }}" --depth=1
            pnpm --filter="...[origin/${{ github.base_ref }}]" run --parallel --if-present typecheck
          else
            pnpm run --recursive --parallel --if-present typecheck
          fi

  web-test:
    name: Web tests
    needs: [changes]
    if: >
      !cancelled() && (
        github.event_name == 'workflow_dispatch' ||
        needs.changes.outputs.web-studio == 'true'
      )
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
        shell: bash
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
      - name: Install pnpm via corepack
        run: npm i -g corepack@0.31.0 && corepack enable pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Test changed packages
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            git fetch origin "${{ github.base_ref }}" --depth=1
            pnpm --filter="...[origin/${{ github.base_ref }}]" run --parallel --if-present test:ci
          else
            pnpm run --recursive --parallel --if-present test:ci
          fi

  web-format:
    name: Web format check
    needs: [changes]
    if: >
      !cancelled() && (
        github.event_name == 'workflow_dispatch' ||
        needs.changes.outputs.web-studio == 'true'
      )
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
        shell: bash
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
      - name: Install pnpm via corepack
        run: npm i -g corepack@0.31.0 && corepack enable pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Check formatting
        run: pnpm format

  web-lint:
    name: Web lint
    needs: [changes]
    if: >
      !cancelled() && (
        github.event_name == 'workflow_dispatch' ||
        needs.changes.outputs.web-studio == 'true'
      )
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
        shell: bash
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
      - name: Install pnpm via corepack
        run: npm i -g corepack@0.31.0 && corepack enable pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Lint
        run: pnpm lint

  web-sdk-gen:
    name: Web SDK generation check
    needs: [changes]
    if: >
      !cancelled() && (
        github.event_name == 'workflow_dispatch' ||
        needs.changes.outputs.openapi == 'true' ||
        needs.changes.outputs.web-studio == 'true'
      )
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
        shell: bash
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
      - name: Install pnpm via corepack
        run: npm i -g corepack@0.31.0 && corepack enable pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Generate SDK from OpenAPI specs
        run: pnpm --filter @nemo/sdk gen:all-force
      - name: Typecheck SDK generated output
        run: pnpm --filter @nemo/sdk typecheck

  web-studio-deps:
    name: Web studio deps check
    needs: [changes]
    if: >
      !cancelled() && (
        github.event_name == 'workflow_dispatch' ||
        needs.changes.outputs.web-studio == 'true'
      )
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
        shell: bash
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
      - name: Install pnpm via corepack
        run: npm i -g corepack@0.31.0 && corepack enable pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Check studio deps
        run: pnpm deps:studio

  web-studio-e2e:
    name: Studio UI E2E tests
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
        shell: bash
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
      - name: Install pnpm via corepack
        run: npm i -g corepack@0.31.0 && corepack enable pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Install Playwright browsers
        run: pnpm --filter nemo-studio-ui exec playwright install --with-deps
      - name: Run E2E tests
        run: CI=1 pnpm --filter nemo-studio-ui test:e2e
      - name: Upload E2E artifacts
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: studio-e2e-results
          retention-days: 7
          path: web/packages/studio/playwright-report/

  benchmark-guardrails:
    name: Guardrails plugin benchmark
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout nemo-platform
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          path: nemo-platform
      - name: Checkout NeMo-Guardrails
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          repository: NVIDIA/NeMo-Guardrails
          path: NeMo-Guardrails
      - name: Install uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7.6.0
        with:
          # Point setup-uv at the nemo-platform checkout so it picks up the
          # repo's `required-version` constraint from pyproject.toml. Other
          # jobs check out into the workspace root and get this implicitly.
          working-directory: nemo-platform
          python-version: "3.11"
          enable-cache: true
      - name: Bootstrap Python environment
        working-directory: nemo-platform
        run: make bootstrap-python
        env:
          PYTORCH_DEPS: cpu
      - name: Run benchmark sweep
        working-directory: nemo-platform
        run: make benchmark-guardrails
        env:
          NEMO_GUARDRAILS_REPO_ROOT: ${{ github.workspace }}/NeMo-Guardrails
          _TYPER_FORCE_DISABLE_TERMINAL: "1"
      - name: Upload benchmark artifacts
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: benchmark-guardrails-results
          retention-days: 30
          path: |
            nemo-platform/plugins/nemo-guardrails/benchmarks/artifacts/runs/

  coverage-comment:
    name: Post coverage comment
    needs: [python-unit-test, python-integration-test]
    if: always() && github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read
    steps:
      - name: Download unit test coverage
        continue-on-error: true
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: python-unit-test-results
          path: unit-coverage
      - name: Download integration test coverage
        continue-on-error: true
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: python-integration-test-results
          path: integration-coverage
      - name: Prepare coverage table
        run: |
          extract_coverage() {
            local xml_file="$1"
            local label="$2"
            if [[ ! -f "${xml_file}" ]]; then
              echo "| **${label}** | N/A | N/A | N/A |"
              return
            fi
            LINE_RATE=$(grep -oP 'line-rate="\K[^"]+' "${xml_file}" | head -1)
            LINE_COVERED=$(grep -oP 'lines-covered="\K[^"]+' "${xml_file}" | head -1)
            LINE_VALID=$(grep -oP 'lines-valid="\K[^"]+' "${xml_file}" | head -1)
            BRANCH_RATE=$(grep -oP 'branch-rate="\K[^"]+' "${xml_file}" | head -1)
            LINE_PCT=$(awk "BEGIN {printf \"%.1f\", ${LINE_RATE} * 100}")
            BRANCH_PCT=$(awk "BEGIN {printf \"%.1f\", ${BRANCH_RATE} * 100}")
            echo "| **${label}** | ${LINE_COVERED}/${LINE_VALID} | ${LINE_PCT}% | ${BRANCH_PCT}% |"
          }

          {
            echo "| Suite | Lines Covered | Line Rate | Branch Rate |"
            echo "| --- | --- | --- | --- |"
            extract_coverage "unit-coverage/coverage.xml" "Unit Tests"
            extract_coverage "integration-coverage/coverage.xml" "Integration Tests"
          } > summary.md
          cat summary.md
        shell: bash
      - name: Post comment
        uses: marocchino/sticky-pull-request-comment@70d2764d1a7d5d9560b100cbea0077fc8f633987
        with:
          header: coverage-report
          path: summary.md

  opa-policy-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Install OPA 1.8.0
        run: |
          curl -L -o opa https://github.com/open-policy-agent/opa/releases/download/v1.8.0/opa_linux_amd64_static
          chmod +x opa
          ./opa version
      - name: Run test
        run: |
          ./opa test services/core/auth/src/nmp/core/auth/app/policies services/core/auth/src/nmp/core/auth/app/policy_tests services/core/auth/src/nmp/core/auth/assets/static-authz.yaml -v

  require-nvskills:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Require trusted NVSkills signature for skills changes
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        env:
          SIGNATURE_ACTOR: ${{ vars.NVSKILLS_SIGNATURE_PUSH_ACTOR || 'svc-nvskills-signing' }}
          SIGNATURE_TITLE: ${{ vars.NVSKILLS_SIGNATURE_COMMIT_TITLE || 'Attach NVSkills validation signatures' }}
          ONBOARDING_DOC: https://nvidia.atlassian.net/wiki/spaces/GAIT/pages/3483240468/Github+First+-+Outbound+Repos+Onboarding+doc+-+NVCARPS#Review-Internal-Pipeline-Logs
        with:
          script: |
            const pr = context.payload.pull_request;
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            const files = await github.paginate(github.rest.pulls.listFiles, {
              owner,
              repo,
              pull_number: pr.number,
              per_page: 100,
            });

            const touchedSkills = files.some((file) => file.filename.startsWith('skills/'));
            if (!touchedSkills) {
              core.info('No files under skills/ changed.');
              return;
            }

            const commit = await github.rest.repos.getCommit({
              owner,
              repo,
              ref: pr.head.sha,
            });

            const actor = commit.data.author?.login || '';
            const title = commit.data.commit.message.split('\n')[0];

            const okActor = actor === process.env.SIGNATURE_ACTOR;
            const okTitle = title.startsWith(process.env.SIGNATURE_TITLE);

            if (!okActor || !okTitle) {
              core.setFailed(
                'Files under skills/ changed in this PR, but HEAD is not the trusted NVSkills signature commit. ' +
                'Ask a maintainer/admin to comment /nvskills-ci. If new skills/ content was pushed after signing, rerun /nvskills-ci. ' +
                `Expected HEAD GitHub author "${process.env.SIGNATURE_ACTOR}" and commit title prefix "${process.env.SIGNATURE_TITLE}". ` +
                `See ${process.env.ONBOARDING_DOC}.`
              );
            }

  # Required-check pin: branch protection should require this final aggregate.
  # Skipped jobs count as pass so conditional jobs can remain optional.
  ci-status:
    name: CI status
    needs:
      - changes
      - actionlint
      - lint
      - policy-wasm
      - python-unit-test-tools
      - python-unit-test
      # Enable if you want this required
      # - python-integration-test
      - require-nvskills
      - wheel-build
      - wheel-test
      - python-e2e-test
      - web-typecheck
      - web-test
      - web-format
      - web-lint
      - web-sdk-gen
      - web-studio-deps
      - web-studio-e2e
      - benchmark-guardrails
      - opa-policy-test
    if: always()
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check all dependent jobs
        shell: bash
        env:
          NEEDS_JSON: ${{ toJson(needs) }}
        run: |
          set -euo pipefail

          {
            echo "## CI status"
            echo
            echo "| Job | Result |"
            echo "| --- | --- |"
            printf '%s\n' "${NEEDS_JSON}" \
              | jq -r 'to_entries[] | "| \(.key) | \(.value.result) |"'
          } >> "${GITHUB_STEP_SUMMARY}"

          printf '%s\n' "${NEEDS_JSON}" \
            | jq -e 'to_entries | map(.value.result) | all(. as $result | ["success", "skipped"] | any($result == .))'

