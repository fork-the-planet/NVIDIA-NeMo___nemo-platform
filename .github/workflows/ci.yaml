name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  merge_group:
    types: [checks_requested]
  workflow_dispatch:
    inputs:
      image_tag:
        description: Optional CPU smoke image tag. Defaults to the commit SHA.
        required: false
        type: string
        default: ""
      publish:
        description: Publish CPU smoke images to GHCR.
        required: false
        type: boolean
        default: true

permissions:
  actions: read
  contents: read
  pull-requests: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  changes:
    name: Detect Path Changes
    runs-on: ubuntu-latest
    outputs:
      openapi: ${{ steps.changes.outputs.openapi }}
      test: ${{ steps.changes.outputs.test }}
      deps: ${{ steps.changes.outputs.deps }}
      e2e: ${{ steps.changes.outputs.e2e }}
      docs: ${{ steps.changes.outputs.docs }}
      web-studio: ${{ steps.changes.outputs.web-studio }}
      tools: ${{ steps.changes.outputs.tools }}
      docker: ${{ steps.changes.outputs.docker }}
      helm: ${{ steps.changes.outputs.helm }}
      cpu-smoke: ${{ steps.changes.outputs.cpu-smoke }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: ./.github/actions/changes
        id: changes

  actionlint:
    name: Run actionlint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Install actionlint
        shell: bash
        run: |
          mkdir -p "${RUNNER_TEMP}/actionlint"
          curl -fsSL \
            -o "${RUNNER_TEMP}/actionlint.tar.gz" \
            "https://github.com/rhysd/actionlint/releases/download/v1.7.12/actionlint_1.7.12_linux_amd64.tar.gz"
          echo "8aca8db96f1b94770f1b0d72b6dddcb1ebb8123cb3712530b08cc387b349a3d8  ${RUNNER_TEMP}/actionlint.tar.gz" \
            | sha256sum -c -
          tar -xzf "${RUNNER_TEMP}/actionlint.tar.gz" -C "${RUNNER_TEMP}/actionlint"
      - name: Lint GitHub workflows and actions
        shell: bash
        run: |
          "${RUNNER_TEMP}/actionlint/actionlint"

  docker-bake-graph:
    name: Docker bake graph
    needs: [changes]
    if: >
      !cancelled() && (
        github.event_name == 'workflow_dispatch' ||
        needs.changes.outputs.docker == 'true'
      )
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Print bake groups
        shell: bash
        run: |
          make docker-print TARGET=docker-cpu
          make docker-print TARGET=docker-gpu
          make docker-print TARGET=docker-auditor
          make docker-print TARGET=docker-python-base
          make docker-print TARGET=nmp-automodel-gpu-wheels
          make docker-print TARGET=nmp-automodel
          make docker-print TARGET=nmp-unsloth

  build-cpu-smoke-images:
    name: Build CPU smoke images
    needs: [changes]
    if: >
      !cancelled() && (
        github.event_name == 'workflow_dispatch' ||
        needs.changes.outputs.cpu-smoke == 'true'
      )
    runs-on: ubuntu-latest
    timeout-minutes: 90
    permissions:
      contents: read
      packages: write
    outputs:
      image_registry: ${{ steps.bake-vars.outputs.image_registry }}
      image_tag: ${{ steps.bake-vars.outputs.image_tag }}
      publish_images: ${{ steps.bake-vars.outputs.publish_images }}
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Free disk space
        uses: ./.github/actions/free-disk-space
        with:
          disable_swap: "true"
          remove_haskell: "true"
          remove_java: "true"
          remove_ruby: "true"
          remove_swift: "true"
          prune_docker: "true"

      - name: Set up Docker Buildx
        shell: bash
        run: |
          set -euo pipefail
          docker buildx create --name nmp-builder --driver docker-container --use
          docker buildx inspect --bootstrap

      - name: Configure bake variables
        id: bake-vars
        shell: bash
        env:
          HEAD_REPOSITORY: ${{ github.event.pull_request.head.repo.full_name || github.repository }}
          INPUT_IMAGE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.image_tag || '' }}
          INPUT_PUBLISH: ${{ inputs.publish }}
          SOURCE_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
        run: |
          set -euo pipefail

          image_registry="ghcr.io/${GITHUB_REPOSITORY,,}"
          source_sha="${SOURCE_SHA:-$GITHUB_SHA}"
          bake_tag="${INPUT_IMAGE_TAG:-$source_sha}"
          fastembed_cache_dir="${RUNNER_TEMP}/fastembed-cache"
          publish_images="false"

          if [ "$GITHUB_EVENT_NAME" = "push" ] && [ "$GITHUB_REF" = "refs/heads/main" ]; then
            publish_images="true"
          fi

          if [ "$GITHUB_EVENT_NAME" = "pull_request" ] && [ "$HEAD_REPOSITORY" = "$GITHUB_REPOSITORY" ]; then
            publish_images="true"
          fi

          if [ "$GITHUB_EVENT_NAME" = "merge_group" ]; then
            publish_images="true"
          fi

          if [ "$GITHUB_EVENT_NAME" = "workflow_dispatch" ] && [ "$INPUT_PUBLISH" = "true" ]; then
            publish_images="true"
          fi

          {
            printf 'IMAGE_REGISTRY=%s\n' "$image_registry"
            printf 'BASE_REGISTRY=%s\n' "$image_registry"
            printf 'CACHE_REGISTRY=%s\n' "$image_registry"
            printf 'BAKE_TAG=%s\n' "$bake_tag"
            printf 'CI_COMMIT_SHA=%s\n' "$source_sha"
            printf 'FASTEMBED_CACHE_CONTEXT=%s\n' "$fastembed_cache_dir"
            printf 'FASTEMBED_CACHE_DIR=%s\n' "$fastembed_cache_dir"
            printf 'FASTEMBED_MODEL_REPO=%s\n' "qdrant/all-MiniLM-L6-v2-onnx"
            printf 'FASTEMBED_MODEL_REVISION=%s\n' "main"
            printf 'PUBLISH_IMAGES=%s\n' "$publish_images"
          } >> "$GITHUB_ENV"
          {
            printf 'image_registry=%s\n' "$image_registry"
            printf 'image_tag=%s\n' "$bake_tag"
            printf 'publish_images=%s\n' "$publish_images"
          } >> "$GITHUB_OUTPUT"

      - name: Prepare fastembed model cache directory
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "${FASTEMBED_CACHE_DIR}"
          touch "${FASTEMBED_CACHE_DIR}/.cache-context"

      - name: Restore fastembed model cache
        id: fastembed-cache
        uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ${{ runner.temp }}/fastembed-cache
          key: fastembed-qdrant-all-MiniLM-L6-v2-onnx-main-v1

      - name: Install uv for fastembed model cache
        if: steps.fastembed-cache.outputs.cache-hit != 'true'
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7.6.0
        with:
          version-file: pyproject.toml

      - name: Populate fastembed model cache
        if: steps.fastembed-cache.outputs.cache-hit != 'true'
        shell: bash
        run: |
          set -euo pipefail
          HF_HUB_DISABLE_UPDATE_CHECK=1 uv run --no-project --with 'huggingface-hub>=1.0.1,<2.0.0' hf download \
            "${FASTEMBED_MODEL_REPO}" \
            --revision "${FASTEMBED_MODEL_REVISION}" \
            --cache-dir "${FASTEMBED_CACHE_DIR}" \
            --format quiet
          find "${FASTEMBED_CACHE_DIR}/models--qdrant--all-MiniLM-L6-v2-onnx/snapshots" \
            -mindepth 1 -maxdepth 1 -type d -print -quit | grep -q .

      - name: Log in to GHCR
        if: env.PUBLISH_IMAGES == 'true'
        shell: bash
        env:
          GHCR_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GITHUB_ACTOR" --password-stdin

      - name: Print Docker bake graph
        shell: bash
        run: make docker-print TARGET=docker-cpu

      - name: Build CPU images
        if: env.PUBLISH_IMAGES != 'true'
        shell: bash
        run: make docker-load TARGET=docker-cpu

      - name: Build and publish CPU images
        if: env.PUBLISH_IMAGES == 'true'
        shell: bash
        run: make docker-push TARGET=docker-cpu

      - name: Save fastembed model cache
        if: steps.fastembed-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        continue-on-error: true
        with:
          path: ${{ runner.temp }}/fastembed-cache
          key: fastembed-qdrant-all-MiniLM-L6-v2-onnx-main-v1

  kind-cpu-smoke:
    name: Kind CPU smoke test
    needs: [changes, build-cpu-smoke-images]
    if: >
      !cancelled() &&
      needs.build-cpu-smoke-images.result == 'success' &&
      needs.build-cpu-smoke-images.outputs.publish_images == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read
      packages: read
    env:
      BUSYBOX_IMAGE: docker.io/library/busybox
      HELM_CHART: k8s/helm
      K8S_E2E_SCRIPTS: e2e/k8s/scripts
      K8S_E2E_VALUES: e2e/k8s/values
      KIND_CLUSTER_NAME: gha-${{ github.run_id }}-${{ github.run_attempt }}-kind-smoke
      KUBE_GATEWAY_NAME: nmp-e2e-gateway
      KUBE_NAMESPACE: nemo-platform
      NAMESPACE: nemo-platform
      NMP_E2E_CLUSTER_URL: ""
      NMP_E2E_INTERNAL_HOST: nemo-platform-api:8080
      NMP_E2E_REGISTRY: ${{ needs.build-cpu-smoke-images.outputs.image_registry }}
      NMP_E2E_TAG: ${{ needs.build-cpu-smoke-images.outputs.image_tag }}
      POSTGRES_IMAGE: docker.io/library/postgres
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Free disk space
        uses: ./.github/actions/free-disk-space
        with:
          disable_swap: "true"
          remove_haskell: "true"
          remove_java: "true"
          remove_ruby: "true"
          remove_swift: "true"
          prune_docker: "true"

      - name: Install kind
        shell: bash
        env:
          KIND_VERSION: v0.32.0
        run: |
          set -euo pipefail

          case "$(uname -m)" in
            x86_64) arch=amd64 ;;
            aarch64|arm64) arch=arm64 ;;
            *)
              echo "Unsupported architecture: $(uname -m)" >&2
              exit 1
              ;;
          esac

          kind_url="https://github.com/kubernetes-sigs/kind/releases/download/${KIND_VERSION}/kind-linux-${arch}"
          curl -fsSLo "${RUNNER_TEMP}/kind" "${kind_url}"
          curl -fsSLo "${RUNNER_TEMP}/kind.sha256sum" "${kind_url}.sha256sum"
          sed "s#  kind-linux-${arch}#  ${RUNNER_TEMP}/kind#" "${RUNNER_TEMP}/kind.sha256sum" | sha256sum -c -
          sudo install -m 0755 "${RUNNER_TEMP}/kind" /usr/local/bin/kind

      - name: Install kubectl
        shell: bash
        env:
          KUBECTL_VERSION: v1.33.7
        run: |
          set -euo pipefail

          case "$(uname -m)" in
            x86_64) arch=amd64 ;;
            aarch64|arm64) arch=arm64 ;;
            *)
              echo "Unsupported architecture: $(uname -m)" >&2
              exit 1
              ;;
          esac

          kubectl_url="https://dl.k8s.io/release/${KUBECTL_VERSION}/bin/linux/${arch}/kubectl"
          curl -fsSLo "${RUNNER_TEMP}/kubectl" "${kubectl_url}"
          curl -fsSLo "${RUNNER_TEMP}/kubectl.sha256" "${kubectl_url}.sha256"
          echo "$(cat "${RUNNER_TEMP}/kubectl.sha256")  ${RUNNER_TEMP}/kubectl" | sha256sum -c -
          sudo install -m 0755 "${RUNNER_TEMP}/kubectl" /usr/local/bin/kubectl

      - name: Install Helm
        uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2 # v5.0.0

      - name: Install uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7.6.0
        with:
          python-version: "3.13"
          enable-cache: true
          version-file: pyproject.toml
          cache-dependency-glob: uv.lock

      - name: Start kind cluster
        shell: bash
        env:
          NGC_API_KEY: not-used-for-ghcr-cpu-smoke
        run: bash "${K8S_E2E_SCRIPTS}/setup_local_kind_cpu.sh"

      - name: Set default kubectl namespace
        shell: bash
        run: kubectl config set-context --current --namespace="${NAMESPACE}"

      - name: Verify Gateway API setup
        shell: bash
        run: |
          set -euo pipefail
          kubectl wait --for=condition=Established crd/gateways.gateway.networking.k8s.io --timeout=2m
          kubectl wait --for=condition=Established crd/httproutes.gateway.networking.k8s.io --timeout=2m
          kubectl get gatewayclass cloud-provider-kind
          kubectl -n "${NAMESPACE}" get gateway "${KUBE_GATEWAY_NAME}"

      - name: Pre-pull GHCR images into kind
        shell: bash
        env:
          KIND_IMAGE_PULL_TOKEN: ${{ github.token }}
          KIND_IMAGE_PULL_USER: ${{ github.actor }}
        run: |
          "${K8S_E2E_SCRIPTS}/prepull_kind_images.sh" \
            "${NMP_E2E_REGISTRY}/nmp-api:${NMP_E2E_TAG}" \
            "${NMP_E2E_REGISTRY}/nmp-core:${NMP_E2E_TAG}" \
            "${NMP_E2E_REGISTRY}/nmp-cpu-tasks:${NMP_E2E_TAG}"

      - name: Install NeMo Platform
        shell: bash
        env:
          REQUIRE_NMP_E2E_IMAGES: "true"
        run: |
          if ! HELM_VALUES="${K8S_E2E_VALUES}/kind.yaml" "${K8S_E2E_SCRIPTS}/install_helm_e2e.sh"; then
            echo "--- helm list -A ---"
            helm list -A || true
            echo "--- helm status ${NAMESPACE}/nemo-platform ---"
            helm status -n "${NAMESPACE}" nemo-platform || true
            echo "--- kubectl get all -n ${NAMESPACE} ---"
            kubectl get all -n "${NAMESPACE}" || true
            exit 1
          fi

      - name: Wait for API
        shell: bash
        run: |
          test -n "${NMP_E2E_CLUSTER_URL}"
          "${K8S_E2E_SCRIPTS}/wait_for_api.sh" "${NMP_E2E_CLUSTER_URL}/cluster-info" 120

      - name: Run CPU job e2e smoke test
        shell: bash
        env:
          _TYPER_FORCE_DISABLE_TERMINAL: "1"
          E2E_SERVICES_LOG_DIR: ${{ runner.temp }}/e2e-services-logs
          NGC_API_KEY: not-used-for-ghcr-cpu-smoke
        run: |
          test -n "${NMP_E2E_CLUSTER_URL}"
          export NMP_BASE_URL="${NMP_E2E_CLUSTER_URL}"
          uv run --frozen pytest \
            e2e/test_jobs.py::test_job_using_secret_environment_variable \
            -v \
            --run-e2e \
            --no-cov \
            --junitxml=report-kubernetes-smoke.xml

      - name: Collect Kubernetes logs
        if: always()
        shell: bash
        run: |
          "${K8S_E2E_SCRIPTS}/collect_k8s_logs.sh"

      - name: Disk usage summary
        if: always()
        shell: bash
        run: |
          echo "=== Host disk ==="
          df -h /
          echo "=== Docker system ==="
          docker system df
          echo "=== kind node storage ==="
          for node in $(kind get nodes --name "${KIND_CLUSTER_NAME}" 2>/dev/null); do
            echo "--- ${node} ---"
            docker exec "${node}" sh -c "du -sh /var/lib/containerd /var/lib/kubelet /var/log 2>/dev/null | sort -h" || true
          done

      - name: Upload Kubernetes artifacts
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: kind-smoke-kubernetes-artifacts
          retention-days: 7
          if-no-files-found: ignore
          path: |
            k8s-logs/
            report-kubernetes-smoke.xml
            ${{ runner.temp }}/e2e-services-logs/

      - name: Delete kind cluster
        if: always()
        shell: bash
        run: |
          docker rm -f "cloud-provider-kind-${KIND_CLUSTER_NAME}" || true
          kind delete cluster --name "${KIND_CLUSTER_NAME}" || true

  helm-lint:
    name: Helm lint
    needs: [changes]
    if: >
      !cancelled() && (
        github.event_name == 'workflow_dispatch' ||
        needs.changes.outputs.helm == 'true'
      )
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      HELM_FOLDER: k8s/helm
      HELM_RELEASE_NAME: nemo-platform
      KUBECONFORM_VERSION: v0.6.7
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Install Helm
        uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2 # v5.0.0
      - name: Install kubeconform
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p "${RUNNER_TEMP}/kubeconform"
          kubeconform_archive="kubeconform-linux-amd64.tar.gz"
          curl -fsSL \
            -o "${RUNNER_TEMP}/kubeconform.tar.gz" \
            "https://github.com/yannh/kubeconform/releases/download/${KUBECONFORM_VERSION}/${kubeconform_archive}"
          curl -fsSL \
            -o "${RUNNER_TEMP}/kubeconform.CHECKSUMS" \
            "https://github.com/yannh/kubeconform/releases/download/${KUBECONFORM_VERSION}/CHECKSUMS"
          grep "  ${kubeconform_archive}$" "${RUNNER_TEMP}/kubeconform.CHECKSUMS" \
            | sed "s#  ${kubeconform_archive}#  ${RUNNER_TEMP}/kubeconform.tar.gz#" \
            | sha256sum -c -
          tar -xzf "${RUNNER_TEMP}/kubeconform.tar.gz" -C "${RUNNER_TEMP}/kubeconform" kubeconform
          chmod +x "${RUNNER_TEMP}/kubeconform/kubeconform"
          echo "${RUNNER_TEMP}/kubeconform" >> "${GITHUB_PATH}"
      - name: Add NVIDIA Helm repo
        shell: bash
        run: |
          helm repo add nvidia https://helm.ngc.nvidia.com/nvidia
          helm repo update
      - name: Lint and validate Helm chart
        shell: bash
        run: tools/lint/lint-helm.sh
      - name: Upload Helm lint artifacts
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: helm-lint-artifacts
          retention-days: 7
          if-no-files-found: ignore
          path: |
            k8s/helm/ci/*.output
            k8s/helm/ci/*.kubeconform.json

  helm-chart-verifier:
    name: Helm chart verifier
    needs: [changes]
    if: >
      !cancelled() && (
        github.event_name == 'workflow_dispatch' ||
        needs.changes.outputs.helm == 'true'
      )
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      CHART_VERIFIER_VERSION: "1.14.0"
      HELM_FOLDER: k8s/helm
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Install Helm
        uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2 # v5.0.0
      - name: Install chart-verifier
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p "${RUNNER_TEMP}/chart-verifier"
          chart_verifier_archive="chart-verifier-${CHART_VERIFIER_VERSION}.tgz"
          curl -fsSL \
            -o "${RUNNER_TEMP}/chart-verifier.tar.gz" \
            "https://github.com/redhat-certification/chart-verifier/releases/download/${CHART_VERIFIER_VERSION}/${chart_verifier_archive}"
          chart_verifier_sha256="$(
            curl -fsSL "https://api.github.com/repos/redhat-certification/chart-verifier/releases/tags/${CHART_VERIFIER_VERSION}" \
              | python3 -c 'import json, sys; target = sys.argv[1]; digests = [asset.get("digest", "") for asset in json.load(sys.stdin).get("assets", []) if asset.get("name") == target]; digest = digests[0] if digests else ""; print(digest.removeprefix("sha256:")) if digest.startswith("sha256:") else sys.exit(1)' "${chart_verifier_archive}"
          )"
          printf '%s  %s\n' "${chart_verifier_sha256}" "${RUNNER_TEMP}/chart-verifier.tar.gz" \
            | sha256sum -c -
          tar -xzf "${RUNNER_TEMP}/chart-verifier.tar.gz" -C "${RUNNER_TEMP}/chart-verifier" chart-verifier
          chmod +x "${RUNNER_TEMP}/chart-verifier/chart-verifier"
          echo "${RUNNER_TEMP}/chart-verifier" >> "${GITHUB_PATH}"
      - name: Prepare Helm dependencies
        shell: bash
        run: |
          helm repo add nvidia https://helm.ngc.nvidia.com/nvidia
          helm repo update
          helm dep update "${HELM_FOLDER}"
      - name: Run chart verifier
        shell: bash
        run: |
          set -euo pipefail

          report_json="${RUNNER_TEMP}/chart-verifier-report.json"
          chart-verifier verify --enable helm-lint,is-helm-v3,contains-values,has-readme \
            -o json "${HELM_FOLDER}" | tee "${report_json}"

          python3 - "${report_json}" <<'PY'
          import json
          import sys

          with open(sys.argv[1], encoding="utf-8") as report_file:
              data = json.load(report_file)

          failed = [
              result.get("check", "?")
              for result in data.get("results", [])
              if result.get("outcome") == "FAIL"
          ]
          if failed:
              print("chart-verifier failed checks: " + ", ".join(failed), file=sys.stderr)
              sys.exit(1)
          PY

  lint:
    name: Lint all
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Install uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7.6.0
        with:
          enable-cache: true
          python-version: "3.11"
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'
      - name: Install pnpm via corepack
        run: npm i -g corepack@0.31.0 && corepack enable pnpm
      - name: Install web dependencies
        working-directory: web
        run: pnpm install --frozen-lockfile
      - name: Install scanner dependencies
        shell: bash
        run: script/install_osv_scanner.sh
      - name: Run lint
        run: tools/lint/lint-all.sh
        shell: bash
        env:
          CI_PROJECT_DIR: ${{ github.workspace }}
      - name: Upload lint artifacts
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: lint-artifacts
