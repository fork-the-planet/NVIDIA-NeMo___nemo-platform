name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  merge_group:
    types: [checks_requested]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  changes:
    name: Detect Path Changes
    runs-on: ubuntu-latest
    outputs:
      openapi: ${{ steps.changes.outputs.openapi }}
      test: ${{ steps.changes.outputs.test }}
      deps: ${{ steps.changes.outputs.deps }}
      e2e: ${{ steps.changes.outputs.e2e }}
      docs: ${{ steps.changes.outputs.docs }}
      web: ${{ steps.changes.outputs.web }}
      tools: ${{ steps.changes.outputs.tools }}
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/changes
        id: changes

  lint:
    name: Lint all
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          python-version: "3.11"
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install pnpm via corepack
        run: npm i -g corepack@0.31.0 && corepack enable pnpm
      - name: Install web dependencies
        working-directory: web
        run: pnpm install --frozen-lockfile
      - name: Install scanner dependencies
        shell: bash
        run: script/install_osv_scanner.sh
      - name: Run lint
        run: tools/lint/lint-all.sh
        shell: bash
        env:
          CI_PROJECT_DIR: ${{ github.workspace }}
      - name: Upload lint artifacts
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: lint-artifacts
          retention-days: 7
          path: |
            third_party/
            openapi/openapi.yaml
            openapi/ga/openapi.yaml
            openapicheck/openapi.yaml
            openapicheck/openapi.ga.yaml
            docs/set-up/config-reference.md
            python-sdk-lint/
            web/packages/sdk/generated/
            diff.txt

  policy-wasm:
    name: Build OPA policy WASM
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/build-policy-wasm
      - name: Upload policy WASM
        uses: actions/upload-artifact@v6
        with:
          name: policy-wasm
          retention-days: 1
          path: services/core/auth/src/nmp/core/auth/assets/policy.wasm

  python-unit-test-tools:
    name: Python unit tests (tools)
    needs: [changes]
    if: >
      always() && (
        github.event_name == 'workflow_dispatch' ||
        needs.changes.outputs.tools == 'true'
      )
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.11"
          enable-cache: true
      - name: Run tools unit tests
        run: uv run pytest tools -v --junit-xml=report.xml
      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: python-unit-test-tools-results
          retention-days: 30
          path: report.xml

  python-unit-test:
    name: Python unit tests
    needs: [policy-wasm]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Download policy WASM
        uses: actions/download-artifact@v8
        with:
          name: policy-wasm
          path: services/core/auth/src/nmp/core/auth/assets
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.11"
          enable-cache: true
      - name: Run unit tests
        run: make test-unit-ci
        env:
          EXTRA: cpu
          PYTEST_WORKERS: "2"
          _TYPER_FORCE_DISABLE_TERMINAL: "1"
      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: python-unit-test-results
          retention-days: 30
          path: |
            report.xml
            coverage.xml
            coverage.json
            coverage-html/

  python-integration-test:
    name: Python integration tests
    needs: [policy-wasm]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Free disk space
        uses: ./.github/actions/free-disk-space
      - name: Download policy WASM
        uses: actions/download-artifact@v8
        with:
          name: policy-wasm
          path: services/core/auth/src/nmp/core/auth/assets
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.11"
          enable-cache: true
      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ vars.AIRE_DOCKERHUB_USERNAME }}
          password: ${{ secrets.AIRE_DOCKERHUB_ACCESS_TOKEN }}
      - name: Pull mock base images
        run: |
          docker pull nginx:1.29.4-alpine-slim
          docker pull alpine:3.23
        shell: bash
      - name: Run integration tests
        run: make test-integration-ci
        env:
          EXTRA: cpu
          PYTEST_WORKERS: "2"
          _TYPER_FORCE_DISABLE_TERMINAL: "1"
      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: python-integration-test-results
          retention-days: 30
          path: |
            report.xml
            coverage.xml
            coverage.json

  # One job, one (package x python) matrix — kept as a single job rather
  # than split per-package because the build path is identical and the
  # matrix definition is the natural place to change what's covered.
  # nemo-platform's wheel force-includes auth's policy.wasm at build time;
  # nemo-platform-plugin doesn't, but plugin rows still wait on policy-wasm
  # because needs: is per-job. ~5s of harmless wait per plugin row.
  wheel-test:
    name: ${{ matrix.package }} wheel build + test (py${{ matrix.python-version }})
    needs: [policy-wasm]
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        package: [nemo-platform, nemo-platform-plugin]
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Download policy WASM
        if: matrix.package == 'nemo-platform'
        uses: actions/download-artifact@v8
        with:
          name: policy-wasm
          path: services/core/auth/src/nmp/core/auth/assets
      - name: Build ${{ matrix.package }} wheel
        id: build
        uses: ./.github/actions/build-nemo-platform-wheel
        with:
          package: ${{ matrix.package }}
          out-dir: ${{ github.workspace }}/dist
          cadence: nightly
          # Sentinel epoch — the wheel version is meaningless for a CI test
          # build, but stamp_sdk_version.py requires \d{14}.
          nightly-timestamp: "19700101000000"
          python-version: ${{ matrix.python-version }}

      # The two install+test steps below intentionally share a small preamble
      # (mkdir + cp). Hoisting it into a separate step would cost more in
      # workflow indirection than the 3 duplicated lines save.
      - name: Install + test nemo-platform CLI
        if: matrix.package == 'nemo-platform'
        shell: bash
        env:
          WHEEL: ${{ steps.build.outputs.wheel-path }}
          PYTHON_VERSION: ${{ matrix.python-version }}
          NMP_DATA_DIR: ${{ runner.temp }}/nemo-data
        run: |
          set -euo pipefail
          # Copy the wheel out of $GITHUB_WORKSPACE so the test cd's away
          # from the source tree and Python can't reach back into it.
          mkdir -p "${RUNNER_TEMP}/wheelcheck"
          cp "${WHEEL}" "${RUNNER_TEMP}/wheelcheck/"
          uv tool install --force --python "${PYTHON_VERSION}" \
            "${RUNNER_TEMP}/wheelcheck/$(basename "${WHEEL}")[services]"
          cd "${RUNNER_TEMP}/wheelcheck"
          unset PYTHONPATH VIRTUAL_ENV
          bash "${GITHUB_WORKSPACE}/script/test-nemo-cli.sh"

      - name: Install + test nemo-platform-plugin
        if: matrix.package == 'nemo-platform-plugin'
        shell: bash
        env:
          WHEEL: ${{ steps.build.outputs.wheel-path }}
          PYTHON_VERSION: ${{ matrix.python-version }}
        run: |
          set -euo pipefail
          mkdir -p "${RUNNER_TEMP}/wheelcheck"
          cp "${WHEEL}" "${RUNNER_TEMP}/wheelcheck/"
          cd "${RUNNER_TEMP}/wheelcheck"
          uv venv .venv --python "${PYTHON_VERSION}"
          uv pip install --python .venv/bin/python "$(basename "${WHEEL}")"
          unset PYTHONPATH VIRTUAL_ENV
          # Import the package + a couple of representative submodules
          # (cli, commands). These are the surfaces a plugin author would
          # touch first; if any of them fail to import, the wheel is
          # broken in a way that surfaces immediately on day one. If
          # the plugin's public API surface changes substantially, this
          # list should be revisited.
          .venv/bin/python -c "
          import nemo_platform_plugin
          import nemo_platform_plugin.cli
          import nemo_platform_plugin.commands
          print('nemo_platform_plugin', getattr(nemo_platform_plugin, '__version__', '<no __version__>'))
          "

      - name: Upload wheel
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.package }}-wheel-py${{ matrix.python-version }}
          path: ${{ steps.build.outputs.wheel-path }}
          retention-days: 7
          if-no-files-found: error

  # Required-check pin: branch protection should reference this aggregator
  # rather than the per-row matrix jobs, so the matrix can grow or shrink
  # without admin intervention. Skipped counts as pass.
  wheel-test-aggregate:
    name: Wheel build + test
    needs: [wheel-test]
    if: always()
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check matrix result
        shell: bash
        env:
          MATRIX_RESULT: ${{ needs.wheel-test.result }}
          # Per-row results, useful for debugging which (package, python)
          # combination failed. GitHub doesn't expose individual matrix
          # results by name; the workflow run UI is the canonical place
          # to look. We surface a pointer in the failure message.
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail
          case "${MATRIX_RESULT}" in
            success|skipped)
              echo "wheel-test matrix: ${MATRIX_RESULT}"
              ;;
            *)
              echo "::error::wheel-test matrix concluded ${MATRIX_RESULT}"
              echo "::error::see per-row results: ${RUN_URL}"
              exit 1
              ;;
          esac

  coverage-comment:
    name: Post coverage comment
    needs: [python-unit-test, python-integration-test]
    if: always() && github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read
    steps:
      - name: Download unit test coverage
        continue-on-error: true
        uses: actions/download-artifact@v8
        with:
          name: python-unit-test-results
          path: unit-coverage
      - name: Download integration test coverage
        continue-on-error: true
        uses: actions/download-artifact@v8
        with:
          name: python-integration-test-results
          path: integration-coverage
      - name: Prepare coverage table
        run: |
          extract_coverage() {
            local xml_file="$1"
            local label="$2"
            if [[ ! -f "${xml_file}" ]]; then
              echo "| **${label}** | N/A | N/A | N/A |"
              return
            fi
            LINE_RATE=$(grep -oP 'line-rate="\K[^"]+' "${xml_file}" | head -1)
            LINE_COVERED=$(grep -oP 'lines-covered="\K[^"]+' "${xml_file}" | head -1)
            LINE_VALID=$(grep -oP 'lines-valid="\K[^"]+' "${xml_file}" | head -1)
            BRANCH_RATE=$(grep -oP 'branch-rate="\K[^"]+' "${xml_file}" | head -1)
            LINE_PCT=$(awk "BEGIN {printf \"%.1f\", ${LINE_RATE} * 100}")
            BRANCH_PCT=$(awk "BEGIN {printf \"%.1f\", ${BRANCH_RATE} * 100}")
            echo "| **${label}** | ${LINE_COVERED}/${LINE_VALID} | ${LINE_PCT}% | ${BRANCH_PCT}% |"
          }

          {
            echo "| Suite | Lines Covered | Line Rate | Branch Rate |"
            echo "| --- | --- | --- | --- |"
            extract_coverage "unit-coverage/coverage.xml" "Unit Tests"
            extract_coverage "integration-coverage/coverage.xml" "Integration Tests"
          } > summary.md
          cat summary.md
        shell: bash
      - name: Post comment
        uses: marocchino/sticky-pull-request-comment@70d2764d1a7d5d9560b100cbea0077fc8f633987
        with:
          header: coverage-report
          path: summary.md

  opa-policy-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Install OPA 1.8.0
        run: |
          curl -L -o opa https://github.com/open-policy-agent/opa/releases/download/v1.8.0/opa_linux_amd64_static
          chmod +x opa
          ./opa version
      - name: Run test
        run: |
          ./opa test services/core/auth/src/nmp/core/auth/app/policies services/core/auth/src/nmp/core/auth/app/policy_tests services/core/auth/src/nmp/core/auth/assets/static-authz.yaml -v

  notify-ci-consumer:
    name: Notify CI consumer
    needs: [lint, python-unit-test, opa-policy-test, wheel-test-aggregate]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Send completion event
        env:
          GH_TOKEN: ${{ secrets.CI_DISPATCH_TOKEN }}
          DISPATCH_REPO: ${{ secrets.CI_DISPATCH_REPO }}
        run: |
          jq -n --arg ref "${GITHUB_SHA}" \
            '{event_type: "ci-passed", client_payload: {ref: $ref}}' \
          | gh api -X POST "/repos/${DISPATCH_REPO}/dispatches" --input -
