# Triggers the Docker build check on pull requests.
name: Docker build trigger

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read

concurrency:
  group: docker-build-trigger-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  requested:
    name: Signal docker build requested
    runs-on: ubuntu-latest
    steps:
      - run: echo "Docker build requested."
