name: "Release: RC"

on:
  workflow_dispatch:
    inputs:
      source_sha:
        description: "Exact source commit SHA to release from the selected workflow branch."
        required: true
        type: string
      base_version:
        description: "Base SemVer core release version, for example 1.0.0."
        required: true
        type: string
      release_date:
        description: "Optional. Provide only for first-time registration of this release version. Leave blank for reruns or when this release version is already registered. Format: YYYY-MM-DD."
        required: false
        type: string
        default: ""
      release_scope:
        description: "Release artifact scope."
        required: false
        type: choice
        default: all
        options:
          - all
          - sdks
          - containers
          - custom
      sdk_ids:
        description: "Comma-separated SDK IDs for custom releases."
        required: false
        type: string
        default: ""
      container_ids:
        description: "Comma-separated container IDs for custom releases."
        required: false
        type: string
        default: ""

permissions:
  contents: read

jobs:
  release-bundle:
    name: Produce release bundle
    uses: ./.github/workflows/release-bundle.yaml
    permissions:
      contents: write
    with:
      cadence: rc
      source_sha: ${{ inputs.source_sha }}
      version: ${{ inputs.base_version }}
      release_date: ${{ inputs.release_date }}
      release_scope: ${{ inputs.release_scope }}
      sdk_ids: ${{ inputs.sdk_ids }}
      container_ids: ${{ inputs.container_ids }}
    secrets:
      CI_DISPATCH_TOKEN: ${{ secrets.CI_DISPATCH_TOKEN }}
      CI_DISPATCH_REPO: ${{ secrets.CI_DISPATCH_REPO }}
