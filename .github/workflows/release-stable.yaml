name: "Release: Stable"
run-name: Stable release ${{ inputs.version }} from ${{ inputs.source_sha }} by @${{ github.actor }}

on:
  workflow_dispatch:
    inputs:
      source_sha:
        description: "Exact source commit SHA to release from the selected workflow branch."
        required: true
        type: string
      version:
        description: "Stable SemVer core release version, for example 1.0.0."
        required: true
        type: string
      release_date:
        description: "Optional. Provide only for first-time registration of this release version. Leave blank for reruns or when this release version is already registered. Format: YYYY-MM-DD."
        required: false
        type: string
        default: ""
      release_scope:
        description: "Release artifact scope."
        required: false
        type: choice
        default: all
        options:
          - all
          - sdks
          - containers
          - custom
      sdk_ids:
        description: "Comma-separated SDK IDs for custom releases."
        required: false
        type: string
        default: ""
      container_ids:
        description: "Comma-separated container IDs for custom releases."
        required: false
        type: string
        default: ""

concurrency:
  group: release-stable
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  preview-stable-release:
    name: Preview stable release ${{ inputs.version }} from ${{ inputs.source_sha }}
    runs-on: ubuntu-latest
    steps:
      - name: Summarize stable release request
        shell: bash
        env:
          VERSION: ${{ inputs.version }}
          SOURCE_SHA: ${{ inputs.source_sha }}
          RELEASE_DATE: ${{ inputs.release_date }}
          RELEASE_SCOPE: ${{ inputs.release_scope }}
          SDK_IDS: ${{ inputs.sdk_ids }}
          CONTAINER_IDS: ${{ inputs.container_ids }}
        run: |
          set -euo pipefail

          source_link="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/commit/${SOURCE_SHA}"

          {
            echo "## Stable release approval preview"
            echo
            echo "| Field | Value |"
            echo "| --- | --- |"
            echo "| Version | ${VERSION} |"
            echo "| Stable tag | ${VERSION} |"
            echo "| Source SHA | [${SOURCE_SHA}](${source_link}) |"
            echo "| Workflow branch | ${GITHUB_REF_NAME} |"
            echo "| Release date | ${RELEASE_DATE:-not provided} |"
            echo "| Release scope | ${RELEASE_SCOPE} |"
            if [[ "${RELEASE_SCOPE}" == "custom" ]]; then
              echo "| SDK IDs | ${SDK_IDS:-not provided} |"
              echo "| Container IDs | ${CONTAINER_IDS:-not provided} |"
            fi
            echo "| Destination | Stable git tag, release bundle artifact, downstream \`release-bundle-produced\` dispatch |"
            echo
            echo "This preview is informational only. \`release-bundle.yaml\` still performs the authoritative validation before creating tags, building bundles, or dispatching downstream."
          } >>"${GITHUB_STEP_SUMMARY}"

  approve-stable-release:
    name: Approve public stable ${{ inputs.version }} from ${{ inputs.source_sha }}
    needs: preview-stable-release
    runs-on: ubuntu-latest
    environment: release-stable
    steps:
      - name: Record stable release approval
        run: |
          echo "release-stable approval passed for ${VERSION} from ${SOURCE_SHA}."
        env:
          VERSION: ${{ inputs.version }}
          SOURCE_SHA: ${{ inputs.source_sha }}

  release-bundle:
    name: Produce release bundle
    needs: approve-stable-release
    uses: ./.github/workflows/release-bundle.yaml
    permissions:
      contents: write
    with:
      cadence: release
      source_sha: ${{ inputs.source_sha }}
      version: ${{ inputs.version }}
      release_date: ${{ inputs.release_date }}
      release_scope: ${{ inputs.release_scope }}
      sdk_ids: ${{ inputs.sdk_ids }}
      container_ids: ${{ inputs.container_ids }}
    secrets:
      CI_DISPATCH_TOKEN: ${{ secrets.CI_DISPATCH_TOKEN }}
      CI_DISPATCH_REPO: ${{ secrets.CI_DISPATCH_REPO }}
