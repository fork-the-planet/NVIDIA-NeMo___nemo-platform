name: Studio CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    paths:
      - "web/**"
      - ".github/workflows/studio-ci.yaml"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  changes:
    name: Detect path changes
    runs-on: ubuntu-latest
    outputs:
      studio: ${{ steps.changes.outputs.web-studio }}
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/changes
        id: changes

  web-typecheck:
    name: Web typecheck
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
        shell: bash
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install pnpm via corepack
        run: npm i -g corepack@0.31.0 && corepack enable pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Typecheck changed packages
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            git fetch origin "${{ github.base_ref }}" --depth=1
            pnpm --filter="...[origin/${{ github.base_ref }}]" run --parallel --if-present typecheck
          else
            pnpm run --recursive --parallel --if-present typecheck
          fi

  web-test:
    name: Web tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
        shell: bash
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install pnpm via corepack
        run: npm i -g corepack@0.31.0 && corepack enable pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Test changed packages
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            git fetch origin "${{ github.base_ref }}" --depth=1
            pnpm --filter="...[origin/${{ github.base_ref }}]" run --parallel --if-present test:ci
          else
            pnpm run --recursive --parallel --if-present test:ci
          fi

  web-format:
    name: Web format check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
        shell: bash
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install pnpm via corepack
        run: npm i -g corepack@0.31.0 && corepack enable pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Check formatting
        run: pnpm format

  web-lint:
    name: Web lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
        shell: bash
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install pnpm via corepack
        run: npm i -g corepack@0.31.0 && corepack enable pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Lint
        run: pnpm lint

  web-studio-deps:
    name: Web studio deps check
    needs: changes
    if: >
      always() && (
        github.event_name == 'workflow_dispatch' ||
        needs.changes.outputs.studio == 'true'
      )
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
        shell: bash
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install pnpm via corepack
        run: npm i -g corepack@0.31.0 && corepack enable pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Check studio deps
        run: pnpm deps:studio

  web-studio-e2e:
    name: Studio UI E2E tests
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
        shell: bash
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install pnpm via corepack
        run: npm i -g corepack@0.31.0 && corepack enable pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Install Playwright browsers
        run: pnpm --filter nemo-studio-ui exec playwright install --with-deps
      - name: Run E2E tests
        run: CI=1 pnpm --filter nemo-studio-ui test:e2e
      - name: Upload E2E artifacts
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: studio-e2e-results
          retention-days: 7
          path: web/packages/studio/playwright-report/
