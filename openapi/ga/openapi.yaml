    EntryContext:
      properties:
        app:
          type: string
          title: App
          description: Reference to the app that produced this entry, in the form
            `workspace/name`. If the app doesn't exist, it will be automatically created
            when the entry is ingested.
        task:
          title: Task
          description: Name of the task within the app (e.g., 'chat', 'completion',
            'tool-call'). If the task doesn't exist, it will be automatically created
            when the entry is ingested.
          type: string
        thread_id:
          title: Thread Id
          description: Logical thread identifier that groups related entries in a
            multi-turn conversation. If provided, entries with the same thread_id
            are treated as part of the same conversation. If omitted, the entry is
            treated as a single-turn interaction (e.g., a standalone tool call or
            completion).
          type: string
        user_id:
          title: User Id
          description: Identifier of the application's end-user who triggered this
            LLM interaction. This represents the person using your application (e.g.,
            'customer_123', 'employee@company.com'), NOT the service account that
            created the entry record (see ownership.created_by for that). Use this
            to track which of your users a conversation belongs to, filter entries
            by user, and enable per-user analytics. Format is application-defined.
          type: string
        trace_id:
          title: Trace Id
          description: Distributed trace identifier (e.g., W3C traceparent). Intake
            stores it verbatim and does not use it at ingestion time; helps with later
            cross-system joins.
          type: string
        session_id:
          title: Session Id
          description: Long-lived session identifier (e.g., user account or browser
            session). Stored for post-processing analytics; not used by the Intake
            service at runtime.
          type: string
        created_at:
          type: string
          format: date-time
          title: Created At
          description: UTC timestamp when the entry was created.
      type: object
      required:
      - app
      - task
      title: EntryContext
      description: 'Contextual metadata attached to every entry record.


        Keeping these grouped in a dedicated object avoids polluting the top-level

        entity schema and makes it trivial to extend without breaking compatibility.'
