    CreateVirtualModelRequest:
      properties:
        default_model_entity:
          title: Default Model Entity
          description: Model entity to route to, in "workspace/name" format. Written
            into request["model"] before the request middleware pipeline runs. If
            omitted, a request middleware plugin must handle backend routing itself.
            Set to null to clear an existing value.
          type: string
        autoprovisioned:
          type: boolean
          title: Autoprovisioned
          description: Marks this VirtualModel as controller-managed. The Models controller
            will delete it once no ModelProvider serves the matching entity. Setting
            this manually opts the VirtualModel into that cleanup behavior.
          default: false
        models:
          items:
            $ref: '#/components/schemas/VirtualModelInferenceConfig'
          type: array
          title: Models
          description: Model entity references used by this VirtualModel. A per-entry
            backend_format overrides the referenced ModelEntity backend_format when
            IGW resolves the backend format for a request.
        request_middleware:
          items:
            $ref: '#/components/schemas/MiddlewareCall'
          type: array
          title: Request Middleware
          description: Ordered list of middleware plugins applied before proxying
            to the backend. Each entry is a MiddlewareCall with a "name" (plugin identifier)
            and optional "config_type" and "config_id" fields that reference a stored
            plugin configuration.
        response_middleware:
          items:
            $ref: '#/components/schemas/MiddlewareCall'
          type: array
          title: Response Middleware
          description: Ordered list of middleware plugins applied after the backend
            response is received, before returning it to the caller.
        post_response_middleware:
          items:
            $ref: '#/components/schemas/MiddlewareCall'
          type: array
          title: Post Response Middleware
          description: Ordered list of middleware plugins invoked after the response
            has been returned to the caller. Intended for fire-and-forget work (logging,
            analytics) that must not block or modify the response.
        override_proxy:
          title: Override Proxy
          description: 'Plugin-provided proxy implementation for IGW to use instead
            of its default aiohttp proxy. Format: "plugin-name.proxy-name". Leave
            unset to use the default IGW proxy. Set to null to clear an existing value.'
          type: string
        name:
          type: string
          title: Name
          description: Name of the virtual model within the workspace. Must be unique
            per workspace.
      type: object
      required:
      - name
      title: CreateVirtualModelRequest
      description: Request body for creating a new VirtualModel.
    CrowdStrikeAIDRRailConfig:
      properties:
        timeout:
          type: number
          title: Timeout
          description: Timeout in seconds for API requests to CrowdStrike AIDR
          default: 30.0
      type: object
      title: CrowdStrikeAIDRRailConfig
      description: Configuration data for the CrowdStrike AIDR API
    DataParameters:
      properties:
        group_training_examples_by:
          title: Group Training Examples By
          description: Column to group training examples by. This is useful when you
            want the model to learn inter-record correlations for a given grouping
            of records.
          type: string
        order_training_examples_by:
          title: Order Training Examples By
          description: Column to order training examples by. This is useful when you
            want the model to learn sequential relationships for a given ordering
            of records. If you provide this parameter, you must also provide ``group_training_examples_by``.
          type: string
        max_sequences_per_example:
          anyOf:
          - type: string
            const: auto
          - type: integer
          title: Max Sequences Per Example
          description: If specified, adds at most this number of sequences per example.
            Supports 'auto' where a value of 1 is chosen if differential privacy is
            enabled, and 10 otherwise. If not specified or set to 'auto', fills up
            context. Required for DP to limit contribution of each example.
          default: auto
        holdout:
          type: number
          title: Holdout
          description: Amount of records to hold out for evaluation. If this is a
            float between 0 and 1, that ratio of records is held out. If an integer
            greater than 1, that number of records is held out. If the value is equal
            to zero, no holdout will be performed. Must be >= 0.
          default: 0.05
        max_holdout:
          type: integer
          title: Max Holdout
          description: Maximum number of records to hold out. Overrides any behavior
            set by ``holdout``. Must be >= 0.
          default: 2000
        random_state:
          title: Random State
          description: Random state for holdout split to ensure reproducibility.
          type: integer
      type: object
      title: DataParameters
      description: Configuration for grouping, ordering, and splitting input data
        for training and evaluation.
