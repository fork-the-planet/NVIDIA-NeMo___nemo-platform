        in: query
        required: false
        schema:
          enum:
          - -created_at
          - created_at
          - -updated_at
          - updated_at
          - -name
          - name
          type: string
          description: The field to sort by. To sort in decreasing order, use `-`
            in front of the field name.
          examples:
          - -created_at
          - created_at
          - -updated_at
          - updated_at
          - -name
          - name
          default: -created_at
          title: Sort
        description: The field to sort by. To sort in decreasing order, use `-` in
          front of the field name.
      - in: query
        name: filter
        style: deepObject
        required: false
        explode: true
        schema:
          additionalProperties: false
          description: Filter for list metrics query.
          properties:
            name:
              description: Filter metrics by name.
              title: Name
              type: string
            description:
              description: Filter metrics by description.
              title: Description
              type: string
