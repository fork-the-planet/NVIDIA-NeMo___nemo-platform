components:
  schemas:
    AIDefenseRailConfig:
      properties:
        timeout:
          type: number
          title: Timeout
          description: Timeout in seconds for API requests to AI Defense service
          default: 30.0
        fail_open:
          type: boolean
          title: Fail Open
          description: If True, allow content when AI Defense API call fails (fail
            open). If False, block content when API call fails (fail closed). Does
            not affect missing configuration validation.
          default: false
      type: object
      title: AIDefenseRailConfig
      description: Configuration data for the Cisco AI Defense API
    APIEndpointData:
      properties:
        url:
          title: Url
          description: Endpoint URL
          type: string
          minLength: 1
          format: uri
        model_id:
          title: Model Id
          description: Model identifier at the endpoint
          type: string
        api_key:
          title: Api Key
          description: API key for authentication
          type: string
        format:
          title: Format
          description: API format (e.g., openai, nvidia)
          type: string
      type: object
      title: APIEndpointData
      description: Data about an inference endpoint.
    ActionRails:
      properties:
        instant_actions:
          title: Instant Actions
          description: The names of all actions which should finish instantly.
          items:
            type: string
          type: array
      type: object
      title: ActionRails
      description: 'Configuration of action rails.


        Action rails control various options related to the execution of actions.

        Currently, only


        In the future multiple options will be added, e.g., what input validation
        should be

        performed per action, output validation, throttling, disabling, etc.'
    ActivatedRail:
      properties:
        type:
          type: string
          title: Type
          description: The type of the rail that was activated, e.g., input, output,
            dialog.
        name:
          type: string
          title: Name
          description: The name of the rail, i.e., the name of the flow implementing
            the rail.
        decisions:
          items:
            type: string
          type: array
          title: Decisions
          description: A sequence of decisions made by the rail, e.g., 'bot refuse
            to respond', 'stop', 'continue'.
        executed_actions:
          items:
            $ref: '#/components/schemas/ExecutedAction'
          type: array
          title: Executed Actions
          description: The list of actions executed by the rail.
        stop:
          type: boolean
          title: Stop
          description: Whether the rail decided to stop any further processing.
          default: false
        additional_info:
          title: Additional Info
          description: Additional information coming from rail.
          additionalProperties: true
          type: object
        started_at:
          title: Started At
          description: Timestamp for when the rail started.
          type: number
        finished_at:
          title: Finished At
          description: Timestamp for when the rail finished.
          type: number
        duration:
          title: Duration
          description: The duration in seconds for applying the rail. Some rails are
            applied instantly, e.g., dialog rails, so they don't have a duration.
          type: number
      type: object
      required:
      - type
      - name
      title: ActivatedRail
      description: A rail that was activated during the generation.
    Adapter:
      properties:
        name:
          type: string
          maxLength: 255
          pattern: ^[\w\-.]+$
          title: Name
          description: 'Name of the adapter. Name must be unique in the workspace
            for all Adapters and match the following regex: Allowed characters: letters
            (a-z, A-Z), digits (0-9), underscores, hyphens, and dots.'
          examples:
          - lora-adapter-v1
          - my-finetune
        workspace:
          type: string
          maxLength: 255
          pattern: ^[\w\-.]+$
          title: Workspace
          description: 'Workspace of the adapter. Allowed characters: letters (a-z,
            A-Z), digits (0-9), underscores, hyphens, and dots.'
        description:
          title: Description
          description: Optional description of the adapter
          type: string
          maxLength: 1000
        fileset:
          type: string
          title: Fileset
          description: Fileset where the adapter files are stored expected format
            {workspace}/{fileset_name}
        finetuning_type:
          allOf:
          - $ref: '#/components/schemas/FinetuningType'
          description: Type of finetuning (LORA, P_TUNING, etc.)
        enabled:
          type: boolean
          title: Enabled
          description: Whether to make this adapter available for inference post training
          default: true
        lora_config:
          allOf:
          - $ref: '#/components/schemas/Lora'
          description: Lora configuration specifics
        model:
          title: Model
          description: Parent model entity reference. A single name (2-63 characters)
            or 'workspace/model_name' where each segment is a valid name (lowercase,
            digits, hyphens, and temporarily @ . + _; no leading/trailing or consecutive
            hyphens). If one slash, both sides must be non-empty.
          type: string
          maxLength: 127
        created_at:
          type: string
          format: date-time
          title: Created At
        updated_at:
          type: string
          format: date-time
          title: Updated At
      type: object
      required:
      - name
      - workspace
      - fileset
      - finetuning_type
      title: Adapter
    AdapterEntityFilter:
      additionalProperties: false
      description: Filter for Adapter list queries.
      properties:
        name:
          anyOf:
          - $ref: '#/components/schemas/StringFilter'
          - type: string
          description: Filter by adapter name.
          title: Name
        model:
          anyOf:
          - $ref: '#/components/schemas/StringFilter'
          - type: string
          description: Filter by parent (base) model entity reference in the form
            {workspace}/{model_name}.
          title: Model
        description:
          anyOf:
          - $ref: '#/components/schemas/StringFilter'
          - type: string
          description: Filter by description.
          title: Description
        fileset:
          description: Filter by fileset reference in the form {workspace}/{fileset_name}.
          title: Fileset
          type: string
        finetuning_type:
          allOf:
          - $ref: '#/components/schemas/FinetuningType'
          description: Filter by fine-tuning / PEFT type.
        enabled:
          description: Filter by whether the adapter is enabled for inference after
            training.
          title: Enabled
          type: boolean
        created_at:
          allOf:
          - $ref: '#/components/schemas/DatetimeFilter'
          description: Filter entities based on creation date.
        updated_at:
          allOf:
          - $ref: '#/components/schemas/DatetimeFilter'
          description: Filter entities based on update date.
      title: AdapterEntityFilter
      type: object
    AdaptersPage:
      properties:
        data:
          items:
            $ref: '#/components/schemas/Adapter'
          type: array
          title: Data
        pagination:
          allOf:
          - $ref: '#/components/schemas/PaginationData'
          description: Pagination information.
        sort:
          title: Sort
          description: The field on which the results are sorted.
          type: string
        filter:
          title: Filter
          description: Filtering information.
          additionalProperties: true
          type: object
      type: object
      required:
      - data
      title: AdaptersPage
    Annotation:
      oneOf:
      - $ref: '#/components/schemas/FeedbackAnnotation'
      - $ref: '#/components/schemas/NoteAnnotation'
      - $ref: '#/components/schemas/MetadataAnnotation'
      - $ref: '#/components/schemas/LabelAnnotation'
      title: Annotation
      description: Discriminated annotation read response. The shape varies by `kind`.
      discriminator:
        propertyName: kind
        mapping:
          feedback: '#/components/schemas/FeedbackAnnotation'
          label: '#/components/schemas/LabelAnnotation'
          metadata: '#/components/schemas/MetadataAnnotation'
          note: '#/components/schemas/NoteAnnotation'
    AnnotationFilter:
      additionalProperties: false
      properties:
        span_id:
          description: Return only annotations attached to this span.
          title: Span Id
          type: string
        session_id:
          description: Return only annotations attached to this session.
          title: Session Id
          type: string
        kind:
          allOf:
          - $ref: '#/components/schemas/AnnotationKind'
          description: Return only annotations of this kind (`feedback`, `note`, `label`,
            or `metadata`).
        name:
          description: Return only `label` annotations with this `name` (e.g., `severity`,
            `helpfulness`).
          title: Name
          type: string
        value_text:
          description: Return only annotations with this text value. For `feedback`
            annotations this is `positive` or `negative`; for `label` annotations
            with `value_type=text` this is the label's value.
          title: Value Text
          type: string
        value_numeric:
          allOf:
          - $ref: '#/components/schemas/NumericFilter'
          description: Return only `label` annotations whose numeric value falls within
            the given range. Applies to labels with `value_type=numeric`.
        created_by:
          description: Return only annotations created by this user.
          title: Created By
          type: string
        created_at:
          allOf:
          - $ref: '#/components/schemas/DatetimeFilter'
          description: Return only annotations created within the given time range.
      title: AnnotationFilter
      type: object
    AnnotationInput:
      oneOf:
      - $ref: '#/components/schemas/FeedbackAnnotationInput'
      - $ref: '#/components/schemas/NoteAnnotationInput'
      - $ref: '#/components/schemas/MetadataAnnotationInput'
      - $ref: '#/components/schemas/LabelAnnotationInput'
      title: AnnotationInput
      description: Discriminated annotation create body. The shape varies by `kind`.
      discriminator:
        propertyName: kind
        mapping:
          feedback: '#/components/schemas/FeedbackAnnotationInput'
          label: '#/components/schemas/LabelAnnotationInput'
          metadata: '#/components/schemas/MetadataAnnotationInput'
          note: '#/components/schemas/NoteAnnotationInput'
    AnnotationKind:
      enum:
      - feedback
      - label
      - note
      - metadata
      title: AnnotationKind
      type: string
    AnnotationSortField:
      type: string
      enum:
      - created_at
      - -created_at
      title: AnnotationSortField
    AnnotationsPage:
      properties:
        data:
          items:
            $ref: '#/components/schemas/Annotation'
          type: array
          title: Data
        pagination:
          allOf:
          - $ref: '#/components/schemas/PaginationData'
          description: Pagination information.
        sort:
          title: Sort
          description: The field on which the results are sorted.
          type: string
        filter:
          title: Filter
          description: Filtering information.
          additionalProperties: true
          type: object
      type: object
      required:
      - data
      title: AnnotationsPage
    AtifAgent:
      properties:
        name:
          type: string
          title: Name
        version:
          type: string
          title: Version
        model_name:
          title: Model Name
          type: string
        tool_definitions:
          title: Tool Definitions
          items:
            additionalProperties: true
            type: object
          type: array
        extra:
          title: Extra
          additionalProperties: true
          type: object
      additionalProperties: false
      type: object
      required:
      - name
      - version
      title: AtifAgent
    AtifContentPart:
      oneOf:
      - $ref: '#/components/schemas/AtifContentPartText'
      - $ref: '#/components/schemas/AtifContentPartImage'
