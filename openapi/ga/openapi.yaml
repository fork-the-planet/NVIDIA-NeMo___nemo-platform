      required:
      - type
      - source
      title: AtifContentPartImage
    AtifContentPartText:
      properties:
        type:
          type: string
          const: text
          title: Type
        text:
          type: string
          title: Text
      additionalProperties: false
      type: object
      required:
      - type
      - text
      title: AtifContentPartText
    AtifFinalMetrics:
