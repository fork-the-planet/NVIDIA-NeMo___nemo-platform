        num_experts_per_tok:
          type: integer
          title: Num Experts Per Tok
          description: Number of experts activated per token (top-k routing)
        num_expert_layers:
          type: integer
          title: Num Expert Layers
          description: Number of layers with MoE
        expert_ffn_size:
          title: Expert Ffn Size
          description: FFN size for experts (if different from main FFN)
          type: integer
        num_shared_experts:
          type: integer
          title: Num Shared Experts
          description: Number of shared experts (replicated, not sharded by EP)
          default: 0
      type: object
      required:
