    ReviewerAnnotationEvent:
      properties:
        id:
          title: Id
          description: Unique identifier for the event. Populated when retrieved from
            database.
          type: string
        created_at:
          type: string
          format: date-time
          title: Created At
          description: UTC timestamp when the record was created.
        created_by:
          title: Created By
          description: Identifier of the user or system that generated the record.
            Can be set of key-value pairs.
          additionalProperties:
            type: string
          type: object
        event_type:
          type: string
          const: reviewer_annotation
          title: Event Type
          default: reviewer_annotation
        thumb:
          allOf:
          - $ref: '#/components/schemas/ThumbDirection'
          description: "Binary feedback: \"up\" for \U0001F44D or \"down\" for \U0001F44E\
            . Mutually exclusive with `rating`. Use this for simple thumbs up/down\
            \ UI elements."
        rating:
          title: Rating
          description: Numeric rating (e.g., 1-5 stars) provided by the end user.
            Mutually exclusive with `thumb`. Use this for star ratings or numeric
            scales.
          type: number
          minimum: 0.0
        opinion:
          title: Opinion
          description: Free-text comment from the end user describing their opinion
            of the response.
          type: string
          maxLength: 2000
          minLength: 1
        rewrite:
          title: Rewrite
          description: End-user's suggested text replacement for the generated response.
            This is the user's idea of what the response should have been.
          type: string
          maxLength: 10000
          minLength: 1
        chosen_index:
          title: Chosen Index
          description: Zero-based index of the response option the user selected when
            multiple responses were returned. Use this when showing users multiple
            completion choices and tracking which one they picked.
          type: integer
          minimum: 0.0
        categories:
          title: Categories
          description: 'Application-specific category ratings as key-value pairs.
            Use this for custom rating dimensions (e.g., {''helpfulness'': 4, ''accuracy'':
            5, ''tone'': ''professional''}). Useful for radio buttons, dropdowns,
            or multi-dimensional rating systems.'
          additionalProperties:
            anyOf:
            - type: number
            - type: string
          type: object
        response_override:
          title: Response Override
          description: 'Complete JSON object that replaces the original model response
            when exporting data. Unlike the `rewrite` field (which is just text),
            this can include tool calls, function outputs, and all other response
            metadata. When an entry with response_override is exported, you can choose
            to use this corrected response instead of the original. Example: {''choices'':
            [{''message'': {''role'': ''assistant'', ''content'': ''Corrected text'',
            ''tool_calls'': [...]}}]}'
          additionalProperties: true
          type: object
      additionalProperties: false
      type: object
      title: ReviewerAnnotationEvent
      description: 'Structured annotation supplied by a reviewer or expert evaluator.


        A reviewer annotation is similar to user feedback but includes an additional
        capability

        to provide a complete replacement response. This is useful when human experts
        need to

        correct not just the text but also structured elements like tool calls, function
        outputs,

        or other response metadata.


        Inherits all feedback fields from UserFeedbackEvent (thumb, rating, opinion,
        rewrite,

        chosen_index, categories) and adds response_override for full response replacement.'
