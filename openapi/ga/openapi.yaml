              - $ref: '#/components/schemas/DatetimeFilter'
              description: Filter job results by creation date range.
          title: BenchmarkJobResultsListFilter
          type: object
        description: 'Filter benchmark job results by name, benchmark, metrics, dataset,
          model, and dates. Supports JSON filter syntax with operators: $eq, $like,
          $lt, $lte, $gt, $gte, $in, $nin, $and, $or, $not. Also supports text filter
          syntax.'
