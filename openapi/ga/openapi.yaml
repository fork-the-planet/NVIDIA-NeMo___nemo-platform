          description: 'The endpoint for the Trend Micro AI Guard API. For other regions,
            use: https://api.{region}.xdr.trendmicro.com/v3.0/aiSecurity/applyGuardrails
            where region is eu, jp, au, in, sg, or mea.'
          default: https://api.xdr.trendmicro.com/v3.0/aiSecurity/applyGuardrails
        api_key_env_var:
          title: Api Key Env Var
          description: Environment variable containing API key for Trend Micro AI
