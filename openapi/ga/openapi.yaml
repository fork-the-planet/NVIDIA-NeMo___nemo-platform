        This flexibility enables the Intake service to store responses from various
        LLM providers

        and future model types without requiring schema updates.


        Required: either `choices` (successful response) or `error` (failed call).

        Common optional fields: `id`, `created`, `model`, `usage`, `system_fingerprint`,
