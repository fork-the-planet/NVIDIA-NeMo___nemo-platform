          maxLength: 1000
          title: Status Message
          description: Detailed status message
          default: ''
        model_provider_id:
          title: Model Provider Id
          description: 'Optional reference to the auto-created ModelProvider workspace/name
            (format: workspace/name)'
          type: string
          maxLength: 255
      type: object
      required:
      - status
      title: UpdateModelDeploymentStatusRequest
      description: Request model for updating ModelDeployment status.
    UpdateModelEntityRequest:
      properties:
        description:
          title: Description
          description: Optional description of the model
          type: string
          maxLength: 1000
        spec:
          allOf:
          - $ref: '#/components/schemas/ModelSpec'
          description: Detailed specification for the model
        fileset:
          title: Fileset
          description: A set of checkpoint files, configs, and other auxiliary info
            associated with this model - expected format {workspace}/{fileset_name}
          type: string
        finetuning_type:
          allOf:
          - $ref: '#/components/schemas/FinetuningType'
          description: Set for full weight finetuned models
        base_model:
          title: Base Model
          description: Link to another model which is used as a base for the current
            model
          type: string
        api_endpoint:
          allOf:
          - $ref: '#/components/schemas/APIEndpointData'
          description: Data about the inference endpoint for this model
        backend_format:
          allOf:
          - $ref: '#/components/schemas/BackendFormat'
          description: Inference API wire format expected by the backend. If unset,
            inference routing treats the model as OPENAI_CHAT.
          nullable: true
        prompt:
          allOf:
          - $ref: '#/components/schemas/PromptData'
          description: Configuration for prompt engineering
        custom_fields:
          title: Custom Fields
          description: Custom fields for additional metadata
          additionalProperties: true
          type: object
        ownership:
          title: Ownership
          description: Ownership information for the model
          additionalProperties: true
          type: object
        model_providers:
          title: Model Providers
          description: List of ModelProvider workspace/name resource names that provide
            inference for this Model Entity
          items:
            type: string
          type: array
        trust_remote_code:
          title: Trust Remote Code
          description: "Whether to trust remote code for the checkpoint.\n       \
            \ Some models without support in certain libraries such as Transformers\
            \ require additional custom Python code to execute.\n        Due to security\
            \ ramifications of running arbitrary code, this can only be set to true\
            \ on one of the following conditions:\n        (1) the model's fileset's\
            \ source is pre-approved in the platform config, or\n        (2) the user\
            \ creating this model is an administrator.\n        "
          type: boolean
      type: object
      title: UpdateModelEntityRequest
      description: Request model for updating Model Entity metadata.
    UpdateModelProviderStatusRequest:
      properties:
        model_deployment_id:
          title: Model Deployment Id
          description: Reference to the ModelDeployment ID if this provider is associated
            with a deployment
          type: string
          maxLength: 255
        served_models:
          title: Served Models
          description: List of models served by this provider with routing information
