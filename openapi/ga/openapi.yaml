        - choices
      - required:
        - error
      properties:
        choices:
          title: Choices
          description: A list of response choices generated by the model. Each choice
            typically contains a message object with role, content, and optional tool_calls.
            The structure varies by provider but commonly includes fields like `index`,
            `message`, and `finish_reason`.
          items:
            additionalProperties: true
            type: object
          type: array
        error:
          title: Error
          description: 'Error envelope returned by the provider when the call failed
            (e.g., OpenAI''s `{message, type, code, param}` shape). Mutually exclusive
            with `choices`: a response carries one or the other.'
          additionalProperties: true
          type: object
