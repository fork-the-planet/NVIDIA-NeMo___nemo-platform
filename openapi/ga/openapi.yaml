      - session_id
      - kind
      - metadata
      title: MetadataAnnotationInput
      description: Structured key/value metadata attached to a span or session.
    MetricStatFilters:
      additionalProperties: false
      description: 'Numeric range filters keyed by rollup aggregate stat.


        Declaring each stat explicitly (rather than an open ``dict[str, NumberFilter]``)
        makes the valid

        stats visible in the OpenAPI schema, e.g. ``filter[cost_usd.mean][$lte]=0.5``.
        These stats must

        stay in sync with the runtime sort/filter grammar (``_METRIC_STATS`` in the
        experiments

        endpoints); a unit test guards the parity.'
      properties:
        sum:
          $ref: '#/components/schemas/NumberFilter'
        mean:
          $ref: '#/components/schemas/NumberFilter'
        median:
          $ref: '#/components/schemas/NumberFilter'
        p90:
          $ref: '#/components/schemas/NumberFilter'
        p95:
          $ref: '#/components/schemas/NumberFilter'
        p99:
          $ref: '#/components/schemas/NumberFilter'
        count:
          $ref: '#/components/schemas/NumberFilter'
      title: MetricStatFilters
      type: object
    MiddlewareCall:
      properties:
        name:
          type: string
          title: Name
        config_type:
          type: string
          title: Config Type
        config:
          title: Config
          additionalProperties: true
          type: object
        config_id:
          title: Config Id
          type: string
      type: object
      required:
      - name
      - config_type
      title: MiddlewareCall
      description: "One entry in a VirtualModel middleware pipeline.\n\nDeclares which\
        \ plugin to invoke and how to resolve its configuration.\nExactly one of ``config``\
        \ (inline dict) or ``config_id`` (entity reference)\nshould be provided. ``config_type``\
        \ is always required regardless of which\nis used \u2014 it is the discriminator\
        \ that tells IGW (and the plugin) which\nconfig schema applies.\n\nAttributes:\n\
        \    name: The entry-point key of the plugin to invoke\n        (e.g. ``\"\
        nemo-switchyard\"``). Must match the plugin's\n        ``nemo.inference_middleware``\
        \ entry-point key.\n    config_type: Always required. Maps to the ``entity_type``\
        \ of the plugin's\n        config ``NemoEntity`` subclass (e.g. ``\"routellm_config\"\
        ``). Used by\n        IGW to call :meth:`~NemoInferenceMiddleware.validate_middleware_config`\n\
        \        with the right discriminator, and by the plugin to dispatch to the\n\
        \        correct schema when it supports multiple config types.\n    config:\
        \ Inline config dict. Mutually exclusive with ``config_id``.\n    config_id:\
        \ ``\"workspace/name\"`` reference to a stored config entity.\n        Mutually\
        \ exclusive with ``config``. IGW resolves this by calling\n        :meth:`~NemoInferenceMiddleware.get_middleware_config`\
        \ on the plugin."
