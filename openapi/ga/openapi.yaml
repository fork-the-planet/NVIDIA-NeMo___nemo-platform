    ContainerExecutorConfig:
      properties:
        gpu:
          type: integer
          minimum: 0.0
          title: Gpu
          description: Number of GPUs required for the deployment. 0 = CPU-only.
        disk_size:
          type: string
          title: Disk Size
          description: Disk size for the deployment
          default: 50Gi
        image_name:
