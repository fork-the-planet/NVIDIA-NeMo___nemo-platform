      tags:
      - Virtual Models
      summary: List VirtualModels
      description: 'List VirtualModels for the given workspace.


        Use ``workspace=-`` to list across all workspaces accessible to the caller.'
      operationId: list_virtual_models
      parameters:
      - name: workspace
        in: path
        required: true
        schema:
          type: string
          title: Workspace
      - name: page
        in: query
        required: false
        schema:
          type: integer
          minimum: 1
          description: Page number (1-indexed).
          default: 1
          title: Page
        description: Page number (1-indexed).
      - name: page_size
        in: query
        required: false
        schema:
          type: integer
          maximum: 200
          minimum: 1
