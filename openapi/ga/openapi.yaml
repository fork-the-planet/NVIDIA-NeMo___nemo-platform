      - Inference Gateway
      summary: Check Provider Readiness
      description: "Check if a model provider is registered in the gateway's cache.\n\
        \nThis is a lightweight endpoint that only checks the gateway's internal state,\n\
        without making any requests to the actual provider backend. Use this to verify\n\
        the gateway is ready to route requests to a provider after deployment.\n\n\
        Returns:\n    200 OK with provider info if the provider is registered\n  \
        \  404 Not Found if the provider is not yet in the gateway's cache"
      operationId: provider_ready
      parameters:
      - name: workspace
        in: path
        required: true
