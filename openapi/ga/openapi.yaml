          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /apis/inference-gateway/v2/workspaces/{workspace}/virtual-models:
    post:
      tags:
      - Virtual Models
      summary: Create VirtualModel
      description: 'Create a new VirtualModel in the given workspace.


        A VirtualModel defines an ordered middleware pipeline that IGW executes

        when an inference request arrives with ``model: "workspace/name"`` matching

        this entity.'
      operationId: create_virtual_model
      parameters:
      - name: workspace
        in: path
        required: true
        schema:
          type: string
          title: Workspace
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateVirtualModelRequest'
      responses:
        '201':
          description: VirtualModel created successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VirtualModel'
        '409':
          description: A VirtualModel with that name already exists in the workspace.
        '422':
          description: Validation error.
    get:
      tags:
      - Virtual Models
      summary: List VirtualModels
      description: 'List VirtualModels for the given workspace.


        Use ``workspace=-`` to list across all workspaces accessible to the caller.'
      operationId: list_virtual_models
      parameters:
      - name: workspace
        in: path
        required: true
        schema:
          type: string
          title: Workspace
      - name: page
        in: query
        required: false
        schema:
          type: integer
          minimum: 1
          description: Page number (1-indexed).
          default: 1
          title: Page
        description: Page number (1-indexed).
      - name: page_size
        in: query
        required: false
        schema:
          type: integer
          maximum: 200
          minimum: 1
          description: Number of results per page.
          default: 20
          title: Page Size
        description: Number of results per page.
      - name: sort
        in: query
        required: false
        schema:
          type: string
          description: Sort field.  Prefix with ``-`` for descending order.
          default: -created_at
          title: Sort
        description: Sort field.  Prefix with ``-`` for descending order.
      responses:
        '200':
          description: Paginated list of virtual models
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VirtualModelsPage'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
