    CreateModelEntityRequest:
      properties:
        name:
          type: string
          maxLength: 255
          pattern: ^[\w\-.]+$
          title: Name
          description: 'Name of the model entity. Allowed characters: letters (a-z,
            A-Z), digits (0-9), underscores, hyphens, and dots.'
