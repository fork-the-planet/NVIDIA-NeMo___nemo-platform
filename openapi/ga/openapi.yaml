  /apis/evaluation/v2/workspaces/{workspace}/metric-evaluate:
    post:
      tags:
      - Evaluator
      summary: Evaluate Metric
      description: 'Run a synchronous metric evaluation on a dataset.


        This endpoint evaluates the given dataset using the specified metric and returns

        results immediately. Use this for quick, interactive evaluations with small
        datasets

        (up to 10 rows). For larger evaluations, use the async job-based evaluation
        endpoints.


        The metric can be specified either as a URN reference to a stored metric

        (e.g., "workspace/metric_name") or as an inline metric definition.


        The dataset must be provided inline with rows.


        **Aggregate Score Fields:**

        The `name` and `count` fields are always included in aggregate scores.

        By default, additional fields returned are: nan_count, sum, mean, min, max.

        Use the `aggregate_fields` query parameter to customize which optional fields

        are included (e.g., std_dev, variance, percentiles, histogram, rubric_distribution,
        mode_category).'
      operationId: evaluate_metric_apis_evaluation_v2_workspaces__workspace__metric_evaluate_post
      parameters:
      - name: workspace
        in: path
        required: true
        schema:
          type: string
          title: Workspace
      - name: aggregate_fields
        in: query
        required: false
        schema:
          type: array
          items:
            enum:
            - nan_count
            - sum
            - mean
            - min
            - max
            - std_dev
            - variance
            - score_type
            - percentiles
            - histogram
            - rubric_distribution
            - mode_category
            type: string
          description: 'Aggregate score fields to include in the response (comma-separated
            or repeated). Default: (''nan_count'', ''sum'', ''mean'', ''min'', ''max'').
            Available: (''nan_count'', ''sum'', ''mean'', ''min'', ''max'', ''std_dev'',
            ''variance'', ''score_type'', ''percentiles'', ''histogram'', ''rubric_distribution'',
            ''mode_category'').'
          default: []
          title: Aggregate Fields
        description: 'Aggregate score fields to include in the response (comma-separated
          or repeated). Default: (''nan_count'', ''sum'', ''mean'', ''min'', ''max'').
          Available: (''nan_count'', ''sum'', ''mean'', ''min'', ''max'', ''std_dev'',
          ''variance'', ''score_type'', ''percentiles'', ''histogram'', ''rubric_distribution'',
          ''mode_category'').'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MetricEvaluationRequest'
      responses:
        '200':
          description: Evaluation Completed Successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MetricEvaluationResponse'
        '400':
          description: Invalid Request Body
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Metric Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
