          - api_key_secret: secret/my_openai_api_key
            endpoint: https://api.openai.com/v1
            format: openai
            name: gpt-4o
        scores:
          items:
            oneOf:
            - $ref: '#/components/schemas/RubricScore'
            - $ref: '#/components/schemas/RangeScore'
          type: array
          minItems: 1
          title: Scores
          description: Definitions of scores that will be extracted from the judge's
            output.
        prompt_template:
          anyOf:
          - type: string
          - additionalProperties: true
            type: object
          title: Prompt Template
          description: The prompt template for the judge. Can be either a simple string
            or a structured object (e.g., OpenAI messages format). Use Jinja template
            variables like {{sample.output_text}} to use the model output within the
            template or {{item.xxx}} to reference input columns from the dataset.
          examples:
          - content: You are an expert judge evaluating the correctness of AI responses.
            type: string
          - content:
              messages:
              - content: You are an expert judge evaluating the correctness of AI
                  responses.
                role: system
              - content: 'Question: {{item.prompt}}

                  Answer: {{sample.output_text}}

                  Reference: {{item.reference}}

                  Rate the correctness from 1-5.'
                role: user
            type: object
            additionalProperties: true
        optional_fields:
          items:
            type: string
            minLength: 1
          type: array
          title: Optional Fields
          description: Prompt template fields that should remain in the inferred input
            schema but not be required. Use this for fields like 'reference' when
            the metric can still run without them.
          examples:
          - - reference
        structured_output:
          title: Structured Output
          description: JSON schema to apply structured output for the judge model
            evaluation. Structured output is derived from scores when omitted. Use
            this option if there are custom requirements for the output of the judge.
          additionalProperties: true
          type: object
        inference:
          allOf:
          - $ref: '#/components/schemas/InferenceParams'
          description: Inference parameters for the judge model.
        system_prompt:
          title: System Prompt
          description: Initial instructions that define the judge model's role and
            behavior for the conversation. This is prepended to the messages as a
            system message.
          type: string
        reasoning:
          allOf:
          - $ref: '#/components/schemas/ReasoningParams'
          description: Custom settings that control the judge model's reasoning behavior.
            For reasoning models (e.g., Nemotron), use `end_token` to strip reasoning
            traces from the output.
        ignore_request_failure:
          type: boolean
          title: Ignore Request Failure
          description: If True, request failures will be ignored and the result will
            be marked as NaN. If False (default), request failures will raise an exception.
          default: false
        id:
          type: string
          title: Id
          readOnly: true
        created_at:
          title: Created At
          readOnly: true
          type: string
          format: date-time
        created_by:
          title: Created By
          readOnly: true
          nullable: true
          type: string
        updated_at:
          title: Updated At
          readOnly: true
          type: string
          format: date-time
        updated_by:
          title: Updated By
          readOnly: true
          nullable: true
          type: string
        entity_id:
          type: string
          title: Entity Id
          description: Alias for id for backwards compatibility.
          readOnly: true
        parent:
          title: Parent
          description: Parent entity ID for nested entities.
          readOnly: true
          type: string
      type: object
      required:
      - workspace
      - model
      - scores
      - id
      - created_at
      - created_by
      - updated_at
      - updated_by
      - entity_id
      - parent
      title: LLMJudgeMetric
      description: Persisted LLM-as-a-Judge metric.
