          description: Optional reference to the base model entity ID for this deployment
          type: string
          maxLength: 255
      type: object
      required:
      - nim_deployment
      title: UpdateModelDeploymentConfigRequest
      description: Request model for updating a ModelDeploymentConfig (creates new
        version).
    UpdateModelDeploymentRequest:
      properties:
        config:
          type: string
          maxLength: 255
          title: Config
          description: Reference to the ModelDeploymentConfig name
        config_version:
          title: Config Version
          description: Reference to a specific ModelDeploymentConfig version. If not
            specified, uses latest.
          type: integer
      type: object
      required:
      - config
      title: UpdateModelDeploymentRequest
      description: Request model for updating a ModelDeployment (creates new version).
    UpdateModelDeploymentStatusRequest:
      properties:
        status:
          allOf:
          - $ref: '#/components/schemas/ModelDeploymentStatus'
          description: New status for the deployment
        status_message:
          type: string
          maxLength: 1000
          title: Status Message
          description: Detailed status message
          default: ''
        model_provider_id:
          title: Model Provider Id
          description: 'Optional reference to the auto-created ModelProvider workspace/name
            (format: workspace/name)'
          type: string
          maxLength: 255
      type: object
      required:
      - status
      title: UpdateModelDeploymentStatusRequest
      description: Request model for updating ModelDeployment status.
    UpdateModelEntityRequest:
      properties:
        description:
          title: Description
          description: Optional description of the model
          type: string
          maxLength: 1000
        spec:
          allOf:
          - $ref: '#/components/schemas/ModelSpec'
          description: Detailed specification for the model
        fileset:
          title: Fileset
          description: A set of checkpoint files, configs, and other auxiliary info
            associated with this model - expected format {workspace}/{fileset_name}
          type: string
        finetuning_type:
          allOf:
          - $ref: '#/components/schemas/FinetuningType'
          description: Set for full weight finetuned models
        base_model:
          title: Base Model
          description: Link to another model which is used as a base for the current
            model
          type: string
        api_endpoint:
          allOf:
          - $ref: '#/components/schemas/APIEndpointData'
          description: Data about the inference endpoint for this model
        backend_format:
          allOf:
          - $ref: '#/components/schemas/BackendFormat'
          description: Inference API wire format expected by the backend. If unset,
            inference routing treats the model as OPENAI_CHAT.
          nullable: true
        prompt:
          allOf:
          - $ref: '#/components/schemas/PromptData'
          description: Configuration for prompt engineering
        custom_fields:
          title: Custom Fields
          description: Custom fields for additional metadata
          additionalProperties: true
          type: object
        ownership:
          title: Ownership
          description: Ownership information for the model
          additionalProperties: true
          type: object
        model_providers:
          title: Model Providers
          description: List of ModelProvider workspace/name resource names that provide
            inference for this Model Entity
          items:
            type: string
          type: array
        trust_remote_code:
          title: Trust Remote Code
          description: "Whether to trust remote code for the checkpoint.\n       \
            \ Some models without support in certain libraries such as Transformers\
            \ require additional custom Python code to execute.\n        Due to security\
            \ ramifications of running arbitrary code, this can only be set to true\
            \ on one of the following conditions:\n        (1) the model's fileset's\
            \ source is pre-approved in the platform config, or\n        (2) the user\
            \ creating this model is an administrator.\n        "
          type: boolean
      type: object
      title: UpdateModelEntityRequest
      description: Request model for updating Model Entity metadata.
    UpdateModelProviderStatusRequest:
      properties:
        model_deployment_id:
          title: Model Deployment Id
          description: Reference to the ModelDeployment ID if this provider is associated
            with a deployment
          type: string
          maxLength: 255
        served_models:
          title: Served Models
          description: List of models served by this provider with routing information
            for IGW
          items:
            $ref: '#/components/schemas/ServedModelMapping'
          type: array
        status:
          allOf:
          - $ref: '#/components/schemas/ModelProviderStatus'
          description: Status of the model provider
        status_message:
          title: Status Message
          description: Status message. If status is provided without status_message,
            defaults to empty string.
          type: string
          maxLength: 1000
      type: object
      title: UpdateModelProviderStatusRequest
      description: 'Request model for updating ModelProvider status and autodiscovery
        fields.


        This endpoint supports partial updates for fields managed by Models Controller.'
    UpdateVirtualModelRequest:
      properties:
        default_model_entity:
          title: Default Model Entity
          description: Model entity to route to, in "workspace/name" format. Written
            into request["model"] before the request middleware pipeline runs. If
            omitted, a request middleware plugin must handle backend routing itself.
            Set to null to clear an existing value.
          type: string
        autoprovisioned:
          type: boolean
          title: Autoprovisioned
          description: Marks this VirtualModel as controller-managed. The Models controller
            will delete it once no ModelProvider serves the matching entity. Setting
            this manually opts the VirtualModel into that cleanup behavior.
          default: false
        models:
          items:
            $ref: '#/components/schemas/VirtualModelInferenceConfig'
          type: array
          title: Models
          description: Model entity references used by this VirtualModel. A per-entry
            backend_format overrides the referenced ModelEntity backend_format when
            IGW resolves the backend format for a request.
        request_middleware:
          items:
            $ref: '#/components/schemas/MiddlewareCall'
          type: array
          title: Request Middleware
          description: Ordered list of middleware plugins applied before proxying
            to the backend. Each entry is a MiddlewareCall with a "name" (plugin identifier)
            and optional "config_type" and "config_id" fields that reference a stored
            plugin configuration.
        response_middleware:
          items:
            $ref: '#/components/schemas/MiddlewareCall'
          type: array
          title: Response Middleware
          description: Ordered list of middleware plugins applied after the backend
            response is received, before returning it to the caller.
        post_response_middleware:
          items:
            $ref: '#/components/schemas/MiddlewareCall'
          type: array
          title: Post Response Middleware
          description: Ordered list of middleware plugins invoked after the response
            has been returned to the caller. Intended for fire-and-forget work (logging,
            analytics) that must not block or modify the response.
        override_proxy:
          title: Override Proxy
          description: 'Plugin-provided proxy implementation for IGW to use instead
            of its default aiohttp proxy. Format: "plugin-name.proxy-name". Leave
            unset to use the default IGW proxy. Set to null to clear an existing value.'
          type: string
      type: object
      title: UpdateVirtualModelRequest
      description: 'Request body for partially updating an existing VirtualModel (PATCH).


        Only fields present in the request body are updated.  Omitted fields

        retain their current values.  ``model_fields_set`` is used in the handler

        to distinguish an intentional ``[]`` (clear the list) from a missing field

        (leave unchanged).  Set ``default_model_entity`` or ``override_proxy`` to

        ``null`` explicitly to clear them.'
    UpsertModelProviderRequest:
      properties:
        project:
          title: Project
          description: The URN of the project associated with this model provider
          type: string
          maxLength: 255
          pattern: ^[\w\-./]+$
        description:
          title: Description
          description: Optional description of the model provider
          type: string
          maxLength: 1000
        host_url:
          type: string
          maxLength: 2048
          title: Host Url
          description: The network endpoint URL for the model provider
        api_key_secret_name:
          title: Api Key Secret Name
          description: Reference to an API key secret stored in the Secrets service.
            Create the secret first via secrets API, then pass the secret name here.
          type: string
          maxLength: 255
        enabled_models:
          title: Enabled Models
          description: Optional list of specific models to enable from this provider
          items:
            type: string
          type: array
        default_extra_body:
          title: Default Extra Body
          description: Default body parameters for inference requests. Can be overridden
            by user requests.
          additionalProperties: true
          type: object
        default_extra_headers:
          title: Default Extra Headers
          description: Default headers for inference requests. Can be overridden by
            user requests.
          additionalProperties:
            type: string
          type: object
        required_extra_body:
          title: Required Extra Body
          description: Required body parameters for inference requests. Cannot be
            overridden by user requests.
          additionalProperties: true
          type: object
        required_extra_headers:
          title: Required Extra Headers
          description: Required headers for inference requests. Cannot be overridden
            by user requests.
          additionalProperties:
            type: string
          type: object
        model_deployment_id:
          title: Model Deployment Id
          description: Optional reference to the ModelDeployment ID if this provider
            is associated with a deployment
          type: string
          maxLength: 255
        status:
          allOf:
          - $ref: '#/components/schemas/ModelProviderStatus'
          description: Status of the model provider
        status_message:
          title: Status Message
          description: Status message
          type: string
          maxLength: 1000
        auth_header_format:
          title: Auth Header Format
          description: 'Jinja2 template string controlling how the API key secret
            is sent to the upstream. Must contain exactly one variable named `auth_secret`,
            which is substituted with the resolved secret value at request time. Example:
            `''X-Api-Key: {{ auth_secret }}''`. If not set, defaults to `''Authorization:
            Bearer {{ auth_secret }}''`.'
          type: string
          maxLength: 1024
      type: object
      required:
      - host_url
      title: UpsertModelProviderRequest
      description: 'Request model for upserting a ModelProvider (PUT /apis/models/v2/workspaces/{workspace}/providers/{name}).


        All fields must be provided - partial updates are not supported for security
        reasons.

        Use PUT /status endpoint to update status-related fields only.'
    Usage:
      properties:
        model:
          title: Model
          description: The actual model that served the request (after any routing).
            May differ from the model in the request body.
          type: string
        started_at:
          format: date-time
          title: Started At
          description: UTC timestamp when the upstream LLM call started.
          type: string
        ended_at:
          format: date-time
          title: Ended At
          description: UTC timestamp when the upstream LLM call ended.
          type: string
        latency_ms:
          minimum: 0.0
          title: Latency Ms
          description: Wall-clock latency of the upstream LLM call, in milliseconds.
          type: integer
        cost_usd:
          minimum: 0.0
          title: Cost Usd
          description: Total estimated cost of this call, in USD.
          type: number
        cost_input_usd:
          minimum: 0.0
          title: Cost Input Usd
          description: Estimated cost attributed to input tokens, in USD.
          type: number
        cost_output_usd:
          minimum: 0.0
          title: Cost Output Usd
          description: Estimated cost attributed to output tokens, in USD.
          type: number
        input_tokens:
          minimum: 0.0
          title: Input Tokens
          description: Number of input tokens consumed.
          type: integer
        output_tokens:
          minimum: 0.0
          title: Output Tokens
          description: Number of output tokens produced.
          type: integer
        cached_tokens:
          minimum: 0.0
          title: Cached Tokens
          description: Number of input tokens served from a prompt cache (subset of
            input_tokens).
          type: integer
      type: object
      title: Usage
      description: 'Structured usage metrics captured at log time.


        Every field is optional so producers can populate whatever they have without

        schema breakage. Stored as the entry-level ``usage`` field so filters can

        reach it via ``data.usage.<field>`` entity-store paths.'
    UserActionEvent:
      properties:
        id:
          title: Id
          description: Unique identifier for the event. Populated when retrieved from
            database.
          type: string
        created_at:
          type: string
          format: date-time
          title: Created At
          description: UTC timestamp when the record was created.
        created_by:
          title: Created By
          description: Identifier of the user or system that generated the record.
            Can be set of key-value pairs.
          additionalProperties:
            type: string
          type: object
        event_type:
          type: string
          const: user_action
          title: Event Type
          default: user_action
        action:
          type: string
          maxLength: 256
          title: Action
          description: "Descriptive name for the action taken by the user (e.g., 'share_clicked',\
            \ 'code_copied', 'link_followed'). Use snake-case or kebab-case. This\
            \ is a label, not a unique identifier\u2014multiple events can have the\
            \ same action name."
        metadata:
          additionalProperties:
            anyOf:
            - type: string
              maxLength: 256
            - items:
                type: string
                maxLength: 256
              type: array
            - type: boolean
            - type: integer
            - type: number
          propertyNames:
            maxLength: 256
          type: object
          maxProperties: 16
          title: Metadata
          description: 'Optional key-value pairs with additional context about the
            action (max 16 entries). Use this for details like user IDs, item IDs,
            timestamps, A/B test variants, or any other information useful for downstream
            training or evaluation pipelines. Example: {''user_id'': ''12345'', ''experiment'':
            ''variant_b'', ''item_purchased'': ''product_456''}.'
      additionalProperties: false
      type: object
      required:
      - action
      title: UserActionEvent
      description: "Free-form user action captured by the client application.\n\n\
        Use this to track arbitrary user interactions with AI responses, such as copying\
        \ code,\nclicking share buttons, making purchases, or any other measurable\
        \ action.\n\nThe action identifier must be \u2264256 characters and should\
        \ use snake-case or kebab-case\nfor consistency (e.g., ``share_clicked``,\
        \ ``code_copied``, ``purchase_made``)."
    UserFeedbackEvent:
      properties:
        id:
          title: Id
          description: Unique identifier for the event. Populated when retrieved from
            database.
          type: string
        created_at:
          type: string
          format: date-time
          title: Created At
          description: UTC timestamp when the record was created.
        created_by:
          title: Created By
          description: Identifier of the user or system that generated the record.
            Can be set of key-value pairs.
          additionalProperties:
            type: string
          type: object
        event_type:
          type: string
          const: user_feedback
          title: Event Type
          default: user_feedback
        thumb:
          allOf:
          - $ref: '#/components/schemas/ThumbDirection'
          description: "Binary feedback: \"up\" for \U0001F44D or \"down\" for \U0001F44E\
            . Mutually exclusive with `rating`. Use this for simple thumbs up/down\
            \ UI elements."
        rating:
          title: Rating
          description: Numeric rating (e.g., 1-5 stars) provided by the end user.
            Mutually exclusive with `thumb`. Use this for star ratings or numeric
            scales.
          type: number
          minimum: 0.0
        opinion:
          title: Opinion
          description: Free-text comment from the end user describing their opinion
            of the response.
          type: string
          maxLength: 2000
          minLength: 1
        rewrite:
          title: Rewrite
          description: End-user's suggested text replacement for the generated response.
            This is the user's idea of what the response should have been.
          type: string
          maxLength: 10000
          minLength: 1
        chosen_index:
          title: Chosen Index
          description: Zero-based index of the response option the user selected when
            multiple responses were returned. Use this when showing users multiple
            completion choices and tracking which one they picked.
          type: integer
          minimum: 0.0
        categories:
          title: Categories
          description: 'Application-specific category ratings as key-value pairs.
            Use this for custom rating dimensions (e.g., {''helpfulness'': 4, ''accuracy'':
            5, ''tone'': ''professional''}). Useful for radio buttons, dropdowns,
            or multi-dimensional rating systems.'
          additionalProperties:
            anyOf:
            - type: number
            - type: string
          type: object
      additionalProperties: false
      type: object
      title: UserFeedbackEvent
      description: 'Structured feedback supplied by an end-user.


        This event captures various forms of end-user feedback about a model''s response,

        including binary thumbs up/down ratings, numeric scores, free-text opinions,

        suggested rewrites, and structured category ratings.


        Either `thumb` or `rating` should be provided (they are mutually exclusive),
        but all

        feedback fields are optional to accommodate different feedback collection
        patterns.'
    UserMessagesConfig:
      properties:
        embeddings_only:
          type: boolean
          title: Embeddings Only
          description: Whether to use only embeddings for computing the user canonical
            form messages.
          default: false
        embeddings_only_similarity_threshold:
          title: Embeddings Only Similarity Threshold
          description: The similarity threshold to use when using only embeddings
            for computing the user canonical form messages.
          type: number
          maximum: 1.0
          minimum: 0.0
        embeddings_only_fallback_intent:
          title: Embeddings Only Fallback Intent
          description: Defines the fallback intent when the similarity is below the
            threshold. If set to None, the user intent is computed normally using
            the LLM. If set to a string value, that string is used as the intent.
          type: string
      type: object
      title: UserMessagesConfig
      description: Configuration for how the user messages are interpreted.
    UserRating:
      properties:
        thumb:
          allOf:
          - $ref: '#/components/schemas/ThumbDirection'
          description: "Binary feedback: \"up\" for \U0001F44D or \"down\" for \U0001F44E\
            . Mutually exclusive with `rating`. Use this for simple thumbs up/down\
            \ UI elements."
        rating:
          title: Rating
          description: Numeric rating (e.g., 1-5 stars) provided by the end user.
            Mutually exclusive with `thumb`. Use this for star ratings or numeric
            scales.
          type: number
          minimum: 0.0
        opinion:
          title: Opinion
          description: Free-text comment from the end user describing their opinion
            of the response.
          type: string
          maxLength: 2000
          minLength: 1
        rewrite:
          title: Rewrite
          description: End-user's suggested text replacement for the generated response.
            This is the user's idea of what the response should have been.
          type: string
          maxLength: 10000
          minLength: 1
        chosen_index:
          title: Chosen Index
          description: Zero-based index of the response option the user selected when
            multiple responses were returned. Use this when showing users multiple
            completion choices and tracking which one they picked.
          type: integer
          minimum: 0.0
        categories:
          title: Categories
          description: 'Application-specific category ratings as key-value pairs.
            Use this for custom rating dimensions (e.g., {''helpfulness'': 4, ''accuracy'':
            5, ''tone'': ''professional''}). Useful for radio buttons, dropdowns,
            or multi-dimensional rating systems.'
          additionalProperties:
            anyOf:
            - type: number
            - type: string
          type: object
      type: object
      title: UserRating
      description: 'User''s rating/evaluation of an AI response.


        This captures various forms of end-user feedback about a model''s response,
        including

        binary thumbs up/down ratings, numeric scores, free-text opinions, suggested
        rewrites,

        and structured category ratings.


        Either `thumb` or `rating` should be provided (they are mutually exclusive),
        but all

        fields are optional to accommodate different feedback collection patterns.'
    ValidationError:
      properties:
        loc:
          items:
            anyOf:
            - type: string
            - type: integer
          type: array
          title: Location
        msg:
          type: string
          title: Message
        type:
          type: string
          title: Error Type
        input:
          title: Input
        ctx:
          type: object
          title: Context
          additionalProperties: true
      type: object
      required:
      - loc
      - msg
      - type
      title: ValidationError
    ValidationParameters:
      properties:
        group_by_accept_no_delineator:
          type: boolean
          title: group_by_accept_no_delineator
          description: Whether to accept completions without both beginning and end
            of sequence delineators as a single sequence.
          default: false
        group_by_ignore_invalid_records:
          type: boolean
          title: group_by_ignore_invalid_records
          description: Whether to ignore invalid records in a sequence and proceed
            with the valid records.
          default: false
        group_by_fix_non_unique_value:
          type: boolean
          title: group_by_fix_non_unique_value
          description: Whether to automatically fix non-unique group-by values in
            a sequence by using the first unique value for all records.
          default: false
        group_by_fix_unordered_records:
          type: boolean
          title: group_by_fix_unordered_records
          description: Whether to automatically fix unordered records in a sequence
            by sorting the records.
          default: false
      type: object
      title: ValidationParameters
      description: 'Configuration for record and sequence validation.


        These parameters control the validation and automatic fixes when going

        from LLM output to tabular data.'
    VirtualModel:
      properties:
        name:
          type: string
          title: Name
          description: Entity name within the workspace
          default: ''
        workspace:
          type: string
          pattern: ^[\w\-\+.@:]+$
          title: Workspace
          description: Workspace identifier
        project:
          title: Project
          description: The name of the project associated with this entity.
          type: string
        default_model_entity:
          title: Default Model Entity
          type: string
        autoprovisioned:
          type: boolean
          title: Autoprovisioned
          description: Marks this VirtualModel as controller-managed. The Models controller
            will delete it once no ModelProvider serves the matching entity. Setting
            this manually opts the VirtualModel into that cleanup behavior.
          default: false
        models:
          items:
            $ref: '#/components/schemas/VirtualModelInferenceConfig'
          type: array
          title: Models
        request_middleware:
          items:
            $ref: '#/components/schemas/MiddlewareCall'
          type: array
          title: Request Middleware
          default: []
        response_middleware:
          items:
            $ref: '#/components/schemas/MiddlewareCall'
          type: array
          title: Response Middleware
          default: []
        post_response_middleware:
          items:
            $ref: '#/components/schemas/MiddlewareCall'
          type: array
          title: Post Response Middleware
          default: []
        override_proxy:
          title: Override Proxy
          type: string
        id:
          type: string
          title: Id
          readOnly: true
        created_at:
          title: Created At
          readOnly: true
          type: string
          format: date-time
        created_by:
          title: Created By
          readOnly: true
          nullable: true
          type: string
        updated_at:
          title: Updated At
          readOnly: true
          type: string
          format: date-time
        updated_by:
          title: Updated By
          readOnly: true
          nullable: true
          type: string
        entity_id:
          type: string
          title: Entity Id
          description: Alias for id for backwards compatibility.
          readOnly: true
        parent:
          title: Parent
          description: Parent entity ID for nested entities.
          readOnly: true
          type: string
      type: object
      required:
      - workspace
      - id
      - created_at
      - created_by
      - updated_at
      - updated_by
      - entity_id
      - parent
      title: VirtualModel
      description: 'Logical inference route.


        Maps a user-facing model name to an optional default model entity and

        defines ordered middleware pipelines for the request, response, and

        post-response phases.


        When a caller sets ``model: "workspace/my-virtual-model"`` in an inference

        request, IGW resolves the ``VirtualModel`` instead of a ``ModelEntity``

        directly. If ``default_model_entity`` is set, IGW writes it into

        ``request["model"]`` before the request middleware pipeline runs. Middleware

        may mutate ``request["model"]`` freely. After the pipeline completes, IGW

        reads ``request["model"]``, resolves it to a ``ModelProvider`` via the

        ``ModelCache``, and proxies.


        The ``ModelProviderReconciler`` auto-creates a passthrough ``VirtualModel``

        for each discovered model (same workspace and name as the ``ModelEntity``,

        empty middleware lists, ``default_model_entity`` pointing to that entity).

        All existing inference requests continue to work without changes.'
    VirtualModelInferenceConfig:
      properties:
        model:
          type: string
          title: Model
        backend_format:
          allOf:
          - $ref: '#/components/schemas/BackendFormat'
          description: Optional backend format override for this VirtualModel entry.
          nullable: true
      type: object
      required:
      - model
      title: VirtualModelInferenceConfig
      description: Inference configuration for one model entity referenced by a VirtualModel.
    VirtualModelsPage:
      properties:
        data:
          items:
            $ref: '#/components/schemas/VirtualModel'
          type: array
          title: Data
        pagination:
          allOf:
          - $ref: '#/components/schemas/PaginationData'
          description: Pagination information.
        sort:
          title: Sort
          description: The field on which the results are sorted.
          type: string
        filter:
          title: Filter
          description: Filtering information.
          additionalProperties: true
          type: object
      type: object
      required:
      - data
      title: VirtualModelsPage
    VolcanoJobExecutionProfile:
      properties:
        provider:
          type: string
          title: Provider
          description: The compute provider for the executor, e.g., cpu, gpu
          default: cpu
        profile:
          type: string
          title: Profile
          description: The profile name for the executor, e.g., high_priority_a100,
            low_priority, etc.
          default: default
        backend:
          type: string
          const: volcano_job
          title: Backend
          default: volcano_job
        config:
          allOf:
          - $ref: '#/components/schemas/VolcanoJobExecutionProfileConfig'
          description: Additional configuration for the kubernetes executor
      type: object
      required:
      - config
      title: VolcanoJobExecutionProfile
      description: Volcano Job Execution Profile
    VolcanoJobExecutionProfileConfig:
      properties:
        ttl_seconds_before_active:
          type: integer
          title: Ttl Seconds Before Active
          default: 1800
        ttl_seconds_active:
          type: integer
          title: Ttl Seconds Active
          default: 86400
        ttl_seconds_after_finished:
          type: integer
          title: Ttl Seconds After Finished
          default: 3600
        cleanup_completed_jobs_immediately:
          type: boolean
          title: Cleanup Completed Jobs Immediately
          default: true
        launcher_tool_path:
          type: string
          title: Launcher Tool Path
          description: Path to the jobs launcher tool
          default: /tools/jobs-launcher
        env:
          additionalProperties:
            type: string
          type: object
          title: Env
          description: Optional env vars applied to all jobs (e.g. HOME=/tmp). Keys
            must not conflict with platform-reserved names. Job steps may override
            these variables.
        namespace:
          title: Namespace
          description: Kubernetes namespace to submit the job to. If not set, it will
            be determined from the environment.
          type: string
        service_account_name:
          type: string
          title: Service Account Name
          description: Kubernetes service account name for job pods. Uses the Kubernetes
            default service account when set to 'default'.
          default: default
        tolerations:
          items:
            additionalProperties: true
            type: object
          type: array
          title: Tolerations
          description: Tolerations for the Kubernetes job pods.
        node_selector:
          additionalProperties:
            type: string
          type: object
          title: Node Selector
          description: Node selector for the Kubernetes job pods.
        affinity:
          additionalProperties: true
          type: object
          title: Affinity
          description: Affinity for the Kubernetes job pods.
        resources:
          allOf:
          - $ref: '#/components/schemas/ComputeResources'
          description: Resource requests and limits for the Kubernetes job pods.
        pod_security_context:
          additionalProperties: true
          type: object
          title: Pod Security Context
          description: Pod security context for the Kubernetes job pods.
        image_pull_secrets:
          items:
            $ref: '#/components/schemas/ImagePullSecret'
          type: array
          title: Image Pull Secrets
          description: Image pull secrets for the Kubernetes job pods.
        job_metadata:
          allOf:
          - $ref: '#/components/schemas/KubernetesObjectMetadata'
          description: Metadata to add to each job object in the Kubernetes job.
        pod_metadata:
          allOf:
          - $ref: '#/components/schemas/KubernetesObjectMetadata'
          description: Metadata to add to each pod in the Kubernetes job.
        storage:
          allOf:
          - $ref: '#/components/schemas/KubernetesJobStorageConfig'
          description: Storage configuration for the Kubernetes job pods.
        num_gpus:
          type: integer
          title: Num Gpus
          description: Number of GPUs to request for the job
          default: 1
        scheduler_name:
          type: string
          title: Scheduler Name
          description: The scheduler name to use for the Volcano job.
          default: volcano
        launcher_image:
          type: string
          title: Launcher Image
          description: Container image that contains the jobs-launcher binary.
          default: nvcr.io/nvidia/nemo-microservices/jobs-launcher:latest
        queue:
          type: string
          title: Queue
          description: The Volcano queue to submit the job to.
          default: default
        max_retry:
          type: integer
          title: Max Retry
          description: maxRetry indicates the maximum number of retries allowed by
            the job
          default: 0
        plugins:
          additionalProperties: true
          type: object
          title: Plugins
          description: plugins indicates the plugins used by Volcano when the job
            is scheduled. We always add the pytorch plugin if more than one node.
        enable_multi_node_networking:
          type: boolean
          title: Enable Multi Node Networking
          description: Enable multi-node networking injection. Sets annotations to
            trigger Kyverno policy mutations.
          default: true
      type: object
      title: VolcanoJobExecutionProfileConfig
      description: Configuration for Volcano Job Execution Profile
