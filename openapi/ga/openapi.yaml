        type:
          type: string
          const: huggingface
          title: Type
          default: huggingface
        repo_id:
          type: string
          title: Repo Id
          description: Huggingface repository ID (e.g., 'meta-llama/Llama-2-7b')
        repo_type:
          type: string
          enum:
          - model
          - dataset
          - space
          title: Repo Type
          description: 'Type of Huggingface repository: ''model'', ''dataset'', or
            ''space'''
          default: model
        revision:
          type: string
          title: Revision
          description: Branch, tag, or commit SHA. Defaults to 'main'
          default: main
        original_revision:
          title: Original Revision
          description: The original revision requested by the user before resolution
            (e.g., 'main'). The 'revision' field contains the resolved commit SHA.
          type: string
        token_secret:
          allOf:
          - $ref: '#/components/schemas/SecretRef'
          description: Huggingface API `token` secret name for private repositories
        endpoint:
          type: string
          title: Endpoint
          description: Huggingface Hub endpoint URL. Use for self-hosted instances.
          default: https://huggingface.co
      type: object
