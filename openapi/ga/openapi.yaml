        This flexibility enables the Intake service to store requests from various
        LLM providers

        (OpenAI, Anthropic, NIM, etc.) and future model types (embeddings, multimodal,
        etc.)

        without requiring schema updates.


        Required fields: `messages` and `model`

        Common optional fields: `temperature`, `max_tokens`, `top_p`, `tools`, `tool_choice`,

        `stream`, `response_format`, etc.'
    FlexibleEntryRequestOutput:
      properties:
        messages:
