          type: array
        colang_history:
          title: Colang History
          description: The Colang history associated with the generation.
          type: string
      type: object
      title: GenerationLog
      description: Contains additional logging information associated with a generation
        call.
    GenerationLogOptions:
      properties:
        activated_rails:
          type: boolean
          title: Activated Rails
          description: Include detailed information about the rails that were activated
            during generation.
          default: false
        llm_calls:
          type: boolean
          title: Llm Calls
          description: 'Include information about all the LLM calls that were made.
            This includes: prompt, completion, token usage, raw response, etc.'
          default: false
        internal_events:
          type: boolean
          title: Internal Events
          description: Include the array of internal generated events.
          default: false
        colang_history:
          type: boolean
          title: Colang History
          description: Include the history of the conversation in Colang format.
          default: false
        stats:
          type: boolean
          title: Stats
          description: "Include generation statistics \u2014 rail durations, LLM call\
            \ counts, and token usage."
          default: false
      type: object
      title: GenerationLogOptions
      description: Options for what should be included in the generation log.
    GenerationOptions:
      properties:
        rails:
          allOf:
          - $ref: '#/components/schemas/GenerationRailsOptions'
          description: Options for which rails should be applied for the generation.
            By default, all rails are enabled.
        llm_params:
          title: Llm Params
          description: Additional parameters that should be used for the LLM call
          additionalProperties: true
          type: object
        llm_output:
          title: Llm Output
          description: Whether the response should also include any custom LLM output.
          default: false
          type: boolean
        output_vars:
          anyOf:
          - type: boolean
          - items:
              type: string
            type: array
          title: Output Vars
          description: Whether additional context information should be returned.
            When True is specified, the whole context is returned. Otherwise, a list
            of key names can be specified.
        log:
          allOf:
          - $ref: '#/components/schemas/GenerationLogOptions'
          description: 'Options about what to include in the log. By default, nothing
            is included. '
      type: object
      title: GenerationOptions
      description: 'A set of options that should be applied during a generation.


        The GenerationOptions control various things such as what rails are enabled,

        additional parameters for the main LLM, whether the rails should be enforced
        or

        ran in parallel, what to be included in the generation log, etc.'
    GenerationRailsOptions:
      properties:
        input:
          anyOf:
          - type: boolean
          - items:
              type: string
            type: array
          title: Input
          description: Whether the input rails are enabled or not. If a list of names
            is specified, then only the specified input rails will be applied.
          default: true
        output:
          anyOf:
          - type: boolean
          - items:
              type: string
            type: array
          title: Output
          description: Whether the output rails are enabled or not. If a list of names
            is specified, then only the specified output rails will be applied.
          default: true
        retrieval:
          anyOf:
          - type: boolean
          - items:
              type: string
            type: array
          title: Retrieval
          description: Whether the retrieval rails are enabled or not. If a list of
            names is specified, then only the specified retrieval rails will be applied.
          default: true
        dialog:
          type: boolean
          title: Dialog
          description: Whether the dialog rails are enabled or not.
          default: true
      type: object
      title: GenerationRailsOptions
      description: Options for what rails should be used during the generation.
    GenerationStats:
      properties:
        input_rails_duration:
          title: Input Rails Duration
          description: The time in seconds spent in processing the input rails.
          type: number
        dialog_rails_duration:
          title: Dialog Rails Duration
          description: The time in seconds spent in processing the dialog rails.
          type: number
        generation_rails_duration:
          title: Generation Rails Duration
          description: The time in seconds spent in generation rails.
          type: number
        output_rails_duration:
          title: Output Rails Duration
          description: The time in seconds spent in processing the output rails.
          type: number
        total_duration:
          title: Total Duration
          description: The total time in seconds.
          type: number
        llm_calls_duration:
          title: Llm Calls Duration
          description: The time in seconds spent in LLM calls.
          default: 0
          type: number
        llm_calls_count:
          title: Llm Calls Count
          description: The number of LLM calls in total.
          default: 0
          type: integer
        llm_calls_total_prompt_tokens:
          title: Llm Calls Total Prompt Tokens
          description: The total number of prompt tokens.
          default: 0
          type: integer
        llm_calls_total_completion_tokens:
          title: Llm Calls Total Completion Tokens
          description: The total number of completion tokens.
          default: 0
          type: integer
        llm_calls_total_tokens:
          title: Llm Calls Total Tokens
          description: The total number of tokens.
          default: 0
          type: integer
      type: object
      title: GenerationStats
      description: General stats about the generation.
    GenericSortField:
      type: string
      enum:
      - created_at
      - -created_at
      - name
      - -name
      title: GenericSortField
    GlinerConfig:
      properties:
        enable_gliner:
          type: boolean
          title: Enable Gliner
          description: Enable GLiNER NER module.
          default: true
        enable_batch_mode:
          type: boolean
          title: Enable Batch Mode
          description: Enable GLiNER batch mode.
          default: true
        batch_size:
          type: integer
          title: Batch Size
          description: GLiNER batch size.
          default: 8
        chunk_length:
          type: integer
          title: Chunk Length
          description: GLiNER batch chunk length in characters.
          default: 512
        gliner_model:
          type: string
          title: Gliner Model
          description: GLiNER model name.
          default: nvidia/gliner-PII
      type: object
      title: GlinerConfig
      description: Configuration for the GLiNER named-entity recognition model.
    Globals:
      properties:
        locales:
          title: Locales
          description: List of locales.
          examples:
          - en_US
          items:
            type: string
          type: array
        seed:
          title: Seed
          description: Optional random seed.
          type: integer
          exclusiveMaximum: 2147483647.0
          exclusiveMinimum: -2147483647.0
        classify:
          allOf:
          - $ref: '#/components/schemas/ClassifyConfig'
          description: Column classification configuration.
          default:
            num_samples: 3
        ner:
          allOf:
          - $ref: '#/components/schemas/NERConfig'
          description: Named Entity Recognition configuration.
          default:
            ner_threshold: 0.3
            enable_regexps: false
            gliner:
              batch_size: 8
              chunk_length: 512
              enable_batch_mode: true
              enable_gliner: true
              gliner_model: nvidia/gliner-PII
        lock_columns:
          title: Lock Columns
          description: List of columns to preserve as immutable across all transformations.
          items:
            type: string
          type: array
      type: object
      title: Globals
      description: Global settings for the PII replacer including locales, seed, NER,
        and classification.
    GuardrailCheckRequest:
      properties:
        model:
          type: string
          title: Model
          description: The model to use for completion. Must be one of the available
            models.
        response_format:
          title: Response Format
          description: 'Format of the response. Use {''type'': ''json_object''} for
            JSON mode or {''type'': ''json_schema'', ''json_schema'': {...}} for structured
            outputs.'
          additionalProperties: true
          type: object
        max_tokens:
          title: Max Tokens
          description: The maximum number of tokens that can be generated in the chat
            completion.
          type: integer
          minimum: 1.0
        n:
          title: N
          description: How many chat completion choices to generate for each input
            message.
          type: integer
          minimum: 1.0
        stream:
          title: Stream
          description: If set, partial message deltas will be sent, like in ChatGPT.
          default: false
          type: boolean
        temperature:
          title: Temperature
          description: What sampling temperature to use, between 0 and 2.
          type: number
          maximum: 2.0
          minimum: 0.0
        top_p:
          title: Top P
          description: An alternative to sampling with temperature, called nucleus
            sampling.
          type: number
          maximum: 1.0
          minimum: 0.0
        stop:
          anyOf:
          - type: string
          - items:
              type: string
            type: array
          title: Stop
          description: Up to 4 sequences where the API will stop generating further
            tokens.
        frequency_penalty:
          title: Frequency Penalty
          description: Positive values penalize new tokens based on their existing
            frequency in the text.
          type: number
          maximum: 2.0
          minimum: -2.0
        presence_penalty:
          title: Presence Penalty
          description: Positive values penalize new tokens based on whether they appear
            in the text so far.
          type: number
          maximum: 2.0
          minimum: -2.0
        function_call:
          anyOf:
          - type: string
          - additionalProperties: true
            type: object
          title: Function Call
          description: 'Deprecated in favor of tool_choice. ''none'' means the model
            will not call a function and instead generates a message. ''auto'' means
            the model can pick between generating a message or calling a function.
            Specifying a particular function via {''name'': ''my_function''} forces
            the model to call that function.'
        seed:
          title: Seed
          description: If specified, attempts to sample deterministically.
          type: integer
        logit_bias:
          title: Logit Bias
          description: Modify the likelihood of specified tokens appearing in the
            completion. Maps token IDs (as strings) to bias values from -100 to 100.
          additionalProperties:
            type: number
          type: object
        top_logprobs:
          title: Top Logprobs
          description: The number of most likely tokens to return at each token position.
          type: integer
          maximum: 20.0
          minimum: 0.0
        logprobs:
          title: Logprobs
          description: Whether to return log probabilities of the output tokens or
            not. If true, returns the log probabilities of each output token returned
            in the content of message
          type: boolean
        tool_choice:
          anyOf:
          - type: string
          - additionalProperties: true
            type: object
          title: Tool Choice
          description: Controls which (if any) tool is called by the model. 'none'
            means no tool is called, 'auto' lets the model decide, 'required' forces
            a tool call.
        user:
          title: User
          description: A unique identifier representing your end-user, used by some
            providers for abuse monitoring.
          type: string
        tools:
          title: Tools
          description: A list of tools the model may call. Each tool is an object
            with a 'type' field and a 'function' definition.
          items:
            additionalProperties: true
            type: object
          type: array
        ignore_eos:
          title: Ignore Eos
          description: Ignore the eos when running
          type: boolean
        reasoning_effort:
          title: Reasoning Effort
          description: Constrains effort on reasoning for reasoning models. Reducing
            reasoning effort can result in faster responses and fewer tokens used
            on reasoning in a response.
          type: string
        max_completion_tokens:
          title: Max Completion Tokens
          description: An upper bound for the number of tokens that can be generated
            for a completion, including visible output tokens and reasoning tokens.
            Preferred over max_tokens for reasoning models.
          type: integer
          minimum: 1.0
        stream_options:
          title: Stream Options
          description: Options for streaming response. Only set this when stream=True.
            Supports include_usage to receive token usage in the final stream chunk.
          additionalProperties:
            type: boolean
          type: object
        messages:
          items:
            anyOf:
            - $ref: '#/components/schemas/ChatCompletionSystemMessageParam'
            - $ref: '#/components/schemas/ChatCompletionUserMessageParam'
            - $ref: '#/components/schemas/ChatCompletionAssistantMessageParam'
            - $ref: '#/components/schemas/ChatCompletionToolMessageParam'
            - $ref: '#/components/schemas/ChatCompletionFunctionMessageParam'
          type: array
          title: Messages
          description: A list of messages comprising the conversation so far
        vision:
          title: Vision
          description: Whether this is a vision-capable request with image inputs.
          type: boolean
        guardrails:
          allOf:
          - $ref: '#/components/schemas/GuardrailsDataInput'
          description: Guardrails specific options for the request.
      additionalProperties: true
      type: object
      required:
      - model
      - messages
      title: GuardrailCheckRequest
      description: Currently only inherits, in the future we might add new fields.
    GuardrailCheckResponse:
      properties:
        status:
          allOf:
          - $ref: '#/components/schemas/StatusEnum'
          description: Overall status indicating if all rails passed or if any failed.
        rails_status:
          additionalProperties:
            $ref: '#/components/schemas/RailStatus'
          type: object
          title: Rails Status
          description: Dictionary mapping each rail to its status.
        guardrails_data:
          allOf:
          - $ref: '#/components/schemas/GuardrailsDataOutput'
          description: Additional data related to guardrails.
      type: object
      required:
      - status
      - rails_status
      title: GuardrailCheckResponse
    GuardrailConfig:
