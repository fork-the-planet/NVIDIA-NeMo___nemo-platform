    CreateAdapterRequest:
      properties:
        name:
          type: string
          maxLength: 255
          pattern: ^[\w\-.]+$
          title: Name
          description: 'Name of the adapter. Name must be unique in the workspace.
            Allowed characters: letters (a-z, A-Z), digits (0-9), underscores, hyphens,
            and dots.'
          examples:
          - lora-adapter-v1
          - my-finetune
        description:
          title: Description
          description: Optional description of the adapter
          type: string
          maxLength: 1000
        fileset:
          type: string
          title: Fileset
          description: Location where adapter files are stored - expected format {workspace}/{fileset_name}
        finetuning_type:
          allOf:
          - $ref: '#/components/schemas/FinetuningType'
          description: Type of finetuning (LORA, P_TUNING, etc.)
        enabled:
          type: boolean
          title: Enabled
          description: Whether to make this adapter available for inference post training
          default: true
        lora_config:
          allOf:
          - $ref: '#/components/schemas/Lora'
          description: Lora configuration specifics
        model:
          type: string
          maxLength: 127
          title: Model
          description: "Base model entity.\n            Use `{workspace}/{model_name}`\
            \ to reference a model in any workspace, or a single `{model_name}` resolved\
            \ in the path workspace. A single name (2-63 characters) or 'workspace/model_name'\
            \ where each segment is a valid name (lowercase, digits, hyphens, and\
            \ temporarily @ . + _; no leading/trailing or consecutive hyphens). If\
            \ one slash, both sides must be non-empty."
          examples:
          - llama-3-8b-instruct
          - shared-tenant/base-llm
      type: object
      required:
      - name
      - fileset
      - finetuning_type
      - model
      title: CreateAdapterRequest
      description: Request body for Adapter creation.
