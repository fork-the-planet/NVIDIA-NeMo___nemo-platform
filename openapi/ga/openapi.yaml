openapi: 3.1.0
info:
  title: Nemo Platform API
  description: API for Nemo Platform services
  version: 0.2.0
paths:
  /apis/auth/discovery:
    get:
      tags:
      - Discovery
      summary: Discover auth configuration
      description: "Return authentication configuration for CLI/SDK discovery.\n\n\
        This endpoint is unauthenticated and returns the information clients\nneed\
        \ to authenticate with this NeMo Platform deployment.\n\n**Response fields:**\n\
        \n- `auth_enabled`: Whether authentication is enabled on this cluster\n- `oidc`:\
        \ OIDC configuration (only present when OIDC is enabled)\n  - `issuer`: The\
        \ OIDC issuer URL\n  - `authorization_endpoint`: Authorization endpoint for\
        \ browser-based flows\n  - `token_endpoint`: Token exchange endpoint\n  -\
        \ `device_authorization_endpoint`: Device flow authorization endpoint (for\
        \ CLI)\n  - `userinfo_endpoint`: UserInfo endpoint\n  - `client_id`: OAuth\
        \ client ID to use\n  - `default_scopes`: OAuth scopes to request during authentication\n\
        \  - `scope_prefix`: Prefix to prepend to custom scopes (those with ':' or\
        \ '.default')"
      operationId: get_auth_discovery_apis_auth_discovery_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthDiscoveryResponse'
  /apis/auth/v2/iam/role-bindings:
    get:
      tags:
      - IAM
      summary: List role bindings
      description: List all role bindings (Platform Admin only)
      operationId: list_role_bindings_apis_auth_v2_iam_role_bindings_get
      parameters:
      - name: page
        in: query
        required: false
        schema:
          type: integer
          description: Page number.
          default: 1
          title: Page
        description: Page number.
      - name: page_size
        in: query
        required: false
        schema:
          type: integer
          description: Page size.
          default: 10
          title: Page Size
        description: Page size.
      - name: sort
        in: query
        required: false
        schema:
          type: string
          description: The field to sort by. To sort in decreasing order, use `-`
            in front of the field name.
          default: created_at
          title: Sort
        description: The field to sort by. To sort in decreasing order, use `-` in
          front of the field name.
      - in: query
        name: filter
        style: deepObject
        required: false
        explode: true
        schema:
          $ref: '#/components/schemas/RoleBindingFilter'
        description: Filter role bindings by principal, workspace, role, granted_by,
          is_active, granted_at, and revoked_at.
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RoleBindingsPage'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    post:
      tags:
      - IAM
      summary: Create role binding
      description: Create a new role binding (Platform Admin only)
      operationId: create_role_binding_apis_auth_v2_iam_role_bindings_post
      parameters:
      - name: wait_role_propagation
        in: query
        required: false
        schema:
          type: boolean
          description: 'If true, wait for role to propagate before returning (default:
            true). Set to false for bulk operations.'
          default: true
          title: Wait Role Propagation
        description: 'If true, wait for role to propagate before returning (default:
          true). Set to false for bulk operations.'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RoleBindingInput'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RoleBinding'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /apis/auth/v2/iam/role-bindings/{name}:
    get:
      tags:
      - IAM
      summary: Get role binding
      description: Get a specific role binding (Platform Admin only)
      operationId: get_role_binding_apis_auth_v2_iam_role_bindings__name__get
      parameters:
      - name: name
        in: path
        required: true
        schema:
          type: string
          title: Name
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RoleBinding'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    delete:
      tags:
      - IAM
      summary: Revoke role binding
      description: Revoke a role binding (Platform Admin only)
      operationId: revoke_role_binding_apis_auth_v2_iam_role_bindings__name__delete
      parameters:
      - name: name
        in: path
        required: true
        schema:
          type: string
          title: Name
      - name: wait_role_propagation
        in: query
        required: false
        schema:
          type: boolean
          description: 'If true, wait for role to propagate before returning (default:
            true). Set to false for bulk operations.'
          default: true
          title: Wait Role Propagation
        description: 'If true, wait for role to propagate before returning (default:
          true). Set to false for bulk operations.'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeleteResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /apis/entities/v2/entities/{id}:
    get:
      tags:
      - Entity Store
      summary: Get entity by ID (debug/internal)
      description: 'Get a specific entity by its unique identifier.

        This endpoint is primarily for debugging and internal use.


        Example:

        ```

        GET /apis/entities/v2/entities/customization-config-5Q2LoF8z8M9JZxZsHwJKNn

        ```'
      operationId: get_entity_by_id_apis_entities_v2_entities__id__get
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          title: Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Entity'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /apis/entities/v2/workspaces:
    post:
      tags:
      - Entity Store
      summary: Create a new workspace
      description: "Create a new workspace.\n\nThe creator is automatically granted\
        \ Admin role on the workspace.\nBy default, this endpoint waits for the Admin\
        \ role to propagate before returning.\nUse `wait_role_propagation=false` to\
        \ skip waiting (useful for bulk operations).\n\nExample:\n```\nPOST /apis/entities/v2/workspaces\n\
        {\n    \"name\": \"ml-team\",\n    \"description\": \"Machine Learning Team\
        \ workspace\"\n}\n```"
      operationId: create_workspace_apis_entities_v2_workspaces_post
      parameters:
      - name: wait_role_propagation
        in: query
        required: false
        schema:
          type: boolean
          description: 'If true, wait for Admin role to propagate before returning
            (default: true). Set to false for bulk operations.'
          default: true
          title: Wait Role Propagation
        description: 'If true, wait for Admin role to propagate before returning (default:
          true). Set to false for bulk operations.'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WorkspaceInput'
      responses:
        '201':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Workspace'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    get:
      tags:
      - Entity Store
      summary: List all workspaces
      description: 'List all workspaces with pagination.


        When authentication is enabled, only workspaces the principal has access to

        are returned. Service principals and platform admins have access to all workspaces.


        Query Parameters:

        - page, page_size: Pagination

        - sort: Sort field

        - filter: Advanced filters (JSON, text, or bracket notation)


        Example:

        ```

        GET /apis/entities/v2/workspaces?sort=-created_at&page=1&page_size=10

        ```'
      operationId: list_workspaces_apis_entities_v2_workspaces_get
      parameters:
      - name: page
        in: query
        required: false
        schema:
          type: integer
          minimum: 1
          description: Page number
          default: 1
          title: Page
        description: Page number
      - name: page_size
        in: query
        required: false
        schema:
          type: integer
          maximum: 1000
          minimum: 1
          description: Items per page
          default: 100
          title: Page Size
        description: Items per page
      - name: sort
        in: query
        required: false
        schema:
          allOf:
          - $ref: '#/components/schemas/GenericSortField'
          description: Sort field
          default: -created_at
        description: Sort field
      - name: filter
        in: query
        required: false
        schema:
          description: 'Query filter expression. Supports text and JSON syntaxes:

            - Text: name:"value" AND status>500 with operators : ~ > >= < <= IN NOT
            IN AND OR and negation prefix -

            - Object (JSON): {"name":{"$like":"value"}} with operators $eq, $like,
            $lt, $lte, $gt, $gte, $in, $nin, $and, $or, $not

            - Bracket notation: ?filter[name][$like]=value

            - Relationship traversal: ?filter[relationship][$exists]=true or ?filter[relationship][field]=value'
          title: Filter
          type: string
        description: 'Query filter expression. Supports text and JSON syntaxes:

          - Text: name:"value" AND status>500 with operators : ~ > >= < <= IN NOT
          IN AND OR and negation prefix -

          - Object (JSON): {"name":{"$like":"value"}} with operators $eq, $like, $lt,
          $lte, $gt, $gte, $in, $nin, $and, $or, $not

          - Bracket notation: ?filter[name][$like]=value

          - Relationship traversal: ?filter[relationship][$exists]=true or ?filter[relationship][field]=value'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkspacesPage'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /apis/entities/v2/workspaces/{name}:
    get:
      tags:
      - Entity Store
      summary: Get workspace by ID
      description: 'Get a specific workspace by ID.


        Example:

        ```

        GET /apis/entities/v2/workspaces/ml-team

        ```'
      operationId: get_workspace_apis_entities_v2_workspaces__name__get
      parameters:
      - name: name
        in: path
        required: true
        schema:
          type: string
          title: Name
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Workspace'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    put:
      tags:
      - Entity Store
      summary: Update workspace
      description: "Update a workspace's description.\n\nExample:\n```\nPUT /apis/entities/v2/workspaces/ml-team\n\
        {\n    \"description\": \"Updated description for ML Team\"\n}\n```"
      operationId: update_workspace_apis_entities_v2_workspaces__name__put
      parameters:
      - name: name
        in: path
        required: true
        schema:
          type: string
          title: Name
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WorkspaceUpdate'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Workspace'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    delete:
      tags:
      - Entity Store
      summary: Delete workspace
      description: 'Delete a workspace.


        This marks the workspace for deletion and returns immediately. The workspace

        will no longer be accessible via the API. An asynchronous cleanup controller

        will handle deletion of all entities and external resources.


        Role bindings are immediately deleted to revoke access.


        Example:

        ```

        DELETE /apis/entities/v2/workspaces/ml-team

        ```'
      operationId: delete_workspace_apis_entities_v2_workspaces__name__delete
      parameters:
      - name: name
        in: path
        required: true
        schema:
          type: string
          title: Name
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeleteResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /apis/entities/v2/workspaces/{workspace}/entities/{entity_type}:
    post:
      tags:
      - Entity Store
      summary: Create a new entity
      description: "Create a new entity of the specified type in the given workspace.\n\
        \nIf name is not provided, it will be auto-generated based on the entity type.\n\
        \nExample:\n```\nPOST /apis/entities/v2/workspaces/default/entities/customization_config\n\
        {\n    \"name\": \"my-config\",\n    \"data\": {\n        \"target_id\": \"\
        llama-2-7b\",\n        \"training_options\": {\"learning_rate\": 0.01}\n \
        \   }\n}\n```"
      operationId: create_entity_apis_entities_v2_workspaces__workspace__entities__entity_type__post
      parameters:
      - name: workspace
        in: path
        required: true
        schema:
          type: string
          title: Workspace
      - name: entity_type
        in: path
        required: true
        schema:
          type: string
          title: Entity Type
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EntityCreateInput'
      responses:
        '201':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Entity'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    get:
      tags:
      - Entity Store
      summary: List entities
      description: 'List all entities of a specific type in the given workspace.


        Use workspace="-" to list entities across all workspaces the principal has

        access to.


        Query Parameters:

        - sort: Sort field

        - page, page_size: Pagination

        - filter: Advanced filters (JSON, text, or bracket notation)


        Examples:

        ```

        GET /apis/entities/v2/workspaces/default/entities/customization_config?sort=-created_at

        GET /apis/entities/v2/workspaces/-/entities/customization_config  # Cross-workspace
        query

        ```'
      operationId: list_entities_apis_entities_v2_workspaces__workspace__entities__entity_type__get
      parameters:
      - name: workspace
        in: path
        required: true
        schema:
          type: string
          title: Workspace
      - name: entity_type
        in: path
        required: true
        schema:
          type: string
          title: Entity Type
      - name: page
        in: query
        required: false
        schema:
          type: integer
          minimum: 1
          description: Page number
          default: 1
          title: Page
        description: Page number
      - name: page_size
        in: query
        required: false
        schema:
          type: integer
          maximum: 1000
          minimum: 1
          description: Items per page
          default: 100
          title: Page Size
        description: Items per page
      - name: sort
        in: query
        required: false
        schema:
          type: string
          description: Sort field
          examples:
          - -created_at
          - created_at
          - -updated_at
          - updated_at
          - -name
          - name
          default: -created_at
          title: Sort
        description: Sort field
      - name: filter
        in: query
        required: false
        schema:
          description: 'Query filter expression. Supports text and JSON syntaxes:

            - Text: name:"value" AND status>500 with operators : ~ > >= < <= IN NOT
            IN AND OR and negation prefix -

            - Object (JSON): {"name":{"$like":"value"}} with operators $eq, $like,
            $lt, $lte, $gt, $gte, $in, $nin, $and, $or, $not

            - Bracket notation: ?filter[name][$like]=value

            - Relationship traversal: ?filter[relationship][$exists]=true or ?filter[relationship][field]=value'
          title: Filter
          type: string
        description: 'Query filter expression. Supports text and JSON syntaxes:

          - Text: name:"value" AND status>500 with operators : ~ > >= < <= IN NOT
          IN AND OR and negation prefix -

          - Object (JSON): {"name":{"$like":"value"}} with operators $eq, $like, $lt,
          $lte, $gt, $gte, $in, $nin, $and, $or, $not

          - Bracket notation: ?filter[name][$like]=value

          - Relationship traversal: ?filter[relationship][$exists]=true or ?filter[relationship][field]=value'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EntitiesPage'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /apis/entities/v2/workspaces/{workspace}/entities/{entity_type}/{name}:
    get:
      tags:
      - Entity Store
      summary: Get entity by name
      description: 'Get a specific entity by its workspace, type, and name.


        Example:

        ```

        GET /apis/entities/v2/workspaces/default/entities/customization_config/my-config

        ```'
      operationId: get_entity_by_name_apis_entities_v2_workspaces__workspace__entities__entity_type___name__get
      parameters:
      - name: workspace
        in: path
        required: true
        schema:
          type: string
          title: Workspace
      - name: entity_type
        in: path
        required: true
        schema:
          type: string
          title: Entity Type
      - name: name
        in: path
        required: true
        schema:
          type: string
          title: Name
      - name: parent
        in: query
        required: false
        schema:
          description: Parent entity ID for nested entities
          title: Parent
          type: string
        description: Parent entity ID for nested entities
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Entity'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    put:
      tags:
      - Entity Store
      summary: Update entity by name
      description: "Update an entity by its name. Optionally change the entity's name.\n\
        \nExample:\n```\nPUT /apis/entities/v2/workspaces/default/entities/customization_config/my-config\n\
        {\n    \"data\": {\n        \"target_id\": \"llama-2-7b\",\n        \"training_options\"\
        : {\"learning_rate\": 0.02}\n    }\n}\n```"
      operationId: update_entity_by_name_apis_entities_v2_workspaces__workspace__entities__entity_type___name__put
      parameters:
      - name: workspace
        in: path
        required: true
        schema:
          type: string
          title: Workspace
      - name: entity_type
        in: path
        required: true
        schema:
          type: string
          title: Entity Type
      - name: name
        in: path
        required: true
        schema:
          type: string
          title: Name
      - name: parent
        in: query
        required: false
        schema:
          description: Parent entity ID for nested entities
          title: Parent
          type: string
        description: Parent entity ID for nested entities
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EntityUpdate'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Entity'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    delete:
      tags:
      - Entity Store
      summary: Delete entity by name
      description: 'Delete an entity by its name.


        Example:

        ```

        DELETE /apis/entities/v2/workspaces/default/entities/customization_config/my-config

        ```'
      operationId: delete_entity_by_name_apis_entities_v2_workspaces__workspace__entities__entity_type___name__delete
      parameters:
      - name: workspace
        in: path
        required: true
        schema:
          type: string
          title: Workspace
      - name: entity_type
        in: path
        required: true
        schema:
          type: string
          title: Entity Type
      - name: name
        in: path
        required: true
        schema:
          type: string
          title: Name
      - name: parent
        in: query
        required: false
        schema:
          description: Parent entity ID for nested entities
          title: Parent
          type: string
        description: Parent entity ID for nested entities
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeleteResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /apis/entities/v2/workspaces/{workspace}/members:
    get:
      tags:
      - Entity Store
      summary: List workspace members
      description: 'List all members of a workspace with their roles.


        Returns a list of all principals with active role bindings in the workspace.


        Example:

        ```

        GET /apis/entities/v2/workspaces/ml-team/members

        ```'
      operationId: list_workspace_members_apis_entities_v2_workspaces__workspace__members_get
      parameters:
      - name: workspace
        in: path
        required: true
        schema:
          type: string
          title: Workspace
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkspaceMemberListResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    post:
      tags:
      - Entity Store
      summary: Add workspace member
      description: "Add a new member to the workspace with specified roles.\n\nThis\
        \ creates role bindings for the specified principal with the given roles.\n\
        By default, this endpoint waits for the roles to propagate before returning.\n\
        Use `wait_role_propagation=false` to skip waiting (useful for bulk operations).\n\
        \nExample:\n```\nPOST /apis/entities/v2/workspaces/ml-team/members\n{\n  \
        \  \"principal\": \"user@example.com\",\n    \"roles\": [\"Editor\"]\n}\n\
        ```"
      operationId: add_workspace_member_apis_entities_v2_workspaces__workspace__members_post
      parameters:
      - name: workspace
        in: path
        required: true
        schema:
          type: string
          title: Workspace
      - name: wait_role_propagation
        in: query
        required: false
        schema:
          type: boolean
          description: 'If true, wait for roles to propagate before returning (default:
            true). Set to false for bulk operations.'
          default: true
          title: Wait Role Propagation
        description: 'If true, wait for roles to propagate before returning (default:
          true). Set to false for bulk operations.'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WorkspaceMemberInput'
      responses:
        '201':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkspaceMember'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /apis/entities/v2/workspaces/{workspace}/members/{principal_id}:
    put:
      tags:
      - Entity Store
      summary: Update workspace member roles
      description: "Update the roles for a workspace member.\n\nThis will revoke existing\
        \ roles not in the new list and add new roles.\nBy default, this endpoint\
        \ waits for the roles to propagate before returning.\nUse `wait_role_propagation=false`\
        \ to skip waiting (useful for bulk operations).\n\nExample:\n```\nPUT /apis/entities/v2/workspaces/ml-team/members/user@example.com\n\
        {\n    \"roles\": [\"Viewer\", \"Editor\"]\n}\n```"
      operationId: update_workspace_member_apis_entities_v2_workspaces__workspace__members__principal_id__put
      parameters:
      - name: workspace
        in: path
        required: true
        schema:
          type: string
          title: Workspace
      - name: principal_id
        in: path
        required: true
        schema:
          type: string
          title: Principal Id
      - name: wait_role_propagation
        in: query
        required: false
        schema:
          type: boolean
          description: 'If true, wait for roles to propagate before returning (default:
            true). Set to false for bulk operations.'
          default: true
