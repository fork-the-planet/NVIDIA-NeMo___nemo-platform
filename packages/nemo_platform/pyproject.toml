[tool.uv.sources]
nemo-platform-sdk = { workspace = true }
nemo-platform-ext = { workspace = true }
nemo-evaluator-sdk = { workspace = true }

[tool.hatch.version]
source = "regex"
path = "../nmp_common/src/nmp/common/version.py"
pattern = '^platform_sdk_version = "(?P<version>[^"]+)"'

[build-system]
requires = ["hatchling", "nmp-build-tools"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel.hooks.custom]
path = "hatch_build.py"

[tool.hatch.build.targets.wheel]
packages = []
# Hatch requires an explicit file-selection option even though the custom build
# hook supplies the wheel contents from [tool.bundle-package]. Use a nonexistent
# sentinel so no wrapper-local implementation files are shipped by default.
only-include = ["_empty"]

# Wheel bundling configuration.
#
# Each entry declares a package to bundle into the wheel via force-include.
# The hatch build hook reads this at build time to generate force-include mappings.
# `make vendor` reads each bundled package's deps and writes them as extras on
# this package, so transitive dependencies are properly declared. By default the
# extra name matches the bundle key; set `deps_group` only when it should differ.
# Set `inherit` only when this package should re-export bundled package metadata.
# Each inherited metadata type accepts `true` or wildcard patterns.
#
# As packages are published to PyPI independently, remove their entry here
# and add them as a normal dependency above instead.
[tool.bundle-package]
# Library packages
nmp-common = { source = "../../packages/nmp_common/src/nmp/common", module = "nmp/common", inherit = { "entry-points" = ["nemo.*"] } }
nemo-platform-plugin = { source = "../../packages/nemo_platform_plugin/src/nemo_platform_plugin", module = "nemo_platform_plugin" }
nemo-evaluator-sdk = { source = "../../packages/nemo_evaluator_sdk/src/nemo_evaluator_sdk", module = "nemo_evaluator_sdk" }
data-designer-nemo = { source = "../../packages/data_designer_nemo/src/data_designer_nemo", module = "data_designer_nemo" }
nmp-platform-runner = { source = "../../packages/nmp_platform_runner/src/nmp/platform_runner", module = "nmp/platform_runner", deps_group = "services" }
garak-api = { source = "../../packages/garak_api/garakapi", module = "garakapi", deps_group = "auditor-service" }
switchyard-vendored = { source = "../../plugins/nemo-switchyard/vendor/switchyard/switchyard", module = "switchyard" }

# Default first-party plugins
nemo-agents-plugin = { source = "../../plugins/nemo-agents/src/nemo_agents_plugin", module = "nemo_agents_plugin", inherit = { "entry-points" = ["nemo.*", "nat.plugins"] } }
nemo-anonymizer-plugin = { source = "../../plugins/nemo-anonymizer/src/nemo_anonymizer_plugin", module = "nemo_anonymizer_plugin", inherit = { "entry-points" = ["nemo.*"] } }
nemo-auditor-plugin = { source = "../../plugins/nemo-auditor/src/nemo_auditor", module = "nemo_auditor", inherit = { "entry-points" = ["nemo.*"] } }
nemo-data-designer-plugin = { source = "../../plugins/nemo-data-designer/src/nemo_data_designer_plugin", module = "nemo_data_designer_plugin", inherit = { "entry-points" = ["nemo.*"] } }
nemo-evaluator-plugin = { source = "../../plugins/nemo-evaluator/src/nemo_evaluator", module = "nemo_evaluator", inherit = { "entry-points" = ["nemo.*"] } }
nemo-guardrails-plugin = { source = "../../plugins/nemo-guardrails/src/nemo_guardrails_plugin", module = "nemo_guardrails_plugin", inherit = { "entry-points" = ["nemo.*"] } }
nemo-safe-synthesizer-plugin = { source = "../../plugins/nemo-safe-synthesizer/src/nemo_safe_synthesizer_plugin", module = "nemo_safe_synthesizer_plugin", inherit = { "entry-points" = ["nemo.*"] } }
nemo-switchyard = { source = "../../plugins/nemo-switchyard/src/nemo_switchyard", module = "nemo_switchyard", inherit = { "entry-points" = ["nemo.*"] } }

# Core services
nmp-auth = { source = "../../services/core/auth/src/nmp/core/auth", module = "nmp/core/auth", deps_group = "auth-service" }
nmp-files = { source = "../../services/core/files/src/nmp/core/files", module = "nmp/core/files", deps_group = "files-service" }
nmp-jobs = { source = "../../services/core/jobs/src/nmp/core/jobs", module = "nmp/core/jobs", deps_group = "jobs-service" }
nmp-models = { source = "../../services/core/models/src/nmp/core/models", module = "nmp/core/models", deps_group = "models-service" }
nmp-secrets = { source = "../../services/core/secrets/src/nmp/core/secrets", module = "nmp/core/secrets", deps_group = "secrets-service" }
nmp-inference-gateway = { source = "../../services/core/inference-gateway/src/nmp/core/inference_gateway", module = "nmp/core/inference_gateway", deps_group = "inference-gateway-service" }

# Non-core services
nmp-guardrails = { source = "../../services/guardrails/src/nmp/guardrails", module = "nmp/guardrails", deps_group = "guardrails-service" }
nmp-platform-seed = { source = "../../services/platform-seed/src/nmp/platform_seed", module = "nmp/platform_seed", deps_group = "platform-seed-service" }
nmp-hello-world = { source = "../../services/hello-world/src/nmp/hello_world", module = "nmp/hello_world", deps_group = "hello-world-service" }
nmp-intake = { source = "../../services/intake/src/nmp/intake", module = "nmp/intake", deps_group = "intake-service" }

[tool.bundle-package.nemo-platform-sdk]
source = "../../sdk/python/nemo-platform/src/nemo_platform"
module = "nemo_platform"
inherit."optional-dependencies" = true
inherit.scripts = true
inherit."entry-points" = ["nemo.*"]
force_include."../../../../../docs" = "nemo_platform/cli/docs"

[tool.bundle-package.nemo-agents-example-calculator]
source = "../../plugins/nemo-agents/examples/calculator-agent/src/calculator_agent"
module = "calculator_agent"
inherit."entry-points" = ["nat.*"]

[tool.bundle-package.nmp-entities]
source = "../../services/core/entities/src/nmp/core/entities"
module = "nmp/core/entities"
deps_group = "entities-service"
# force_include source paths are relative to this bundle entry's source path.
force_include."../../../../alembic.ini" = "nmp/core/entities/alembic.ini"
force_include."../../../../alembic" = "nmp/core/entities/alembic"

[tool.bundle-package.nmp-studio]
source = "../../services/studio/src/nmp/studio"
module = "nmp/studio"
deps_group = "studio-service"
# force_include source paths are relative to this bundle entry's source path.
force_include."../../../../../web/packages/studio/dist" = "nmp/studio/static"
