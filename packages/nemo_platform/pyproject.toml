# =============================================================================
# Wrapper distribution for NeMo Platform.
#
# This package bundles the SDK, runtime packages, and services into a single
# wheel via hatch force-include mappings.
#
# To regenerate the auto-generated sections:
#   make vendor
#
# README.md is the public PyPI landing page (top-level NeMo Platform intro).
# Internal bundling/wrapper-distribution developer docs live in BUNDLING.md.
# =============================================================================

[project]
name = "nemo-platform"
dynamic = ["version"]
description = "Convenience wrapper distribution for NeMo Platform Python packages"
readme = "README.md"
authors = [{ name = "NVIDIA Corporation" }]
requires-python = ">=3.11,<3.15"
classifiers = [
  "Intended Audience :: Developers",
  "Programming Language :: Python :: 3.11",
  "Programming Language :: Python :: 3.12",
  "Programming Language :: Python :: 3.13",
  "Programming Language :: Python :: 3.14",
  "Operating System :: OS Independent",
  "Operating System :: POSIX",
  "Operating System :: MacOS",
  "Operating System :: POSIX :: Linux",
  "Topic :: Software Development :: Libraries :: Python Modules",
  "License :: OSI Approved :: Apache Software License",
]

# Base install: SDK + shared runtime (nmp-common) + plugin contract.
# Keep the true workspace deps here for editable installs and local tooling.
# Wheel builds rewrite bundled workspace deps to self-referencing extras.
# Service deps are pulled in via the `-service` optional extras. Most users
# should install `nemo-platform[all]` for the full packaged install; `[services]`
# is retained as the underlying aggregate and continues to work.
dependencies = [
  "nemo-platform-plugin",
  "nemo-platform-sdk",
  "nmp-common",
]

[project.optional-dependencies]
all = ["nemo-platform[services]"]

