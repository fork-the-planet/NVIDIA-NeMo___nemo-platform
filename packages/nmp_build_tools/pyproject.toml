[project]
name = "nmp-build-tools"
version = "0.0.0"
description = "Build-time helpers for NeMo Platform workspace packages"
requires-python = ">=3.11,<3.15"
dependencies = [
    "packaging",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/nmp_build_tools"]
