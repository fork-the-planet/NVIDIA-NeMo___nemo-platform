[project]
name = "nemo-evaluator-sdk"
description = "NeMo Evaluator SDK"
readme = "README.md"
authors = [{ name = "NVIDIA", email = "nemo@nvidia.com" }]
requires-python = ">=3.11,<3.15"
classifiers = [
  "Development Status :: 3 - Alpha",
  "Intended Audience :: Developers",
  "Intended Audience :: Science/Research",
  "Topic :: Scientific/Engineering :: Artificial Intelligence",
  "Topic :: Scientific/Engineering :: Human Machine Interfaces",
  "Topic :: Software Development",
  "License :: OSI Approved :: Apache Software License",
  "Programming Language :: Python :: 3.11",
  "Programming Language :: Python :: 3.12",
  "Programming Language :: Python :: 3.13",
  "Programming Language :: Python :: 3.14",
]
dependencies = [
  "pydantic>=2.10.6",
  "jinja2>=3.1.6",
  "jsonschema>=4.23.0",
  "jsonpath-ng>=1.7.0",
  "pyarrow>=19.0.1",
  "pandas>=1.5.3",
  "openai>=1.61.0",
  "sacrebleu>=2.5.1",
  "rouge_score==0.1.2",
  "ragas==0.4.3",
  "langchain-openai>=1.3.5",
  "langchain-nvidia-ai-endpoints>=1.4.3,<2.0.0",
  "nemo-relay>=0.4.0,<0.5.0",
]
version = "0.0.0"

[dependency-groups]
dev = ["nemo-evaluator-plugin", "nemo-platform-sdk"]

[project.optional-dependencies]
agent-runtimes = [
  "openai-agents[docker]>=0.17.3,<0.18",
]
engine = []
# NOTE: The native Harbor runtime (HarborAgentTaskRunner / run_harbor_eval) needs
# `harbor`, which is intentionally NOT declared here. Harbor requires Python
# >=3.12 while this workspace supports >=3.11, so pinning it would make the lock
# unsatisfiable. It is imported lazily (like nemo_fabric) and installed
# separately: `uv pip install "harbor>=0.16.1"`.
nemo-platform = [
  "nemo-platform-sdk",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.pytest.ini_options]
asyncio_mode = "auto"
addopts = ["--import-mode=importlib"]

[tool.vendor-package]
package = "nemo_evaluator_sdk"
package_root = "packages/nemo_evaluator_sdk"
source_module = "nemo_evaluator_sdk"
target_sdk_module = "beta.evaluator"
sdk_optional_dependencies_name = "nemo-evaluator-sdk"
included_paths = ["**/*.py", "**/*.Dockerfile"]
