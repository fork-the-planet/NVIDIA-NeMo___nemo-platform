# Task-capable agent-under-test (AUT) config for the `workspace-basic-mcp` task.
#
# The deployed agent must have the tools its task needs. `nemo-mcp` currently
# exposes only workspace operations (create_workspace, list_workspaces,
# delete_workspace), and `workspace-basic-mcp` asks the agent to create and list a
# workspace -- so this MCP react agent scores a green verifier reward end to end.
#
# Usage (build the task image on first run, then invoke + verify):
#   python -m packages.nemo_evaluator_sdk.examples.run_agent_eval.run_agent_eval \
#     --agentic-task workspace-basic-mcp --backend aut \
#     --aut-agent-name run-agent-eval-workspace \
#     --aut-agent-config packages/nemo_evaluator_sdk/examples/run_agent_eval/aut_agent.workspace.example.yml \
#     --agent-model vm-opus-nemotron-random --verify --output-dir ~/rae-workspace
#
# Prerequisites: Docker, the `nmp-agentic-base:latest` base image, NVIDIA_API_KEY,
# and an inference-gateway model entity (set INFERENCE_NVIDIA_API_KEY so
# providers.yaml seeds `vm-opus-nemotron-random`, then pass it as --agent-model).
#
# The LLM `base_url` is rewritten to the platform inference gateway by
# `prepare_aut_config_for_runtime` (inject_gateway_url) at runtime.

llms:
  primary_llm:
    _type: openai
    api_key: not-used
    model_name: meta/llama-3.3-70b-instruct
    temperature: 0.0
    # Cap below the smallest routed model's limit (e.g. opus-4-5 caps at 64k).
    max_tokens: 8192

function_groups:
  nemo_tools:
    _type: mcp_client
    server:
      transport: stdio
      command: /app/.venv/bin/nemo-mcp
      args:
        - "--base-url"
        - "http://localhost:8080"
    tool_call_timeout: 120

workflow:
  _type: react_agent
  llm_name: primary_llm
  tool_names:
    - nemo_tools
  verbose: true
  # Text-based ReAct (no native tool_calls) keeps every assistant message
  # non-empty, so it works across whichever backend the gateway routes to
  # (some models reject the empty-content messages native tool-calling emits).
  use_native_tool_calling: false
  parse_agent_response_max_retries: 3
