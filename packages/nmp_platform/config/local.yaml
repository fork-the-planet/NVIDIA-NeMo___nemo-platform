# Local development for nemo services run (SQLite entity store, embedded auth).
#
#   set -a && source packages/nmp_platform/config/local.env && set +a
#   export NMP_BASE_URL=http://127.0.0.1:8080
#   uv run nemo services run --host 127.0.0.1 --port 8080
#
# Use default service set (omit --services) or --service-group all. Then:
#   nemo auth login --unsigned-token
#   uv run nemo-platform run task --task nmp.platform_seed

platform:
  runtime: "docker"
  base_url: "http://0.0.0.0:8080"
  # GPU pool configuration. By default, "all" detected GPUs are used.
  # To use specific GPUs, set to a comma-separated list of device IDs:
  # docker:
  #   reserved_gpu_device_ids: "0,1,2,3"  # Use specific GPUs

# Common service configuration. Use defaults.
service: {}

auth:
  enabled: false
  allow_unsigned_jwt: true  # local CLI: nemo auth login --unsigned-token
  policy_decision_point_provider: embedded
  policy_decision_point_base_url: "http://localhost:8080"
  # Low timeouts for fast test feedback (same as integration tests)
  policy_data_refresh_interval: 2
  bundle_cache_seconds: 15  # 0 = refresh on every authz call for instant permission changes
  admin_email: "admin@example.com"

  # --- Azure AD OIDC (NeMo Platform dev deployment) ---
  # This config mirrors the dev deployment's Azure AD app registration.
  # Uncomment the block below for local testing with the same auth provider.
  # For Azure AD v2.0, audience must be the client ID (GUID), not the
  # Application ID URI, because v2.0 access tokens set aud to the client ID.
  # oidc:
  #   enabled: true
  #   issuer: "https://login.microsoftonline.com/43083d15-7273-40c1-b7db-39efd9ccc17a/v2.0"
  #   client_id: "bbca6ec1-1e93-470e-b631-7076937da265"
  #   audience: "bbca6ec1-1e93-470e-b631-7076937da265"
  #   default_scopes: "platform:read platform:write openid profile email offline_access"
  #   scope_prefix: "api://nmp/"

# Entities service configuration (SQLite via DATABASE_* in local.env)
entities: {}

# Jobs service configuration
jobs:

  # Explicitly register the subprocess executor at profile "default". This opts
  # the documented `cpu/default` plugin steps (Data Designer create, Evaluator
  # metrics, Anonymizer, hello-world, etc.) into the cpu→subprocess translation
  # in the Jobs API (see `translate_cpu_container_steps_to_subprocess` in
  # services/core/jobs/src/nmp/core/jobs/api/v2/jobs/endpoints.py), so jobs
  # submitted with a CPU container step run on the host subprocess backend
  # rather than being dispatched to the Docker backend (which currently fails
  # because the `nmp-cpu-tasks` image is not available — see the temp comment
  # in services/core/jobs/src/nmp/core/jobs/controllers/backends/config.py).
  # Deployers that have a working Docker or Kubernetes setup may register
  # additional image-backed profiles here under different (provider, profile)
  # keys; `merge_executor_profiles` keys on (provider, profile) so subprocess
  # and Docker entries coexist.
  executors:
    - provider: subprocess
      profile: default
      backend: subprocess
      config:
        working_directory: /tmp/nmp-subprocess-jobs
        cleanup_completed_jobs_immediately: false
        ttl_seconds_before_active: 60
        ttl_seconds_active: 3600
        ttl_seconds_after_finished: 300
    # Customizer (automodel / unsloth) GPU jobs. The unsloth backend stamps the
    # profile name "gpu" onto all 4 steps, so both cpu/gpu and gpu/gpu must
    # exist. `profile` is a name, not a resource claim — `provider` governs
    # CPU vs GPU, so provider: cpu + profile: gpu is correct (not a mismatch).
    - provider: cpu
      profile: gpu
      backend: docker
      config:
        launcher_tool_path: ./services/core/jobs/jobs-launcher/jobs-launcher
    - provider: gpu
      profile: gpu
      backend: docker
      config:
        launcher_tool_path: ./services/core/jobs/jobs-launcher/jobs-launcher

  # Local path to the jobs-launcher binary used by the Docker job backend
  executor_defaults:
    docker:
      # Allow inspecting job containers regardless of completion status
      cleanup_completed_jobs_immediately: false
      # Path to the jobs-launcher binary on the local filesystem
      launcher_tool_path: ./services/core/jobs/jobs-launcher/jobs-launcher
      ttl_seconds_before_active: 60
      ttl_seconds_active: 3600
      ttl_seconds_after_finished: 300
      storage:
        # Additional volume for E2E tests
        additional_volume_mounts:
        - volume_name: nmp-additional-volume
          mount_path: /mnt/additional_storage
          allow_create_volume: true
    subprocess:
      working_directory: /tmp/nmp-subprocess-jobs
      cleanup_completed_jobs_immediately: false
      ttl_seconds_before_active: 60
      ttl_seconds_active: 3600
      ttl_seconds_after_finished: 300

evaluator:
  recreate_existing_system_entities: True

safe_synthesizer: {}

models:
  controller:
    interval_seconds: 5
    model_deployment_garbage_collection_ttl_seconds: 30
    backends:
      docker:
        enabled: true
        # LoRA adapter-download sidecar for deployments with lora_enabled. The
        # docker backend has no separate args field (unlike k8s) and keeps the
        # image ENTRYPOINT — nmp-automodel-tasks is `/opt/venv/bin/python`, so
        # the module goes in lora_sidecar_command (runs `python -m <module>`).
        lora_sidecar_image_name: nmp-automodel-tasks
        lora_sidecar_command: ["-m", "nmp.core.models.sidecars.adapters.main"]

# Inference gateway configuration - uses default values
inference_gateway: {}

# Secrets service configuration
secrets:
  # Allow key creation for local development
  allow_key_creation: true

# Files service configuration
files:
  default_storage_config:
    type: local
    path: ~/.local/share/nemo/files

studio:
  static_files_path: web/packages/studio/dist
  sandbox_enabled: true
