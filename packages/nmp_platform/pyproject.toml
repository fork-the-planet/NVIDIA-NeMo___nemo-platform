[project]
name = "nmp-platform"
version = "0.0.1"
description = "Nemo Platform - entry point for all domain services"
requires-python = ">=3.11,<3.15"

# Service dependencies are NOT listed here - they're defined in the root
# pyproject.toml dependency-groups for container builds. This allows each
# container to include only the services it needs.
dependencies = [
    "fastapi[standard]>=0.115.4",
    "uvicorn[standard]>=0.12.0",
    "nemo-platform-plugin",
    "nmp-common",
    "nmp-platform-runner",
    "nmp-auth",
    "nmp-entities",
    "nmp-models",
    "models",
    "nmp-files",
    "nmp-jobs",
    "nmp-inference-gateway",
    "nmp-secrets",
    "pyleak>=0.1.0",
    "rich-argparse>=1.7.2",
    "rich>=14.1.0",
]

[project.scripts]
nemo-platform = "nmp.platform.main:main"

[tool.uv.sources]
nemo-platform-plugin = { workspace = true }
nmp-common = { workspace = true }
nmp-platform-runner = { workspace = true }
nmp-auth = { workspace = true }
nmp-entities = { workspace = true }
nmp-models = { workspace = true }
models = { workspace = true }
nmp-files = { workspace = true }
nmp-jobs = { workspace = true }
nmp-inference-gateway = { workspace = true }
nmp-secrets = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/nmp"]
