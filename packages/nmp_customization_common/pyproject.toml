[project]
name = "nmp-customization-common"
version = "0.1.0"
description = "Shared library for NeMo customization training backends (unsloth, automodel) — plugin SDK/contributor bases and service-side task/compile helpers."
readme = "README.md"
requires-python = ">=3.11,<3.14"
dependencies = [
    "nmp-common",
    "nemo-platform-sdk",
    "nemo-platform-plugin",
    "pydantic>=2.10.6",
    "pydantic-settings>=2.6.1",
    "httpx>=0.27.0",
    "tenacity>=8.5.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/nmp"]

[tool.uv.sources]
nmp-common = { workspace = true }
nemo-platform-sdk = { workspace = true }
nemo-platform-plugin = { workspace = true }

[dependency-groups]
dev = [
    "pytest>=8.3.4",
    "pytest-asyncio>=0.25.3",
]

[tool.pytest.ini_options]
asyncio_mode = "auto"
pythonpath = ["src"]
testpaths = ["tests"]
