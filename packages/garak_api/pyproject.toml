[build-system]
requires = ["flit_core >=3.11,<4"]
build-backend = "flit_core.buildapi"

[project]
name = "garak-api"
version = "0.15.1"
authors = [
  { name = "Leon Derczynski", email="lderczynski@nvidia.com" },
  { name = "Jeffrey Martin", email="jemartin@nvidia.com" },
  { name = "Erick Galinkin", email="egalinkin@nvidia.com" },
  { name = "Patricia Pampanelli" },
  { name = "Greg Stephens" },
  { name = "Paul A. Parkanzky", email="pparkanzky@nvidia.com" },
]
description = "LLM vulnerability scanner"
readme = "README.md"
classifiers = [
    "Development Status :: 3 - Alpha",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Operating System :: OS Independent",
]
requires-python = ">=3.11,<3.14"
dependencies = [
  "pyyaml>=6.0.2",
  "xdg-base-dirs>=6.0.1",
  "requests>=2.32.3,<3.0.0",
  "httpx>=0.28.1,<1.0.0",
  "aiohttp>=3.13.4",
]

[project.optional-dependencies]
tests = [
  "pytest>=8.0",
  "pytest-mock>=3.14.0",
]
lint = [
  # version incompatible with nmp
  #"black==24.4.2",
  "pylint>=3.1.0",
]
[project.urls]
"Homepage" = "https://github.com/NVIDIA/garak"
"Bug Tracker" = "https://github.com/NVIDIA/garak/issues"

[tool.flit.module]
name = "garakapi"

[tool.flit.sdist]
include = [
  "*.md",
  "*.txt",
  "garakapi/resources/*.json",
  "garakapi/resources/*.yaml",
]

[tool.black]
line-length = 88
target-version = ['py311']
include = '\.pyi?$'

[tool.pytest.ini_options]
filterwarnings = [
    "ignore",
    "default:::garak",
]

[tool.coverage.run]
source = ["./garakapi"]
omit = ["tests/*"]
