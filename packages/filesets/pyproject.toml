[project]
name = "filesets"
version = "0.0.0"
description = "Extended FilesetsResource with fsspec filesystem support"
readme = "README.md"
authors = [{ name = "NVIDIA", email = "nemo@nvidia.com" }]
requires-python = ">=3.11,<3.15"
dependencies = [
    "anyio>=4.0.0",
    "fsspec>=2023.1.0",
]

[dependency-groups]
dev = [
    "nemo-platform-sdk",
    "pytest>=8.0.0",
    "pytest-asyncio>=0.24.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/filesets"]

[tool.vendor-package]
package = "filesets"
package_root = "packages/filesets"
target_sdk_module = "filesets"
included_paths = [
    "**/*.py",
]
vendor_tests = false

# Rewrite imports in _client.py to use our extended FilesResource classes
[[tool.vendor-package.replaces]]
class_names = ["FilesResource", "AsyncFilesResource"]
original = [".resources.files", ".resources.files.files"]
replacement = ".filesets.resources"
