[project]
name = "nmp-platform-runner"
description = "Headless local platform runner for Nemo Platform services"
requires-python = ">=3.11,<3.15"
dependencies = [
    "fastapi[standard]>=0.115.4",
    "uvicorn[standard]>=0.12.0",
    "nemo-platform-plugin",
    "nmp-common",
    "pyleak>=0.1.0",
    "rich>=14.1.0",
]
version = "0.0.0"

[tool.uv.sources]
nemo-platform-plugin = { workspace = true }
nmp-common = { workspace = true }
nmp-testing = { workspace = true }


[dependency-groups]
dev = [
    "pytest>=8.3.3",
    "pytest-asyncio>=0.23.0",
    "nmp-testing",
    "httpx>=0.27.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build]
include = [
    "src/*",
]

[tool.hatch.build.targets.wheel]
packages = ["src/nmp"]
