[project]
name = "nmp-testing"
version = "0.0.0"
description = "Testing utilities for NeMo Platform services"
readme = "README.md"
requires-python = ">=3.11,<3.15"

dependencies = [
    "nmp-common",
    "nmp-auth",
    "nmp-entities",
    "nemo-platform",
    "nemo-nb",
    "docker>=7.0.0",
    "httpx",
    "fastapi",
    "pytest>=8.3.3",
    "pytest-httpserver>=1.0.0",
    "werkzeug>=2.0.0",
    "testcontainers>=4.0.0",
    "tenacity>=9.0.0",  # Retry logic for integration tests
]

[tool.uv.sources]
nmp-common = { workspace = true }
nmp-auth = { workspace = true }
nmp-entities = { workspace = true }
nemo-nb = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/nmp"]
