# calculator-eval.yml — bundled sample seeded into the {agent}-eval fileset.
#
# Evaluates against the deployed agent endpoint. The judge LLM scores answers
# and must exist as a VirtualModel in the workspace.

llms:
  llm:
    _type: openai
    model_name: nvidia-nemotron-3-nano-30b-a3b
    temperature: 0.0
    max_tokens: 1024

  judge_llm:
    _type: openai
    model_name: nvidia-nemotron-3-super-120b-a12b
    temperature: 0.0
    max_tokens: 1024

eval:
  general:
    max_concurrency: 4
    output_dir: eval/agent
    dataset:
      _type: json
      file_path: calculator-eval-data.json
  evaluators:
    accuracy:
      _type: tunable_rag_evaluator
      llm_name: judge_llm
      default_scoring: true
      default_score_weights:
        coverage: 0.5
        correctness: 0.3
        relevance: 0.2
      judge_llm_prompt: >
        You are an evaluator. Score whether the generated answer correctly
        addresses the question compared to the expected answer description.
        Rules:
        - Score is a float between 0.0 and 1.0.
        - 1.0 means the answer fully satisfies the expected answer criteria.
        - Provide a 1-2 sentence reasoning.
