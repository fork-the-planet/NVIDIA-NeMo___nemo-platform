# Studio sample agent: calculator + datetime ReAct agent.
# Served as a static asset and fetched by Studio's Create Example Agent flow.
# `_type: calculator` requires the installed nemo-agents-example-calculator plugin.
# model_name is overwritten with the user's selected model at create time
# (parse-then-set), so the ${NEMO_DEFAULT_MODEL} literal here is irrelevant to Studio.

function_groups:
  calculator:
    _type: calculator
functions:
  current_datetime:
    _type: current_datetime
llms:
  llm:
    _type: openai
    api_key: not-used
    model_name: ${NEMO_DEFAULT_MODEL}
    temperature: 0.0
workflow:
  _type: react_agent
  tool_names: [calculator, current_datetime]
  llm_name: llm
  verbose: false
  parse_agent_response_max_retries: 3
  use_native_tool_calling: true
