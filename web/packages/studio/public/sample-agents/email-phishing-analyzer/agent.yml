# Studio sample agent: email phishing analyzer tool-calling agent.
# Served as a static asset and fetched by Studio's Create Example Agent flow.
# `_type: email_phishing_analyzer` requires the installed
# nemo-agents-example-email-phishing plugin. model_name is overwritten with the
# user's selected model at create time (parse-then-set), so the
# ${NEMO_DEFAULT_MODEL} literal here is irrelevant to Studio.
#
# Uses `tool_calling_agent` (native OpenAI tool calls), NOT `react_agent`. The
# ReAct text prompt makes small models (e.g. nemotron-3-nano) emit and mis-parse
# a text scratchpad and run away; tool_calling_agent binds tools natively with no
# text format to mangle. Requires a model that supports native tool calls.

functions:
  email_phishing_analyzer:
    _type: email_phishing_analyzer
    llm: llm
llms:
  llm:
    _type: openai
    api_key: not-used
    model_name: ${NEMO_DEFAULT_MODEL}
    temperature: 0.0
    max_tokens: 512
workflow:
  _type: tool_calling_agent
  tool_names: [email_phishing_analyzer]
  llm_name: llm
  additional_instructions: >-
    After using the email_phishing_analyzer tool, your final answer MUST begin
    with a single-word verdict on its own line — exactly "phishing" or "benign" —
    followed by a brief one-sentence justification.
general:
  telemetry:
    tracing:
      nemo_trace:
        _type: nemo_files
        # workspace and agent_name are injected at deploy time
        batch_size: 128
