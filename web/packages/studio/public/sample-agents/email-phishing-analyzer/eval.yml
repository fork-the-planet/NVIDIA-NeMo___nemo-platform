# email-phishing-eval.yml — bundled sample seeded into the {agent}-eval fileset.
#
# Evaluates against the deployed agent endpoint. The judge LLM scores the
# generated verdict against the ground-truth label and must exist as a
# VirtualModel in the workspace.

llms:
  llm:
    _type: openai
    model_name: nvidia-nemotron-3-nano-30b-a3b
    temperature: 0.0
    max_tokens: 512

  judge_llm:
    _type: openai
    model_name: nvidia-nemotron-3-super-120b-a12b
    temperature: 0.0
    max_tokens: 1024

eval:
  general:
    max_concurrency: 4
    output_dir: eval/agent
    dataset:
      _type: csv
      file_path: smaller_test.csv
      id_key: subject
      structure:
        question_key: body
        answer_key: label
  evaluators:
    accuracy:
      _type: tunable_rag_evaluator
      llm_name: judge_llm
      default_scoring: true
      default_score_weights:
        coverage: 0.5
        correctness: 0.3
        relevance: 0.2
      judge_llm_prompt: >
        You are an evaluator scoring an email phishing classifier. The expected
        answer is the ground-truth label ("phishing" or "benign"). The generated
        answer may be verbose or contain the agent's intermediate reasoning,
        scratchpad, or ReAct formatting (Thought/Action/Observation). Extract ONLY
        the final verdict it reaches — the last clear "phishing" or "benign" — and
        ignore all surrounding text, formatting, and reasoning.
        Rules:
        - Score is a float between 0.0 and 1.0.
        - 1.0 means the extracted verdict matches the expected label; 0.0 means it
          does not, or no clear verdict can be extracted.
        - Keep your own reasoning to ONE short sentence.
