[project]
name = "nmp-secrets"
version = "0.1.0"
description = "NeMo Platform Secrets provides secrets to other microservices."
readme = "README.md"
requires-python = ">=3.11,<3.15"

classifiers = [
    "License :: OSI Approved :: Apache Software License",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Programming Language :: Python :: 3.14",
]

dependencies = [
    # API server dependencies (for nmp-api/nmp-core containers)
    "fastapi>=0.115.8",
    "uvicorn>=0.34.0",
    "nmp-common",
]

[project.scripts]
secrets-server = "nmp.core.secrets.main:run_standalone"

[tool.hatch.build.targets.wheel]
packages = ["src/nmp"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[dependency-groups]
# No task deps for secrets - all deps are in main dependencies

dev = [
    "pytest>=8.3.4",
    "pytest-asyncio>=0.25.3",
    "aiosqlite>=0.20.0",
    "ruff>=0.11.8",
    "ty>=0.0.1a14",
]

[tool.pytest.ini_options]
# testpaths = ["tests"]  # Commented to prevent namespace collision with root pytest
asyncio_mode = "auto"

[tool.uv.sources]
nmp-common = { workspace = true }
