[project]
name = "nmp-core-mcp"
description = "Model Context Protocol server for NeMo Platform"
dependencies = [
    "nmp-common",
    "nmp-entities",
    "nemo-platform-sdk",
    "fastmcp>=3.2.0",  # GHSA-vv7q-7jx5-f767 (Critical) + GHSA-rww4-4w9c-7733 (High): fix in >=3.2.0
]
requires-python = ">=3.11,<3.15"
readme = "README.md"
classifiers = [
  "Typing :: Typed",
  "Intended Audience :: Developers",
  "Topic :: Scientific/Engineering :: Artificial Intelligence",
  "Topic :: Scientific/Engineering :: Human Machine Interfaces",
  "Topic :: Software Development",
  "License :: OSI Approved :: Apache Software License",
  "Programming Language :: Python :: 3.11",
  "Programming Language :: Python :: 3.12",
  "Programming Language :: Python :: 3.13",
  "Programming Language :: Python :: 3.14",
  "Operating System :: OS Independent",
]
version = "0.0.0"

[project.scripts]
nemo-mcp = "nmp.core.mcp.main:main"

[tool.uv.sources]
nmp-common = { workspace = true }
nmp-entities = { workspace = true }
nemo-platform-sdk = { workspace = true }


[build-system]
requires = ["hatchling==1.26.3"]
build-backend = "hatchling.build"

[tool.hatch.build]
include = [
  "src/*"
]

[tool.hatch.build.targets.wheel]
packages = ["src/nmp"]
