        - workspaces.members.create
        scopes:
        - entities:write
        - platform:write
    /apis/entities/v2/workspaces/{workspace}/members/{principal_id}:
      delete:
        permissions:
        - workspaces.members.delete
        scopes:
        - entities:write
        - platform:write
      put:
        permissions:
        - workspaces.members.update
        scopes:
        - entities:write
        - platform:write
    /apis/entities/v2/workspaces/{workspace}/projects:
      get:
        permissions:
        - projects.list
        scopes:
        - entities:read
        - platform:read
      post:
        permissions:
        - projects.create
        scopes:
        - entities:write
        - platform:write
    /apis/entities/v2/workspaces/{workspace}/projects/{name}:
      delete:
        permissions:
        - projects.delete
        scopes:
        - entities:write
        - platform:write
      get:
        permissions:
        - projects.read
        scopes:
        - entities:read
        - platform:read
      put:
        permissions:
        - projects.update
        scopes:
        - entities:write
        - platform:write
    /apis/files/v2/workspaces/{workspace}/filesets:
      get:
        permissions:
        - filesets.list
        scopes:
        - files:read
        - platform:read
      post:
        permissions:
