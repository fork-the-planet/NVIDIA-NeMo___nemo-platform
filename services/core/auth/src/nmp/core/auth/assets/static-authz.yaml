# Static authorization data - roles, permissions, and endpoint definitions
# This is bundled with the policy and served by Entity Store
authz:
  # Permission registry — single source of truth for all permissions
  # Each permission has has_endpoint: true by default. Set to false for permissions
  # checked in policy/code that are not mapped to any API endpoint.
  # Set has_role: false for permissions used in endpoints but not assigned to any role
  # (e.g. service-principal-only endpoints).
  permissions:
    entities:
      create:
        description: "Create entities"
        has_role: false
      delete:
        description: "Delete entities"
        has_role: false
      read:
        description: "Read entities"
        has_role: false
      update:
        description: "Update entities"
        has_role: false
    filesets:
      create:
        description: "Create filesets"
      delete:
        description: "Delete filesets"
      list:
        description: "List filesets"
      read:
        description: "Read filesets"
      update:
        description: "Update filesets"
    guardrails:
      checks:
        exec:
          description: "Execute guardrail checks"
      configs:
        create:
          description: "Create guardrail configurations"
        delete:
          description: "Delete guardrail configurations"
        list:
          description: "List guardrail configurations"
        read:
          description: "Read guardrail configurations"
        update:
          description: "Update guardrail configurations"
    iam:
      bundle:
        read:
          description: "Download OPA authorization bundle (external OPA / advanced ops)"
      create:
        description: "Create IAM role bindings"
      delete:
        description: "Delete IAM role bindings"
      list:
        description: "List IAM role bindings"
      read:
        description: "Read IAM role bindings"
    inference:
      deployment-configs:
        create:
          description: "Create inference deployment configurations"
        delete:
          description: "Delete inference deployment configurations"
        list:
          description: "List inference deployment configurations"
        read:
          description: "Read inference deployment configurations"
      deployments:
        create:
          description: "Create inference deployments"
        delete:
          description: "Delete inference deployments"
        list:
          description: "List inference deployments"
        read:
          description: "Read inference deployments"
        update:
          description: "Update inference deployments"
      gateway:
        model:
          exec:
            description: "Execute model gateway inference"
        openai:
          exec:
            description: "Execute OpenAI-compatible gateway inference"
        provider:
          exec:
            description: "Execute provider gateway inference"
      providers:
        create:
          description: "Create inference providers"
        delete:
          description: "Delete inference providers"
        list:
          description: "List inference providers"
        read:
          description: "Read inference providers"
        update:
          description: "Update inference providers"
      virtual-models:
        create:
          description: "Create virtual models"
        delete:
          description: "Delete virtual models"
        list:
          description: "List virtual models"
        read:
          description: "Read virtual models"
        update:
          description: "Update virtual models"
    intake:
      evaluator-results:
        create:
          description: "Create intake evaluator results"
        list:
          description: "List intake evaluator results"
        read:
          description: "Read intake evaluator results"
      annotations:
        create:
          description: "Create intake annotations"
        list:
          description: "List intake annotations"
        read:
          description: "Read intake annotations"
        delete:
          description: "Delete intake annotations"
      experiment-groups:
        create:
          description: "Create intake experiment groups"
        delete:
          description: "Delete intake experiment groups"
        read:
          description: "Read intake experiment groups"
        update:
          description: "Update intake experiment groups"
      evaluations:
        create:
          description: "Create intake evaluations"
        delete:
          description: "Delete intake evaluations"
        read:
          description: "Read intake evaluations"
        update:
          description: "Update intake evaluations"
      ingest:
        create:
          description: "Ingest traces into intake"
      spans:
        list:
          description: "List intake spans"
        read:
          description: "Read intake spans"
      traces:
        read:
          description: "Read intake traces"
    jobs:
      cancel:
        description: "Cancel jobs"
      create:
        description: "Create jobs"
      delete:
        description: "Delete jobs"
      list:
        description: "List jobs"
      logs:
        create:
          description: "Upload job logs"
      read:
        description: "Read jobs"
      update:
        description: "Update jobs"
    models:
      adapters:
        read:
          description: "Read model adapters"
        list:
          description: "List model adapters"
        create:
          description: "Create model adapters"
        update:
          description: "Update model adapters"
        delete:
          description: "Delete model adapters"
      prompts:
        read:
          description: "Read model prompts"
        list:
          description: "List model prompts"
        create:
          description: "Create model prompts"
        update:
          description: "Update model prompts"
        delete:
          description: "Delete model prompts"
      create:
        description: "Create models"
      delete:
        description: "Delete models"
      list:
        description: "List models"
      read:
        description: "Read models"
      update:
        description: "Update models"
      tool-call-plugin:
        set:
          has_endpoint: false
          description: "Whether this user can set tool_call_plugin on Models or Deployment Configs"
      trust-remote-code:
        set:
          has_endpoint: false
          description: "Whether this user can set trust_remote_code on Models"
    platform:
      admin:
        description: "Platform-wide administrative bypass"
        has_endpoint: false
    projects:
      create:
        description: "Create projects"
      delete:
        description: "Delete projects"
      list:
        description: "List projects"
      read:
        description: "Read projects"
      update:
        description: "Update projects"
    safe-synthesizer:
      jobs:
        cancel:
          description: "Cancel safe synthesizer jobs"
        create:
          description: "Create safe synthesizer jobs"
        delete:
          description: "Delete safe synthesizer jobs"
        list:
          description: "List safe synthesizer jobs"
        read:
          description: "Read safe synthesizer jobs"
    secrets:
      access:
        description: "Access secret values (service principals only)"
        has_role: false
      create:
        description: "Create secrets"
      delete:
        description: "Delete secrets"
      list:
        description: "List secrets"
      read:
        description: "Read secrets"
      rotate:
        description: "Rotate encryption keys"
      update:
        description: "Update secrets"
    workspaces:
      create:
        description: "Create workspaces"
      delete:
        description: "Delete workspaces"
      list:
        description: "List workspaces"
      members:
        read:
          description: "Read workspace member details"
        list:
          description: "List workspace members"
        create:
          description: "Add workspace members"
        update:
          description: "Update workspace member roles"
        delete:
          description: "Remove workspace members"
      read:
        description: "Read workspaces"
      update:
        description: "Update workspaces"

  # Role definitions
  roles:
    Viewer:
      description: "Read-only access to workspace resources"
      permissions:
      - filesets.list
      - filesets.read
      - guardrails.configs.list
      - guardrails.configs.read
      - inference.deployment-configs.list
      - inference.deployment-configs.read
      - inference.deployments.list
      - inference.deployments.read
      - inference.gateway.model.exec
      - inference.gateway.openai.exec
      - inference.gateway.provider.exec
      - inference.providers.list
      - inference.providers.read
      - inference.virtual-models.list
      - inference.virtual-models.read
      - intake.annotations.list
      - intake.annotations.read
      - intake.evaluations.read
      - intake.evaluator-results.list
      - intake.evaluator-results.read
      - intake.experiment-groups.read
      - intake.spans.list
      - intake.spans.read
      - intake.traces.read
      - jobs.list
      - jobs.read
      - models.adapters.list
      - models.adapters.read
      - models.list
      - models.prompts.read
      - models.read
      - projects.list
      - projects.read
      - secrets.list
      - secrets.read
      - workspaces.list
      - workspaces.read
    Editor:
      description: "Read and write access to workspace resources"
      includes: ["Viewer"]
      permissions:
      - filesets.create
      - filesets.delete
      - filesets.update
      - guardrails.checks.exec
      - guardrails.configs.create
      - guardrails.configs.delete
      - guardrails.configs.update
      - inference.deployment-configs.create
      - inference.deployment-configs.delete
      - inference.deployments.create
      - inference.deployments.delete
      - inference.deployments.update
      - inference.gateway.model.exec
      - inference.gateway.openai.exec
      - inference.gateway.provider.exec
      - inference.providers.create
      - inference.providers.delete
      - inference.providers.update
      - inference.virtual-models.create
      - inference.virtual-models.delete
      - inference.virtual-models.update
      - intake.annotations.create
      - intake.annotations.delete
      - intake.evaluations.create
      - intake.evaluations.delete
      - intake.evaluations.update
      - intake.evaluator-results.create
      - intake.experiment-groups.create
      - intake.experiment-groups.delete
      - intake.experiment-groups.update
      - intake.ingest.create
      - jobs.cancel
      - jobs.create
      - jobs.delete
      - jobs.update
      - models.adapters.create
      - models.adapters.delete
      - models.adapters.update
      - models.create
      - models.delete
      - models.prompts.create
      - models.prompts.delete
      - models.prompts.update
      - models.update
      - projects.create
      - projects.delete
      - projects.update
      - secrets.create
      - secrets.delete
      - secrets.update
      - workspaces.delete
      - workspaces.update
    Admin:
      description: "Full workspace management capabilities"
      includes: ["Editor"]
      permissions:
      - iam.create
      - iam.read
      - iam.delete
      - iam.list
      - workspaces.update
      - workspaces.delete
      - workspaces.members.list
      - workspaces.members.create
      - workspaces.members.update
      - workspaces.members.delete
      - models.trust-remote-code.set
      - models.tool-call-plugin.set
    WorkspaceCreator:
      description: "Create new workspaces"
      permissions:
      - workspaces.create
    PlatformAdmin:
      description: "Platform-wide administrative access"
      permissions:
      - iam.bundle.read
      - secrets.rotate
      - models.trust-remote-code.set
      - models.tool-call-plugin.set
    JobRunner:
      description: "Runtime permissions for job workload containers"
      permissions:
      - jobs.logs.create
    ServiceSystem:
      description: >-
        Internal platform service principal (principal IDs matching service:*). Used when no
        explicit role bindings exist in policy data; may be replaced by per-service roles later.
        Wildcard permission grants every API permission for known endpoints.
      permissions:
      - "*"

  # Endpoint to permission mappings
  endpoints:
    /apis/auth/discovery:
      get:
        permissions: []
        scopes: []
    /apis/auth/v2/iam/opa-bundle.tar.gz:
      get:
        permissions:
        - iam.bundle.read
        scopes:
        - auth:read
        - platform:read
        # Real endpoint served by services/core/auth/.../api/v2/bundle/endpoints.py;
        # intentionally excluded from the public OpenAPI spec (internal/ops bundle).
        x-not-in-openapi: true
    /apis/auth/v2/iam/role-bindings:
      get:
        permissions:
        - iam.list
        scopes:
        - auth:read
        - platform:read
      post:
        permissions:
        - iam.create
        scopes:
        - auth:write
        - platform:write
    /apis/auth/v2/iam/role-bindings/{name}:
      delete:
        permissions:
        - iam.delete
        scopes:
        - auth:write
        - platform:write
      get:
        permissions:
        - iam.read
        scopes:
        - auth:read
        - platform:read
    /apis/entities/v2/entities/{id}:
      get:
        permissions:
        - entities.read
        scopes:
        - entities:read
        - platform:read
    /apis/entities/v2/workspaces:
      get:
        permissions:
        - workspaces.list
        scopes:
        - entities:read
        - platform:read
      post:
        permissions:
        - workspaces.create
        scopes:
        - entities:write
        - platform:write
    /apis/entities/v2/workspaces/{name}:
      delete:
        permissions:
        - workspaces.delete
        scopes:
        - entities:write
        - platform:write
      get:
        permissions:
        - workspaces.read
        scopes:
        - entities:read
        - platform:read
      put:
        permissions:
        - workspaces.update
        scopes:
        - entities:write
        - platform:write
    /apis/entities/v2/workspaces/{workspace}/entities/{entity_type}:
      get:
        permissions:
        - entities.read
        scopes:
        - entities:read
        - platform:read
      post:
        permissions:
        - entities.create
        scopes:
        - entities:write
        - platform:write
    /apis/entities/v2/workspaces/{workspace}/entities/{entity_type}/{name}:
      delete:
        permissions:
        - entities.delete
        scopes:
        - entities:write
        - platform:write
      get:
        permissions:
        - entities.read
        scopes:
        - entities:read
        - platform:read
      put:
        permissions:
        - entities.update
        scopes:
        - entities:write
        - platform:write
    /apis/entities/v2/workspaces/{workspace}/members:
      get:
        permissions:
        - workspaces.members.list
        scopes:
        - entities:read
        - platform:read
      post:
