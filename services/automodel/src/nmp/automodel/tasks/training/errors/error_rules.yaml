# This file defines rules for converting low-level training exceptions
# into user-friendly CustomizerTrainingError subclasses.
# Rules for all backends are present in the same yaml file.
#
# Rules are evaluated in order; first match wins.
#
# Rule structure:
#   - <matcher>: <value>       # When to match (pick ONE)
#     exception: <name>        # Exception class from EXCEPTION_REGISTRY
#     error_details: <msg>     # Optional user-friendly message


rules:
  # ===========================================================================
  # 1. TRAINING TIMEOUT (subprocess.TimeoutExpired)
  # All backends
  # ===========================================================================

  - type: TimeoutExpired  # subprocess.TimeoutExpired from fallback_modules
    exception: TrainingTimeoutError
    error_details: "Training exceeded the maximum allowed time limit. To reduce training time: 1) Reduce max_steps or epochs, 2) Use a smaller dataset, 3) Use a smaller model, 4) Use LoRA/PEFT instead of all_weights fine-tuning (LoRA trains faster), or 5) Increase batch_size to process more samples per step (if GPU memory allows). If you need longer training times, contact your administrator to adjust the job timeout limits."

  # ===========================================================================
  # 2. DATASET FORMAT ERRORS (400)
  # ===========================================================================

  # --- Automodel ---
  # Unsupported role in chat messages
  - regex: "Unsupported role in messages: \\w+"
    exception: DatasetFormatError
    error_details: "Your dataset contains chat messages with an invalid role. Each message in a conversation must have a 'role' field with one of the following values: 'system' (for system prompts), 'user' (for user inputs), 'assistant' (for model responses), or 'tool' (for tool/function outputs). Please check your dataset and ensure all messages use valid roles."

  # --- NeMo-RL ---
  # Text type error
  - regex: "^text must be a string or a list of strings, got .+$"
    exception: DatasetFormatError
    error_details: "The 'text' field in your dataset has an invalid type. For NeMo-RL training (DPO/GRPO), the text field must be either a single string or a list of strings. Please check your dataset format and ensure the text field contains the correct data type."

  # Prompt file not found
  - regex: "^Prompt file .+ not found$"
    exception: DatasetFormatError
    error_details: "The prompt template file specified in your training dataset configuration does not exist. Prompt templates define how your dataset samples are formatted for training. Please verify the prompt file path is correct and the file is accessible at the specified location."

  # --- Automodel ---
  # Empty dataset
  - regex: "^no sample to consume: \\d+$"
    exception: DatasetFormatError
    error_details: "Your dataset is empty or contains zero valid samples after filtering. This can happen if: 1) The dataset file is empty, 2) All samples were filtered out due to format issues, or 3) The dataset path is incorrect. Please verify your dataset contains valid training samples."

  # All samples consumed
  - regex: "^no samples left to consume: \\d+, \\d+$"
    exception: DatasetFormatError
    error_details: "All samples in your dataset have been consumed before completing the requested number of training steps. This happens when your dataset is too small for the configured epochs or max_steps. Please either: 1) Add more samples to your dataset, 2) Reduce the number of epochs, or 3) Reduce max_steps."

  # Error loading example
  - regex: "Error while loading example \\d+ from dataset .+"
    exception: DatasetFormatError
    error_details: "Failed to load a specific sample from your dataset. This typically indicates a malformed sample that doesn't match the expected format. Please check your dataset for: 1) Missing required fields, 2) Invalid JSON formatting, 3) Incorrect data types for fields. The error message includes the sample index to help you locate the problematic entry."

  # ===========================================================================
  # 3. MODEL NOT FOUND ERRORS (404)
  # Megatron Bridge
  # ===========================================================================

  # Checkpoint file not found (input model checkpoint for training)
  - regex: "^Checkpoint file not found: .+$"
    exception: ModelNotFoundError
    error_details: "The input model checkpoint file could not be found. Please verify the base model path is correct and accessible. This checkpoint is used as the starting point for training."

  # No checkpoints found for resume (output checkpoint directory empty)
  - regex: "There were no checkpoints found in checkpoint_dir.*Cannot resume"
    exception: ModelNotFoundError
    error_details: "The output checkpoint directory is empty. Cannot resume training because no previous training checkpoints were found. Ensure a prior training run completed successfully and saved checkpoints."

  # Nemotron model missing HF source
  - regex: "Nemotron Super models expect HF source code to exist at .+"
    exception: ModelNotFoundError
    error_details: "The Nemotron Super model checkpoint is missing the required HuggingFace source code directory (nemotron_src/). This directory must be present inside the model checkpoint. Please ensure you are using a complete Nemotron Super model checkpoint that includes the HuggingFace source files."

  # ===========================================================================
  # 4. MODEL LOAD ERRORS (500)
  # ===========================================================================

  # --- Automodel ---
  # Model weights swap failure
  - contains: "_apply(): Couldn't swap"
    exception: ModelLoadError
    error_details: "Failed to load the base model: weights could not be applied to a model layer. The base model checkpoint may be corrupted, incomplete, or incompatible with the selected training configuration."

  # Model patching failure
  - exact: "Failed to patch model"
    exception: ModelLoadError
    error_details: "Failed to apply optimizations to the base model. The base model architecture may not be supported for the selected training configuration. Try using a different model or training method."

  # Method signature mismatch
  - starts_with: "Signature mismatch:"
    exception: ModelLoadError
    error_details: "The base model has an incompatible method signature. This typically indicates a version mismatch between the base model and the training framework. Please verify you are using a supported model version."

  # Missing lm_head.weight
  - exact: "lm_head.weight not found in model"
    exception: ModelLoadError
    error_details: "The base model is missing the language model head (lm_head.weight). The base model checkpoint may be corrupted, incomplete, or not a valid language model. Please verify the base model is a complete, valid language model checkpoint."

  # --- NeMo-RL ---
  # vLLM not installed
  - contains: "vLLM is not installed"
    exception: ModelLoadError
    error_details: "vLLM is not installed in the training environment. This is an issue with the training environment setup, please contact the administrator to raise an issue with the NeMo Platform team."

  # Missing generation output keys
  - regex: "^Missing required keys for GenerationOutputSpec: .+$"
    exception: ModelLoadError
    error_details: "The base model's generation output is missing required fields. The base model may not be compatible with the selected training method (e.g., GRPO). Please verify you are using a supported model for this training type."

  # Missing score output keys
  - regex: "^Missing required keys for ScoreOutputSpec: .+$"
    exception: ModelLoadError
    error_details: "The base model's score output is missing required fields. The base model may not be compatible with the selected training method. Please verify you are using a supported model for this training type."

  # Pretrained run config not found (Megatron HF-to-mcore conversion)
  - contains: "Pretrained run config not found at"
    exception: ModelLoadError
    error_details: "The pretrained model configuration file was not found after Megatron checkpoint conversion. This usually means the HuggingFace-to-Megatron conversion on the head node saved to a directory not accessible by this worker node. This is an infrastructure issue - please ensure shared storage is properly mounted across all nodes, or contact your administrator."

  # --- Megatron Bridge ---
  # Shape mismatch for parameter
  - regex: "^Shape mismatch for parameter .+: target shape .+ vs source shape .+$"
    exception: ModelLoadError
    error_details: "The base model parameter shape does not match the checkpoint. The base model checkpoint may be from a different model architecture or an incompatible version. Please ensure the base model matches the expected architecture for this training configuration."

  # Shape mismatch for buffer
  - regex: "^Shape mismatch for buffer .+: .+ vs .+$"
    exception: ModelLoadError
    error_details: "The base model buffer shape does not match the checkpoint. The base model checkpoint may be corrupted, incomplete, or from an incompatible model version. Please verify the base model checkpoint is valid and complete."

  # ===========================================================================
  # 5. TRAINING CONFIG ERRORS - PARALLELISM (400)
  # ===========================================================================

  # --- Automodel ---
  # Pipeline parallelism: tied embeddings not supported
  - all_keywords: ["not compatible with pipeline parallelism", "tie_word_embeddings"]
    exception: TrainingConfigError
    error_details: "The base model has tied embeddings (tie_word_embeddings=True) which is not compatible with pipeline parallelism. Try using a different parallelism configuration or a model without tied embeddings."

  # Pipeline parallelism: encoder-decoder models not supported
  - all_keywords: ["not compatible with pipeline parallelism", "Encoder-Decoder"]
    exception: TrainingConfigError
    error_details: "The base model is an encoder-decoder architecture (like T5 or BART) which is not supported with pipeline parallelism. Please use a decoder-only base model, or disable pipeline parallelism in your training configuration."

  # PP batch size / microbatch validation
  - contains: "pp_batch_size // pp_microbatch_size must be >= pp_size"
    exception: TrainingConfigError
    error_details: "Pipeline parallelism requires: batch_size >= pipeline_parallel_size. The current batch_size is too small to fill all pipeline stages. Either increase batch_size or reduce pipeline_parallel_size."

  # Context parallelism: SDPA not supported
  - contains: "Model does not support SDPA required for context parallelism"
    exception: TrainingConfigError
    error_details: "The base model does not support scaled dot-product attention (SDPA) which is required for context parallelism. Please set context_parallel_size=1 to disable context parallelism."

  # --- NeMo-RL ---
  # Megatron and DTensor both enabled
  - exact: "Configure either Megatron (policy.megatron_cfg.enabled=true) or DTensor (policy.dtensor_cfg.enabled=true), not both."
    exception: TrainingConfigError
    error_details: "Internal configuration error: both Megatron and DTensor training backends are enabled, but only one can be active at a time. This is an issue with the training environment setup, please contact the administrator."

  # Neither Megatron nor DTensor enabled
  - contains: "Please either set policy.megatron_cfg.enabled=true"
    exception: TrainingConfigError
    error_details: "Internal configuration error: no training backend is enabled. The training environment requires either Megatron or DTensor backend to be active. This is an issue with the training environment setup, please contact the administrator."

  # World size insufficient for parallelism
  - regex: "^World size \\(\\d+\\) is insufficient for the parallelism configuration"
    exception: TrainingConfigError
    error_details: "Not enough GPUs available for the requested parallelism settings. The total number of GPUs must be at least pipeline_parallel_size * context_parallel_size * tensor_parallel_size. Either reduce parallelism settings or request more GPUs."

  # World size not divisible by parallelism
  - regex: "^World size \\(\\d+\\) must be divisible by PP \\* CP \\* TP"
    exception: TrainingConfigError
    error_details: "The total number of GPUs must be evenly divisible by (pipeline_parallel_size * context_parallel_size * tensor_parallel_size). For example, with PP=2, CP=1, TP=2, you need 4, 8, 12, etc. GPUs. Please adjust your parallelism settings or cluster size."

  # DTensor world size mismatch
  - regex: "^World size\\(\\d+\\) must equal to dp_size\\(\\d+\\) \\* tp_size\\(\\d+\\) \\* cp_size\\(\\d+\\) to use DTensor$"
    exception: TrainingConfigError
    error_details: "The total number of GPUs (world_size) does not match the product of data_parallel_size * tensor_parallel_size * context_parallel_size for the DTensor backend. Please adjust your parallelism settings so they are consistent with the available GPU count."

  # Dynamic batching with PP > 1
  - contains: "Dynamic batching is only supported for single pipeline parallel stage"
    exception: TrainingConfigError
    error_details: "Dynamic batching is only supported when pipeline_parallel_size=1. With pipeline parallelism (PP > 1), the model is split across GPU stages which requires fixed batch sizes. Please either set pipeline_parallel_size=1 or disable dynamic batching."

  # Dynamic batching exclusive of sequence packing
  - contains: "Dynamic Batching is exclusive of Sequence Packing"
    exception: TrainingConfigError
    error_details: "Dynamic batching and sequence packing cannot be used together. Please disable one of them: either set dynamic_batching=false or set sequence_packing_enabled=false."

  # Sequence packing not supported for VLM models
  - contains: "Sequence packing is not supported for VLM models"
    exception: TrainingConfigError
    error_details: "Sequence packing is not supported for Vision-Language Models (VLMs). Please set sequence_packing_enabled=false when training VLM models."

  # Context parallel not supported for sequence packing (DTensor)
  - exact: "Context parallel is not supported for sequence packing. Refer to https://github.com/NVIDIA/NeMo-RL/blob/main/docs/model-quirks.md#context-parallel-with-fsdp2 for more details."
    exception: TrainingConfigError
    error_details: "Context parallelism cannot be used with sequence packing in the DTensor backend. Please either set context_parallel_size=1 to disable context parallelism, or set sequence_packing_enabled=false to disable sequence packing."

  # Context parallel not supported for Gemma3
  - contains: "Context parallel is not supported for Gemma3ForCausalLM"
    exception: TrainingConfigError
    error_details: "Context parallelism is not supported for Gemma3 models due to limitations in the PyTorch context parallel implementation. Please set context_parallel_size=1 when training Gemma3 models."

  # Context parallel not supported for VLM models
  - contains: "Context parallel is yet not supported for VLM models"
    exception: TrainingConfigError
    error_details: "Context parallelism is not yet supported for Vision-Language Models (VLMs). Please set context_parallel_size=1 when training VLM models."

  # Context parallelism requires sequence packing (Megatron)
  - contains: "Context Parallelism (CP>1) requires sequence packing to be enabled"
    exception: TrainingConfigError
    error_details: "When using the Megatron backend with context_parallel_size > 1, sequence packing must be enabled. Please either enable sequence packing (sequence_packing_enabled=true) or reduce context_parallel_size to 1."

  # Reward models not supported with Megatron backend
  - contains: "Reward models are not yet supported with the Megatron backend"
    exception: TrainingConfigError
    error_details: "Reward models are not yet supported with the Megatron training backend. This is a current limitation of the framework. Please use the DTensor backend for reward model training, or contact your administrator for alternative configurations."

  # Dynamic sampling max batches reached
  - contains: "Dynamic sampling has reached the maximum allowed number of batches"
    exception: TrainingConfigError
    error_details: "Dynamic sampling exceeded the maximum number of generation batches allowed per training step. This means the training data or reward signal is too challenging for the model to produce enough valid samples. Consider: 1) Simplifying your dataset, 2) Adjusting num_prompts_per_step or num_generations_per_prompt, 3) Checking that your reward function is not too strict."

  # Batch size not divisible by DP
  - regex: "Configuration error: \\(num_prompts_per_step \\* num_generations_per_prompt\\) = \\d+ must be divisible by data_parallel size \\d+"
    exception: TrainingConfigError
    error_details: "The effective batch size (num_prompts_per_step * num_generations_per_prompt) must be evenly divisible by the number of data parallel workers. Please adjust num_prompts_per_step or num_generations_per_prompt so their product divides evenly."

  # ===========================================================================
  # 6. TRAINING CONFIG ERRORS - DPO/GRPO (400)
  # NeMo-RL
  # ===========================================================================

  # Dynamic batching with DPO
  - contains: "Dynamic batching is currently not supported with DPO"
    exception: TrainingConfigError
    error_details: "DPO (Direct Preference Optimization) training does not support dynamic batching. This is an internal configuration issue with the training environment, please contact the administrator."

  # Sequence packing with DPO
  - contains: "Sequence packing is currently not supported with DPO"
    exception: TrainingConfigError
    error_details: "DPO (Direct Preference Optimization) training does not support sequence packing. Please set sequence_packing_enabled=false in your training request."

  # GRPO requires generation config
  - contains: "A generation config in the PolicyConfig is required for GRPO"
    exception: TrainingConfigError
    error_details: "GRPO (Group Relative Policy Optimization) requires a generation configuration to produce responses during training. This is an internal configuration issue with the training environment, please contact the administrator."

  # Validation dataset required
  - exact: "Validation dataset is required if validation is enabled"
    exception: TrainingConfigError
    error_details: "Validation is enabled for this training job, but no validation dataset was provided. Please provide a validation dataset in your training request, or disable validation."

  # Non-colocated inference with Megatron
  - contains: "Non-colocated inference is not supported for Megatron generation backends"
    exception: TrainingConfigError
    error_details: "The current training configuration uses Megatron for generation, which does not support the required inference mode. This is an internal configuration issue with the training environment, please contact the administrator."

  # Async GRPO requires vLLM async
  - contains: "Async GRPO requires vLLM backend with vllm_cfg.async_engine=True"
    exception: TrainingConfigError
    error_details: "Async GRPO training requires the vLLM backend with async engine enabled, but the current configuration does not have this set. This is an internal configuration issue with the training environment, please contact the administrator."

  # Async GRPO requires importance sampling
  - contains: "Importance sampling correction must be enabled for async GRPO"
    exception: TrainingConfigError
    error_details: "Async GRPO training requires importance sampling correction to handle off-policy samples and ensure stable training. This is an internal configuration issue with the training environment, please contact the administrator."

  # Async GRPO doesn't support colocated inference
  - contains: "Colocated inference is not supported for async GRPO"
    exception: TrainingConfigError
    error_details: "Async GRPO training does not support colocated inference (running training and generation on the same GPUs). This is an internal configuration issue with the training environment, please contact the administrator."

  # top_k sampling threshold (vLLM V1 engine limitation)
  - contains: "top_k sampling with values <"
    exception: TrainingConfigError
    error_details: "The top_k value is too low for the vLLM V1 engine. The vLLM V1 engine does not return logprobs after top_k filtering, so very low top_k values produce inaccurate logprob computations. Please increase top_k or remove the top_k constraint."

  # top_p sampling threshold (vLLM V1 engine limitation)
  - contains: "top_p sampling with values <"
    exception: TrainingConfigError
    error_details: "The top_p value is too low for the vLLM V1 engine. The vLLM V1 engine does not return logprobs after top_p filtering, so very low top_p values produce inaccurate logprob computations. Please increase top_p or remove the top_p constraint."

  # MoE aux loss not supported
  - contains: "MoE aux loss is currently not supported"
    exception: TrainingConfigError
    error_details: "Mixture-of-Experts (MoE) auxiliary loss is not currently supported due to a known bug in Megatron-LM. Please disable the MoE auxiliary loss in your training configuration."

  # ===========================================================================
  # 7. TRAINING CONFIG ERRORS - PEFT/LORA (400)
  # Automodel
  # ===========================================================================

  # Triton not installed
  - contains: "triton is not installed"
    exception: TrainingConfigError
    error_details: "The Triton library, which is required for optimized LoRA kernel operations, is not installed in the training environment. This is an issue with the training environment setup, please contact the administrator to ensure Triton is properly installed."

  # LoRA dimensions mismatch
  - contains: "Incompatible X and LoRA A dimensions"
    exception: TrainingConfigError
    error_details: "The LoRA adapter dimensions are incompatible with the base model's layer dimensions. This can happen if you are trying to apply a pre-trained LoRA adapter that was created for a different model architecture. Please ensure the LoRA configuration (lora_dim/rank) is compatible with the base model you are fine-tuning."

  # ===========================================================================
  # 8. TRAINING CONFIG ERRORS - PACKING (400)
  # NeMo-RL
  # ===========================================================================

  # Sequence too long for packing
  - regex: "^Sequence length \\d+ exceeds bin capacity \\d+$"
    exception: TrainingConfigError
    error_details: "When sequence packing is enabled, one or more sequences in your dataset exceed the maximum sequence length (max_seq_length). Sequence packing combines multiple shorter sequences into a single training sample, but each individual sequence must fit within max_seq_length. Please either increase max_seq_length to accommodate longer sequences, or preprocess your dataset to truncate or remove sequences that are too long."

  # Not enough sequences for packing
  - regex: "^Cannot create \\d+ bins with only \\d+ sequences"
    exception: TrainingConfigError
    error_details: "When sequence packing is enabled, the packing algorithm needs enough sequences to efficiently fill the training batches. Your dataset does not have enough sequences for the current batch configuration. Please either add more samples to your dataset, reduce the batch_size, or disable sequence packing by setting sequence_packing_enabled=false."

  # ===========================================================================
  # 9. ENVIRONMENT ERRORS (400)
  # NeMo-RL
  # ===========================================================================

  # Unable to find compatible environment
  - regex: "^Unable to find compatible environment - .+$"
    exception: TrainingEnvironmentError
    error_details: "The specified GRPO environment name is not recognized. GRPO (Group Relative Policy Optimization) requires a valid environment that defines how to evaluate model responses. Please check the environment name in your training request and ensure it matches one of the supported environments for your use case."

  # GRPO environment required
  - exact: "hyperparameters.environment is required for GRPO, but it is not set"
    exception: TrainingEnvironmentError
    error_details: "GRPO (Group Relative Policy Optimization) training requires an environment configuration to evaluate model responses and compute rewards. Please specify the environment in your training request's hyperparameters. The environment determines how the model's generated responses will be scored during reinforcement learning."

  # No environment for task type
  - regex: "^No environment found for task type: .+$"
    exception: TrainingEnvironmentError
    error_details: "No GRPO environment is registered for the specified task type. The environment defines how model responses are evaluated during reinforcement learning. This may indicate an unsupported task type or a misconfiguration. Please verify your task type is supported for GRPO training."

  # ===========================================================================
  # 10. CHECKPOINT ERRORS (500)
  # ===========================================================================

  # --- Automodel ---
  # Checkpoint directory already exists
  - regex: "Checkpoint directory .* already exists"
    exception: CheckpointError
    error_details: "The output checkpoint directory already exists from a previous training run. This typically happens when a previous training job failed or was cancelled but left partial checkpoint files behind. Please use a clean output directory, if you do not have access to remove the existing checkpoint directory, contact your administrator."

  # Global plan validation failure
  - exact: "Failed to validate global plan"
    exception: CheckpointError
    error_details: "Checkpoint validation failed during distributed checkpoint loading. This occurs when the 'global plan' (which coordinates how model weights are distributed across GPUs) cannot be validated. Common causes include: 1) Corrupted checkpoint metadata files, 2) Mismatch between the number of GPUs used when saving vs loading the checkpoint, or 3) Interrupted checkpoint save operation. Please ensure the checkpoint is complete and you are using the same GPU topology as when the checkpoint was saved."

  # Missing key in checkpoint
  - starts_with: "Missing key in checkpoint state_dict:"
    exception: CheckpointError
    error_details: "The checkpoint is missing one or more required model weights. This typically indicates that the checkpoint file is corrupted, incomplete (possibly from an interrupted save), or was created from a different model architecture than the one being loaded. Please verify the checkpoint is complete and matches the expected model architecture."

  # MoE expert weights missing
  - contains: "Expert weights missing from checkpoint"
    exception: CheckpointError
    error_details: "The checkpoint for this Mixture-of-Experts (MoE) model is missing one or more expert weights. MoE models have multiple 'expert' sub-networks, and all expert weights must be present in the checkpoint. This typically indicates the checkpoint is corrupted or was saved incorrectly. Please use a complete, valid MoE checkpoint."

  # --- NeMo-RL ---
  # Checkpoint file corrupted (JSONDecodeError)
  - type_name: JSONDecodeError
    exception: CheckpointError
    error_details: "The checkpoint metadata file (training_info.json) is corrupted and cannot be parsed. This file stores training progress information like the current step and loss values. The checkpoint may have been saved incompletely or the file was corrupted during storage."

  # Distributed process group not initialized for checkpoint save
  - exact: "Distributed process group is not initialized. Cannot save checkpoint."
    exception: CheckpointError
    error_details: "Cannot save checkpoint because the distributed process group is not initialized. This typically occurs when the training cluster encountered communication issues before checkpoint saving could complete. This is a transient infrastructure issue - please try running your training job again."

  # Megatron core state not initialized for checkpoint save
  - exact: "Megatron core state or model is not initialized. Cannot save checkpoint."
    exception: CheckpointError
    error_details: "Cannot save checkpoint because the Megatron model state is not initialized. This typically occurs when the model failed to load or initialize correctly before training could produce a checkpoint. Please verify the base model is valid and try again."

  # HF checkpoint already exists
  - regex: "^HF checkpoint already exists at .+\\. Delete it to run or set overwrite=True\\.$"
    exception: CheckpointError
    error_details: "The HuggingFace checkpoint output directory already exists from a previous training run or conversion. This typically happens when a previous training job left partial output behind. Please use a clean output directory, or contact your administrator to remove the existing checkpoint."

  # ===========================================================================
  # 11. CUDA/GPU ERRORS (500)
  # ===========================================================================

  # --- NeMo-RL ---
  # Disk space exhausted - occurs in Ray cluster workers during RL training
  # Ray stores session logs in /tmp/ray/session_*/logs/ which can fill up ephemeral node storage
  - contains: "No space left on device"
    exception: DistributedError
    error_details: "Disk space exhausted on the node's ephemeral storage (/tmp). During reinforcement learning training (DPO/GRPO), Ray stores session logs and temporary files in /tmp/ray/ which can fill up the node's local disk. This is separate from the PVC used for checkpoints and datasets. This is typically a transient infrastructure issue - please try running your training job again, or contact your administrator to ensure adequate ephemeral storage is configured for the cluster nodes."

  # CUDA out of memory - catch by type name
  - type_name: OutOfMemoryError
    exception: CudaError
    error_details: "GPU out of memory. To reduce memory usage: 1) Lower batch_size, 2) Reduce max_seq_length, 3) Use LoRA/PEFT instead of all_weights fine-tuning, or 4) Use a model with fewer parameters."

  # CUDA OOM - catch by message pattern
  - contains: "CUDA out of memory"
    exception: CudaError
    error_details: "GPU out of memory. To reduce memory usage: 1) Lower batch_size, 2) Reduce max_seq_length, 3) Use LoRA/PEFT instead of all_weights fine-tuning, or 4) Use a model with fewer parameters."

  # OOM keyword
  - contains: "out of memory"
    exception: CudaError
    error_details: "GPU out of memory. To reduce memory usage: 1) Lower batch_size, 2) Reduce max_seq_length, 3) Use LoRA/PEFT instead of all_weights fine-tuning, or 4) Use a model with fewer parameters."

  # General CUDA errors
  - and:
      - any_keywords: ["CUDA", "cuda"]
      - any_keywords: ["error", "Error", "failed", "Failed"]
    exception: CudaError
    error_details: "A GPU/CUDA error occurred. Please check GPU availability, ensure the GPU is not being used by another process, and try again."

  # ===========================================================================
  # 12. DISTRIBUTED ERRORS (500)
  # ===========================================================================

  # --- Automodel ---
  # torch.distributed not available
  - exact: "torch.distributed not available"
    exception: DistributedError
    error_details: "The PyTorch distributed package is not available in the training environment. Distributed training requires PyTorch to be built with distributed support enabled. This is an issue with the training environment setup, please contact the administrator to ensure the correct PyTorch version is installed."

  # torch.distributed not initialized
  - exact: "expected torch.distributed to be initialized"
    exception: DistributedError
    error_details: "PyTorch distributed training was not properly initialized before the training process started. This typically happens when the training script is not launched correctly with the distributed launcher (torchrun). This is an issue with the training environment setup, please contact the administrator."

  # Distributed timeout - check for TimeoutError in cause chain
  - cause:
      type_name: TimeoutError
      recursive: true
    exception: DistributedError
    error_details: "A distributed training operation timed out while waiting for communication between GPUs or nodes. This can happen when: 1) One or more GPU workers crashed or became unresponsive, 2) Network connectivity issues between nodes, 3) Uneven workload causing some GPUs to wait too long for others. This may be a transient issue - please try running your training job again. If the problem persists, contact your administrator."

  # NCCL errors
  - any_keywords: ["NCCL", "nccl"]
    exception: DistributedError
    error_details: "An NCCL (NVIDIA Collective Communications Library) error occurred during GPU-to-GPU communication. NCCL is used to synchronize data between GPUs during distributed training. Common causes include: 1) Network connectivity issues between GPU nodes, 2) GPU hardware problems, 3) Incompatible NCCL versions, or 4) Memory pressure on GPUs. This may be a transient issue - please try running your training job again. If the problem persists, contact your administrator."

  # c10d errors
  - contains: "c10d"
    exception: DistributedError
    error_details: "A PyTorch distributed communication error occurred (c10d is PyTorch's distributed communication backend). This indicates a failure in the inter-process or inter-node communication during distributed training. This may be caused by network issues, process crashes, or resource exhaustion. Please try running your training job again. If the problem persists, contact your administrator."

  # --- NeMo-RL ---
  # Not enough GPUs
  - and:
      - type_name: ResourceInsufficientError
      - contains: "Not enough GPUs available"
    exception: DistributedError
    error_details: "The training cluster does not have enough GPUs available for your requested configuration. Your training job requires more GPUs than are currently available in the cluster. Try reducing the parallelism settings (tensor_parallel_size, pipeline_parallel_size) to require fewer GPUs."

  # Not enough CPUs
  - and:
      - type_name: ResourceInsufficientError
      - contains: "Not enough CPUs available"
    exception: DistributedError
    error_details: "The training cluster does not have enough CPUs available for your requested configuration. CPUs are needed for data loading and preprocessing alongside GPU training."

  # Maximum retries reached
  - and:
      - type_name: ResourceInsufficientError
      - contains: "Maximum number of retries reached"
    exception: DistributedError
    error_details: "Failed to allocate cluster resources after multiple retry attempts. This is typically a transient issue - please wait a few minutes and try submitting your training job again. If the problem persists, contact your administrator to check cluster health."

  # Placement group timeout
  - contains: "Timed out waiting for placement groups to be ready"
    exception: DistributedError
    error_details: "Timed out while waiting for Ray placement groups to be allocated. Placement groups are used to co-locate GPU workers on the same nodes for efficient communication. This typically happens when the cluster is under heavy load and cannot allocate the required resources in time. Please try submitting your training job again. If the problem persists, contact your administrator."

  # No valid placement groups
  - contains: "No valid placement groups found"
    exception: DistributedError
    error_details: "No valid Ray placement groups could be found for the training job. This indicates a problem with the distributed training cluster configuration or resource availability. This is an infrastructure issue - please contact your administrator to investigate the cluster setup."

  # Workers per node mismatch
  - regex: "^workers_per_node list length \\(\\d+\\) must match"
    exception: DistributedError
    error_details: "The workers-per-node configuration does not match the number of placement groups allocated. This indicates an internal mismatch in the distributed training setup. This is an infrastructure issue - please contact your administrator."

  # Missing sharding annotations
  - exact: "Sharding annotations must be provided to use sharded data distribution"
    exception: DistributedError
    error_details: "The training configuration requires sharded data distribution but sharding annotations are not provided. Sharding annotations specify how data should be distributed across workers for efficient parallel processing. This is an internal configuration issue - please contact your administrator."

  # ===========================================================================
  # 13. GENERATION ERRORS (500)
  # NeMo-RL
  # ===========================================================================

  # Weight update failed during refit
  - regex: "^Updating weights for the generation policy failed during refit"
    exception: GenerationError
    error_details: "Failed to update the vLLM generation model weights from the training policy during the 'refit' step. In GRPO training, the generation model periodically syncs weights from the training model. This failure may be caused by: 1) CUDA IPC (Inter-Process Communication) issues between training and generation workers, 2) NCCL communication errors, or 3) Memory pressure on GPUs. This is typically a transient issue - please try running your training job again."

  # generate_text with async_engine
  - contains: "generate_text cannot be used with async_engine=True"
    exception: GenerationError
    error_details: "A synchronous generation method was called on an async vLLM engine. When async_engine is enabled, you must use async methods (e.g., generate_text_async). This is an internal configuration issue with the training environment, please contact the administrator."

  # update_weights_via_ipc with async_engine
  - contains: "cannot be used with async_engine=True"
    exception: GenerationError
    error_details: "A synchronous method was called on an async vLLM engine. When async_engine is enabled, all vLLM operations must use their async variants. This is an internal configuration issue with the training environment, please contact the administrator."

  # Error in sample rollout
  - regex: "^Error in sample \\d+ rollout: .+$"
    exception: GenerationError
    error_details: "An error occurred while generating a response (rollout) for one of the training samples during GRPO training. Rollouts are the model-generated responses used to compute rewards and policy gradients. This may be caused by: 1) Invalid input data in the sample, 2) Generation parameters causing issues (e.g., max_tokens too low), or 3) vLLM backend errors. Check your dataset for problematic samples."

  # Async generation not enabled
  - contains: "Async generation is not enabled"
    exception: GenerationError
    error_details: "Async generation was requested but the vLLM engine is not configured with async_engine=True. Async generation allows overlapping training and generation for better throughput. This is an internal configuration issue with the training environment, please contact the administrator."

  # NeMo-Gym/Penguin requires async vLLM
  - contains: "you must use vllm generation backend with"
    exception: GenerationError
    error_details: "The NeMo-Gym (Penguin) environment requires the vLLM generation backend with async_engine enabled. NeMo-Gym provides advanced RL training features that depend on async generation. This is an internal configuration issue with the training environment, please contact the administrator."

  # NeMo-Gym/Penguin requires HTTP server
  - contains: "expose the vllm server via"
    exception: GenerationError
    error_details: "The NeMo-Gym (Penguin) environment requires the vLLM server to be exposed via HTTP (expose_http_server: true). This allows the environment to communicate with the generation model through an HTTP API. This is an internal configuration issue with the training environment, please contact the administrator."

  # NeMo-Gym/Penguin incompatible with reasoning parser
  - contains: "Please do not use a reasoning parser in vLLM"
    exception: GenerationError
    error_details: "The NeMo-Gym (Penguin) environment is incompatible with vLLM's reasoning parser. NeMo-Gym handles all data processing including reasoning traces itself, so having a reasoning parser in vLLM would cause conflicts. This is an internal configuration issue with the training environment, please contact the administrator."

  # No placement groups available for vLLM
  - exact: "No placement groups available in the cluster"
    exception: GenerationError
    error_details: "No Ray placement groups are available for vLLM generation workers. This means the cluster could not allocate the required GPU resources for the generation component of training. This is typically a resource availability issue - please try again or contact your administrator to check cluster capacity."

  # Unable to allocate vLLM worker groups
  - contains: "Unable to allocate any worker groups with the available resources"
    exception: GenerationError
    error_details: "Could not allocate any vLLM worker groups with the available cluster resources. The generation component of DPO/GRPO training requires dedicated GPU resources for vLLM inference workers. Please ensure the cluster has enough GPUs, or reduce the generation parallelism settings."

  # Placement group contains no bundles
  - exact: "Placement group contains no bundles"
    exception: GenerationError
    error_details: "A Ray placement group allocated for vLLM generation workers contains no resource bundles. This indicates an issue with cluster resource allocation. This is an infrastructure issue - please contact your administrator."

  # Failed to retrieve bundle/node mapping from placement group
  - contains: "Failed to retrieve bundle/node mapping from placement group"
    exception: GenerationError
    error_details: "Could not retrieve the bundle-to-node mapping from the Ray placement group for vLLM workers. This indicates an issue with the distributed training cluster setup. This is an infrastructure issue - please contact your administrator."

  # No output received for generation request
  - regex: "^No output received for request .+$"
    exception: GenerationError
    error_details: "The vLLM async generation engine did not produce any output for a generation request. This can happen when: 1) The generation request timed out, 2) The vLLM worker encountered an internal error, or 3) GPU memory was exhausted during generation. This is typically a transient issue - please try running your training job again."

  # ===========================================================================
  # 14. INTERNAL ERRORS (500)
  # ===========================================================================

  # --- Automodel Pipeline Parallelism Errors ---
  # Pipeline parallelism: first stage missing inputs
  - exact: "You must provide either input_ids or inputs_embeds"
    exception: InternalError
    error_details: "Pipeline parallelism internal error: the first pipeline stage did not receive input data (input_ids or inputs_embeds). This is an internal configuration issue with how the model is split across pipeline stages, please reach out to the NeMo Platform team."

  # Pipeline parallelism: intermediate stage missing embeddings
  - exact: "inputs_embeds must be provided for pipeline stages without embed_tokens"
    exception: InternalError
    error_details: "Pipeline parallelism internal error: an intermediate pipeline stage did not receive embeddings from the previous stage. In pipeline parallelism, each stage processes a portion of the model layers and passes activations to the next stage. This error indicates the inter-stage communication failed, and is an internal training configuration issue, please reach out to the NeMo Platform team."

  # --- Automodel MoE (Mixture of Experts) Errors ---
  # MoE: only 1D mesh supported (occurs when TP+EP are both > 1)
  - exact: "We only support 1D mesh for MoE"
    exception: ParallelismConfigError
    error_details: "MoE (Mixture of Experts) models do not support combining tensor parallelism with expert parallelism. When using expert_model_parallel_size > 1, you must set tensor_parallel_size=1. Please update your parallelism configuration to disable tensor parallelism for MoE training."

  # MoE: DTensor placement error (checkpoint/parallelism mismatch)
  - contains: "has unsupported DTensor placement"
    exception: ParallelismConfigError
    error_details: "MoE (Mixture of Experts) model checkpoint has an incompatible tensor distribution for the current expert parallelism settings. This typically occurs when the base model checkpoint was saved with different expert_model_parallel_size than what you're using for training. Please ensure your expert_model_parallel_size matches how the base model was originally distributed, or use a checkpoint that was saved without expert parallelism (expert_model_parallel_size=1)."

  # --- Automodel Fused Optimization Errors ---
  # FusedLinearCrossEntropy configuration
  - contains: "FusedLinearCrossEntropy requires the model to output hidden states"
    exception: InternalError
    error_details: "The fused linear cross-entropy optimization requires the model to output hidden states, but the model is configured to only output logits. FusedLinearCrossEntropy is a memory optimization that combines the final linear projection and loss computation. This is an internal configuration issue, contact the NeMo Platform team."

  # --- NeMo-RL Async GRPO Errors ---
  # Stale trajectories in replay buffer
  - regex: "^Found \\d+ trajectories older than min_valid_version \\d+$"
    exception: InternalError
    error_details: "The async GRPO replay buffer contains stale trajectories that are older than the minimum valid version. In async GRPO, trajectories are generated asynchronously and stored in a replay buffer. Stale trajectories can cause training instability because they were generated by an outdated policy. This indicates a synchronization issue between generation and training workers. Please contact the administrator."

  # --- NeMo-RL Tensor Processing Errors ---
  # Tensor dimension mismatch
  - regex: "^tensors for .+ must have same number of dimensions"
    exception: InternalError
    error_details: "Tensors being processed have mismatched dimensions during internal batching. This is an internal data processing issue that should not occur with valid datasets. Please contact the NeMo Platform team with your dataset format details."

  # Tensor dtype mismatch
  - contains: "expected consistent types but got:"
    exception: InternalError
    error_details: "Tensors being processed have inconsistent data types (dtypes) during internal batching. This is an internal data processing issue that should not occur with valid datasets. Please contact the NeMo Platform team."

  # Tensors on different devices
  - contains: "expected tensors on the same device but got:"
    exception: InternalError
    error_details: "Tensors are located on different devices during internal processing. This is an internal distributed training issue. Please contact the NeMo Platform team."

  # --- Automodel Configuration Errors ---
  # Config instantiation failure (from ConfigNode.instantiate())
  # This prints a detailed error with "Instantiation failed for `func_name`"
  - contains: "Instantiation failed for"
    exception: InternalError
    error_details: "Failed to instantiate a training configuration component. The training system uses a configuration tree where each node can instantiate Python objects (like optimizers, schedulers, or model components). This error means one of these instantiations failed, possibly due to invalid parameters or missing dependencies. Please contact the administrator."

  # Model compilation failure
  - contains: "Model compilation failed"
    exception: InternalError
    error_details: "PyTorch model compilation (torch.compile) failed. Model compilation is an optional optimization that can speed up training by compiling the model graph. Training will fall back to eager mode and continue without compilation. If this error persists, it may indicate an incompatibility between the model architecture and PyTorch's compiler. Please contact the administrator if training fails."

  # --- General Training Process Errors ---
  # Training subprocess error (generic fallback when no specific error was parsed)
  # Matches both parser ("Training failed with exit code: X") and train.py ("Training subprocess returned with error code: X")
  - regex: "^Training (failed with exit code|subprocess returned with (?:error )?code):? \\d+.*"
    exception: InternalError
    error_details: "The training process exited with a non-zero exit code, but no specific error message could be extracted from the training logs. This is a generic failure that can have many causes. Please check the full training logs for more details, and contact the administrator if you cannot determine the cause."

