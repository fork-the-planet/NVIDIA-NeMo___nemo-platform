instances:
- url: nemo-platform.docs.buildwithfern.com/nemo/platform
  custom-domain: docs.nvidia.com/nemo/platform
  multi-source: true
title: NVIDIA NeMo Platform
global-theme: nvidia
logo:
  right-text: NeMo Platform
css:
- ./styles/notebook-viewer.css
- ./styles/button.css
navbar-links:
- type: github
  value: https://github.com/NVIDIA-NeMo/nemo-platform
experimental:
  mdx-components:
  - ./components
versions:
- display-name: Latest
  path: versions/latest.yml
  slug: latest

redirects:
  # Generated by utils/generate_redirects.py — re-run from repo root; see scripts README
  - source: "/index.html"
    destination: "/latest"
  - source: "/index"
    destination: "/latest"
  - source: "/latest/:path*/index.html"
    destination: "/latest/:path*"
  - source: "/:path*/index.html"
    destination: "/:path*"
  # Sphinx page URLs (foo.html); must follow all :path*/index.html rules above
  - source: "/:path*.html"
    destination: "/:path*"
