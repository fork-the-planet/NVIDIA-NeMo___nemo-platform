site_name: NeMo Platform
site_description: NVIDIA NeMo Platform Documentation
site_url: !ENV [NMP_DOCS_SITE_URL, "https://nvidia-nemo.github.io/nemo-platform/latest/"]
repo_url: https://github.com/NVIDIA-NeMo/nemo-platform
repo_name: NVIDIA-NeMo/nemo-platform
edit_uri: edit/main/docs/
copyright: "Copyright &copy; 2026 NVIDIA Corporation"

docs_dir: docs
site_dir: site
use_directory_urls: true

exclude_docs: |
  _scripts/
  _generated/
  _hooks/
  _build/
  _overrides/
  _snippets/*.md
  _snippets/**/*.md
  **/_snippets/*.md
  **/_snippets/**/*.md
  .venv-mkdocs/
  template/
  work/
  notebooks/
  **/*.executed.ipynb
  **/*.tmp.ipynb
  **/*.py
  **/*.pyc
  README.md
  CONTRIBUTING.md
  CHANGELOG.md
  MIGRATION.md
  Makefile
  requirements-mkdocs.txt

# ─── Theme ───────────────────────────────────────────────────────────────────
theme:
  name: material
  custom_dir: docs/_overrides
  logo: assets/nvidia-logo-white.png
  favicon: assets/favicon.ico
  icon:
    repo: fontawesome/brands/github

  palette:
    # Light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-sunny
        name: Switch to dark mode
    # Dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-night
        name: Switch to light mode

  font:
    text: Inter
    code: JetBrains Mono

  features:
    - navigation.indexes
    - navigation.top
    - navigation.path
    - navigation.footer
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
    - content.tooltips
    - toc.follow
    - announce.dismiss

# ─── Plugins ─────────────────────────────────────────────────────────────────
plugins:
  - search:
      lang: en

  - awesome-pages

  - macros:
      on_error_fail: false
      on_undefined: keep

  - mkdocstrings:
      handlers:
        python:
          paths: [sdk/python/nemo-platform/src]
          options:
            docstring_style: google
            show_source: false
            show_root_heading: true
            show_root_full_path: false
            show_if_no_docstring: false
            members_order: source
            inherited_members: false

  - mkdocs-jupyter:
      execute: false
      include_source: true
      ignore:
        - "_scripts/*.py"
        - "_extensions/**"
        - "_templates/**"

  - redirects:
      redirect_maps:
        get-started/platform-prereq.md: get-started/setup.md
        get-started/installation.md: get-started/setup.md
        get-started/quickstart.md: get-started/setup.md
        get-started/getting-started.md: index.md
        generate-synthetic-data/index.md: data-designer/index.md

  - swagger-ui-tag:
      docExpansion: list
      filter: true
      syntaxHighlightTheme: monokai
      tryItOutEnabled: false

  - mike:
      alias_type: redirect
      canonical_version: !ENV [NMP_DOCS_CANONICAL_VERSION, latest]

# ─── Hooks ───────────────────────────────────────────────────────────────────
hooks:
  # Reads extra.hidden_docs below to hide temporary pages from nav, output, and API filters.
  - docs/_hooks/hide_unready_docs.py

# ─── Markdown Extensions ─────────────────────────────────────────────────────
markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
      slugify: !!python/object/apply:pymdownx.slugs.slugify
        kwds:
          case: lower
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets:
      base_path:
        - docs
      check_paths: false
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - attr_list
  - md_in_html
  - tables
  - footnotes
  - def_list
  - toc:
      permalink: true
      title: On this page
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.caret
  - pymdownx.tilde
  - pymdownx.tasklist:
      custom_checkbox: true

# ─── Extra ───────────────────────────────────────────────────────────────────
extra:
  social: []
  analytics:
    feedback:
      title: Was this page helpful?
      ratings:
        - icon: material/thumb-up-outline
          name: This page was helpful
          data: 1
          note: >-
            Thanks for your feedback!
        - icon: material/thumb-down-outline
          name: This page could be improved
          data: 0
          note: >-
            Thanks for your feedback! Help us improve by
            <a href="https://github.com/NVIDIA-NeMo/nemo-platform/issues/new" target="_blank">opening an issue</a>.

  # Temporary gating for docs that are not ready for the 2026-05-12 launch.
  # Used by docs/_hooks/hide_unready_docs.py.
  # Set NMP_HIDE_UNREADY_DOCS=false, or run `make html-with-unready` / `make live-with-unready`,
  # to build or serve these pages locally without editing nav.
  hidden_docs:
    enabled: !ENV [NMP_HIDE_UNREADY_DOCS, true]
    sections:
      - Platform
      - Fine-tune Models
      - Customizer
      - Example Applications
    paths:
      - auth/**
      - customizer/**
      - evaluator/benchmarks/**
      - evaluator/metrics/job-management.md
      - evaluator/metrics/results.md
      - evaluator/metrics/retriever.md
      - evaluator/tutorials/run-an-evaluation.md
      - example-applications/tool-calling.ipynb
      - get-started/quickstart.md
      - helm/**
      - run-inference/tutorials/deploy-models.md
      - set-up/**
      - troubleshooting/cluster-setup.md
      - troubleshooting/customizer.md
    api_tags:
      - Auditor
      - Customizer
      - Safe Synthesizer

  # Substitution variables (accessed as {{ release }}, {{ ncm_short_name }}, etc.)
  release: "0.1.0"
  platform_name: "NeMo Platform"
  ncm_long_name: "NVIDIA NeMo Customizer"
  ncm_short_name: "NeMo Customizer"
  ndd_long_name: "NVIDIA NeMo Data Designer"
