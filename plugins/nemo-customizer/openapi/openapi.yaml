        required: true
        schema:
          type: string
          title: Workspace
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AutomodelJobsJobRequest'
      responses:
        '201':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AutomodelJobsJob'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    get:
      tags:
      - Automodel Jobs
      summary: List Jobs
      operationId: list_jobs_apis_customization_v2_workspaces__workspace__automodel_jobs_get
      parameters:
      - name: workspace
        in: path
        required: true
        schema:
          type: string
          title: Workspace
      - name: page
        in: query
        required: false
        schema:
          type: integer
          exclusiveMinimum: 0
          description: Page number.
          default: 1
          title: Page
        description: Page number.
      - name: page_size
        in: query
        required: false
        schema:
          type: integer
          exclusiveMinimum: 0
          description: Page size.
          default: 10
          title: Page Size
        description: Page size.
      - name: sort
        in: query
        required: false
        schema:
          allOf:
          - $ref: '#/components/schemas/AutomodelJobsJobsSortField'
          description: The field to sort by. To sort in decreasing order, use `-`
            in front of the field name.
          default: -created_at
        description: The field to sort by. To sort in decreasing order, use `-` in
          front of the field name.
      - in: query
        name: filter
        style: deepObject
        required: false
        explode: true
        schema:
          $ref: '#/components/schemas/AutomodelJobsJobsListFilter'
        description: Filter jobs on various criteria.
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AutomodelJobsJobsPage'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
