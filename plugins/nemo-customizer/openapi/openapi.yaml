        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                additionalProperties: true
                type: object
                title: Response Healthz Apis Customization V2 Healthz Get
  /apis/customization/v2/workspaces/{workspace}/automodel/jobs:
    post:
      tags:
      - Automodel Jobs
      summary: Create Job
      operationId: create_job_apis_customization_v2_workspaces__workspace__automodel_jobs_post
