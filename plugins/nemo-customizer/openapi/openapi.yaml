components:
  schemas:
    AutomodelJobInput:
      properties:
        name:
          title: Name
          type: string
        model:
          type: string
          title: Model
        dataset:
          $ref: '#/components/schemas/DatasetSpec'
        training:
          $ref: '#/components/schemas/TrainingSpec'
        schedule:
          $ref: '#/components/schemas/ScheduleSpec'
        batch:
          $ref: '#/components/schemas/BatchSpec'
        optimizer:
          $ref: '#/components/schemas/OptimizerSpec'
        parallelism:
          $ref: '#/components/schemas/ParallelismSpec'
        output:
          $ref: '#/components/schemas/OutputRequest'
        integrations:
          $ref: '#/components/schemas/IntegrationsSpecInput'
      additionalProperties: false
      type: object
      required:
      - model
      - dataset
      - training
      title: AutomodelJobInput
      description: POST body / CLI JSON.
    AutomodelJobOutput:
      properties:
        name:
          title: Name
          type: string
        model:
          type: string
          title: Model
        dataset:
          $ref: '#/components/schemas/DatasetSpec'
        training:
          $ref: '#/components/schemas/TrainingSpec'
        schedule:
          $ref: '#/components/schemas/ScheduleSpec'
        batch:
          $ref: '#/components/schemas/BatchSpec'
        optimizer:
          $ref: '#/components/schemas/OptimizerSpec'
        parallelism:
          $ref: '#/components/schemas/ParallelismSpec'
        output:
          $ref: '#/components/schemas/OutputResponse'
        integrations:
          $ref: '#/components/schemas/IntegrationsSpecOutput'
      additionalProperties: false
      type: object
      required:
      - model
      - dataset
      - training
      - schedule
      - batch
      - optimizer
      - parallelism
      - output
      title: AutomodelJobOutput
      description: Stored canonical spec after ``to_spec()``.
    AutomodelJobsJob:
      properties:
        id:
          title: Id
          type: string
        name:
          type: string
          title: Name
        description:
          title: Description
          type: string
        project:
          title: Project
          type: string
        workspace:
          title: Workspace
          type: string
        created_at:
          title: Created At
          type: string
          format: date-time
        updated_at:
          title: Updated At
          type: string
          format: date-time
        spec:
          $ref: '#/components/schemas/AutomodelJobOutput'
        status:
          $ref: '#/components/schemas/PlatformJobStatus'
        status_details:
          title: Status Details
          additionalProperties: true
          type: object
        error_details:
          title: Error Details
          additionalProperties: true
          type: object
        ownership:
          title: Ownership
          additionalProperties: true
          type: object
        custom_fields:
          title: Custom Fields
          additionalProperties: true
          type: object
      type: object
      required:
      - name
      - spec
      title: AutomodelJobsJob
    AutomodelJobsJobRequest:
      properties:
        name:
          title: Name
          type: string
        description:
          title: Description
          type: string
        project:
          title: Project
          type: string
        spec:
          $ref: '#/components/schemas/AutomodelJobInput'
        ownership:
          title: Ownership
          additionalProperties: true
          type: object
        custom_fields:
          title: Custom Fields
          additionalProperties: true
          type: object
      type: object
      required:
      - spec
      title: AutomodelJobsJobRequest
    AutomodelJobsJobsListFilter:
      additionalProperties: false
      properties:
        created_at:
          allOf:
          - $ref: '#/components/schemas/DatetimeFilter'
          description: Jobs created at 'gte' datetime or 'lte' datetime.
        name:
          anyOf:
          - $ref: '#/components/schemas/StringFilter'
          - type: string
          description: Name of the job.
          title: Name
        workspace:
          description: Workspace of the job.
          title: Workspace
          type: string
        project:
          description: Project containing the job.
          title: Project
          type: string
        status:
          allOf:
          - $ref: '#/components/schemas/PlatformJobStatus'
          description: The current status.
        updated_at:
          allOf:
          - $ref: '#/components/schemas/DatetimeFilter'
          description: Jobs updated at 'gte' datetime or 'lte' datetime.
      title: AutomodelJobsJobsListFilter
      type: object
    AutomodelJobsJobsPage:
      properties:
        data:
          items:
            $ref: '#/components/schemas/AutomodelJobsJob'
          type: array
          title: Data
        pagination:
          allOf:
          - $ref: '#/components/schemas/PaginationData'
          description: Pagination information.
        sort:
          title: Sort
          description: The field on which the results are sorted.
          type: string
        filter:
          title: Filter
          description: Filtering information.
          additionalProperties: true
          type: object
      type: object
      required:
      - data
      title: AutomodelJobsJobsPage
    AutomodelJobsJobsSortField:
      type: string
      enum:
      - created_at
      - -created_at
      - updated_at
      - -updated_at
      title: AutomodelJobsJobsSortField
    BatchSpec:
      properties:
        global_batch_size:
          type: integer
          exclusiveMinimum: 0.0
          title: Global Batch Size
          default: 8
        micro_batch_size:
          type: integer
          exclusiveMinimum: 0.0
          title: Micro Batch Size
          default: 1
        sequence_packing:
          type: boolean
          title: Sequence Packing
          default: false
        sequence_packing_max_samples:
          type: integer
          exclusiveMinimum: 0.0
          title: Sequence Packing Max Samples
          description: Samples analyzed to estimate the optimal pack size when packing
            is enabled.
          default: 1000
      additionalProperties: false
      type: object
      title: BatchSpec
    DPOTraining:
      properties:
        optimizer_type:
          allOf:
          - $ref: '#/components/schemas/OptimizerType'
          description: "Optimizer + LR-scheduler combination (AdamW/Adam \xD7 cosine-annealing/flat-LR).\
            \ Defaults to AdamW with cosine annealing."
        learning_rate:
          type: number
          title: Learning Rate
          description: Peak learning rate.
          default: 0.0001
        min_learning_rate:
          title: Min Learning Rate
          description: Minimum LR for cosine decay.
          type: number
        weight_decay:
          type: number
          title: Weight Decay
          description: Weight decay coefficient.
          default: 0.01
        adam_beta1:
          type: number
          title: Adam Beta1
          description: Adam beta1.
          default: 0.9
        adam_beta2:
          type: number
          title: Adam Beta2
          description: Adam beta2.
          default: 0.999
        adam_eps:
          type: number
          exclusiveMinimum: 0.0
          title: Adam Eps
          description: Adam epsilon (numerical stability term).
          default: 1.0e-05
        warmup_steps:
          type: integer
          minimum: 0.0
          title: Warmup Steps
          description: Linear warmup steps.
          default: 0
        epochs:
          type: integer
          exclusiveMinimum: 0.0
          title: Epochs
          description: Number of passes through the dataset.
          default: 1
        max_steps:
          title: Max Steps
          description: Max training steps (overrides epochs if set).
          type: integer
          exclusiveMinimum: 0.0
        val_check_interval:
          title: Val Check Interval
          description: Validation interval. Float <= 1.0 is fraction of epoch; > 1.0
            is step count.
          type: number
        val_at_end:
          type: boolean
          title: Val At End
          description: Run a final validation pass after the last training step. Keep
            enabled so the final checkpoint carries validation metrics and best-checkpoint
            selection works; set False only to skip the extra eval.
          default: true
        keep_top_k:
          type: integer
          exclusiveMinimum: 0.0
          title: Keep Top K
          description: Number of best checkpoints to retain (ranked by validation
            loss).
          default: 1
        batch_size:
          type: integer
          exclusiveMinimum: 0.0
          title: Batch Size
          description: Global batch size across all GPUs.
          default: 32
        micro_batch_size:
          type: integer
          exclusiveMinimum: 0.0
          title: Micro Batch Size
          description: Per-GPU micro batch size.
          default: 1
        activation_checkpointing:
          type: boolean
          title: Activation Checkpointing
          description: Recompute activations during the backward pass to reduce memory
            at the cost of compute. Enable to fit larger models or longer sequences.
          default: false
        max_seq_length:
          type: integer
          exclusiveMinimum: 0.0
          title: Max Seq Length
          description: Maximum token sequence length for training.
          default: 2048
        seed:
          title: Seed
          description: Random seed for reproducibility.
          type: integer
        parallelism:
          $ref: '#/components/schemas/ParallelismParams'
        execution_profile:
          title: Execution Profile
          description: Execution profile for the GPU training step (operator-configured).
            Falls back to the service default when omitted.
          type: string
          minLength: 1
        type:
          type: string
          const: dpo
          title: Type
          default: dpo
        ref_policy_kl_penalty:
          type: number
          minimum: 0.0
          title: Ref Policy Kl Penalty
          description: KL penalty coefficient (beta in the DPO paper).
          default: 0.05
        preference_average_log_probs:
          type: boolean
          title: Preference Average Log Probs
          description: Average log probabilities for preference loss calculation.
          default: false
        sft_average_log_probs:
          type: boolean
          title: Sft Average Log Probs
          description: Average log probabilities for SFT regularization loss.
          default: false
        preference_loss_weight:
          type: number
          minimum: 0.0
          title: Preference Loss Weight
          description: Weight for the preference (DPO) loss term.
          default: 1.0
        sft_loss_weight:
          type: number
          minimum: 0.0
          title: Sft Loss Weight
          description: Weight for SFT regularization loss (0 = disabled).
          default: 0.0
        max_grad_norm:
          type: number
          minimum: 0.0
          title: Max Grad Norm
          description: Maximum gradient norm for clipping.
          default: 1.0
      additionalProperties: false
      type: object
      title: DPOTraining
      description: "Direct Preference Optimization (full-weight only \u2014 PEFT unsupported)."
    DatasetSpec:
      properties:
        training:
          type: string
          title: Training
          description: Training fileset as 'name' or 'workspace/name'.
        validation:
          title: Validation
          type: string
        prompt_template:
          title: Prompt Template
          type: string
      additionalProperties: false
      type: object
      required:
      - training
      title: DatasetSpec
    DatetimeFilter:
      additionalProperties: false
      properties:
        $gte:
          description: Filter for results greater than or equal to this datetime.
          title: $Gte
          format: date-time
          type: string
        $lte:
          description: Filter for results less than or equal to this datetime.
          title: $Lte
          format: date-time
          type: string
      title: DatetimeFilter
      type: object
    DeploymentParams:
      properties:
        gpu:
          type: integer
          title: Gpu
          description: Number of GPUs required for the deployment.
          default: 1
        additional_envs:
          title: Additional Envs
          description: Additional environment variables for the deployment.
          additionalProperties:
            type: string
          type: object
        disk_size:
          title: Disk Size
          description: Disk size for the deployment.
          type: string
        image_name:
          title: Image Name
          description: Container image name from NGC. If not specified, defaults to
            multi-llm.
          type: string
        image_tag:
          title: Image Tag
          description: Container image tag from NGC.
          type: string
        lora_enabled:
          type: boolean
          title: Lora Enabled
          description: When auto-deploying a full SFT training, setting this true
            allows subsequent LoRA adapters to be deployed against it.
          default: true
        tool_call_config:
          allOf:
          - $ref: '#/components/schemas/ToolCallParams'
          description: Tool calling configuration override for the NIM deployment.
      additionalProperties: false
      type: object
      title: DeploymentParams
      description: 'Inline deployment parameters for auto-deploying a trained model.


        Used in :class:`UnslothJobInput.deployment_config` and passed through to

        the model_entity task at compile time. When unset, no deployment is launched.'
    FileStorageType:
      type: string
      enum:
      - fileset
      title: FileStorageType
    HTTPValidationError:
      properties:
        detail:
          items:
            $ref: '#/components/schemas/ValidationError'
          type: array
          title: Detail
      type: object
      title: HTTPValidationError
    HardwareSpec:
      properties:
        gpus:
          title: Gpus
          description: Comma-separated GPU indices ('0' or '0,1') for CUDA_VISIBLE_DEVICES.
            Selection, not reservation.
          type: string
        precision:
          type: string
          enum:
          - bf16
          - fp16
          title: Precision
          description: Mixed-precision dtype for training. bf16 recommended for Ampere+.
          default: bf16
      additionalProperties: false
      type: object
      title: HardwareSpec
    IntegrationsSpecInput:
      properties:
        wandb:
          allOf:
          - $ref: '#/components/schemas/WandbIntegration'
          description: Weights & Biases integration configuration.
        mlflow:
          allOf:
          - $ref: '#/components/schemas/MlflowIntegration'
          description: MLflow integration configuration.
      additionalProperties: false
      type: object
      title: IntegrationsSpecInput
      description: 'Third-party experiment-tracking integrations for a job spec.


        Each integration is requested by presence: omit or set a field to ``null``
        to

        disable it. Activation at training time still requires credentials/URIs

        (see compile-time warnings and runtime builders).'
    IntegrationsSpecOutput:
      properties:
        wandb:
          allOf:
          - $ref: '#/components/schemas/WandbIntegration'
          description: Weights & Biases integration configuration.
        mlflow:
          allOf:
          - $ref: '#/components/schemas/MlflowIntegration'
          description: MLflow integration configuration.
      additionalProperties: false
      type: object
      title: IntegrationsSpecOutput
      description: 'Third-party experiment-tracking integrations for a job spec.


        Each integration is requested by presence: omit or set a field to ``null``
        to

        disable it. Activation at training time still requires credentials/URIs

        (see compile-time warnings and runtime builders).'
    LoRAParams:
      properties:
        rank:
          type: integer
          exclusiveMinimum: 0.0
          title: Rank
          default: 16
        alpha:
          type: integer
          exclusiveMinimum: 0.0
          title: Alpha
          default: 32
        dropout:
          type: number
          maximum: 1.0
          minimum: 0.0
          title: Dropout
          description: LoRA dropout probability for regularization.
          default: 0.0
        merge:
          type: boolean
          title: Merge
          default: false
        target_modules:
          title: Target Modules
          items:
            type: string
          type: array
        exclude_modules:
          title: Exclude Modules
          description: Module name patterns to exclude from LoRA (e.g. ['*.out_proj']).
          items:
            type: string
          type: array
        use_triton:
          type: boolean
          title: Use Triton
          description: Use the optimized Triton LoRA kernel.
          default: true
      additionalProperties: false
      type: object
      title: LoRAParams
    MlflowIntegration:
      properties:
        experiment_name:
          title: Experiment Name
          description: MLflow experiment name (groups related runs). Defaults to output.name
            if not set.
          type: string
        name:
          title: Name
          description: MLflow run name. Defaults to job_id if not provided.
          type: string
        tags:
          title: Tags
          description: MLflow tags as key-value pairs for filtering runs.
          additionalProperties:
            type: string
          type: object
        description:
          title: Description
          description: MLflow run description.
          type: string
        tracking_uri:
          title: Tracking Uri
          description: MLflow tracking server URI (e.g., 'http://mlflow.mycompany.com:5000').
            Can also be set via MLFLOW_TRACKING_URI environment variable.
          type: string
      additionalProperties: false
      type: object
      title: MlflowIntegration
      description: 'MLflow integration configuration.


        To enable MLflow, provide a non-null ``mlflow`` object on :class:`IntegrationsSpec`.'
    ModelLoadSpec:
      properties:
        name:
          type: string
          title: Name
          description: Model entity reference. Accepts 'name' (uses the job's workspace)
            or 'workspace/name'. The plugin's run resolves this to a local path before
            training.
        max_seq_length:
          type: integer
          exclusiveMinimum: 0.0
          title: Max Seq Length
          default: 2048
        load_in_4bit:
          type: boolean
          title: Load In 4Bit
          description: bitsandbytes 4-bit. Mutex with load_in_8bit. Default for Unsloth's
            headline path.
          default: true
        load_in_8bit:
          type: boolean
          title: Load In 8Bit
          default: false
        dtype:
          type: string
          enum:
          - auto
          - bfloat16
          - float16
          - float32
          title: Dtype
          default: auto
        trust_remote_code:
          type: boolean
          title: Trust Remote Code
          default: false
        device_map:
          anyOf:
          - type: string
          - type: integer
          - additionalProperties:
              type: integer
            type: object
          title: Device Map
          description: "Device placement forwarded to FastLanguageModel.from_pretrained.\
            \ Omit (null) to pin the whole model to the single visible GPU ({'': 0})\
            \ \u2014 the right default for this single-GPU backend, and it avoids\
            \ accelerate's auto-placement under-sizing GPU memory on unified-memory\
            \ parts (e.g. GB10 / DGX Spark), which otherwise spills layers to CPU\
            \ and aborts 4-bit loads. Set 'auto', 'balanced', 'sequential', a device\
            \ index, or a custom map for multi-device experiments."
        rope_scaling:
          title: Rope Scaling
          description: 'RoPE scaling config for long-context extension, passed to
            FastLanguageModel.from_pretrained (e.g. {''type'': ''linear'', ''factor'':
            2.0}). None uses the model''s native context length.'
          additionalProperties: true
          type: object
      additionalProperties: false
      type: object
      required:
      - name
      title: ModelLoadSpec
      description: 'Args to ``FastLanguageModel.from_pretrained``.


        ``name`` is a NeMo Platform model entity reference (``"name"`` or

        ``"workspace/name"``). The plugin''s run orchestration resolves the

        entity, downloads its fileset to a local path, and hands that path

        to :func:`train_sft`.'
    OptimizerSpec:
      properties:
        learning_rate:
          type: number
          exclusiveMinimum: 0.0
          title: Learning Rate
          default: 5.0e-06
        min_learning_rate:
          title: Min Learning Rate
          description: Minimum learning rate for the cosine decay schedule.
          type: number
          minimum: 0.0
        weight_decay:
          type: number
          minimum: 0.0
          title: Weight Decay
          default: 0.01
        adam_beta1:
          type: number
          exclusiveMaximum: 1.0
          minimum: 0.0
          title: Adam Beta1
          description: Adam optimizer beta1.
          default: 0.9
        adam_beta2:
          type: number
          exclusiveMaximum: 1.0
          minimum: 0.0
          title: Adam Beta2
          description: Adam optimizer beta2.
          default: 0.999
        warmup_steps:
          type: integer
          minimum: 0.0
          title: Warmup Steps
          default: 0
        adam_eps:
          type: number
          exclusiveMinimum: 0.0
          title: Adam Eps
          description: Adam/AdamW epsilon for numerical stability.
          default: 1.0e-08
        optimizer:
          type: string
          enum:
          - Adam
          - AdamW
          title: Optimizer
          description: Optimizer algorithm.
          default: Adam
        lr_decay_style:
          type: string
          enum:
          - cosine
          - linear
          - constant
          title: Lr Decay Style
          description: Learning-rate decay schedule.
          default: cosine
      additionalProperties: false
      type: object
      title: OptimizerSpec
    OptimizerType:
      type: string
      enum:
      - adamw_with_cosine_annealing
      - adam_with_cosine_annealing
      - adamw_with_flat_lr
      - adam_with_flat_lr
      title: OptimizerType
      description: Optimizer and scheduler combination types.
    OutputRequest:
      properties:
        name:
          type: string
          title: Name
        description:
          title: Description
          type: string
      additionalProperties: false
      type: object
      required:
      - name
      title: OutputRequest
    OutputResponse:
      properties:
        name:
          type: string
          title: Name
        type:
          type: string
          enum:
          - model
          - adapter
          title: Type
        fileset:
          type: string
          title: Fileset
        description:
          title: Description
          type: string
      additionalProperties: false
      type: object
      required:
      - name
      - type
      - fileset
      title: OutputResponse
    PaginationData:
      properties:
        page:
          type: integer
          title: Page
          description: The current page number.
        page_size:
          type: integer
          title: Page Size
          description: The page size used for the query.
        current_page_size:
          type: integer
          title: Current Page Size
          description: The size for the current page.
        total_pages:
          type: integer
          title: Total Pages
          description: The total number of pages.
        total_results:
          type: integer
          title: Total Results
          description: The total number of results.
      type: object
      required:
      - page
      - page_size
      - current_page_size
      - total_pages
      - total_results
      title: PaginationData
    ParallelismParams:
      properties:
        num_gpus_per_node:
          type: integer
          exclusiveMinimum: 0.0
          title: Num Gpus Per Node
          description: Number of GPUs per node.
          default: 1
        num_nodes:
          type: integer
          exclusiveMinimum: 0.0
          title: Num Nodes
          description: "Number of nodes (>1 \u2192 multi-node Ray cluster)."
          default: 1
        tensor_parallel_size:
          type: integer
          exclusiveMinimum: 0.0
          title: Tensor Parallel Size
          description: Tensor parallel size.
          default: 1
        pipeline_parallel_size:
          type: integer
          exclusiveMinimum: 0.0
          title: Pipeline Parallel Size
          description: Pipeline parallel size.
          default: 1
        context_parallel_size:
