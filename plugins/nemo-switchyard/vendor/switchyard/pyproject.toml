# Vendored subset of github.com/NVIDIA-dev/switchyard at commit
# 94079222829d67fa278ac5b50799c8162e4c0409.
#
# Only `switchyard.lib` and `switchyard.telemetry` are vendored — the CLI,
# server, and experimental subpackages from upstream are omitted because
# Platform does not depend on them.

[build-system]
requires = ["setuptools>=77.0"]
build-backend = "setuptools.build_meta"

[project]
name = "switchyard-vendored"
version = "0.1.0+vendored.9407922"
description = "Vendored subset of Switchyard (lib + telemetry) for the NeMo Platform nemo-switchyard plugin"
readme = "README.md"
license = "Apache-2.0"
requires-python = ">=3.10"
authors = [{ name = "NVIDIA Corporation" }]
dependencies = [
    "openai>=2.34.0,<3.0",
    "anthropic>=0.99.0,<1.0",
    "httpx>=0.28.1,<1.0",
    "pydantic>=2.13.3,<3.0",
]

[tool.setuptools.packages.find]
include = ["switchyard*"]
