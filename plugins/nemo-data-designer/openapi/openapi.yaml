          type: string
          const: image
          title: Generation Type
          default: image
        max_parallel_requests:
          type: integer
          minimum: 1.0
          title: Max Parallel Requests
          default: 4
        timeout:
          title: Timeout
          type: integer
          minimum: 1.0
        extra_body:
          title: Extra Body
          additionalProperties: true
          type: object
      additionalProperties: false
      type: object
      title: ImageInferenceParams
      description: "Configuration for image generation models.\n\nWorks for both diffusion\
        \ and autoregressive image generation models. Pass all model-specific image\
        \ options via `extra_body`.\n\nAttributes:\n    generation_type: Type of generation,\
        \ always \"image\" for this class.\n\nExample:\n    ```python\n    # OpenAI-style\
        \ (DALL\xB7E): quality and size in extra_body or as top-level kwargs\n   \
        \ dd.ImageInferenceParams(\n        extra_body={\"size\": \"1024x1024\", \"\
        quality\": \"hd\"}\n    )\n\n    # Gemini-style: generationConfig.imageConfig\n\
        \    dd.ImageInferenceParams(\n        extra_body={\n            \"generationConfig\"\
        : {\n                \"imageConfig\": {\n                    \"aspectRatio\"\
        : \"1:1\",\n                    \"imageSize\": \"1024\"\n                }\n\
        \            }\n        }\n    )\n    ```"
    IndexRange:
      properties:
        start:
          type: integer
          minimum: 0.0
          title: Start
          description: The start index of the index range (inclusive)
        end:
          type: integer
          minimum: 0.0
          title: End
          description: The end index of the index range (inclusive)
      additionalProperties: false
      type: object
      required:
      - start
      - end
      title: IndexRange
    InequalityOperator:
      type: string
      enum:
      - lt
      - le
      - gt
      - ge
      title: InequalityOperator
    JudgeScoreProfilerConfig:
