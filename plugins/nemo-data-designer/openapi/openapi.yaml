      description: "Parameters for sampling synthetic person data with demographic\
        \ attributes from Faker.\n\nUses the Faker library to generate random personal\
        \ information. The data is basic and not demographically\naccurate, but is\
        \ useful for quick testing, prototyping, or when realistic demographic distributions\
        \ are not\nrelevant for your use case. For demographically accurate person\
        \ data, use the `PersonSamplerParams` sampler.\n\nAttributes:\n    locale:\
        \ Locale string determining the language and geographic region for synthetic\
        \ people.\n        Can be any locale supported by Faker.\n    sex: If specified,\
        \ filters to only sample people of the specified sex. Options: \"Male\" or\n\
        \        \"Female\". If None, samples both sexes.\n    city: If specified,\
        \ filters to only sample people from the specified city or cities. Can be\n\
        \        a single city name (string) or a list of city names.\n    age_range:\
        \ Two-element list [min_age, max_age] specifying the age range to sample from\n\
        \        (inclusive). Defaults to a standard age range. Both values must be\
        \ between the minimum and\n        maximum allowed ages.\n    sampler_type:\
        \ Discriminator for the sampler type. Must be `SamplerType.PERSON_FROM_FAKER`."
