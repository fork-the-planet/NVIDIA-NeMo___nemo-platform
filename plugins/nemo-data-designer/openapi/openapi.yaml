      title: LLMStructuredColumnConfig
      description: "Configuration for structured JSON generation columns using Large\
        \ Language Models.\n\nExtends LLMTextColumnConfig to generate structured data\
        \ conforming to a specified schema.\nUses JSON schema or Pydantic models to\
        \ define the expected output structure, enabling\ntype-safe and validated\
        \ structured output generation. Inherits prompt templating capabilities\n\
        from LLMTextColumnConfig.\n\nAttributes:\n    output_format (required): The\
        \ schema defining the expected output structure. Can be either:\n        -\
        \ A Pydantic BaseModel class (recommended)\n        - A JSON schema dictionary\n\
        \nInherited Attributes:\n    name (required): Unique name of the column to\
        \ be generated.\n    prompt (required): Prompt template for structured generation\
        \ (supports Jinja2).\n    model_alias (required): Alias of the model configuration\
        \ to use.\n    system_prompt: Optional system prompt (supports Jinja2).\n\
