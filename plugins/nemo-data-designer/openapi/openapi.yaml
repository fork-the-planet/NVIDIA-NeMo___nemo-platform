      title: LLMTextColumnConfig
      description: "Configuration for text generation columns using Large Language\
        \ Models.\n\nLLM text columns generate free-form text content using language\
        \ models.\nPrompts support Jinja2 templating to reference values from other\
        \ columns, enabling\ncontext-aware generation. The generated text can optionally\
        \ include message traces\ncapturing the full conversation history.\n\nAttributes:\n\
        \    prompt (required): Prompt template for text generation. Supports Jinja2\
        \ syntax to\n        reference other columns (e.g., \"Write a story about\
        \ {{ character_name }}\").\n        Must be a valid Jinja2 template.\n   \
        \ model_alias (required): Alias of the model configuration to use for generation.\n\
        \        Must match a model alias defined when initializing the DataDesignerConfigBuilder.\n\
        \    system_prompt: Optional system prompt to set model behavior and constraints.\n\
        \        Also supports Jinja2 templating. If provided, must be a valid Jinja2\
        \ template.\n        Do not put any output parsing instructions in the system\
        \ prompt. Instead,\n        use the appropriate column type for the output\
        \ you want to generate - e.g.,\n        `LLMStructuredColumnConfig` for structured\
        \ output, `LLMCodeColumnConfig` for code.\n    multi_modal_context: Optional\
        \ list of multimodal contexts for generation.\n        Enables capable models\
        \ to generate text based on image, audio, or video inputs.\n    tool_alias:\
        \ Optional alias of the tool configuration to use for MCP tool calls.\n  \
        \      Must match a tool alias defined when initializing the DataDesignerConfigBuilder.\n\
        \        When provided, the model may call permitted tools during generation.\n\
        \    with_trace: Specifies what trace information to capture in a `{column_name}__trace`\n\
        \        column. Options are:\n        - `TraceType.NONE` (default): No trace\
        \ is captured.\n        - `TraceType.LAST_MESSAGE`: Only the final assistant\
        \ message is captured.\n        - `TraceType.ALL_MESSAGES`: Full conversation\
        \ history (system/user/assistant/tool).\n    extract_reasoning_content: If\
        \ True, creates a `{column_name}__reasoning_content` column\n        containing\
        \ only the reasoning_content from the final assistant response. This is\n\
        \        useful for models that expose chain-of-thought reasoning separately\
        \ from the main\n        response. Defaults to False.\n\nInherited Attributes:\n\
        \    name (required): Unique name of the column to be generated.\n    drop:\
        \ If True, generate this column but remove it from the final dataset."
