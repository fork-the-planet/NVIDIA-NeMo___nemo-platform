            - $ref: '#/components/schemas/VideoContext'
            discriminator:
              propertyName: modality
              mapping:
                audio: '#/components/schemas/AudioContext'
                image: '#/components/schemas/ImageContext'
                video: '#/components/schemas/VideoContext'
          type: array
      additionalProperties: false
      type: object
      required:
      - name
      - prompt
      - model_alias
      title: ImageColumnConfig
      description: "Configuration for image generation columns.\n\nImage columns generate\
        \ images using either autoregressive or diffusion models.\nThe API used is\
        \ automatically determined based on the model name:\n\nAttributes:\n    prompt\
        \ (required): Prompt template for image generation. Supports Jinja2 templating\
        \ to\n        reference other columns (e.g., \"Generate an image of a {{ character_name\
        \ }}\").\n        Must be a valid Jinja2 template.\n    model_alias (required):\
        \ The model to use for image generation.\n    multi_modal_context: Optional\
        \ list of multimodal contexts for generation.\n        Enables autoregressive\
        \ multimodal models to generate images based on image, audio, or video inputs.\n\
        \        Ignored by diffusion image-generation routes, which do not consume\
        \ multimodal context.\n\nInherited Attributes:\n    name (required): Unique\
        \ name of the column to be generated.\n    drop: If True, generate this column\
        \ but remove it from the final dataset."
    ImageContext:
      properties:
        modality:
          type: string
          const: image
          title: Modality
          default: image
        column_name:
          type: string
          title: Column Name
        data_type:
          $ref: '#/components/schemas/ModalityDataType'
        image_format:
          $ref: '#/components/schemas/ImageFormat'
      type: object
      required:
      - column_name
      title: ImageContext
      description: "Configuration for providing image context to multimodal models.\n\
        \nAttributes:\n    modality: The modality type (always \"image\").\n    column_name:\
        \ Name of the column containing image data.\n    data_type: Format of the\
        \ image data (\"url\", \"base64\", or None for auto-detection).\n        When\
        \ None, the format is auto-detected: URLs are passed through, file paths that\n\
        \        exist under base_path are loaded as base64, and other values are\
