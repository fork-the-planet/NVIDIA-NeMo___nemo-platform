      additionalProperties: false
      type: object
      required:
      - model_alias
      title: JudgeScoreProfilerConfig
      description: "Configuration for the LLM-as-a-judge score profiler.\n\nAttributes:\n\
        \    model_alias: Alias of the LLM model to use for generating score distribution\
        \ summaries.\n        Must match a model alias defined in the Data Designer\
        \ configuration.\n    summary_score_sample_size: Number of score samples to\
        \ include when prompting the LLM\n        to generate summaries. Larger sample\
        \ sizes provide more context but increase\n        token usage. Must be at\
        \ least 1 when provided. Set to None to skip LLM-generated\n        summaries.\
        \ Defaults to 20."
    LLMCodeColumnConfig:
      properties:
        name:
          type: string
          title: Name
        drop:
