    RemoteValidatorParams:
      properties:
        validator_type:
          type: string
          const: remote
          title: Validator Type
          description: Validator type discriminator, always 'remote' for this validator
          default: remote
        endpoint_url:
          type: string
          title: Endpoint Url
          description: URL of the remote endpoint
        output_schema:
          title: Output Schema
          description: Expected schema for remote validator's output
          additionalProperties: true
          type: object
        timeout:
          type: number
          exclusiveMinimum: 0.0
          title: Timeout
          description: The timeout for the HTTP request
          default: 30.0
        max_retries:
          type: integer
          minimum: 0.0
          title: Max Retries
          description: The maximum number of retry attempts
          default: 3
        retry_backoff:
          type: number
          exclusiveMinimum: 1.0
          title: Retry Backoff
          description: The backoff factor for the retry delay
          default: 2.0
        max_parallel_requests:
          type: integer
          minimum: 1.0
          title: Max Parallel Requests
          description: The maximum number of parallel requests to make
          default: 4
      additionalProperties: false
      type: object
      required:
      - endpoint_url
      title: RemoteValidatorParams
      description: "Configuration for remote validation. Sends data to a remote endpoint\
        \ for validation.\n\nAttributes:\n    endpoint_url (required): The URL of\
        \ the remote endpoint.\n    output_schema: The JSON schema for the remote\
        \ validator's output. If not provided,\n        the output will not be validated.\n\
        \    timeout: The timeout for the HTTP request in seconds. Defaults to 30.0.\n\
        \    max_retries: The maximum number of retry attempts. Defaults to 3.\n \
        \   retry_backoff: The backoff factor for the retry delay in seconds. Defaults\
        \ to 2.0.\n    max_parallel_requests: The maximum number of parallel requests\
        \ to make. Defaults to 4."
    SamplerColumnConfig:
      properties:
        name:
          type: string
          title: Name
        drop:
          type: boolean
          title: Drop
          default: false
        allow_resize:
          type: boolean
          title: Allow Resize
          default: false
        column_type:
          type: string
          const: sampler
          title: Column Type
          default: sampler
        skip:
          $ref: '#/components/schemas/SkipConfig'
        propagate_skip:
          type: boolean
          title: Propagate Skip
          description: "If True (default), this column auto-skips when any of its\
            \ required_columns was skipped. Independent of skip \u2014 a column with\
            \ no SkipConfig still propagates upstream skips. Set to False for null-tolerant\
            \ columns."
          default: true
        sampler_type:
          allOf:
          - $ref: '#/components/schemas/SamplerType'
          description: Type of sampler to use (e.g., uuid, category, uniform, gaussian,
            person, datetime)
        params:
          oneOf:
          - $ref: '#/components/schemas/SubcategorySamplerParams'
          - $ref: '#/components/schemas/CategorySamplerParams'
          - $ref: '#/components/schemas/DatetimeSamplerParams'
          - $ref: '#/components/schemas/PersonSamplerParams'
          - $ref: '#/components/schemas/PersonFromFakerSamplerParams'
          - $ref: '#/components/schemas/TimeDeltaSamplerParams'
          - $ref: '#/components/schemas/UUIDSamplerParams'
          - $ref: '#/components/schemas/BernoulliSamplerParams'
          - $ref: '#/components/schemas/BernoulliMixtureSamplerParams'
          - $ref: '#/components/schemas/BinomialSamplerParams'
          - $ref: '#/components/schemas/GaussianSamplerParams'
          - $ref: '#/components/schemas/PoissonSamplerParams'
          - $ref: '#/components/schemas/UniformSamplerParams'
          - $ref: '#/components/schemas/ScipySamplerParams'
          title: Params
          description: Parameters specific to the chosen sampler type
          discriminator:
            propertyName: sampler_type
            mapping:
              bernoulli: '#/components/schemas/BernoulliSamplerParams'
              bernoulli_mixture: '#/components/schemas/BernoulliMixtureSamplerParams'
              binomial: '#/components/schemas/BinomialSamplerParams'
              category: '#/components/schemas/CategorySamplerParams'
              datetime: '#/components/schemas/DatetimeSamplerParams'
              gaussian: '#/components/schemas/GaussianSamplerParams'
              person: '#/components/schemas/PersonSamplerParams'
              person_from_faker: '#/components/schemas/PersonFromFakerSamplerParams'
              poisson: '#/components/schemas/PoissonSamplerParams'
              scipy: '#/components/schemas/ScipySamplerParams'
              subcategory: '#/components/schemas/SubcategorySamplerParams'
              timedelta: '#/components/schemas/TimeDeltaSamplerParams'
              uniform: '#/components/schemas/UniformSamplerParams'
              uuid: '#/components/schemas/UUIDSamplerParams'
        conditional_params:
          additionalProperties:
            oneOf:
            - $ref: '#/components/schemas/SubcategorySamplerParams'
            - $ref: '#/components/schemas/CategorySamplerParams'
            - $ref: '#/components/schemas/DatetimeSamplerParams'
            - $ref: '#/components/schemas/PersonSamplerParams'
            - $ref: '#/components/schemas/PersonFromFakerSamplerParams'
            - $ref: '#/components/schemas/TimeDeltaSamplerParams'
            - $ref: '#/components/schemas/UUIDSamplerParams'
            - $ref: '#/components/schemas/BernoulliSamplerParams'
            - $ref: '#/components/schemas/BernoulliMixtureSamplerParams'
            - $ref: '#/components/schemas/BinomialSamplerParams'
            - $ref: '#/components/schemas/GaussianSamplerParams'
            - $ref: '#/components/schemas/PoissonSamplerParams'
            - $ref: '#/components/schemas/UniformSamplerParams'
            - $ref: '#/components/schemas/ScipySamplerParams'
            discriminator:
              propertyName: sampler_type
              mapping:
                bernoulli: '#/components/schemas/BernoulliSamplerParams'
                bernoulli_mixture: '#/components/schemas/BernoulliMixtureSamplerParams'
                binomial: '#/components/schemas/BinomialSamplerParams'
                category: '#/components/schemas/CategorySamplerParams'
                datetime: '#/components/schemas/DatetimeSamplerParams'
                gaussian: '#/components/schemas/GaussianSamplerParams'
                person: '#/components/schemas/PersonSamplerParams'
                person_from_faker: '#/components/schemas/PersonFromFakerSamplerParams'
                poisson: '#/components/schemas/PoissonSamplerParams'
                scipy: '#/components/schemas/ScipySamplerParams'
                subcategory: '#/components/schemas/SubcategorySamplerParams'
                timedelta: '#/components/schemas/TimeDeltaSamplerParams'
                uniform: '#/components/schemas/UniformSamplerParams'
                uuid: '#/components/schemas/UUIDSamplerParams'
          type: object
          title: Conditional Params
          description: Optional dictionary for conditional parameters; keys are conditions,
            values are params to use when met
        convert_to:
          title: Convert To
          description: 'Optional type conversion after sampling: ''float'', ''int'',
            or ''str'' for numerical samplers; a strftime format string (e.g., ''%Y-%m-%d'')
            for datetime/timedelta samplers. Datetime/timedelta columns default to
            ISO-8601 (e.g., 2024-01-15T09:30:00) when omitted.'
          type: string
      additionalProperties: false
      type: object
      required:
      - name
      - sampler_type
      - params
      title: SamplerColumnConfig
      description: "Configuration for columns generated using built-in samplers.\n\
        \nSampler columns provide efficient data generation for common data types\
        \ and\ndistributions. Supported samplers include UUID generation,\ndatetime/timedelta\
        \ sampling, person generation, category / subcategory sampling,\nand various\
        \ statistical distributions (uniform, gaussian, binomial, poisson, scipy).\n\
        \nAttributes:\n    sampler_type (required): Type of sampler to use. Available\
        \ types include:\n        \"uuid\", \"category\", \"subcategory\", \"uniform\"\
        , \"gaussian\", \"bernoulli\",\n        \"bernoulli_mixture\", \"binomial\"\
        , \"poisson\", \"scipy\", \"person\",\n        \"person_from_faker\", \"datetime\"\
        , \"timedelta\".\n    params (required): Parameters specific to the chosen\
        \ sampler type. Type varies based on the `sampler_type`\n        (e.g., `CategorySamplerParams`,\
        \ `UniformSamplerParams`, `PersonSamplerParams`).\n    conditional_params:\
        \ Optional dictionary for conditional parameters. The dict keys\n        are\
        \ the conditions that must be met (e.g., \"age > 21\") for the conditional\
        \ parameters\n        to be used. The values of dict are the parameters to\
        \ use when the condition is met.\n    convert_to: Optional type conversion\
        \ to apply after sampling. For numerical samplers,\n        must be one of\
        \ \"float\", \"int\", or \"str\". For datetime and timedelta samplers, accepts\n\
        \        a strftime format string (e.g., ``\"%Y-%m-%d\"``, ``\"%m/%d/%Y %H:%M\"\
        ``). When omitted,\n        datetime/timedelta columns default to ISO-8601\
        \ format (e.g., ``2024-01-15T09:30:00``).\n\nInherited Attributes:\n    name\
        \ (required): Unique name of the column to be generated.\n    drop: If True,\
        \ generate this column but remove it from the final dataset.\n\n!!! tip \"\
        Displaying available samplers and their parameters\"\n    The config builder\
        \ has an `info` attribute that can be used to display the\n    available samplers\
        \ and their parameters:\n    ```python\n    config_builder.info.display(\"\
        samplers\")\n    ```"
    SamplerType:
      type: string
      enum:
      - bernoulli
      - bernoulli_mixture
      - binomial
      - category
      - datetime
      - gaussian
      - person
      - person_from_faker
      - poisson
      - scipy
      - subcategory
      - timedelta
      - uniform
      - uuid
      title: SamplerType
    SamplingStrategy:
      type: string
      enum:
      - ordered
      - shuffle
      title: SamplingStrategy
    ScalarInequalityConstraint:
      properties:
        target_column:
          type: string
          title: Target Column
          description: Name of the sampler column this constraint applies to
        constraint_type:
          type: string
          const: scalar_inequality
          title: Constraint Type
          description: Constraint type discriminator, always 'scalar_inequality' for
            this constraint
          default: scalar_inequality
        rhs:
          type: number
          title: Rhs
          description: Scalar value to compare against
        operator:
          allOf:
          - $ref: '#/components/schemas/InequalityOperator'
          description: Comparison operator
      additionalProperties: false
      type: object
      required:
      - target_column
      - rhs
      - operator
      title: ScalarInequalityConstraint
      description: "Constrain a sampler column to be less/greater than a scalar value.\n\
        \nOnly applies to sampler columns.\n\nAttributes:\n    rhs (required): Scalar\
        \ value to compare against.\n    operator (required): Comparison operator\
        \ (lt, le, gt, ge).\n\nInherited Attributes:\n    target_column (required):\
        \ Name of the sampler column this constraint applies to."
    SchemaTransformProcessorConfig:
      properties:
        name:
          type: string
          title: Name
          description: The name of the processor, used to identify the processor in
            the results and to write the artifacts to disk.
        processor_type:
          type: string
          const: schema_transform
          title: Processor Type
          default: schema_transform
        template:
          additionalProperties: true
          type: object
          title: Template
          description: "\n        Dictionary specifying columns and templates to use\
            \ in the new dataset with transformed schema.\n\n        Each key is a\
            \ new column name, and each value is an object containing Jinja2 templates\
            \ - for instance, a string or a list of strings.\n        Values must\
            \ be JSON-serializable.\n\n        Example:\n\n        ```python\n   \
            \     template = {\n            \"list_of_strings\": [\"{{ col1 }}\",\
            \ \"{{ col2 }}\"],\n            \"uppercase_string\": \"{{ col1 | upper\
            \ }}\",\n            \"lowercase_string\": \"{{ col2 | lower }}\",\n \
            \       }\n        ```\n\n        The above templates will create an new\
            \ dataset with three columns: \"list_of_strings\", \"uppercase_string\"\
            , and \"lowercase_string\".\n        References to columns \"col1\" and\
            \ \"col2\" in the templates will be replaced with the actual values of\
            \ the columns in the dataset.\n        "
      additionalProperties: false
      type: object
      required:
      - name
      - template
      title: SchemaTransformProcessorConfig
      description: "Configuration for transforming the dataset schema using Jinja2\
        \ templates.\n\nThis processor creates a new dataset with a transformed schema.\
        \ Each key in the\ntemplate becomes a column in the output, and values are\
        \ Jinja2 templates that\ncan reference any column in the batch. The transformed\
        \ dataset is written to\na `processors-files/{processor_name}/` directory\
        \ alongside the main dataset.\n\nAttributes:\n    template (required): Dictionary\
        \ defining the output schema. Keys are new column names,\n        values are\
        \ Jinja2 templates (strings, lists, or nested structures).\n        Must be\
        \ JSON-serializable.\n\nInherited Attributes:\n    name (required): Name of\
        \ the processor."
    ScipySamplerParams:
      properties:
        dist_name:
          type: string
          title: Dist Name
          description: Name of a scipy.stats distribution.
        dist_params:
          additionalProperties: true
          type: object
          title: Dist Params
          description: Parameters of the scipy.stats distribution given in `dist_name`.
        decimal_places:
          title: Decimal Places
          description: Number of decimal places to round the sampled values to.
          type: integer
        sampler_type:
          type: string
          const: scipy
          title: Sampler Type
          default: scipy
      additionalProperties: false
      type: object
      required:
      - dist_name
      - dist_params
      title: ScipySamplerParams
      description: "Parameters for sampling from any scipy.stats continuous or discrete\
        \ distribution.\n\nProvides a flexible interface to sample from the wide range\
        \ of probability distributions\navailable in scipy.stats. This enables advanced\
        \ statistical sampling beyond the built-in\ndistribution types (Gaussian,\
        \ Uniform, etc.).\n\nSee: [scipy.stats documentation](https://docs.scipy.org/doc/scipy/reference/stats.html)\n\
        \nAttributes:\n    dist_name (required): Name of the scipy.stats distribution\
        \ to sample from (e.g., \"beta\", \"gamma\",\n        \"lognorm\", \"expon\"\
        ). Must be a valid distribution name from scipy.stats.\n    dist_params (required):\
        \ Dictionary of parameters for the specified distribution. Parameter names\n\
        \        and values must match the scipy.stats distribution specification\
        \ (e.g., {\"a\": 2, \"b\": 5}\n        for beta distribution, {\"scale\":\
        \ 1.5} for exponential).\n    decimal_places: Optional number of decimal places\
        \ to round sampled values to. If None,\n        values are not rounded."
    Score:
      properties:
        name:
          type: string
          title: Name
          description: A clear name for this score.
        description:
          type: string
          title: Description
          description: An informative and detailed assessment guide for using this
            score.
        options:
          additionalProperties:
            type: string
          type: object
          title: Options
          description: 'Score options in the format of {score: description}.'
      additionalProperties: false
      type: object
      required:
      - name
      - description
      - options
      title: Score
      description: "Configuration for a \"score\" in an LLM judge evaluation.\n\n\
        Defines a single scoring criterion with its possible values and descriptions.\
        \ Multiple\nScore objects can be combined in an LLMJudgeColumnConfig to create\
        \ multi-dimensional\nquality assessments.\n\nAttributes:\n    name (required):\
        \ A clear, concise name for this scoring dimension (e.g., \"Relevance\", \"\
        Fluency\").\n    description (required): An informative and detailed assessment\
        \ guide explaining how to evaluate\n        this dimension. Should provide\
        \ clear criteria for scoring.\n    options (required): Dictionary mapping\
        \ score values to their descriptions. Keys can be integers\n        (e.g.,\
        \ 1-5 scale) or strings (e.g., \"Poor\", \"Good\", \"Excellent\"). Values\
        \ are\n        descriptions explaining what each score level means."
    SeedConfig:
      properties:
        source:
          oneOf:
          - $ref: '#/components/schemas/LocalFileSeedSource'
          - $ref: '#/components/schemas/HuggingFaceSeedSource'
          - $ref: '#/components/schemas/DataFrameSeedSource'
          - $ref: '#/components/schemas/DirectorySeedSource'
          - $ref: '#/components/schemas/FileContentsSeedSource'
          - $ref: '#/components/schemas/AgentRolloutSeedSource'
          - $ref: '#/components/schemas/FilesetFileSeedSource'
          title: Source
          discriminator:
            propertyName: seed_type
            mapping:
              agent_rollout: '#/components/schemas/AgentRolloutSeedSource'
              df: '#/components/schemas/DataFrameSeedSource'
              directory: '#/components/schemas/DirectorySeedSource'
              file_contents: '#/components/schemas/FileContentsSeedSource'
              hf: '#/components/schemas/HuggingFaceSeedSource'
              local: '#/components/schemas/LocalFileSeedSource'
              nmp: '#/components/schemas/FilesetFileSeedSource'
        sampling_strategy:
          allOf:
          - $ref: '#/components/schemas/SamplingStrategy'
          default: ordered
        selection_strategy:
          anyOf:
          - $ref: '#/components/schemas/IndexRange'
          - $ref: '#/components/schemas/PartitionBlock'
          title: Selection Strategy
      additionalProperties: false
      type: object
      required:
      - source
      title: SeedConfig
      description: "Configuration for sampling data from a seed dataset.\n\nAttributes:\n\
        \    source: A SeedSource defining where the seed data exists\n    sampling_strategy:\
        \ Strategy for how to sample rows from the dataset.\n        - ORDERED: Read\
        \ rows sequentially in their original order.\n        - SHUFFLE: Randomly\
        \ shuffle rows before sampling. When used with\n          selection_strategy,\
        \ shuffling occurs within the selected range/partition.\n    selection_strategy:\
        \ Optional strategy to select a subset of the dataset.\n        - IndexRange:\
        \ Select a specific range of indices (e.g., rows 100-200).\n        - PartitionBlock:\
        \ Select a partition by splitting the dataset into N equal parts.\n      \
        \    Partition indices are zero-based (index=0 is the first partition, index=1\
        \ is\n          the second, etc.).\n\nExamples:\n    Read rows sequentially\
        \ from start to end:\n        SeedConfig(\n            source=LocalFileSeedSource(path=\"\
        my_data.parquet\"),\n            sampling_strategy=SamplingStrategy.ORDERED\n\
        \        )\n\n    Read rows in random order:\n        SeedConfig(\n      \
        \      source=LocalFileSeedSource(path=\"my_data.parquet\"),\n           \
        \ sampling_strategy=SamplingStrategy.SHUFFLE\n        )\n\n    Read specific\
        \ index range (rows 100-199):\n        SeedConfig(\n            source=LocalFileSeedSource(path=\"\
        my_data.parquet\"),\n            sampling_strategy=SamplingStrategy.ORDERED,\n\
        \            selection_strategy=IndexRange(start=100, end=199)\n        )\n\
        \n    Read random rows from a specific index range (shuffles within rows 100-199):\n\
        \        SeedConfig(\n            source=LocalFileSeedSource(path=\"my_data.parquet\"\
        ),\n            sampling_strategy=SamplingStrategy.SHUFFLE,\n            selection_strategy=IndexRange(start=100,\
        \ end=199)\n        )\n\n    Read from partition 2 (3rd partition, zero-based)\
        \ of 5 partitions (20% of dataset):\n        SeedConfig(\n            source=LocalFileSeedSource(path=\"\
        my_data.parquet\"),\n            sampling_strategy=SamplingStrategy.ORDERED,\n\
        \            selection_strategy=PartitionBlock(index=2, num_partitions=5)\n\
        \        )\n\n    Read shuffled rows from partition 0 of 10 partitions (shuffles\
        \ within the partition):\n        SeedConfig(\n            source=LocalFileSeedSource(path=\"\
        my_data.parquet\"),\n            sampling_strategy=SamplingStrategy.SHUFFLE,\n\
        \            selection_strategy=PartitionBlock(index=0, num_partitions=10)\n\
        \        )"
    SeedDatasetColumnConfig:
      properties:
        name:
          type: string
          title: Name
        drop:
          type: boolean
          title: Drop
          default: false
        allow_resize:
          type: boolean
          title: Allow Resize
          default: false
        column_type:
          type: string
          const: seed-dataset
          title: Column Type
          default: seed-dataset
        skip:
          $ref: '#/components/schemas/SkipConfig'
        propagate_skip:
          type: boolean
          title: Propagate Skip
          description: "If True (default), this column auto-skips when any of its\
            \ required_columns was skipped. Independent of skip \u2014 a column with\
            \ no SkipConfig still propagates upstream skips. Set to False for null-tolerant\
            \ columns."
          default: true
      additionalProperties: false
      type: object
      required:
      - name
      title: SeedDatasetColumnConfig
      description: "Configuration for columns sourced from seed datasets.\n\nThis\
        \ config marks columns that come from seed data. It is typically created\n\
        automatically when calling `with_seed_dataset()` on the builder, rather than\n\
        being instantiated directly by users.\n\nInherited Attributes:\n    name (required):\
        \ Unique name of the column to be generated.\n    drop: If True, generate\
        \ this column but remove it from the final dataset."
    SkipConfig:
      properties:
        when:
          type: string
          title: When
          description: Jinja2 expression (including {{ }} delimiters); when truthy,
            skip generation for this row.
        value:
          anyOf:
          - type: boolean
          - type: integer
          - type: number
          - type: string
          title: Value
          description: Value to write for skipped cells. Defaults to None (becomes
            NaN/pd.NA in DataFrame).
      additionalProperties: false
      type: object
      required:
      - when
      title: SkipConfig
      description: "Expression gate for conditional column generation.\n\nAttach to\
        \ a ``SingleColumnConfig`` via ``skip=SkipConfig(...)`` to gate\ngeneration\
        \ on a Jinja2 expression.  Controls *when* to skip; propagation\nof upstream\
        \ skips is controlled separately by ``propagate_skip`` on\n``SingleColumnConfig``.\n\
        \nAttributes:\n    when: Jinja2 expression (including ``{{ }}`` delimiters);\
        \ when truthy,\n        skip generation for this row.\n    value: Value to\
        \ write for skipped cells.  Defaults to ``None``\n        (becomes ``NaN``/``pd.NA``\
        \ in the DataFrame)."
    StringFilter:
      additionalProperties: false
      properties:
        $eq:
          description: Filter for results equal to this value.
          title: $Eq
          type: string
        $like:
          description: Filter for results matching this pattern.
          title: $Like
          type: string
        $in:
          description: Filter for results in this list of values.
          title: $In
          items:
            type: string
          type: array
        $nin:
          description: Filter for results not in this list of values.
          title: $Nin
          items:
            type: string
          type: array
      title: StringFilter
      type: object
    SubcategorySamplerParams:
      properties:
        category:
          type: string
          title: Category
          description: Name of parent category to this subcategory.
        values:
          additionalProperties:
            items:
              anyOf:
              - type: string
              - type: integer
              - type: number
            type: array
          type: object
          title: Values
          description: Mapping from each value of parent category to a list of subcategory
            values.
        sampler_type:
          type: string
          const: subcategory
          title: Sampler Type
          default: subcategory
      additionalProperties: false
      type: object
      required:
      - category
      - values
      title: SubcategorySamplerParams
      description: "Parameters for subcategory sampling conditioned on a parent category\
        \ column.\n\nSamples subcategory values based on the value of a parent category\
        \ column. Each parent\ncategory value maps to its own list of possible subcategory\
        \ values, enabling hierarchical\nor conditional sampling patterns.\n\nAttributes:\n\
        \    category (required): Name of the parent category column that this subcategory\
        \ depends on.\n        The parent column must be generated before this subcategory\
        \ column.\n    values (required): Mapping from each parent category value\
        \ to a list of possible subcategory values.\n        Each key must correspond\
        \ to a value that appears in the parent category column."
    TimeDeltaSamplerParams:
      properties:
        dt_min:
          type: integer
          minimum: 0.0
          title: Dt Min
          description: Minimum possible time-delta for sampling range, inclusive.
            Must be less than `dt_max`.
        dt_max:
          type: integer
          exclusiveMinimum: 0.0
          title: Dt Max
          description: Maximum possible time-delta for sampling range, exclusive.
            Must be greater than `dt_min`.
        reference_column_name:
          type: string
          title: Reference Column Name
          description: Name of an existing datetime column to condition time-delta
            sampling on.
        unit:
          type: string
          enum:
          - D
          - h
          - m
          - s
          title: Unit
          description: Sampling units, e.g. the smallest possible time interval between
            samples.
          default: D
        sampler_type:
          type: string
          const: timedelta
          title: Sampler Type
          default: timedelta
      additionalProperties: false
      type: object
      required:
      - dt_min
      - dt_max
      - reference_column_name
      title: TimeDeltaSamplerParams
      description: "Parameters for sampling time deltas relative to a reference datetime\
        \ column.\n\nSamples time offsets within a specified range and adds them to\
        \ values from a reference\ndatetime column. This is useful for generating\
        \ related datetime columns like order dates\nand delivery dates, or event\
        \ start times and end times.\n\nNote:\n    Years and months are not supported\
        \ as timedelta units because they have variable lengths.\n    See: [pandas\
        \ timedelta documentation](https://pandas.pydata.org/docs/user_guide/timedeltas.html)\n\
        \nAttributes:\n    dt_min (required): Minimum time-delta value (inclusive).\
        \ Must be non-negative and less than `dt_max`.\n        Specified in units\
        \ defined by the `unit` parameter.\n    dt_max (required): Maximum time-delta\
        \ value (exclusive). Must be positive and greater than `dt_min`.\n       \
        \ Specified in units defined by the `unit` parameter.\n    reference_column_name\
        \ (required): Name of an existing datetime column to add the time-delta to.\n\
        \        This column must be generated before the timedelta column.\n    unit:\
        \ Time unit for the delta values. Options:\n        - \"D\": Days (default)\n\
        \        - \"h\": Hours\n        - \"m\": Minutes\n        - \"s\": Seconds"
    ToolConfig:
      properties:
        tool_alias:
          type: string
          title: Tool Alias
        providers:
          items:
            type: string
          type: array
          title: Providers
        allow_tools:
          title: Allow Tools
          items:
            type: string
          type: array
        max_tool_call_turns:
          type: integer
          minimum: 1.0
          title: Max Tool Call Turns
          default: 5
        timeout_sec:
          title: Timeout Sec
          type: number
          exclusiveMinimum: 0.0
      additionalProperties: false
      type: object
      required:
      - tool_alias
      - providers
      title: ToolConfig
      description: "Configuration for permitting MCP tools on an LLM column.\n\nToolConfig\
        \ defines which tools are available for use during LLM generation.\nIt references\
        \ one or more MCP providers by name and can optionally restrict\nwhich tools\
        \ from those providers are permitted.\n\nAttributes:\n    tool_alias (str):\
        \ User-defined alias to reference this tool configuration in column configs.\n\
        \    providers (list[str]): Names of the MCP providers to use for tool calls.\
        \ Tools can be\n        drawn from multiple providers.\n    allow_tools (list[str]\
        \ | None): Optional allowlist of tool names that restricts which\n       \
        \ tools are permitted. If None, all tools from the specified providers are\
        \ allowed.\n        Defaults to None.\n    max_tool_call_turns (int): Maximum\
        \ number of tool-calling turns permitted in a single\n        generation.\
        \ A turn is one iteration where the LLM requests tool calls. With parallel\n\
        \        tool calling, a single turn may execute multiple tools simultaneously.\
        \ Defaults to 5.\n    timeout_sec (float | None): Timeout in seconds for MCP\
        \ tool calls. Defaults to None (no timeout).\n\nExamples:\n    >>> ToolConfig(\n\
        \    ...     tool_alias=\"search-tools\",\n    ...     providers=[\"doc-search-mcp\"\
        , \"web-search-mcp\"],\n    ...     allow_tools=[\"search_docs\", \"list_docs\"\
        ],\n    ...     max_tool_call_turns=10,\n    ...     timeout_sec=30.0,\n \
        \   ... )"
    TraceType:
      type: string
      enum:
      - none
      - last_message
      - all_messages
      title: TraceType
      description: "Specifies the type of reasoning trace to capture for LLM columns.\n\
        \nTraces capture the conversation history during LLM generation, which is\n\
        useful for debugging, analysis, and understanding model behavior.\n\nAttributes:\n\
        \    NONE: No trace is captured. This is the default.\n    LAST_MESSAGE: Only\
        \ the final assistant message is captured.\n    ALL_MESSAGES: The full conversation\
        \ history (system/user/assistant/tool)\n        is captured."
    UUIDSamplerParams:
      properties:
        prefix:
          title: Prefix
          description: String prepended to the front of the UUID.
          type: string
        short_form:
          type: boolean
          title: Short Form
          description: If true, all UUIDs sampled will be truncated at 8 characters.
          default: false
        uppercase:
          type: boolean
          title: Uppercase
          description: If true, all letters in the UUID will be capitalized.
          default: false
        sampler_type:
          type: string
          const: uuid
          title: Sampler Type
          default: uuid
      additionalProperties: false
      type: object
      title: UUIDSamplerParams
      description: "Parameters for generating UUID (Universally Unique Identifier)\
        \ values.\n\nGenerates UUID4 (random) identifiers with optional formatting\
        \ options. UUIDs are useful\nfor creating unique identifiers for records,\
        \ entities, or transactions.\n\nAttributes:\n    prefix: Optional string to\
        \ prepend to each UUID. Useful for creating namespaced or\n        typed identifiers\
        \ (e.g., \"user-\", \"order-\", \"txn-\").\n    short_form: If True, truncates\
        \ UUIDs to 8 characters (first segment only). Default is False\n        for\
        \ full 32-character UUIDs (excluding hyphens).\n    uppercase: If True, converts\
        \ all hexadecimal letters to uppercase. Default is False for\n        lowercase\
        \ UUIDs."
    UniformDistribution:
      properties:
        distribution_type:
          allOf:
          - $ref: '#/components/schemas/DistributionType'
          default: uniform
        params:
          $ref: '#/components/schemas/UniformDistributionParams'
      additionalProperties: false
      type: object
      required:
      - params
      title: UniformDistribution
      description: "Uniform distribution for sampling inference parameters.\n\nSamples\
        \ values uniformly between low and high bounds. Useful for exploring\na continuous\
        \ range of values for temperature or top_p.\n\nAttributes:\n    distribution_type:\
        \ Type of distribution (\"uniform\").\n    params: Distribution parameters\
        \ (low, high)."
    UniformDistributionParams:
      properties:
        low:
          type: number
          title: Low
        high:
          type: number
          title: High
      additionalProperties: false
      type: object
      required:
      - low
      - high
      title: UniformDistributionParams
      description: "Parameters for uniform distribution sampling.\n\nAttributes:\n\
        \    low: Lower bound (inclusive).\n    high: Upper bound (exclusive)."
    UniformSamplerParams:
      properties:
        low:
          type: number
          title: Low
          description: Lower bound of the uniform distribution, inclusive.
        high:
          type: number
          title: High
          description: Upper bound of the uniform distribution.
        decimal_places:
          title: Decimal Places
          description: Number of decimal places to round the sampled values to.
          type: integer
        sampler_type:
          type: string
          const: uniform
          title: Sampler Type
          default: uniform
      additionalProperties: false
      type: object
      required:
      - low
      - high
      title: UniformSamplerParams
      description: "Parameters for sampling from a continuous Uniform distribution.\n\
        \nSamples continuous values uniformly from a specified range, where every\
        \ value in the range\nhas equal probability of being sampled. This is useful\
        \ when all values within a range are\nequally likely, such as random percentages,\
        \ proportions, or unbiased measurements.\n\nAttributes:\n    low (required):\
        \ Lower bound of the uniform distribution (inclusive). Can be any real number.\n\
        \    high (required): Upper bound of the uniform distribution. Must be greater\
        \ than `low`.\n    decimal_places: Optional number of decimal places to round\
        \ sampled values to. If None,\n        values are not rounded and may have\
        \ many decimal places."
    ValidationColumnConfig:
      properties:
        name:
          type: string
          title: Name
        drop:
          type: boolean
          title: Drop
          default: false
        allow_resize:
          type: boolean
          title: Allow Resize
          default: false
        column_type:
          type: string
          const: validation
          title: Column Type
          default: validation
        skip:
          $ref: '#/components/schemas/SkipConfig'
        propagate_skip:
          type: boolean
          title: Propagate Skip
          description: "If True (default), this column auto-skips when any of its\
            \ required_columns was skipped. Independent of skip \u2014 a column with\
            \ no SkipConfig still propagates upstream skips. Set to False for null-tolerant\
            \ columns."
          default: true
        target_columns:
          items:
            type: string
          type: array
          title: Target Columns
          description: List of column names to validate
        validator_type:
          allOf:
          - $ref: '#/components/schemas/ValidatorType'
          description: 'Validation method: ''code'', ''local_callable'', or ''remote'''
        validator_params:
          oneOf:
          - $ref: '#/components/schemas/CodeValidatorParams'
          - $ref: '#/components/schemas/LocalCallableValidatorParams'
          - $ref: '#/components/schemas/RemoteValidatorParams'
          title: Validator Params
          description: Validator-specific parameters (e.g., CodeValidatorParams)
          discriminator:
            propertyName: validator_type
            mapping:
              code: '#/components/schemas/CodeValidatorParams'
              local_callable: '#/components/schemas/LocalCallableValidatorParams'
              remote: '#/components/schemas/RemoteValidatorParams'
        batch_size:
          type: integer
          minimum: 1.0
          title: Batch Size
          description: Number of records to process in each batch
          default: 10
      additionalProperties: false
      type: object
      required:
      - name
      - target_columns
      - validator_type
      - validator_params
      title: ValidationColumnConfig
      description: "Configuration for validation columns that validate existing columns.\n\
        \nValidation columns execute validation logic against specified target columns\
        \ and return\nstructured results indicating pass/fail status with validation\
        \ details. Supports multiple\nvalidation strategies: code execution (Python/SQL),\
        \ local callable functions (library only),\nand remote HTTP endpoints.\n\n\
        Attributes:\n    target_columns (required): List of column names to validate.\
        \ These columns are passed to the\n        validator for validation. All target\
        \ columns must exist in the dataset\n        before validation runs.\n   \
        \ validator_type (required): The type of validator to use. Options:\n    \
        \    - \"code\": Execute code (Python or SQL) for validation. The code receives\
        \ a\n          DataFrame with target columns and must return a DataFrame with\
        \ validation results.\n        - \"local_callable\": Call a local Python function\
        \ with the data. Only supported\n          when running DataDesigner locally.\n\
        \        - \"remote\": Send data to a remote HTTP endpoint for validation.\n\
        \    validator_params (required): Parameters specific to the validator type.\
        \ Type varies by validator:\n        - CodeValidatorParams: Specifies code\
        \ language (python or SQL dialect like\n          \"sql:postgres\", \"sql:mysql\"\
        ).\n        - LocalCallableValidatorParams: Provides validation function (Callable[[pd.DataFrame],\n\
        \          pd.DataFrame]) and optional output schema for validation results.\n\
        \        - RemoteValidatorParams: Configures endpoint URL, HTTP timeout, retry\
        \ behavior\n          (max_retries, retry_backoff), and parallel request limits\
        \ (max_parallel_requests).\n    batch_size: Number of records to process in\
        \ each validation batch. Defaults to 10.\n        Larger batches are more\
        \ efficient but use more memory. Adjust based on validator\n        complexity\
        \ and available resources.\n\nInherited Attributes:\n    name (required):\
        \ Unique name of the column to be generated.\n    drop: If True, generate\
        \ this column but remove it from the final dataset."
    ValidationError:
      properties:
        loc:
          items:
            anyOf:
            - type: string
            - type: integer
          type: array
          title: Location
        msg:
          type: string
          title: Message
        type:
          type: string
          title: Error Type
        input:
          title: Input
        ctx:
          type: object
          title: Context
          additionalProperties: true
      type: object
      required:
      - loc
      - msg
      - type
      title: ValidationError
    ValidatorType:
      type: string
      enum:
      - code
      - local_callable
      - remote
      title: ValidatorType
    VideoContext:
      properties:
        modality:
          type: string
          const: video
          title: Modality
          default: video
        column_name:
          type: string
          title: Column Name
        data_type:
          $ref: '#/components/schemas/ModalityDataType'
        video_format:
          $ref: '#/components/schemas/VideoFormat'
      type: object
      required:
      - column_name
      title: VideoContext
      description: 'Configuration for providing video context to multimodal models.


        Video context values are URL or base64 media values. Local paths may be

        passed through only in explicit URL mode so colocated model endpoints can

        read them directly. ``video_format`` is consulted only for base64 sources.'
    VideoFormat:
      type: string
      enum:
      - mp4
      - mov
      - webm
      title: VideoFormat
      description: Supported video formats for video context.
