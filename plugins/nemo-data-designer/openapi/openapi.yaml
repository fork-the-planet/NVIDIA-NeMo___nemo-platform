          type: object
        with_synthetic_personas:
          type: boolean
          title: With Synthetic Personas
          description: If True, then append synthetic persona columns to each generated
            person.
          default: false
        sampler_type:
          type: string
          const: person
          title: Sampler Type
          default: person
      additionalProperties: false
      type: object
      title: PersonSamplerParams
      description: "Parameters for sampling synthetic person data with demographic\
        \ attributes.\n\nGenerates realistic synthetic person data including names,\
        \ addresses, phone numbers, and other\ndemographic information from managed\
        \ datasets. The sampler supports filtering by locale, sex, age,\ngeographic\
        \ location, and selected managed-dataset fields, and can optionally include\
        \ synthetic\npersona descriptions. For Faker-generated person data, use PersonFromFakerSamplerParams.\n\
        \nAttributes:\n    locale: Locale string determining the language and geographic\
        \ region for synthetic people.\n        Must be a locale supported by a managed\
        \ Nemotron Personas dataset. The dataset must\n        be downloaded and available\
        \ in the managed assets directory.\n    sex: If specified, filters to only\
        \ sample people of the specified sex. Options: \"Male\" or\n        \"Female\"\
        . If None, samples both sexes.\n    city: If specified, filters to only sample\
        \ people from the specified city or cities. Can be\n        a single city\
        \ name (string) or a list of city names.\n    age_range: Two-element list\
        \ [min_age, max_age] specifying the age range to sample from\n        (inclusive).\
        \ Defaults to a standard age range. Both values must be between minimum and\n\
        \        maximum allowed ages.\n    with_synthetic_personas: If True, appends\
        \ additional synthetic persona columns including\n        personality traits,\
        \ interests, and background descriptions. Only supported for certain\n   \
        \     locales with managed datasets.\n    select_field_values: Optional field-value\
        \ filters for managed datasets. Supported field\n        names are checked\
        \ against the managed person data fields."
