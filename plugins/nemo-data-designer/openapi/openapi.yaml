        model_alias:
          type: string
          title: Model Alias
          description: Alias of the model to use for image generation
        multi_modal_context:
          title: Multi Modal Context
          description: Optional list of multimodal context inputs for image generation
          items:
            oneOf:
            - $ref: '#/components/schemas/ImageContext'
