          title: Allow Resize
          default: false
        column_type:
          type: string
          const: llm-code
          title: Column Type
          default: llm-code
        skip:
          $ref: '#/components/schemas/SkipConfig'
        propagate_skip:
          type: boolean
          title: Propagate Skip
          description: "If True (default), this column auto-skips when any of its\
            \ required_columns was skipped. Independent of skip \u2014 a column with\
            \ no SkipConfig still propagates upstream skips. Set to False for null-tolerant\
            \ columns."
          default: true
        prompt:
          type: string
          title: Prompt
          description: Jinja2 template for the LLM prompt; can reference other columns
