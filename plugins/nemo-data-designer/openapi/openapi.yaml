        model_alias:
          type: string
          title: Model Alias
          description: Alias of the model configuration to use for generation
        system_prompt:
          title: System Prompt
          description: Optional system prompt to set model behavior and constraints
          type: string
        multi_modal_context:
          title: Multi Modal Context
          description: Optional list of multimodal context inputs
          items:
