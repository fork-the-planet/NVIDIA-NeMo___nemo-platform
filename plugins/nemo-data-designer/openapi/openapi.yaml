          title: Path
          description: Path to the seed data in HuggingFace. Wildcards are allowed.
            Examples include 'datasets/my-username/my-dataset/data/000_00000.parquet',
            'datasets/my-username/my-dataset/data/*.parquet', and 'datasets/my-username/my-dataset/**/*.parquet'
        token:
          title: Token
          type: string
        endpoint:
          type: string
          title: Endpoint
          default: https://huggingface.co
      type: object
      required:
      - path
      title: HuggingFaceSeedSource
    ImageColumnConfig:
      properties:
        name:
          type: string
          title: Name
        drop:
          type: boolean
          title: Drop
          default: false
        allow_resize:
          type: boolean
          title: Allow Resize
          default: false
        column_type:
          type: string
          const: image
          title: Column Type
          default: image
        skip:
          $ref: '#/components/schemas/SkipConfig'
        propagate_skip:
          type: boolean
          title: Propagate Skip
          description: "If True (default), this column auto-skips when any of its\
            \ required_columns was skipped. Independent of skip \u2014 a column with\
            \ no SkipConfig still propagates upstream skips. Set to False for null-tolerant\
            \ columns."
          default: true
        prompt:
          type: string
          title: Prompt
          description: Jinja2 template for the image generation prompt; can reference
