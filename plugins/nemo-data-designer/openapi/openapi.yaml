openapi: 3.1.0
info:
  title: data-designer (plugin)
  version: 0.0.0
paths:
  /apis/data-designer/v2/workspaces/{workspace}/jobs/create:
    post:
      tags:
      - Data Designer
      summary: Create Job
      operationId: create_job_apis_data_designer_v2_workspaces__workspace__jobs_create_post
      parameters:
      - name: workspace
        in: path
        required: true
        schema:
          type: string
          title: Workspace
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateJobRequest'
      responses:
        '201':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateJob'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    get:
      tags:
      - Data Designer
      summary: List Jobs
      operationId: list_jobs_apis_data_designer_v2_workspaces__workspace__jobs_create_get
      parameters:
      - name: workspace
        in: path
        required: true
        schema:
          type: string
          title: Workspace
      - name: page
        in: query
        required: false
        schema:
          type: integer
          exclusiveMinimum: 0
          description: Page number.
          default: 1
          title: Page
        description: Page number.
      - name: page_size
        in: query
        required: false
        schema:
          type: integer
          exclusiveMinimum: 0
          description: Page size.
          default: 10
          title: Page Size
        description: Page size.
      - name: sort
        in: query
        required: false
        schema:
          allOf:
          - $ref: '#/components/schemas/CreateJobsSortField'
          description: The field to sort by. To sort in decreasing order, use `-`
            in front of the field name.
          default: -created_at
        description: The field to sort by. To sort in decreasing order, use `-` in
          front of the field name.
      - in: query
        name: filter
        style: deepObject
        required: false
        explode: true
        schema:
          $ref: '#/components/schemas/CreateJobsListFilter'
        description: Filter jobs on various criteria.
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateJobsPage'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /apis/data-designer/v2/workspaces/{workspace}/jobs/create/{job}/results/{name}:
    get:
      tags:
      - Data Designer
      summary: Get Job Result
      operationId: get_job_result_apis_data_designer_v2_workspaces__workspace__jobs_create__job__results__name__get
      parameters:
      - name: workspace
        in: path
        required: true
        schema:
          type: string
          title: Workspace
      - name: job
        in: path
        required: true
        schema:
          type: string
          title: Job
      - name: name
        in: path
        required: true
        schema:
          type: string
          title: Name
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PlatformJobResultResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /apis/data-designer/v2/workspaces/{workspace}/jobs/create/{job}/results/{name}/download:
    get:
      tags:
      - Data Designer
      summary: Download Job Result
      operationId: download_job_result_apis_data_designer_v2_workspaces__workspace__jobs_create__job__results__name__download_get
      parameters:
      - name: workspace
        in: path
        required: true
        schema:
          type: string
          title: Workspace
      - name: job
        in: path
        required: true
        schema:
          type: string
          title: Job
      - name: name
        in: path
        required: true
        schema:
          type: string
          title: Name
      responses:
        '200':
          description: Successful Response
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        '404':
          description: Not Found
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /apis/data-designer/v2/workspaces/{workspace}/jobs/create/{name}:
    get:
      tags:
      - Data Designer
      summary: Get Job
      operationId: get_job_apis_data_designer_v2_workspaces__workspace__jobs_create__name__get
      parameters:
      - name: workspace
        in: path
        required: true
        schema:
          type: string
          title: Workspace
      - name: name
        in: path
        required: true
        schema:
          type: string
          title: Name
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateJob'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    delete:
      tags:
      - Data Designer
      summary: Delete Job
      operationId: delete_job_apis_data_designer_v2_workspaces__workspace__jobs_create__name__delete
      parameters:
      - name: workspace
        in: path
        required: true
        schema:
          type: string
          title: Workspace
      - name: name
        in: path
        required: true
        schema:
          type: string
          title: Name
      responses:
        '204':
          description: Successful Response
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /apis/data-designer/v2/workspaces/{workspace}/jobs/create/{name}/cancel:
    post:
      tags:
      - Data Designer
      summary: Cancel Job
      operationId: cancel_job_apis_data_designer_v2_workspaces__workspace__jobs_create__name__cancel_post
      parameters:
      - name: workspace
        in: path
        required: true
        schema:
          type: string
          title: Workspace
      - name: name
        in: path
        required: true
        schema:
          type: string
          title: Name
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateJob'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /apis/data-designer/v2/workspaces/{workspace}/jobs/create/{name}/logs:
    get:
      tags:
      - Data Designer
      summary: Get Job Logs
      operationId: get_job_logs_apis_data_designer_v2_workspaces__workspace__jobs_create__name__logs_get
      parameters:
      - name: workspace
        in: path
        required: true
        schema:
          type: string
          title: Workspace
      - name: name
        in: path
        required: true
        schema:
          type: string
          title: Name
      - name: limit
        in: query
        required: false
        schema:
          title: Limit
          type: integer
      - name: page_cursor
        in: query
        required: false
        schema:
          title: Page Cursor
          type: string
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PlatformJobLogPage'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /apis/data-designer/v2/workspaces/{workspace}/jobs/create/{name}/results:
    get:
      tags:
      - Data Designer
      summary: List Job Results
      operationId: list_job_results_apis_data_designer_v2_workspaces__workspace__jobs_create__name__results_get
      parameters:
      - name: workspace
        in: path
        required: true
        schema:
          type: string
          title: Workspace
      - name: name
        in: path
        required: true
        schema:
          type: string
          title: Name
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PlatformJobListResultResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /apis/data-designer/v2/workspaces/{workspace}/jobs/create/{name}/status:
    get:
      tags:
      - Data Designer
      summary: Get Job Status
      operationId: get_job_status_apis_data_designer_v2_workspaces__workspace__jobs_create__name__status_get
      parameters:
      - name: workspace
        in: path
        required: true
        schema:
          type: string
          title: Workspace
      - name: name
        in: path
        required: true
        schema:
          type: string
          title: Name
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PlatformJobStatusResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /apis/data-designer/v2/workspaces/{workspace}/preview:
    post:
      tags:
      - Data Designer
      summary: Generate a small preview dataset by streaming NDJSON frames.
      description: Generate a small preview dataset by streaming NDJSON frames.
      operationId: PreviewFunction__route_apis_data_designer_v2_workspaces__workspace__preview_post
      parameters:
      - name: workspace
        in: path
        required: true
        schema:
          type: string
          title: Workspace
      - name: X-Request-ID
        in: header
        required: false
        schema:
          title: X-Request-Id
          type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PreviewSpec'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
components:
  schemas:
    AgentRolloutFormat:
      type: string
      enum:
      - atif
      - claude_code
      - codex
      - hermes_agent
      - pi_coding_agent
      title: AgentRolloutFormat
    AgentRolloutSeedSource:
      properties:
        seed_type:
          type: string
          const: agent_rollout
          title: Seed Type
          default: agent_rollout
        path:
          title: Path
          description: Directory containing agent rollout artifacts. This field is
            required for ATIF trajectories. When omitted, built-in defaults are used
            for formats that define one. Claude Code defaults to ~/.claude/projects,
            Codex defaults to ~/.codex/sessions, Hermes Agent defaults to ~/.hermes/sessions,
            and Pi Coding Agent defaults to ~/.pi/agent/sessions. Relative paths are
            resolved from the current working directory when the config is loaded,
            not from the config file location.
          type: string
        file_pattern:
          title: File Pattern
          description: Case-sensitive filename pattern used to match agent rollout
            files. When omitted, ATIF defaults to '*.json', Claude Code, Codex, and
            Pi Coding Agent default to '*.jsonl', and Hermes Agent defaults to '*.json*'.
          type: string
        recursive:
          type: boolean
          title: Recursive
          description: Whether to search nested subdirectories under the provided
            directory for matching files.
          default: true
        format:
          allOf:
          - $ref: '#/components/schemas/AgentRolloutFormat'
          description: Built-in agent rollout format to use for parsing trace files.
      type: object
      required:
      - format
      title: AgentRolloutSeedSource
    AudioContext:
      properties:
        modality:
          type: string
          const: audio
          title: Modality
          default: audio
        column_name:
          type: string
          title: Column Name
        data_type:
          $ref: '#/components/schemas/ModalityDataType'
        audio_format:
          $ref: '#/components/schemas/AudioFormat'
      type: object
      required:
      - column_name
      title: AudioContext
      description: 'Configuration for providing audio context to multimodal models.


        Audio context values are URL or base64 media values. Local paths may be

        passed through only in explicit URL mode so colocated model endpoints can

        read them directly. ``audio_format`` is consulted only for base64 sources.'
    AudioFormat:
      type: string
      enum:
      - mp3
      - wav
      title: AudioFormat
      description: Supported audio formats for audio context.
    BaseModel:
      properties: {}
      type: object
      title: BaseModel
    BernoulliMixtureSamplerParams:
      properties:
        p:
          type: number
          maximum: 1.0
          minimum: 0.0
          title: P
          description: Bernoulli distribution probability of success.
        dist_name:
          type: string
          title: Dist Name
          description: Mixture distribution name. Samples will be equal to the distribution
            sample with probability `p`, otherwise equal to 0. Must be a valid scipy.stats
            distribution name.
        dist_params:
          additionalProperties: true
          type: object
          title: Dist Params
          description: Parameters of the scipy.stats distribution given in `dist_name`.
        sampler_type:
          type: string
          const: bernoulli_mixture
          title: Sampler Type
          default: bernoulli_mixture
      additionalProperties: false
      type: object
      required:
      - p
      - dist_name
      - dist_params
      title: BernoulliMixtureSamplerParams
      description: "Parameters for sampling from a Bernoulli mixture distribution.\n\
        \nCombines a Bernoulli distribution with another continuous distribution,\
        \ creating a mixture\nwhere values are either 0 (with probability 1-p) or\
        \ sampled from the specified distribution\n(with probability p). This is useful\
        \ for modeling scenarios with many zero values mixed with\na continuous distribution\
        \ of non-zero values.\n\nCommon use cases include modeling sparse events,\
        \ zero-inflated data, or situations where\nan outcome either doesn't occur\
        \ (0) or follows a specific distribution when it does occur.\n\nAttributes:\n\
        \    p (required): Probability of sampling from the mixture distribution (non-zero\
        \ outcome).\n        Must be between 0.0 and 1.0 (inclusive). With probability\
        \ 1-p, the sample is 0.\n    dist_name (required): Name of the scipy.stats\
        \ distribution to sample from when outcome is non-zero.\n        Must be a\
        \ valid scipy.stats distribution name (e.g., \"norm\", \"gamma\", \"expon\"\
        ).\n    dist_params (required): Parameters for the specified scipy.stats distribution."
    BernoulliSamplerParams:
      properties:
        p:
          type: number
          maximum: 1.0
          minimum: 0.0
          title: P
          description: Probability of success.
        sampler_type:
          type: string
          const: bernoulli
          title: Sampler Type
          default: bernoulli
      additionalProperties: false
      type: object
      required:
      - p
      title: BernoulliSamplerParams
      description: "Parameters for sampling from a Bernoulli distribution.\n\nSamples\
        \ binary values (0 or 1) representing the outcome of a single trial with a\
        \ fixed\nprobability of success. This is the simplest discrete probability\
        \ distribution, useful for\nmodeling binary outcomes like success/failure,\
        \ yes/no, or true/false.\n\nAttributes:\n    p (required): Probability of\
        \ success (sampling 1). Must be between 0.0 and 1.0 (inclusive).\n       \
        \ The probability of failure (sampling 0) is automatically 1 - p."
    BinomialSamplerParams:
      properties:
        n:
          type: integer
          title: N
          description: Number of trials.
        p:
          type: number
          maximum: 1.0
          minimum: 0.0
          title: P
          description: Probability of success on each trial.
        sampler_type:
          type: string
          const: binomial
          title: Sampler Type
          default: binomial
      additionalProperties: false
      type: object
      required:
      - n
      - p
      title: BinomialSamplerParams
      description: "Parameters for sampling from a Binomial distribution.\n\nSamples\
        \ integer values representing the number of successes in a fixed number of\
        \ independent\nBernoulli trials, each with the same probability of success.\
        \ Commonly used to model the number\nof successful outcomes in repeated experiments.\n\
        \nAttributes:\n    n (required): Number of independent trials. Must be a positive\
        \ integer.\n    p (required): Probability of success on each trial. Must be\
        \ between 0.0 and 1.0 (inclusive)."
    CategorySamplerParams:
      properties:
        values:
          items:
            anyOf:
            - type: string
            - type: integer
            - type: number
          type: array
          minItems: 1
          title: Values
          description: List of possible categorical values that can be sampled from.
        weights:
          title: Weights
          description: List of unnormalized probability weights to assigned to each
            value, in order. Larger values will be sampled with higher probability.
          items:
            type: number
          type: array
        sampler_type:
          type: string
          const: category
          title: Sampler Type
          default: category
      additionalProperties: false
      type: object
      required:
      - values
      title: CategorySamplerParams
      description: "Parameters for categorical sampling with optional probability\
        \ weighting.\n\nSamples values from a discrete set of categories. When weights\
        \ are provided, values are\nsampled according to their assigned probabilities.\
        \ Without weights, uniform sampling is used.\n\nAttributes:\n    values (required):\
        \ List of possible categorical values to sample from. Can contain strings,\
        \ integers,\n        or floats. Must contain at least one value.\n    weights:\
        \ Optional unnormalized probability weights for each value. If provided, must\
        \ be\n        the same length as `values`. Weights are automatically normalized\
        \ to sum to 1.0.\n        Larger weights result in higher sampling probability\
        \ for the corresponding value."
    ChatCompletionInferenceParams:
      properties:
        generation_type:
          type: string
          const: chat-completion
          title: Generation Type
          default: chat-completion
        max_parallel_requests:
          type: integer
          minimum: 1.0
          title: Max Parallel Requests
          default: 4
        timeout:
          title: Timeout
          type: integer
          minimum: 1.0
        extra_body:
          title: Extra Body
          additionalProperties: true
          type: object
        temperature:
          anyOf:
          - type: number
          - $ref: '#/components/schemas/UniformDistribution'
          - $ref: '#/components/schemas/ManualDistribution'
          title: Temperature
        top_p:
          anyOf:
          - type: number
          - $ref: '#/components/schemas/UniformDistribution'
          - $ref: '#/components/schemas/ManualDistribution'
          title: Top P
        max_tokens:
          title: Max Tokens
          type: integer
          minimum: 1.0
      additionalProperties: false
      type: object
      title: ChatCompletionInferenceParams
      description: "Configuration for LLM inference parameters.\n\nAttributes:\n \
        \   generation_type: Type of generation, always \"chat-completion\" for this\
        \ class.\n    temperature: Sampling temperature (0.0-2.0). Can be a fixed\
        \ value or a distribution for dynamic sampling.\n    top_p: Nucleus sampling\
        \ probability (0.0-1.0). Can be a fixed value or a distribution for dynamic\
        \ sampling.\n    max_tokens: Maximum number of tokens to generate in the response."
    CodeLang:
      type: string
      enum:
      - bash
      - c
      - cobol
      - cpp
      - csharp
      - go
      - java
      - javascript
      - kotlin
      - python
      - ruby
      - rust
      - scala
      - swift
      - typescript
      - sql:sqlite
      - sql:tsql
      - sql:bigquery
      - sql:mysql
      - sql:postgres
      - sql:ansi
      title: CodeLang
    CodeValidatorParams:
      properties:
        validator_type:
          type: string
          const: code
          title: Validator Type
          description: Validator type discriminator, always 'code' for this validator
          default: code
        code_lang:
          allOf:
          - $ref: '#/components/schemas/CodeLang'
          description: The language of the code to validate
      additionalProperties: false
      type: object
      required:
      - code_lang
      title: CodeValidatorParams
      description: "Configuration for code validation. Supports Python and SQL code\
        \ validation.\n\nAttributes:\n    code_lang (required): The language of the\
        \ code to validate. Supported values include: `python`,\n        `sql:sqlite`,\
        \ `sql:postgres`, `sql:mysql`, `sql:tsql`, `sql:bigquery`, `sql:ansi`."
    ColumnInequalityConstraint:
      properties:
        target_column:
          type: string
          title: Target Column
          description: Name of the sampler column this constraint applies to
        constraint_type:
          type: string
          const: column_inequality
          title: Constraint Type
          description: Constraint type discriminator, always 'column_inequality' for
            this constraint
          default: column_inequality
        rhs:
          type: string
          title: Rhs
          description: Name of the other sampler column to compare against
        operator:
          allOf:
          - $ref: '#/components/schemas/InequalityOperator'
          description: Comparison operator
      additionalProperties: false
      type: object
      required:
      - target_column
      - rhs
      - operator
      title: ColumnInequalityConstraint
      description: "Constrain a sampler column to be less/greater than another sampler\
        \ column.\n\nOnly applies to sampler columns.\n\nAttributes:\n    rhs (required):\
        \ Name of the other sampler column to compare against.\n    operator (required):\
        \ Comparison operator (lt, le, gt, ge).\n\nInherited Attributes:\n    target_column\
        \ (required): Name of the sampler column this constraint applies to."
    CreateJob:
      properties:
        id:
          title: Id
          type: string
        name:
          type: string
          title: Name
        description:
          title: Description
          type: string
        project:
          title: Project
          type: string
        workspace:
          title: Workspace
          type: string
        created_at:
          title: Created At
          type: string
          format: date-time
        updated_at:
          title: Updated At
          type: string
          format: date-time
        spec:
          $ref: '#/components/schemas/DataDesignerStepConfig'
        status:
          $ref: '#/components/schemas/PlatformJobStatus'
        status_details:
          title: Status Details
          additionalProperties: true
          type: object
        error_details:
          title: Error Details
          additionalProperties: true
          type: object
        ownership:
          title: Ownership
          additionalProperties: true
          type: object
        custom_fields:
          title: Custom Fields
          additionalProperties: true
          type: object
      type: object
      required:
      - name
      - spec
      title: CreateJob
    CreateJobRequest:
      properties:
        name:
          title: Name
          type: string
        description:
          title: Description
          type: string
        project:
          title: Project
          type: string
        spec:
          $ref: '#/components/schemas/DataDesignerJobConfig'
        ownership:
          title: Ownership
          additionalProperties: true
          type: object
        custom_fields:
          title: Custom Fields
          additionalProperties: true
          type: object
      type: object
      required:
      - spec
      title: CreateJobRequest
    CreateJobsListFilter:
      additionalProperties: false
      properties:
        created_at:
          allOf:
          - $ref: '#/components/schemas/DatetimeFilter'
          description: Jobs created at 'gte' datetime or 'lte' datetime.
        name:
          anyOf:
          - $ref: '#/components/schemas/StringFilter'
          - type: string
          description: Name of the job.
          title: Name
        workspace:
          description: Workspace of the job.
          title: Workspace
          type: string
        project:
          description: Project containing the job.
          title: Project
          type: string
        status:
          allOf:
          - $ref: '#/components/schemas/PlatformJobStatus'
          description: The current status.
        updated_at:
          allOf:
          - $ref: '#/components/schemas/DatetimeFilter'
          description: Jobs updated at 'gte' datetime or 'lte' datetime.
      title: CreateJobsListFilter
      type: object
    CreateJobsPage:
      properties:
        data:
          items:
            $ref: '#/components/schemas/CreateJob'
          type: array
          title: Data
        pagination:
          allOf:
          - $ref: '#/components/schemas/PaginationData'
          description: Pagination information.
        sort:
          title: Sort
          description: The field on which the results are sorted.
          type: string
        filter:
          title: Filter
          description: Filtering information.
          additionalProperties: true
          type: object
      type: object
      required:
      - data
      title: CreateJobsPage
    CreateJobsSortField:
      type: string
      enum:
      - created_at
      - -created_at
      - updated_at
      - -updated_at
      title: CreateJobsSortField
    CustomColumnConfig:
      properties:
        name:
          type: string
          title: Name
        drop:
          type: boolean
          title: Drop
          default: false
        allow_resize:
          type: boolean
          title: Allow Resize
          default: false
        column_type:
          type: string
          const: custom
          title: Column Type
          default: custom
        skip:
          $ref: '#/components/schemas/SkipConfig'
        propagate_skip:
          type: boolean
          title: Propagate Skip
          description: "If True (default), this column auto-skips when any of its\
            \ required_columns was skipped. Independent of skip \u2014 a column with\
            \ no SkipConfig still propagates upstream skips. Set to False for null-tolerant\
            \ columns."
          default: true
        generator_function:
          title: Generator Function
          description: Function decorated with @custom_column_generator
        generation_strategy:
          allOf:
          - $ref: '#/components/schemas/GenerationStrategy'
          description: 'Generation strategy: ''cell_by_cell'' for row-based or ''full_column''
            for batch-based'
          default: cell_by_cell
        generator_params:
          allOf:
          - $ref: '#/components/schemas/BaseModel'
          description: Optional typed configuration object passed as second argument
            to generator function
      additionalProperties: false
      type: object
      required:
      - name
      - generator_function
      title: CustomColumnConfig
      description: "Configuration for custom user-defined column generators.\n\nCustom\
        \ columns allow users to provide their own generation logic via a callable\
        \ function\ndecorated with `@custom_column_generator`. Two strategies are\
        \ supported: cell_by_cell\n(default, row-based) and full_column (batch-based\
        \ with DataFrame access).\n\nAttributes:\n    generator_function (required):\
        \ A callable decorated with @custom_column_generator.\n    generation_strategy:\
        \ \"cell_by_cell\" (row-based) or \"full_column\" (batch-based).\n    generator_params:\
        \ Optional typed configuration object (Pydantic BaseModel) passed\n      \
        \  as the second argument to the generator function.\n\nInherited Attributes:\n\
        \    name (required): Unique name of the column to be generated.\n    drop:\
        \ If True, generate this column but remove it from the final dataset."
    DataDesignerConfig:
      properties:
        columns:
          items:
            oneOf:
            - $ref: '#/components/schemas/CustomColumnConfig'
            - $ref: '#/components/schemas/ExpressionColumnConfig'
            - $ref: '#/components/schemas/LLMCodeColumnConfig'
            - $ref: '#/components/schemas/LLMJudgeColumnConfig'
            - $ref: '#/components/schemas/LLMStructuredColumnConfig'
            - $ref: '#/components/schemas/LLMTextColumnConfig'
            - $ref: '#/components/schemas/SamplerColumnConfig'
            - $ref: '#/components/schemas/SeedDatasetColumnConfig'
            - $ref: '#/components/schemas/ValidationColumnConfig'
            - $ref: '#/components/schemas/EmbeddingColumnConfig'
            - $ref: '#/components/schemas/ImageColumnConfig'
            discriminator:
              propertyName: column_type
              mapping:
                custom: '#/components/schemas/CustomColumnConfig'
                embedding: '#/components/schemas/EmbeddingColumnConfig'
                expression: '#/components/schemas/ExpressionColumnConfig'
                image: '#/components/schemas/ImageColumnConfig'
                llm-code: '#/components/schemas/LLMCodeColumnConfig'
                llm-judge: '#/components/schemas/LLMJudgeColumnConfig'
                llm-structured: '#/components/schemas/LLMStructuredColumnConfig'
                llm-text: '#/components/schemas/LLMTextColumnConfig'
                sampler: '#/components/schemas/SamplerColumnConfig'
                seed-dataset: '#/components/schemas/SeedDatasetColumnConfig'
                validation: '#/components/schemas/ValidationColumnConfig'
          type: array
          title: Columns
        model_configs:
          title: Model Configs
          items:
            $ref: '#/components/schemas/ModelConfig'
          type: array
        tool_configs:
          title: Tool Configs
          items:
            $ref: '#/components/schemas/ToolConfig'
          type: array
        seed_config:
          $ref: '#/components/schemas/SeedConfig'
        constraints:
          title: Constraints
          items:
            oneOf:
            - $ref: '#/components/schemas/ScalarInequalityConstraint'
            - $ref: '#/components/schemas/ColumnInequalityConstraint'
          type: array
        profilers:
          title: Profilers
          items:
            $ref: '#/components/schemas/JudgeScoreProfilerConfig'
          type: array
        processors:
          title: Processors
          items:
            oneOf:
            - $ref: '#/components/schemas/DropColumnsProcessorConfig'
            - $ref: '#/components/schemas/SchemaTransformProcessorConfig'
            discriminator:
              propertyName: processor_type
              mapping:
                drop_columns: '#/components/schemas/DropColumnsProcessorConfig'
                schema_transform: '#/components/schemas/SchemaTransformProcessorConfig'
          type: array
      additionalProperties: false
      type: object
      required:
      - columns
      title: DataDesignerConfig
      description: "Configuration for NeMo Data Designer.\n\nThis class defines the\
        \ main configuration structure for NeMo Data Designer,\nwhich the engine consumes\
        \ when generating synthetic data.\n\nAttributes:\n    columns: Required list\
        \ of column configurations defining how each column\n        should be generated.\
        \ May be empty for seeded processor-only configs.\n    model_configs: Optional\
        \ list of model configurations for LLM-based generation.\n        Each model\
        \ config defines the model, provider, and inference parameters.\n    tool_configs:\
        \ Optional list of tool configurations for MCP tool calling.\n        Each\
        \ tool config defines the provider, allowed tools, and execution limits.\n\
        \    seed_config: Optional seed dataset settings to use for generation.\n\
        \    constraints: Optional list of column constraints.\n    profilers: Optional\
        \ list of column profilers for analyzing generated data characteristics.\n\
        \    processors: Optional list of processor configurations for post-generation\
        \ transformations."
    DataDesignerJobConfig:
      properties:
        num_records:
          type: integer
          title: Num Records
        config:
          $ref: '#/components/schemas/DataDesignerConfig'
      type: object
      required:
      - num_records
      - config
      title: DataDesignerJobConfig
    DataDesignerStepConfig:
      properties:
        job_config:
          $ref: '#/components/schemas/DataDesignerJobConfig'
        model_providers:
          items:
            $ref: '#/components/schemas/ModelProvider'
          type: array
          title: Model Providers
        model_configs:
          items:
            $ref: '#/components/schemas/ModelConfig'
          type: array
          title: Model Configs
      type: object
      required:
      - job_config
      - model_providers
      - model_configs
      title: DataDesignerStepConfig
    DataFrameSeedSource:
      properties:
        seed_type:
          type: string
          const: df
          title: Seed Type
          default: df
      type: object
      title: DataFrameSeedSource
    DatetimeFilter:
      additionalProperties: false
      properties:
        $gte:
          description: Filter for results greater than or equal to this datetime.
          title: $Gte
          format: date-time
          type: string
        $lte:
          description: Filter for results less than or equal to this datetime.
          title: $Lte
          format: date-time
          type: string
      title: DatetimeFilter
      type: object
    DatetimeSamplerParams:
      properties:
        start:
          type: string
          title: Start
          description: Earliest possible datetime for sampling range, inclusive.
        end:
          type: string
          title: End
          description: Exclusive upper bound for datetime sampling range.
        unit:
          type: string
          enum:
          - Y
          - M
          - D
          - h
          - m
          - s
          title: Unit
          description: Sampling units, e.g. the smallest possible time interval between
            samples.
          default: D
        sampler_type:
          type: string
          const: datetime
          title: Sampler Type
          default: datetime
      additionalProperties: false
      type: object
      required:
      - start
      - end
      title: DatetimeSamplerParams
      description: "Parameters for uniform datetime sampling within a specified range.\n\
        \nSamples datetime values uniformly between a start and end date with a specified\
        \ granularity.\nThe sampling unit determines the smallest possible time interval\
        \ between consecutive samples.\n\nAttributes:\n    start (required): Earliest\
        \ possible datetime for the sampling range (inclusive). Must be a valid\n\
        \        datetime string parseable by pandas.to_datetime().\n    end (required):\
        \ Exclusive upper bound for the sampling range. Must be a valid\n        datetime\
        \ string parseable by pandas.to_datetime().\n    unit: Time unit for sampling\
        \ granularity. Options:\n        - \"Y\": Years\n        - \"M\": Months\n\
        \        - \"D\": Days (default)\n        - \"h\": Hours\n        - \"m\"\
        : Minutes\n        - \"s\": Seconds"
    DirectorySeedSource:
      properties:
        seed_type:
          type: string
          const: directory
          title: Seed Type
          default: directory
        path:
          type: string
          title: Path
          description: Directory containing seed artifacts. Relative paths are resolved
            from the current working directory when the config is loaded, not from
            the config file location.
        file_pattern:
          type: string
          title: File Pattern
          description: Case-sensitive filename pattern used to match files under the
            provided directory. Patterns match basenames only, not relative paths.
          default: '*'
        recursive:
          type: boolean
          title: Recursive
          description: Whether to search nested subdirectories under the provided
            directory for matching files.
          default: true
      type: object
      required:
      - path
      title: DirectorySeedSource
    DistributionType:
      type: string
      enum:
      - uniform
      - manual
      title: DistributionType
      description: Types of distributions for sampling inference parameters.
    DropColumnsProcessorConfig:
      properties:
        name:
          type: string
          title: Name
          description: The name of the processor, used to identify the processor in
            the results and to write the artifacts to disk.
        processor_type:
          type: string
          const: drop_columns
          title: Processor Type
          default: drop_columns
        column_names:
          items:
            type: string
          type: array
          title: Column Names
          description: List of column names to drop from the output dataset.
      additionalProperties: false
      type: object
      required:
      - name
      - column_names
      title: DropColumnsProcessorConfig
      description: "Drop columns from the output dataset (prefer ``drop=True`` in\
        \ the column config).\n\nThis processor removes specified columns from the\
        \ generated dataset. The dropped\ncolumns are saved separately in the `dropped-columns-parquet-files`\
        \ directory for reference.\nWhen this processor is added via the config builder,\
        \ the corresponding column\nconfigs are automatically marked with `drop =\
        \ True`.\n\nAttributes:\n    column_names (required): List of column names\
        \ to remove from the output dataset.\n\nInherited Attributes:\n    name (required):\
        \ Name of the processor."
    EmbeddingColumnConfig:
      properties:
        name:
          type: string
          title: Name
        drop:
          type: boolean
          title: Drop
          default: false
        allow_resize:
          type: boolean
          title: Allow Resize
          default: false
        column_type:
          type: string
          const: embedding
          title: Column Type
          default: embedding
        skip:
          $ref: '#/components/schemas/SkipConfig'
        propagate_skip:
          type: boolean
          title: Propagate Skip
          description: "If True (default), this column auto-skips when any of its\
            \ required_columns was skipped. Independent of skip \u2014 a column with\
            \ no SkipConfig still propagates upstream skips. Set to False for null-tolerant\
            \ columns."
          default: true
        target_column:
          type: string
          title: Target Column
          description: Name of the text column to generate embeddings for
        model_alias:
          type: string
          title: Model Alias
          description: Alias of the model to use for embedding generation
      additionalProperties: false
      type: object
      required:
      - name
      - target_column
      - model_alias
      title: EmbeddingColumnConfig
      description: "Configuration for embedding generation columns.\n\nEmbedding columns\
        \ generate embeddings for text input using a specified model.\n\nAttributes:\n\
        \    target_column (required): The column to generate embeddings for. The\
        \ column could be a single text string or a list of text strings in stringified\
        \ JSON format.\n        If it is a list of text strings in stringified JSON\
        \ format, the embeddings will be generated for each text string.\n    model_alias\
        \ (required): The model to use for embedding generation.\n\nInherited Attributes:\n\
        \    name (required): Unique name of the column to be generated.\n    drop:\
        \ If True, generate this column but remove it from the final dataset."
    EmbeddingInferenceParams:
      properties:
        generation_type:
          type: string
          const: embedding
          title: Generation Type
          default: embedding
        max_parallel_requests:
          type: integer
          minimum: 1.0
          title: Max Parallel Requests
          default: 4
        timeout:
          title: Timeout
          type: integer
          minimum: 1.0
        extra_body:
          title: Extra Body
          additionalProperties: true
          type: object
        encoding_format:
          type: string
          enum:
          - float
          - base64
          title: Encoding Format
          default: float
        dimensions:
          title: Dimensions
          type: integer
      additionalProperties: false
      type: object
      title: EmbeddingInferenceParams
      description: "Configuration for embedding generation parameters.\n\nAttributes:\n\
        \    generation_type: Type of generation, always \"embedding\" for this class.\n\
        \    encoding_format: Format of the embedding encoding (\"float\" or \"base64\"\
        ).\n    dimensions: Number of dimensions for the embedding."
    ExpressionColumnConfig:
      properties:
        name:
          type: string
          title: Name
        drop:
          type: boolean
          title: Drop
          default: false
        allow_resize:
          type: boolean
          title: Allow Resize
          default: false
        column_type:
          type: string
          const: expression
          title: Column Type
          default: expression
        skip:
          $ref: '#/components/schemas/SkipConfig'
        propagate_skip:
          type: boolean
          title: Propagate Skip
          description: "If True (default), this column auto-skips when any of its\
            \ required_columns was skipped. Independent of skip \u2014 a column with\
            \ no SkipConfig still propagates upstream skips. Set to False for null-tolerant\
            \ columns."
          default: true
        expr:
          type: string
          title: Expr
          description: Jinja2 expression to compute the column value from other columns
        dtype:
          type: string
          enum:
          - int
          - float
          - str
          - bool
          title: Dtype
          description: 'Data type for expression result: ''int'', ''float'', ''str'',
            or ''bool'''
          default: str
      additionalProperties: false
      type: object
      required:
      - name
      - expr
      title: ExpressionColumnConfig
      description: "Configuration for derived columns using Jinja2 expressions.\n\n\
        Expression columns compute values by evaluating Jinja2 templates that reference\
        \ other\ncolumns. Useful for transformations, concatenations, conditional\
        \ logic, and derived\nfeatures without requiring LLM generation. The expression\
        \ is evaluated row-by-row.\n\nAttributes:\n    expr (required): Jinja2 expression\
        \ to evaluate. Can reference other column values using\n        {{ column_name\
        \ }} syntax. Supports filters, conditionals, and arithmetic.\n        Must\
        \ be a valid, non-empty Jinja2 template.\n    dtype: Data type to cast the\
        \ result to. Must be one of \"int\", \"float\", \"str\", or \"bool\".\n  \
        \      Defaults to \"str\". Type conversion is applied after expression evaluation.\n\
        \nInherited Attributes:\n    name (required): Unique name of the column to\
        \ be generated.\n    drop: If True, generate this column but remove it from\
        \ the final dataset."
    FileContentsSeedSource:
      properties:
        seed_type:
          type: string
          const: file_contents
          title: Seed Type
          default: file_contents
        path:
          type: string
          title: Path
          description: Directory containing seed artifacts. Relative paths are resolved
            from the current working directory when the config is loaded, not from
            the config file location.
        file_pattern:
          type: string
          title: File Pattern
          description: Case-sensitive filename pattern used to match files under the
            provided directory. Patterns match basenames only, not relative paths.
          default: '*'
        recursive:
          type: boolean
          title: Recursive
          description: Whether to search nested subdirectories under the provided
            directory for matching files.
          default: true
        encoding:
          type: string
          title: Encoding
          description: Text encoding used when reading matching files into the `content`
            column.
          default: utf-8
      type: object
      required:
      - path
      title: FileContentsSeedSource
    FileStorageType:
      type: string
      enum:
      - fileset
      title: FileStorageType
    FilesetFileSeedSource:
      properties:
        seed_type:
          type: string
          const: nmp
          title: Seed Type
          default: nmp
        path:
          type: string
          title: Path
      type: object
      required:
      - path
      title: FilesetFileSeedSource
    GaussianSamplerParams:
      properties:
        mean:
          type: number
          title: Mean
          description: Mean of the Gaussian distribution
        stddev:
          type: number
          title: Stddev
          description: Standard deviation of the Gaussian distribution
        decimal_places:
          title: Decimal Places
          description: Number of decimal places to round the sampled values to.
          type: integer
        sampler_type:
          type: string
          const: gaussian
          title: Sampler Type
          default: gaussian
      additionalProperties: false
      type: object
      required:
      - mean
      - stddev
      title: GaussianSamplerParams
      description: "Parameters for sampling from a Gaussian (Normal) distribution.\n\
        \nSamples continuous values from a normal distribution characterized by its\
        \ mean and standard\ndeviation. The Gaussian distribution is one of the most\
        \ commonly used probability distributions,\nappearing naturally in many real-world\
        \ phenomena due to the Central Limit Theorem.\n\nAttributes:\n    mean (required):\
        \ Mean (center) of the Gaussian distribution. This is the expected value and\
        \ the\n        location of the distribution's peak.\n    stddev (required):\
        \ Standard deviation of the Gaussian distribution. Controls the spread or\
        \ width\n        of the distribution. Must be positive.\n    decimal_places:\
        \ Optional number of decimal places to round sampled values to. If None,\n\
        \        values are not rounded."
    GenerationStrategy:
      type: string
      enum:
      - cell_by_cell
      - full_column
      title: GenerationStrategy
      description: Strategy for custom column generation.
    HTTPValidationError:
      properties:
        detail:
          items:
            $ref: '#/components/schemas/ValidationError'
          type: array
          title: Detail
      type: object
      title: HTTPValidationError
    HuggingFaceSeedSource:
      properties:
