[project]
name = "nemo-data-designer-plugin"
version = "0.1.0"
description = "NeMo Data Designer plugin."
readme = "README.md"
requires-python = ">=3.11,<3.14"
authors = [{ name = "NVIDIA", email = "nemo@nvidia.com" }]
dependencies = [
    "nemo-platform-plugin",
    "nemo-platform",
    "data-designer==0.6.0",
    "data-designer-nemo",
    "nmp-common",
    "httpx>=0.27",
    "fastapi",
    "pandas",
]

[project.entry-points."nemo.services"]
data-designer = "nemo_data_designer_plugin.service:DataDesignerService"

[project.entry-points."nemo.cli"]
data-designer = "nemo_data_designer_plugin.cli.main:DataDesignerCLI"

[project.entry-points."nemo.sdk"]
data_designer = "nemo_data_designer_plugin.sdk.resources:data_designer_sdk_resources"

[project.entry-points."nemo.jobs"]
"data-designer.create" = "nemo_data_designer_plugin.jobs.create:CreateJob"

[project.entry-points."nemo.functions"]
"data-designer.preview" = "nemo_data_designer_plugin.functions.preview:PreviewFunction"

[project.entry-points."nemo.skills"]
data-designer = "nemo_data_designer_plugin.skills:get_skills_path"

[project.entry-points."data_designer.plugins"]
fileset-seed-datasets = "data_designer_nemo.plugins:fileset_seed_datasets_plugin"

[project.optional-dependencies]
test = [
    "pytest>=8.0",
    "pytest-asyncio>=0.23",
    "httpx>=0.27",
    "fastapi>=0.115",
    "duckdb",
]

# Generated from [tool.bundle-package]; do not edit by hand.
data-designer-nemo = [
  "data-designer==0.6.0",
  "anyio>=4.0",
  "duckdb",
  "pydantic>=2",
]

# Generated from [tool.bundle-package]; do not edit by hand.
nmp-common = [
  "aiofiles>=24.1.0",
  "base58>=2.1.1",
  "pydantic>=2.10.3",
  "pydantic-settings>=2.8.1",
  "fastapi[standard]>=0.115.4",
  "lark>=1.1.0",
  "nemo-platform-plugin",
  "pyyaml>=6.0.2",
  "sqlalchemy>=2.0.0",
  "huggingface-hub>=1.0.1,<2.0.0",
  "hvac>=2.3.0",
  "kubernetes>=30.1.0",
  "prometheus-fastapi-instrumentator>=7.1.0",
  "opentelemetry-exporter-prometheus>=0.59b0",
  "opentelemetry-processor-baggage>=0.59b0",
  "opentelemetry-instrumentation-fastapi>=0.59b0",
  "opentelemetry-instrumentation-system-metrics>=0.59b0",
  "opentelemetry-instrumentation-sqlalchemy>=0.59b0",
  "opentelemetry-instrumentation-httpx>=0.59b0",
  "opentelemetry-exporter-otlp-proto-http>=1.38.0",
  "opentelemetry-exporter-otlp-proto-grpc>=1.38.0",
  "opentelemetry-sdk>=1.38.0",
  "prometheus-client>=0.23.0",
  "structlog>=24.1.0",
  "nvidia-ml-py>=13.0.0",
  "pyjwt[crypto]>=2.12.0",
]

# Generated from [tool.bundle-package]; do not edit by hand.
nemo-platform-plugin = [
  "anthropic>=0.88.0",
  "fastapi>=0.115.4",
  "lark>=1.1.0",
  "openai>=1.109.1",
  "pydantic>=2.10.3",
  "pydantic-settings>=2.8.1",
  "pyyaml>=6.0.2",
  "typer>=0.20.0,<0.26",
]

[build-system]
requires = ["hatchling", "nmp-build-tools"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel.hooks.custom]
path = "hatch_build.py"

[tool.hatch.build.targets.wheel]
packages = ["src/nemo_data_designer_plugin"]

[tool.uv.sources]
nemo-platform = { workspace = true }
nemo-platform-plugin = { workspace = true }
data-designer-nemo = { workspace = true }

[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"
pythonpath = ["src"]
markers = [
    "integration: high-level tests that exercise user-facing plugin workflows",
]

[tool.bundle-package]
data-designer-nemo = { source = "../../packages/data_designer_nemo/src/data_designer_nemo", module = "data_designer_nemo" }
nmp-common = { source = "../../packages/nmp_common/src/nmp/common", module = "nmp/common" }
nemo-platform-plugin = { source = "../../packages/nemo_platform_plugin/src/nemo_platform_plugin", module = "nemo_platform_plugin" }

# Opt this plugin into OpenAPI spec generation
[tool.nemo.openapi]
