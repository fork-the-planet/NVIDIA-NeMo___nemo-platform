components:
  schemas:
    AuditClassConfig:
      additionalProperties: true
      type: object
      title: AuditClassConfig
      description: Per-class plugin configuration mapping.
    AuditConfigInput:
      properties:
        name:
          type: string
          title: Name
          description: Entity name within the workspace
          default: ''
        workspace:
          type: string
          pattern: ^[\w\-\+.@:]+$
          title: Workspace
          description: Workspace identifier
        project:
          title: Project
          description: The name of the project associated with this entity.
          type: string
        description:
          title: Description
          description: Config description
          type: string
        system:
          $ref: '#/components/schemas/AuditSystemData'
        run:
          $ref: '#/components/schemas/AuditRunData'
        plugins:
          $ref: '#/components/schemas/AuditPluginsDataInput'
        reporting:
          $ref: '#/components/schemas/AuditReportData'
      type: object
      required:
      - workspace
      title: AuditConfigInput
      description: Audit configuration stored in the entity store.
    AuditConfigOutput:
      properties:
        name:
          type: string
          title: Name
          description: Entity name within the workspace
          default: ''
        workspace:
          type: string
          pattern: ^[\w\-\+.@:]+$
          title: Workspace
          description: Workspace identifier
        project:
          title: Project
          description: The name of the project associated with this entity.
          type: string
        description:
          title: Description
          description: Config description
          type: string
        system:
          $ref: '#/components/schemas/AuditSystemData'
        run:
          $ref: '#/components/schemas/AuditRunData'
        plugins:
          $ref: '#/components/schemas/AuditPluginsDataOutput'
        reporting:
          $ref: '#/components/schemas/AuditReportData'
        id:
          type: string
          title: Id
          readOnly: true
        created_at:
          title: Created At
          readOnly: true
          type: string
          format: date-time
        created_by:
          title: Created By
          readOnly: true
          nullable: true
          type: string
        updated_at:
          title: Updated At
          readOnly: true
          type: string
          format: date-time
        updated_by:
          title: Updated By
          readOnly: true
          nullable: true
          type: string
        entity_id:
          type: string
          title: Entity Id
          description: Alias for id for backwards compatibility.
          readOnly: true
        parent:
          title: Parent
          description: Parent entity ID for nested entities.
          readOnly: true
          type: string
      type: object
      required:
      - workspace
      - id
      - created_at
      - created_by
      - updated_at
      - updated_by
      - entity_id
      - parent
      title: AuditConfigOutput
      description: Audit configuration stored in the entity store.
    AuditInputSpec:
      properties:
        config:
          anyOf:
          - $ref: '#/components/schemas/AuditConfigInput'
          - type: string
            minLength: 1
          title: Config
        target:
          anyOf:
          - $ref: '#/components/schemas/AuditTargetInput'
          - type: string
            minLength: 1
          title: Target
        max_probe_retries:
          type: integer
          minimum: 0.0
          title: Max Probe Retries
          default: 0
        fail_job_on_retries_exhausted:
          type: boolean
          title: Fail Job On Retries Exhausted
          default: true
      additionalProperties: false
      type: object
      required:
      - config
      - target
      title: AuditInputSpec
      description: "User-facing spec \u2014 each field accepts an inline entity payload\
        \ OR a\nworkspace-qualified name string referencing one in the entity store.\n\
        \nResolved by :meth:`AuditJob.to_spec` into a canonical :class:`AuditSpec`\n\
        before :meth:`AuditJob.run` is invoked."
    AuditJob:
      properties:
        id:
          title: Id
          type: string
        name:
          type: string
          title: Name
        description:
          title: Description
          type: string
        project:
          title: Project
          type: string
        workspace:
          title: Workspace
          type: string
        created_at:
          title: Created At
          type: string
          format: date-time
        updated_at:
          title: Updated At
          type: string
          format: date-time
        spec:
          $ref: '#/components/schemas/AuditSpec'
        status:
          $ref: '#/components/schemas/PlatformJobStatus'
        status_details:
          title: Status Details
          additionalProperties: true
          type: object
        error_details:
          title: Error Details
          additionalProperties: true
          type: object
        ownership:
          title: Ownership
          additionalProperties: true
          type: object
        custom_fields:
          title: Custom Fields
          additionalProperties: true
          type: object
      type: object
      required:
      - name
      - spec
      title: AuditJob
    AuditJobRequest:
      properties:
        name:
          title: Name
          type: string
        description:
          title: Description
          type: string
        project:
          title: Project
          type: string
        spec:
          $ref: '#/components/schemas/AuditInputSpec'
        ownership:
          title: Ownership
          additionalProperties: true
          type: object
        custom_fields:
          title: Custom Fields
          additionalProperties: true
          type: object
      type: object
      required:
      - spec
      title: AuditJobRequest
    AuditJobsListFilter:
      additionalProperties: false
      properties:
        created_at:
          allOf:
          - $ref: '#/components/schemas/DatetimeFilter'
          description: Jobs created at 'gte' datetime or 'lte' datetime.
        name:
          anyOf:
