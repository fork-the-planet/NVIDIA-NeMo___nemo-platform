      parameters:
      - name: workspace
        in: path
        required: true
        schema:
          type: string
          title: Workspace
      - name: page
        in: query
        required: false
        schema:
          type: integer
          exclusiveMinimum: 0
          description: Page number.
          default: 1
          title: Page
        description: Page number.
      - name: page_size
        in: query
        required: false
        schema:
          type: integer
          exclusiveMinimum: 0
          description: Page size.
          default: 10
          title: Page Size
        description: Page size.
      - name: sort
        in: query
        required: false
        schema:
          allOf:
          - $ref: '#/components/schemas/AuditJobsSortField'
          description: The field to sort by. To sort in decreasing order, use `-`
            in front of the field name.
          default: -created_at
        description: The field to sort by. To sort in decreasing order, use `-` in
          front of the field name.
