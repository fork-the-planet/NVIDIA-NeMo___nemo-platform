        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                additionalProperties: true
                type: object
                title: Response Healthz Apis Auditor V1 Healthz Get
  /apis/auditor/v2/workspaces/{workspace}/configs:
    post:
      tags:
      - Auditor Configs
      summary: Create Config
      description: Create a new audit config.
      operationId: create_config_apis_auditor_v2_workspaces__workspace__configs_post
      parameters:
      - name: workspace
        in: path
        required: true
        schema:
          type: string
          title: Workspace
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateAuditConfigRequest'
      responses:
        '201':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuditConfigOutput'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    get:
      tags:
      - Auditor Configs
      summary: List Configs
      description: List audit configs in the workspace with pagination and filter
        support.
      operationId: list_configs_apis_auditor_v2_workspaces__workspace__configs_get
      parameters:
      - name: workspace
        in: path
        required: true
        schema:
          type: string
          title: Workspace
      - name: page
        in: query
        required: false
        schema:
          type: integer
          minimum: 1
          default: 1
          title: Page
      - name: page_size
        in: query
        required: false
        schema:
          type: integer
          maximum: 100
          minimum: 1
          default: 20
          title: Page Size
      - name: sort
        in: query
        required: false
        schema:
          type: string
          default: -created_at
          title: Sort
      - in: query
        name: filter
        style: deepObject
        required: false
        explode: true
        schema:
          $ref: '#/components/schemas/ConfigFilter'
        description: 'Filter results on various criteria. Supports bracket notation
          (?filter[field][$op]=value), JSON ({"field":{"$op":"value"}}), and text
          syntax (field:"value"). Operators: $eq (exact match), $like (substring),
          $lt, $lte, $gt, $gte (comparison), $in, $nin (set membership), $and, $or,
          $not (logical). Default operator is $eq.'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
                title: Response List Configs Apis Auditor V2 Workspaces  Workspace  Configs
                  Get
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
