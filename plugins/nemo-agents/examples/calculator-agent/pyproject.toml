[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "nemo-agents-example-calculator"
description = "NAT ``calculator`` function group for the nemo-agents calculator ReAct example."
requires-python = ">=3.11"
dependencies = [
    "nvidia-nat-core>=1.8.0,<1.9",
    # Provides the ``react_agent`` workflow and the ``openai`` LLM the agent uses.
    # Required so a packaged container image (nemo agents package) can run the agent.
    "nvidia-nat-langchain>=1.8.0,<1.9",
]
version = "0.0.0"

[project.entry-points."nat.components"]
nemo_agents_example_calculator = "calculator_agent.register"

[tool.hatch.build.targets.wheel]
packages = ["src/calculator_agent"]
