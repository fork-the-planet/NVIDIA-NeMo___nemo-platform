# email-phishing-agent.yml
#
# A ReAct agent that inspects an email body for phishing / social-engineering
# signals. Adapted from NeMo-Agent-Toolkit's email_phishing_analyzer example.
#
# The ``email_phishing_analyzer`` function is provided by the sibling package.
# Install it so NAT loads its ``nat.components`` entry point:
#
#   uv pip install -e plugins/nemo-agents/examples/email-phishing-analyzer
#
# Platform-managed deployment:
#   nemo agents create --name email-phishing-agent \
#     --agent-config plugins/nemo-agents/examples/email-phishing-analyzer/src/nat_email_phishing_analyzer/email-phishing-agent.yml
#   nemo agents deploy  --agent email-phishing-agent
#   nemo agents invoke  --agent email-phishing-agent --input "Subject: Verify your account ..."

functions:
  email_phishing_analyzer:
    _type: email_phishing_analyzer   # requires nemo-agents-example-email-phishing (pip install this dir)
    llm: llm
    # prompt defaults to phishing_prompt from register.py; override here to customize.

llms:
  llm:
    _type: openai
    # base_url is injected by the platform controller at deploy time.
    # For local runs, override: --override llms.llm.base_url https://integrate.api.nvidia.com/v1
    api_key: not-used
    model_name: ${NEMO_DEFAULT_MODEL}
    temperature: 0.0
    max_tokens: 512

workflow:
  _type: react_agent
  tool_names: [email_phishing_analyzer]
  llm_name: llm
  verbose: false
  parse_agent_response_max_retries: 3
  additional_instructions: The final response should indicate that the email is either "phishing" or "benign".
  # Use the LLM's native tool-calling API instead of NAT's text-mode ReAct regex
  # parser (see calculator-agent.yml for the rationale).
  use_native_tool_calling: true
