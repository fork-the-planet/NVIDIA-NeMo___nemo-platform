# email-phishing-eval.yml
#
# Evaluation config for the email phishing agent.
#
# Contains only the eval section — not the agent workflow. The agent runs
# remotely (already deployed); its endpoint is passed via the CLI:
#
#   nemo agents evaluate run \
#       --eval-config plugins/nemo-agents/examples/email-phishing-analyzer/src/nat_email_phishing_analyzer/email-phishing-eval.yml \
#       --agent email-phishing-agent
#
# The judge LLM scores each generated verdict against the expected label in
# smaller_test.csv (column ``label`` = "phishing" | "benign").
#
# NOTE: the upstream NAT config used ragas/trajectory/profiler evaluators. Those
# do not run through ``nemo agents evaluate``; this reshapes to the platform's
# tunable_rag_evaluator judge, matching calculator-eval.yml. Verify against your
# evaluator plugin and tune the weights/prompt as needed.

llms:
  judge_llm:
    _type: openai
    # base_url and api_key are injected automatically by the platform
    # (routes through the Inference Gateway). For local runs, override via
    # --base-url or NEMO_BASE_URL.
    model_name: ${NEMO_DEFAULT_MODEL}
    temperature: 0.0
    max_tokens: 1024

eval:
  general:
    max_concurrency: 1
    output_dir: eval/email-phishing
    dataset:
      _type: csv
      file_path: data/smaller_test.csv
      id_key: subject
      structure:
        question_key: body
        answer_key: label
  evaluators:
    accuracy:
      _type: tunable_rag_evaluator
      llm_name: judge_llm
      default_scoring: true
      default_score_weights:
        coverage: 0.5
        correctness: 0.3
        relevance: 0.2
      judge_llm_prompt: >
        You are an evaluator scoring an email phishing classifier. The expected
        answer is the ground-truth label ("phishing" or "benign"). Score whether
        the generated answer reaches the same verdict as the expected label.
        Rules:
        - Score is a float between 0.0 and 1.0.
        - 1.0 means the generated verdict matches the expected label.
        - Provide a 1-2 sentence reasoning.
