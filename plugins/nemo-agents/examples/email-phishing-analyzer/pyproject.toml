[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "nemo-agents-example-email-phishing"
version = "0.1.0"
description = "NAT ``email_phishing_analyzer`` function for the nemo-agents phishing ReAct example."
requires-python = ">=3.11"
dependencies = [
    "nvidia-nat-core>=1.8.0,<1.9",
]

[project.entry-points."nat.components"]
nemo_agents_example_email_phishing = "nat_email_phishing_analyzer.register"

[tool.hatch.build.targets.wheel]
packages = ["src/nat_email_phishing_analyzer"]
