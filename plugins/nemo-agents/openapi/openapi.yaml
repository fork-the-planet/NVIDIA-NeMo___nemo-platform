        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    delete:
      tags:
      - Agent Deployments
      summary: Delete Deployment
      description: 'Stop and remove a deployment.


        Marks the deployment as ``deleting``.  The controller terminates the

        subprocess and removes the entity on the next reconcile cycle.'
      operationId: delete_deployment_apis_agents_v2_workspaces__workspace__deployments__name__delete
      parameters:
      - name: workspace
        in: path
        required: true
        schema:
          type: string
          title: Workspace
      - name: name
        in: path
        required: true
        schema:
          type: string
          title: Name
      responses:
        '204':
          description: Successful Response
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /apis/agents/v2/workspaces/{workspace}/deployments/{name}/logs:
    get:
      tags:
      - Agent Deployments
      summary: Get Deployment Logs
      description: Return the most recent *tail* lines from the deployment's log file.
