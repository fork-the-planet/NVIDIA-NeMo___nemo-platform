        in: path
        required: true
        schema:
          type: string
          title: Workspace
      - name: name
        in: path
        required: true
        schema:
          type: string
          title: Name
      - name: tail
        in: query
        required: false
        schema:
          type: integer
          maximum: 10000
          minimum: 0
          default: 500
          title: Tail
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeploymentLogsResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /apis/agents/v2/workspaces/{workspace}/deployments/{name}/logs/stream:
    get:
      tags:
      - Agent Deployments
      summary: Stream Deployment Logs
      description: SSE tail-follow of the deployment's log file; resumes via ``Last-Event-ID``.
