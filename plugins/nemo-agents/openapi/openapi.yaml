components:
  schemas:
    Agent:
      properties:
        name:
          type: string
          title: Name
          description: Entity name within the workspace
          default: ''
        workspace:
          type: string
          pattern: ^[\w\-\+.@:]+$
          title: Workspace
          description: Workspace identifier
        project:
          title: Project
          description: The name of the project associated with this entity.
          type: string
        description:
          type: string
          title: Description
          description: Human-readable description of the agent.
          default: ''
        config:
          additionalProperties: true
          type: object
          title: Config
          description: Agent config dict interpreted according to config_format.
        config_format:
          type: string
          title: Config Format
          description: platform-internal schema version tag for the agent config dict.
            `nat-workflow-v1` is the default legacy NAT workflow format; `nemo-agents-spec-v1`
            identifies the Platform-owned agent.yaml spec format.
          default: nat-workflow-v1
        id:
          type: string
          title: Id
          readOnly: true
        created_at:
          title: Created At
          readOnly: true
          type: string
          format: date-time
        created_by:
          title: Created By
          readOnly: true
          nullable: true
          type: string
        updated_at:
          title: Updated At
          readOnly: true
          type: string
          format: date-time
        updated_by:
          title: Updated By
          readOnly: true
          nullable: true
          type: string
        entity_id:
          type: string
          title: Entity Id
          description: Alias for id for backwards compatibility.
          readOnly: true
        parent:
          title: Parent
          description: Parent entity ID for nested entities.
          readOnly: true
          type: string
      type: object
      required:
      - workspace
      - id
      - created_at
      - created_by
      - updated_at
      - updated_by
      - entity_id
      - parent
      title: Agent
      description: "An agent definition \u2014 stores agent config and metadata.\n\
        \nEntity type: ``agent``\nPrimary lookup: by ``name`` within a ``workspace``.\n\
        \nThe agent's spec files live at the locations returned by\n:func:`agent_spec_file_ref`\
        \ and :func:`agent_config_file_ref` \u2014 they\nare **not** stored on the\
        \ entity because the paths are fully derivable\nfrom ``(workspace, name)``."
    AgentDeployment:
      properties:
        name:
          type: string
          title: Name
          description: Entity name within the workspace
          default: ''
        workspace:
          type: string
          pattern: ^[\w\-\+.@:]+$
          title: Workspace
          description: Workspace identifier
        project:
          title: Project
          description: The name of the project associated with this entity.
          type: string
        agent:
          type: string
          title: Agent
          description: Name of the Agent entity this deployment is for.
          default: ''
        config:
          additionalProperties: true
          type: object
          title: Config
          description: Resolved agent config with IGW URL injected, written when the
            deployment is created.
        status:
          type: string
          enum:
          - pending
          - starting
          - running
          - failed
          - deleting
          title: Status
          description: 'Lifecycle status: pending | starting | running | failed |
            deleting.'
          default: pending
        deployment_mode:
          type: string
          enum:
          - subprocess
          - docker
          - k8s
          title: Deployment Mode
          description: Runtime backend for this deployment. 'subprocess' (default)
            reads the loopback 'endpoint'; 'docker'/'k8s' read the projected 'endpoints'.
          default: subprocess
        endpoint:
          type: string
          title: Endpoint
          description: Subprocess loopback endpoint of the agent process (e.g. http://localhost:9001).
          default: ''
        endpoints:
          items:
            $ref: '#/components/schemas/Endpoint'
          type: array
          title: Endpoints
          description: Routable endpoints for container modes, projected from the
            deployments-plugin Deployment. Empty for subprocess mode (which uses 'endpoint').
        image:
          type: string
          title: Image
          description: Container image for docker/k8s modes. Empty for subprocess;
            falls back to AgentsConfig.deployments.default_image.
          default: ''
        plugin_deployment:
          type: string
          title: Plugin Deployment
          description: Name of the linked nemo-deployments Deployment entity. Defaults
            to this deployment's name when empty (set by the controller on create).
          default: ''
        port:
          type: integer
          title: Port
          description: Port the agent process is listening on.
          default: 0
        pid:
          type: integer
          title: Pid
          description: OS process ID of the agent subprocess.
          default: 0
        error:
          type: string
          title: Error
          description: Error message if status is 'failed'.
          default: ''
        id:
          type: string
          title: Id
          readOnly: true
        created_at:
          title: Created At
          readOnly: true
          type: string
          format: date-time
        created_by:
          title: Created By
          readOnly: true
          nullable: true
          type: string
        updated_at:
          title: Updated At
          readOnly: true
          type: string
          format: date-time
        updated_by:
          title: Updated By
          readOnly: true
          nullable: true
          type: string
        entity_id:
          type: string
          title: Entity Id
          description: Alias for id for backwards compatibility.
          readOnly: true
        parent:
          title: Parent
          description: Parent entity ID for nested entities.
          readOnly: true
          type: string
      type: object
      required:
      - workspace
      - id
      - created_at
      - created_by
      - updated_at
      - updated_by
      - entity_id
      - parent
      title: AgentDeployment
      description: "A running (or pending) deployment of an Agent.\n\nEntity type:\
        \ ``agent_deployment``\nLifecycle: pending \u2192 starting \u2192 running\
        \ | failed.\nThe :class:`~nemo_agents_plugin.runner.controller.AgentDeploymentController`\n\
        drives state transitions by reconciling this entity against the\n:class:`~nemo_agents_plugin.runner.backend.RunnerBackend`."
    AnalyzeBatchConfig:
      properties:
        batch:
          type: string
          title: Batch
          description: Path to a batch directory produced by evaluate-suite.
        format:
          type: string
          enum:
          - md
          - json
          title: Format
          description: 'Output format: md or json.'
          default: md
        mechanical_only:
          type: boolean
          title: Mechanical Only
          description: Skip the LLM analysis pass.
          default: false
        anthropic_api_key_secret:
          title: Anthropic Api Key Secret
          description: Name of a platform Secret holding the Anthropic API key.  When
            set on a submit, the value is injected as ``ANTHROPIC_API_KEY`` into the
            dispatched subprocess so the LLM gap-analysis pass can call Anthropic.  Ignored
            when ``mechanical_only=True``.  Local (in-process) runs read ``ANTHROPIC_API_KEY``
            from the calling shell as before.
          type: string
      type: object
      required:
      - batch
      title: AnalyzeBatchConfig
    AnalyzeJob:
      properties:
        id:
          title: Id
          type: string
        name:
          type: string
          title: Name
        description:
          title: Description
          type: string
        project:
          title: Project
          type: string
        workspace:
          title: Workspace
          type: string
        created_at:
          title: Created At
          type: string
          format: date-time
        updated_at:
          title: Updated At
          type: string
          format: date-time
        spec:
          $ref: '#/components/schemas/AnalyzeBatchConfig'
        status:
          $ref: '#/components/schemas/PlatformJobStatus'
        status_details:
          title: Status Details
          additionalProperties: true
          type: object
        error_details:
          title: Error Details
          additionalProperties: true
          type: object
        ownership:
          title: Ownership
          additionalProperties: true
          type: object
        custom_fields:
          title: Custom Fields
          additionalProperties: true
          type: object
      type: object
      required:
      - name
      - spec
      title: AnalyzeJob
    AnalyzeJobRequest:
      properties:
        name:
          title: Name
          type: string
        description:
          title: Description
          type: string
        project:
          title: Project
          type: string
        spec:
          $ref: '#/components/schemas/AnalyzeBatchConfig'
        ownership:
          title: Ownership
          additionalProperties: true
          type: object
        custom_fields:
          title: Custom Fields
          additionalProperties: true
          type: object
      type: object
      required:
      - spec
      title: AnalyzeJobRequest
    AnalyzeJobsListFilter:
      additionalProperties: false
      properties:
        created_at:
          allOf:
          - $ref: '#/components/schemas/DatetimeFilter'
          description: Jobs created at 'gte' datetime or 'lte' datetime.
        name:
          anyOf:
          - $ref: '#/components/schemas/StringFilter'
          - type: string
          description: Name of the job.
          title: Name
        workspace:
          description: Workspace of the job.
          title: Workspace
          type: string
        project:
          description: Project containing the job.
          title: Project
          type: string
        status:
          allOf:
          - $ref: '#/components/schemas/PlatformJobStatus'
          description: The current status.
        updated_at:
          allOf:
          - $ref: '#/components/schemas/DatetimeFilter'
          description: Jobs updated at 'gte' datetime or 'lte' datetime.
      title: AnalyzeJobsListFilter
      type: object
    AnalyzeJobsPage:
      properties:
        data:
          items:
            $ref: '#/components/schemas/AnalyzeJob'
          type: array
          title: Data
        pagination:
          allOf:
          - $ref: '#/components/schemas/PaginationData'
          description: Pagination information.
        sort:
          title: Sort
          description: The field on which the results are sorted.
          type: string
        filter:
          title: Filter
          description: Filtering information.
          additionalProperties: true
          type: object
      type: object
      required:
      - data
      title: AnalyzeJobsPage
    AnalyzeJobsSortField:
      type: string
      enum:
      - created_at
      - -created_at
      - updated_at
      - -updated_at
      title: AnalyzeJobsSortField
    CreateAgentRequest:
      properties:
        name:
          type: string
          title: Name
          description: Unique agent name within the workspace.
        description:
          type: string
          title: Description
          description: Human-readable description.
          default: ''
        config:
          additionalProperties: true
          type: object
          title: Config
          description: Agent config dict interpreted according to config_format.
        config_format:
          type: string
          title: Config Format
          description: Config format identifier.
          default: nat-workflow-v1
      type: object
      required:
      - name
      - config
      title: CreateAgentRequest
      description: Request body for ``POST /v2/workspaces/{workspace}/agents``.
    CreateDeploymentRequest:
      properties:
        agent:
          type: string
          title: Agent
          description: Name of the Agent to deploy.
        name:
          title: Name
          description: Optional deployment name.  Auto-generated from agent name +
            random suffix if omitted.
          type: string
        deployment_mode:
          type: string
          enum:
          - subprocess
          - docker
          - k8s
          title: Deployment Mode
          description: 'Runtime backend: subprocess (default), docker, or k8s.'
          default: subprocess
        image:
          type: string
          title: Image
          description: Container image for docker/k8s modes. Ignored for subprocess.
          default: ''
      type: object
      required:
      - agent
      title: CreateDeploymentRequest
      description: Request body for ``POST /v2/workspaces/{workspace}/deployments``.
    DatetimeFilter:
      additionalProperties: false
      properties:
        $gte:
          description: Filter for results greater than or equal to this datetime.
          title: $Gte
          format: date-time
          type: string
        $lte:
          description: Filter for results less than or equal to this datetime.
          title: $Lte
          format: date-time
          type: string
      title: DatetimeFilter
      type: object
    DeploymentLogsResponse:
      properties:
        data:
          items:
            $ref: '#/components/schemas/LogLine'
          type: array
          title: Data
        total_lines:
          type: integer
          title: Total Lines
          description: Number of lines actually returned.
        next_offset:
          type: integer
          title: Next Offset
          description: Byte offset just past the returned tail; pass as Last-Event-ID
            to resume the stream without gaps.
      type: object
      required:
      - data
      - total_lines
      - next_offset
      title: DeploymentLogsResponse
      description: Response body for ``GET /deployments/{name}/logs``.
    Endpoint:
      properties:
        name:
          type: string
          title: Name
        url:
          type: string
          title: Url
        protocol:
          type: string
          enum:
          - http
          - https
          - grpc
          - tcp
          title: Protocol
          default: http
      type: object
      required:
      - name
      - url
      title: Endpoint
      description: 'A routable network endpoint for a deployment.


        Mirrors ``nemo_deployments_plugin.types.Endpoint`` so container-mode

        deployments can carry the address the deployments-plugin ``Deployment``

        projected without the agents plugin depending on that plugin at the

        entity-schema layer.'
    EvaluateAgentSpec:
      properties:
        agent:
          title: Agent
          description: "Agent to evaluate against \u2014 either a platform-managed\
            \ agent reference (e.g. 'calculator', 'workspace/calculator') or an HTTP(S)\
            \ endpoint URL (e.g. 'http://localhost:8080').  Bare names resolve to\
            \ the platform gateway URL '{base_url}/apis/agents/v2/workspaces/{workspace}/agents/{name}/-';\
            \ URLs are passed through to 'nat eval --endpoint' verbatim.  When omitted,\
            \ the eval config must include an inline agent workflow."
          type: string
        eval_config:
          type: string
          title: Eval Config
          description: Path to the NAT evaluation YAML config file.
        eval_config_fileset:
          title: Eval Config Fileset
          description: Optional fileset reference (``name`` or ``workspace/name``).  When
            set, the runner downloads the fileset's contents into a tempdir and resolves
            ``eval_config`` relative to that dir.  Local CLI runs leave this ``None``.
          type: string
        output:
          title: Output
          description: "Where to write eval outputs \u2014 either a local directory\
            \ (path-shaped: starts with '/', './', '../', '~/') or a NeMo Platform\
            \ fileset reference ('name' or 'workspace/name').  Filesets are created\
            \ on demand if missing.  Defaults to <ctx.storage.persistent>/results\
            \ (the platform-injected persistent volume) when not provided."
          type: string
        workspace:
          type: string
          title: Workspace
          description: Workspace name used to construct the Inference Gateway URL
            when injecting base_url into judge LLMs that have none set, and to resolve
            --agent / --output to gateway endpoints / fileset names when given a bare
            name.
          default: default
      type: object
      required:
      - eval_config
      title: EvaluateAgentSpec
      description: "Spec for an agent evaluation job.\n\nField declaration order also\
        \ drives the auto-generated CLI flag\norder \u2014 keep the most-frequently-set\
        \ knobs first.\n\nAttributes:\n    agent: The agent to evaluate against. \
        \ Accepts either a\n        platform-managed agent reference (``\"name\"``\
        \ or\n        ``\"workspace/name\"``) or a literal HTTP(S) endpoint URL. \
        \ The\n        shape is auto-detected at run time \u2014 values containing\n\
        \        ``\"://\"`` are treated as URLs (and forwarded to\n        ``nat\
        \ eval --endpoint`` verbatim); anything else is resolved\n        to the platform\
        \ gateway URL\n        ``{base_url}/apis/agents/v2/workspaces/{workspace}/agents/{name}/-``.\n\
        \        When ``None`` the eval config is expected to include an\n       \
        \ inline agent workflow.\n    eval_config: Path to the NAT evaluation YAML\
        \ config file.  When\n        ``eval_config_fileset`` is set, this is interpreted\
        \ relative\n        to the downloaded fileset's contents.\n    eval_config_fileset:\
        \ Optional fileset reference (``name`` or\n        ``workspace/name``) that\
        \ pre-stages the eval YAML and any\n        sibling files (e.g. dataset).\
        \  Used by platform-managed\n        submissions where the ``agents.evaluate-agent``\
        \ function\n        uploads everything before submitting; local CLI runs leave\n\
        \        this ``None`` and let ``eval_config`` be a real local path.\n   \
        \ output: Where to put the eval outputs.  Accepts either a local\n       \
        \ directory path (``./out``, ``/abs/out``, ``~/out``) or an\n        NeMo\
        \ Platform fileset reference (``\"name\"`` or ``\"workspace/name\"``).\n \
        \       Path-shaped values write directly to disk; bare names upload\n   \
        \     results to the named fileset, creating it on demand.  When\n       \
        \ ``None`` the job writes to ``ctx.storage.persistent /\n        \"results\"\
        `` \u2014 the platform-injected persistent volume in\n        container runs,\
        \ a tempdir under ``$TMPDIR`` for local CLI\n        runs.\n    workspace:\
        \ NeMo Platform workspace used to scope gateway URL injection,\n        ``--agent``\
        \ resolution, and ``--output`` fileset creation\n        when those values\
        \ are given as bare names."
    EvaluateJob:
      properties:
        id:
          title: Id
          type: string
        name:
          type: string
          title: Name
        description:
          title: Description
          type: string
        project:
          title: Project
          type: string
        workspace:
          title: Workspace
          type: string
        created_at:
          title: Created At
          type: string
          format: date-time
        updated_at:
          title: Updated At
          type: string
          format: date-time
        spec:
          $ref: '#/components/schemas/EvaluateAgentSpec'
        status:
          $ref: '#/components/schemas/PlatformJobStatus'
        status_details:
          title: Status Details
          additionalProperties: true
          type: object
        error_details:
          title: Error Details
          additionalProperties: true
          type: object
        ownership:
          title: Ownership
          additionalProperties: true
          type: object
        custom_fields:
          title: Custom Fields
          additionalProperties: true
          type: object
      type: object
      required:
      - name
      - spec
      title: EvaluateJob
    EvaluateJobRequest:
      properties:
        name:
          title: Name
          type: string
        description:
          title: Description
          type: string
        project:
          title: Project
          type: string
        spec:
          $ref: '#/components/schemas/EvaluateAgentSpec'
        ownership:
          title: Ownership
          additionalProperties: true
          type: object
        custom_fields:
          title: Custom Fields
          additionalProperties: true
          type: object
      type: object
      required:
      - spec
      title: EvaluateJobRequest
    EvaluateJobsListFilter:
      additionalProperties: false
      properties:
        created_at:
          allOf:
          - $ref: '#/components/schemas/DatetimeFilter'
          description: Jobs created at 'gte' datetime or 'lte' datetime.
        name:
          anyOf:
          - $ref: '#/components/schemas/StringFilter'
          - type: string
          description: Name of the job.
          title: Name
        workspace:
          description: Workspace of the job.
          title: Workspace
          type: string
        project:
          description: Project containing the job.
          title: Project
          type: string
        status:
          allOf:
          - $ref: '#/components/schemas/PlatformJobStatus'
          description: The current status.
        updated_at:
          allOf:
          - $ref: '#/components/schemas/DatetimeFilter'
          description: Jobs updated at 'gte' datetime or 'lte' datetime.
      title: EvaluateJobsListFilter
      type: object
    EvaluateJobsPage:
      properties:
        data:
          items:
            $ref: '#/components/schemas/EvaluateJob'
          type: array
          title: Data
        pagination:
          allOf:
          - $ref: '#/components/schemas/PaginationData'
          description: Pagination information.
        sort:
          title: Sort
          description: The field on which the results are sorted.
          type: string
        filter:
          title: Filter
          description: Filtering information.
          additionalProperties: true
          type: object
      type: object
      required:
      - data
      title: EvaluateJobsPage
    EvaluateJobsSortField:
      type: string
      enum:
      - created_at
      - -created_at
      - updated_at
      - -updated_at
      title: EvaluateJobsSortField
    EvaluateSuiteConfig:
      properties:
        evals:
          type: string
          title: Evals
          description: Path to the directory of eval tasks.
        agent:
          title: Agent
          description: Agent root (defaults to repo root in local run).
          type: string
        runner:
          type: string
          enum:
          - auto
          - harbor
          - nat
          title: Runner
          description: Eval runner.
          default: auto
        prefer:
          type: string
          enum:
          - harbor
