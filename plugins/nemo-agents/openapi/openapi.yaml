openapi: 3.1.0
info:
  title: agents (plugin)
  version: 0.0.0
paths:
  /apis/agents/v2/workspaces/{workspace}/agents:
    post:
      tags:
      - Agents
      summary: Create Agent
      description: Create a new agent from a NAT workflow config.
      operationId: create_agent_apis_agents_v2_workspaces__workspace__agents_post
      parameters:
      - name: workspace
        in: path
        required: true
        schema:
          type: string
          title: Workspace
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateAgentRequest'
      responses:
        '201':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Agent'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    get:
      tags:
      - Agents
      summary: List Agents
      description: List all agents in the workspace with pagination and filter support.
      operationId: list_agents_apis_agents_v2_workspaces__workspace__agents_get
      parameters:
      - name: workspace
        in: path
        required: true
        schema:
          type: string
          title: Workspace
      - name: page
        in: query
        required: false
        schema:
          type: integer
          minimum: 1
          default: 1
          title: Page
      - name: page_size
        in: query
        required: false
        schema:
          type: integer
          maximum: 100
          minimum: 1
          default: 20
          title: Page Size
      - name: sort
        in: query
        required: false
        schema:
          type: string
          default: -created_at
          title: Sort
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NemoListResponse_Agent_'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /apis/agents/v2/workspaces/{workspace}/agents/{name}:
    get:
      tags:
      - Agents
      summary: Get Agent
      description: Get a specific agent by name.
      operationId: get_agent_apis_agents_v2_workspaces__workspace__agents__name__get
      parameters:
      - name: workspace
        in: path
        required: true
        schema:
          type: string
          title: Workspace
      - name: name
        in: path
        required: true
        schema:
          type: string
          title: Name
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Agent'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    delete:
      tags:
      - Agents
      summary: Delete Agent
      description: 'Delete an agent by name.


        Returns 409 if any deployments in a live state (pending/starting/running)

        still reference this agent.  Delete or wait for those deployments to finish

        before deleting the agent.'
      operationId: delete_agent_apis_agents_v2_workspaces__workspace__agents__name__delete
      parameters:
      - name: workspace
        in: path
        required: true
        schema:
          type: string
          title: Workspace
      - name: name
        in: path
        required: true
        schema:
          type: string
          title: Name
      responses:
        '204':
          description: Successful Response
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /apis/agents/v2/workspaces/{workspace}/deployments:
    post:
      tags:
      - Agent Deployments
      summary: Create Deployment
      description: 'Create a new deployment for an existing agent.


        The deployment starts in ``pending`` state and is picked up by the

        deployment controller on its next reconcile cycle.'
      operationId: create_deployment_apis_agents_v2_workspaces__workspace__deployments_post
      parameters:
      - name: workspace
        in: path
        required: true
        schema:
          type: string
          title: Workspace
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateDeploymentRequest'
      responses:
        '201':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentDeployment'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    get:
      tags:
      - Agent Deployments
      summary: List Deployments
      description: List all deployments in the workspace with pagination and filter
        support.
      operationId: list_deployments_apis_agents_v2_workspaces__workspace__deployments_get
      parameters:
      - name: workspace
        in: path
        required: true
        schema:
          type: string
          title: Workspace
      - name: page
        in: query
        required: false
        schema:
          type: integer
          minimum: 1
          default: 1
          title: Page
      - name: page_size
        in: query
        required: false
        schema:
          type: integer
          maximum: 100
          minimum: 1
          default: 20
          title: Page Size
      - name: sort
        in: query
        required: false
        schema:
          type: string
          default: -created_at
          title: Sort
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NemoListResponse_AgentDeployment_'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /apis/agents/v2/workspaces/{workspace}/deployments/{name}:
    get:
      tags:
      - Agent Deployments
      summary: Get Deployment
      description: Get a deployment by name.
      operationId: get_deployment_apis_agents_v2_workspaces__workspace__deployments__name__get
      parameters:
      - name: workspace
        in: path
        required: true
        schema:
          type: string
          title: Workspace
      - name: name
        in: path
        required: true
        schema:
          type: string
          title: Name
