    QuantizationScheme:
      type: string
      enum:
      - bnb-4bit
      - bnb-8bit
      - fp8
      - nvfp4
      - mxfp4
      title: QuantizationScheme
      description: "Quantization schemes supported when ``quantize_model=True``.\n\
        \nMembers are string values so they serialize cleanly through pydantic\nand\
        \ JSON configs. The enum also owns construction of the corresponding\ntransformers\
        \ ``quantization_config`` object; optional ML dependencies stay\nlocally imported\
        \ in that construction path.\n\nSelection guide:\n- ``bnb-4bit`` / ``bnb-8bit``:\
        \ bitsandbytes NF4 / int8. Widest hardware\n  support (Ampere+), works with\
        \ QLoRA and LoftQ. Default for training.\n- ``fp8``: transformers ``FineGrainedFP8Config``.\
        \ Float8 with block-wise\n  scaling. Requires Hopper (sm_90+) or Blackwell.\
        \ Inference-leaning.\n- ``nvfp4``: NVIDIA FP4 via ``torchao.prototype.mx_formats.NVFP4WeightOnlyConfig``\n\
        \  wrapped in ``TorchAoConfig``. Requires Blackwell (sm_100+). Weight-only.\n\
        - ``mxfp4``: OCP Microscaling FP4 via transformers ``Mxfp4Config``.\n  Hardware\
        \ support varies by torch/torchao version."
