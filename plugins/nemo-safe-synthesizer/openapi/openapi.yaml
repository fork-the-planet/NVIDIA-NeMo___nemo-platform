    SafeSynthesizerParameters:
      properties:
        data:
          allOf:
          - $ref: '#/components/schemas/DataParameters'
          description: Configuration controlling how input data is grouped and split
            for training and evaluation.
        evaluation:
          allOf:
          - $ref: '#/components/schemas/EvaluationParameters'
          description: Parameters for evaluating the quality of generated synthetic
            data.
        training:
          allOf:
          - $ref: '#/components/schemas/TrainingHyperparams'
          description: Hyperparameters for model training such as learning rate, batch
            size, and LoRA adapter settings.
        generation:
          allOf:
          - $ref: '#/components/schemas/GenerateParameters'
          description: Parameters governing synthetic data generation including temperature,
            top-p, and number of records to produce.
        privacy:
          allOf:
          - $ref: '#/components/schemas/DifferentialPrivacyHyperparams'
          description: Differential-privacy hyperparameters. When ``None``, differential
            privacy is disabled entirely.
        time_series:
          allOf:
          - $ref: '#/components/schemas/TimeSeriesParameters'
          description: Configuration for time-series mode. Time-series pipeline is
            currently experimental.
        replace_pii:
          allOf:
          - $ref: '#/components/schemas/PiiReplacerConfig'
          description: PII replacement configuration. When ``None``, PII replacement
            is skipped.
        preflight:
          allOf:
          - $ref: '#/components/schemas/PreflightParameters'
          description: Preflight validation overrides, including checks to skip via
            ``disabled_checks``.
        emit_telemetry:
          type: boolean
          title: Emit Telemetry
          description: Whether to emit anonymous Safe Synthesizer telemetry events.
            Defaults from NEMO_TELEMETRY_ENABLED when unset.
        enable_synthesis:
          type: boolean
          title: Enable Synthesis
          description: Whether to run LLM training and generation phases. When false
            the task only performs PII replacement and returns the processed data.
          default: true
        enable_replace_pii:
          type: boolean
          title: Enable Replace Pii
          description: Whether to run the default PII replacement pipeline before
            synthesis.
          default: true
      type: object
      title: SafeSynthesizerParameters
      description: NMP-facing Safe Synthesizer parameters with SDK convenience flags.
    SafeSynthesizerSummary:
      properties:
        synthetic_data_quality_score:
          title: Synthetic Data Quality Score
          description: Weighted composite of the five sub-scores below (SQS). Higher
            is better (0--10 scale).
          type: number
        column_correlation_stability_score:
          title: Column Correlation Stability Score
          description: How closely pairwise column correlations in synthetic data
            match the original for numeric and categorical columns.
          type: number
        deep_structure_stability_score:
          title: Deep Structure Stability Score
          description: PCA-based comparison of multivariate structure between real
            and synthetic data for numeric and categorical columns.
          type: number
        column_distribution_stability_score:
          title: Column Distribution Stability Score
          description: Per-column Jensen-Shannon distance between training and synthetic
            distributions averaged across all numeric and categorical columns.
          type: number
        text_semantic_similarity_score:
          title: Text Semantic Similarity Score
          description: Embedding-based semantic closeness between real and synthetic
            free-text columns.
          type: number
        text_structure_similarity_score:
          title: Text Structure Similarity Score
          description: Jensen-Shannon divergence over sentence count, words-per-sentence,
            and characters-per-word distributions between real and synthetic free-text
            columns.
          type: number
        data_privacy_score:
          title: Data Privacy Score
          description: Composite of MIA and AIA protection scores.
          type: number
        membership_inference_protection_score:
          title: Membership Inference Protection Score
          description: Resistance to attacks that try to determine whether a record
            was in the training set.
          type: number
        attribute_inference_protection_score:
          title: Attribute Inference Protection Score
          description: Resistance to attacks that try to infer sensitive attributes
            from quasi-identifiers.
          type: number
        num_valid_records:
          title: Num Valid Records
          description: Count of synthetic records that passed schema and format validation.
          type: integer
        num_invalid_records:
          title: Num Invalid Records
          description: Count of synthetic records filtered out during validation.
          type: integer
        num_prompts:
          title: Num Prompts
          description: Total LLM generation prompts issued.
          type: integer
        valid_record_fraction:
          title: Valid Record Fraction
          description: 'Ratio of valid records: ``num_valid_records / (num_valid_records
            + num_invalid_records)``.'
          type: number
        num_completion_tokens:
          title: Num Completion Tokens
          description: Total tokens generated by the LLM across all completions.
          type: integer
        num_valid_record_tokens:
          title: Num Valid Record Tokens
          description: Tokens in records that passed validation.
          type: integer
        num_invalid_record_tokens:
          title: Num Invalid Record Tokens
          description: Tokens in records that failed validation.
          type: integer
        num_non_record_tokens:
          title: Num Non Record Tokens
          description: Tokens not part of any recognized record.
          type: integer
        valid_record_token_fraction:
          title: Valid Record Token Fraction
          description: Fraction of total completion tokens in valid records.
          type: number
        tokens_per_prompt:
          title: Tokens Per Prompt
          description: 'Average completion tokens per prompt: num_completion_tokens
            / num_prompts.'
          type: number
        tokens_per_second:
          title: Tokens Per Second
          description: Total completion tokens divided by generation wall-clock time.
          type: number
        valid_tokens_per_second:
          title: Valid Tokens Per Second
          description: Valid record tokens divided by generation wall-clock time.
          type: number
        tokenization_overhead_sec:
          title: Tokenization Overhead Sec
          description: Wall-clock seconds spent on tokenization for statistics tracking.
          type: number
        timing:
          allOf:
          - $ref: '#/components/schemas/SafeSynthesizerTiming'
          description: Per-stage wall-clock durations.
      type: object
      required:
      - timing
      title: SafeSynthesizerSummary
      description: "Aggregated quality, privacy, and record-count metrics for a pipeline\
        \ run.\n\nToken-field invariants (when all referenced fields are populated):\n\
        \n* ``num_non_record_tokens == num_completion_tokens\n  - num_valid_record_tokens\
        \ - num_invalid_record_tokens``\n  (clamped to 0 if slight tokenizer-boundary\
        \ drift makes the\n  subtraction negative).\n* ``tokens_per_prompt == num_completion_tokens\
        \ / num_prompts``.\n* ``valid_record_token_fraction == num_valid_record_tokens\n\
        \  / num_completion_tokens``."
    SafeSynthesizerTiming:
      properties:
        total_time_sec:
          title: Total Time Sec
          description: Total end-to-end pipeline duration in seconds.
          type: number
        pii_replacer_time_sec:
          title: Pii Replacer Time Sec
          description: Time spent on PII replacement.
          type: number
        training_time_sec:
          title: Training Time Sec
          description: Time spent on model training.
          type: number
        generation_time_sec:
          title: Generation Time Sec
          description: Time spent generating synthetic records.
          type: number
        evaluation_time_sec:
          title: Evaluation Time Sec
          description: Time spent evaluating synthetic data quality.
          type: number
      type: object
      title: SafeSynthesizerTiming
      description: Wall-clock durations for each pipeline stage.
    StepDefinition:
      properties:
        vars:
          title: Vars
          description: Variable names and templates.
          additionalProperties:
            anyOf:
            - type: string
            - additionalProperties: true
              type: object
            - items: {}
              type: array
          type: object
        columns:
          allOf:
          - $ref: '#/components/schemas/ColumnActions'
          description: Columns transform configuration.
        rows:
          allOf:
          - $ref: '#/components/schemas/RowActions'
          description: Rows transform configurations.
      type: object
      title: StepDefinition
      description: Single transformation step with optional variables, column actions,
        and row actions.
    StringFilter:
      additionalProperties: false
      properties:
        $eq:
          description: Filter for results equal to this value.
          title: $Eq
          type: string
        $like:
          description: Filter for results matching this pattern.
          title: $Like
          type: string
        $in:
          description: Filter for results in this list of values.
          title: $In
          items:
            type: string
          type: array
        $nin:
          description: Filter for results not in this list of values.
          title: $Nin
          items:
            type: string
          type: array
      title: StringFilter
      type: object
    StructuredGenerationParameters:
      properties:
        enabled:
          type: boolean
          title: enabled
          description: Whether to use structured generation for better format control.
          default: false
        backend:
          type: string
          enum:
          - auto
          - xgrammar
          - guidance
          - outlines
          - lm-format-enforcer
          title: backend
          description: 'The backend used by vLLM when structured generation is enabled.
            Supported backends: ''outlines'', ''guidance'', ''xgrammar'', ''lm-format-enforcer''.
            ''auto'' will allow vLLM to choose the backend.'
          default: auto
        schema_method:
          type: string
          enum:
          - auto
          - regex
          - json_schema
          - structural_tag
          title: schema_method
          description: The method used to generate the schema from your dataset and
            pass it to the generation backend. 'auto' picks 'structural_tag' on xgrammar-capable
            backends and 'regex' otherwise. 'regex' uses a custom regex construction
            method that tends to be more comprehensive than 'json_schema' at the cost
            of speed. 'structural_tag' uses XGrammar Structural Tag to compose schema-constrained
            JSONL output.
          default: auto
        use_single_sequence:
          type: boolean
          title: use_single_sequence
          description: Whether to use a regex that matches exactly one sequence or
            record if ``max_sequences_per_example`` is 1.
          default: false
      type: object
      title: StructuredGenerationParameters
      description: 'Configuration for vLLM structured generation.


        These parameters control whether generation is constrained to schema-shaped

        output, which backend enforces the constraint, and how the constraint schema

        is built.'
    TimeSeriesParameters:
      properties:
        is_timeseries:
          type: boolean
          title: Is Timeseries
          description: Whether to treat the dataset as time series. When enabled,
            either ``timestamp_column`` or ``timestamp_interval_seconds`` is required.
            For grouped time series, ``group_training_examples_by`` needs to be set.
          default: false
        timestamp_column:
          title: Timestamp Column
          description: Name of the column containing timestamps used to order records
            when ``is_timeseries`` is ``True``. Required only when ``is_timeseries``
            is ``True`` and ``timestamp_interval_seconds`` is not provided.
          type: string
        timestamp_interval_seconds:
          title: Timestamp Interval Seconds
          description: Positive whole-number interval in seconds between timestamps.
            If not provided, the timestamp column will be used to infer the interval.
          type: integer
        timestamp_format:
          title: Timestamp Format
          description: 'Format of the timestamp column. Accepts either: (1) Python
            strftime format codes for string timestamps (e.g., ''%Y-%m-%d %H:%M:%S'',
            ''%m/%d/%Y''), or (2) ''elapsed_seconds'' for numeric (int/float) timestamps
            representing seconds as an increasing counter (e.g., 0, 60, 120 for 1-minute
            intervals). If not provided, the format will be inferred from the data.'
          type: string
        start_timestamp:
          anyOf:
          - type: string
          - type: integer
          title: Start Timestamp
          description: Start timestamp. If not provided, the first timestamp in the
            timestamp column will be used.
        stop_timestamp:
          anyOf:
          - type: string
          - type: integer
          title: Stop Timestamp
          description: Stop timestamp. If not provided, the last timestamp in the
            timestamp column will be used.
      type: object
      title: TimeSeriesParameters
      description: 'Configuration for time-series mode in the Safe Synthesizer pipeline.


        Controls whether a dataset is treated as time-series data, including

        timestamp column selection, interval inference, and format validation.

        The time-series pipeline is currently experimental.'
    TrainingHyperparams:
      properties:
        num_input_records_to_sample:
          anyOf:
          - type: string
            const: auto
          - type: integer
          title: num_input_records_to_sample
          description: Number of records the model will see during training. This
            parameter is a proxy for training time. For example, if its value is the
            same size as the input dataset, this is like training for a single epoch.
            If its value is larger, this is like training for multiple (possibly fractional)
            epochs. If its value is smaller, this is like training for a fraction
            of an epoch. Supports 'auto' where a reasonable value is chosen based
            on other config params and data.
          default: auto
        batch_size:
          type: integer
          title: batch_size
          description: The batch size per device for training. Must be >= 1.
          default: 1
        gradient_accumulation_steps:
          type: integer
          title: gradient_accumulation_steps
          description: Number of update steps to accumulate the gradients for, before
            performing a backward/update pass. This technique increases the effective
            batch size that will fit into GPU memory. Must be >= 1.
          default: 8
        weight_decay:
          type: number
          title: weight_decay
          description: The weight decay to apply to all layers except all bias and
            LayerNorm weights in the AdamW optimizer. Must be in (0, 1).
          default: 0.01
        warmup_ratio:
          type: number
          title: warmup_ratio
          description: Ratio of total training steps used for a linear warmup from
            0 to the learning rate. Must be > 0.
          default: 0.05
        lr_scheduler:
          type: string
          title: lr_scheduler
          description: The scheduler type to use. See the HuggingFace documentation
            of ``SchedulerType`` for all possible values.
          default: cosine
        learning_rate:
          anyOf:
          - type: string
            const: auto
          - type: number
          title: learning_rate
          description: The initial learning rate for `AdamW` optimizer. Must be in
            (0, 1). Setting to 'auto' uses a model-specific default if one exists.
          default: auto
        lora_r:
          type: integer
          title: lora_r
          description: The rank of the LoRA update matrices. Lower rank results in
            smaller update matrices with fewer trainable parameters. Must be > 0.
          default: 32
        lora_alpha_over_r:
          type: number
          title: lora_alpha_over_r
          description: The ratio of the LoRA scaling factor (alpha) to the LoRA rank.
            Empirically, this parameter works well when set to 0.5, 1, or 2. Must
            be in [0.5, 3].
          default: 1.0
        lora_target_modules:
          items:
            type: string
          type: array
          title: lora_target_modules
          description: 'The list of transformer modules to apply LoRA to. Possible
            modules: ''q_proj'', ''k_proj'', ''v_proj'', ''o_proj'', ''gate_proj'',
            ''up_proj'', ''down_proj''.'
          default:
          - q_proj
          - k_proj
          - v_proj
          - o_proj
        rope_scaling_factor:
          anyOf:
          - type: string
            const: auto
          - type: integer
          title: rope_scaling_factor
          description: Scale the base LLM's context length by this factor using RoPE
            scaling. Must be >= 1 or 'auto'.
          default: auto
        validation_ratio:
          type: number
          title: validation_ratio
          description: The fraction of the training data used for validation. Must
            be in [0, 1]. If set to 0, no validation will be performed. If set larger
            than 0, validation loss will be computed and reported throughout training.
          default: 0.0
        validation_steps:
          type: integer
          title: validation_steps
          description: The number of steps between validation checks for the HF Trainer
            arguments. Must be > 0.
          default: 15
        pretrained_model:
          type: string
          title: pretrained_model
          description: Pretrained model to use for fine-tuning. Defaults to SmolLM3.
            May be a Hugging Face model ID (loaded from the Hugging Face Hub or cache)
            or a local path. See security note in docs before using untrusted sources.
          default: HuggingFaceTB/SmolLM3-3B
        quantize_model:
          type: boolean
          title: quantize_model
          description: Whether to quantize the model during training. This can reduce
            memory usage and potentially speed up training, but may also impact model
            accuracy.
          default: false
        quantization_bits:
          type: integer
          enum:
          - 4
          - 8
          title: quantization_bits
          description: "Deprecated: use ``quantization_scheme`` instead. Bit width\
            \ for bitsandbytes quantization when ``quantization_scheme`` is not set\
            \ (back-compat alias: 4 \u2192 bnb-4bit, 8 \u2192 bnb-8bit)."
          default: 8
          deprecated: true
        quantization_scheme:
          allOf:
          - $ref: '#/components/schemas/QuantizationScheme'
          title: quantization_scheme
          description: Quantization scheme to use when ``quantize_model=True``. Accepts
            ``bnb-4bit``, ``bnb-8bit``, ``fp8``, ``nvfp4``, or ``mxfp4``. If unset,
            falls back to ``quantization_bits`` for backward compatibility. Non-bitsandbytes
            schemes are incompatible with ``peft_implementation='loftq'``.
        peft_implementation:
          type: string
          title: peft_implementation
          description: 'The PEFT (Parameter-Efficient Fine-Tuning) implementation
            to use. Options: ''lora'' for Low-Rank Adaptation, ''QLORA'' for Quantized
            LoRA.'
          default: QLORA
        max_vram_fraction:
          type: number
          title: max_vram_fraction
          description: The fraction of the total VRAM to use for training. Modify
            this to allow longer sequences. Must be in [0, 1].
          default: 0.8
        attn_implementation:
          type: string
          title: attn_implementation
          description: 'The attention implementation to use for model loading. Default
            uses ''sdpa'' (PyTorch scaled dot product attention) for broad compatibility.
            Other common values: ''flash_attention_2'' (requires flash-attn pip package),
            ''flash_attention_3'' (requires flash-attn-3 support), ''eager'' (standard
            PyTorch). Custom HuggingFace Kernels Hub paths (e.g. ''kernels-community/flash-attn2'')
            are also supported.'
          default: sdpa
      type: object
      title: TrainingHyperparams
      description: 'Hyperparameters that control the training process behavior.


        This class contains all the fine-tuning hyperparameters that control how the
        model

        learns, including learning rates, batch sizes, LoRA configuration, and optimization

        settings. These parameters directly affect training performance and quality.'
    ValidationError:
      properties:
        loc:
          items:
            anyOf:
            - type: string
            - type: integer
          type: array
          title: Location
        msg:
          type: string
          title: Message
        type:
          type: string
          title: Error Type
        input:
          title: Input
        ctx:
          type: object
          title: Context
          additionalProperties: true
      type: object
      required:
      - loc
      - msg
      - type
      title: ValidationError
    ValidationParameters:
      properties:
        group_by_accept_no_delineator:
          type: boolean
          title: group_by_accept_no_delineator
          description: Whether to accept completions without both beginning and end
            of sequence delineators as a single sequence.
          default: false
        group_by_ignore_invalid_records:
          type: boolean
          title: group_by_ignore_invalid_records
          description: Whether to ignore invalid records in a sequence and proceed
            with the valid records.
          default: false
        group_by_fix_non_unique_value:
          type: boolean
          title: group_by_fix_non_unique_value
          description: Whether to automatically fix non-unique group-by values in
            a sequence by using the first unique value for all records.
          default: false
        group_by_fix_unordered_records:
          type: boolean
          title: group_by_fix_unordered_records
          description: Whether to automatically fix unordered records in a sequence
            by sorting the records.
          default: false
      type: object
      title: ValidationParameters
      description: 'Configuration for record and sequence validation.


        These parameters control the validation and automatic fixes when going

        from LLM output to tabular data.'
