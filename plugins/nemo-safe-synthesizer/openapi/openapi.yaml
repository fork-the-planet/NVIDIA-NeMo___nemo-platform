openapi: 3.1.0
info:
  title: safe-synthesizer (plugin)
  version: 0.0.0
paths:
  /apis/safe-synthesizer/v2/workspaces/{workspace}/jobs:
    post:
      tags:
      - Safe Synthesizer
      summary: Create Job
      operationId: create_job_apis_safe_synthesizer_v2_workspaces__workspace__jobs_post
      parameters:
      - name: workspace
        in: path
        required: true
        schema:
          type: string
          title: Workspace
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SafeSynthesizerJobRequest'
      responses:
        '201':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SafeSynthesizerJob'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    get:
      tags:
      - Safe Synthesizer
      summary: List Jobs
      operationId: list_jobs_apis_safe_synthesizer_v2_workspaces__workspace__jobs_get
      parameters:
      - name: workspace
        in: path
        required: true
        schema:
          type: string
          title: Workspace
      - name: page
        in: query
        required: false
        schema:
          type: integer
          exclusiveMinimum: 0
          description: Page number.
          default: 1
          title: Page
        description: Page number.
      - name: page_size
        in: query
        required: false
        schema:
          type: integer
          exclusiveMinimum: 0
          description: Page size.
          default: 10
          title: Page Size
        description: Page size.
      - name: sort
        in: query
        required: false
        schema:
          allOf:
          - $ref: '#/components/schemas/SafeSynthesizerJobsSortField'
          description: The field to sort by. To sort in decreasing order, use `-`
            in front of the field name.
          default: -created_at
        description: The field to sort by. To sort in decreasing order, use `-` in
          front of the field name.
      - in: query
        name: filter
        style: deepObject
        required: false
        explode: true
        schema:
          $ref: '#/components/schemas/SafeSynthesizerJobsListFilter'
        description: Filter jobs on various criteria.
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SafeSynthesizerJobsPage'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /apis/safe-synthesizer/v2/workspaces/{workspace}/jobs/{job}/results/adapter/download:
    get:
      tags:
      - Safe Synthesizer
      summary: Download Job Result Adapter
      operationId: download_job_result_adapter_apis_safe_synthesizer_v2_workspaces__workspace__jobs__job__results_adapter_download_get
      parameters:
      - name: workspace
        in: path
        required: true
        schema:
          type: string
          title: Workspace
      - name: job
        in: path
        required: true
        schema:
          type: string
          title: Job
      responses:
        '200':
          description: Successful Response
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        '404':
          description: Not Found
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /apis/safe-synthesizer/v2/workspaces/{workspace}/jobs/{job}/results/evaluation-report/download:
    get:
      tags:
      - Safe Synthesizer
      summary: Download Job Result Evaluation-Report
      operationId: download_job_result_evaluation_report_apis_safe_synthesizer_v2_workspaces__workspace__jobs__job__results_evaluation_report_download_get
      parameters:
      - name: workspace
        in: path
        required: true
        schema:
          type: string
          title: Workspace
      - name: job
        in: path
        required: true
        schema:
          type: string
          title: Job
      responses:
        '200':
          description: Successful Response
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        '404':
          description: Not Found
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /apis/safe-synthesizer/v2/workspaces/{workspace}/jobs/{job}/results/summary/download:
    get:
      tags:
      - Safe Synthesizer
      summary: Download Job Result Summary
      operationId: download_job_result_summary_apis_safe_synthesizer_v2_workspaces__workspace__jobs__job__results_summary_download_get
      parameters:
      - name: workspace
        in: path
        required: true
        schema:
          type: string
          title: Workspace
      - name: job
        in: path
        required: true
        schema:
          type: string
          title: Job
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SafeSynthesizerSummary'
        '404':
          description: Not Found
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /apis/safe-synthesizer/v2/workspaces/{workspace}/jobs/{job}/results/synthetic-data/download:
    get:
      tags:
      - Safe Synthesizer
      summary: Download Job Result Synthetic-Data
      operationId: download_job_result_synthetic_data_apis_safe_synthesizer_v2_workspaces__workspace__jobs__job__results_synthetic_data_download_get
      parameters:
      - name: workspace
        in: path
        required: true
        schema:
          type: string
          title: Workspace
      - name: job
        in: path
        required: true
        schema:
          type: string
          title: Job
      responses:
        '200':
          description: Successful Response
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        '404':
          description: Not Found
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /apis/safe-synthesizer/v2/workspaces/{workspace}/jobs/{job}/results/{name}:
    get:
      tags:
      - Safe Synthesizer
      summary: Get Job Result
      operationId: get_job_result_apis_safe_synthesizer_v2_workspaces__workspace__jobs__job__results__name__get
      parameters:
      - name: workspace
        in: path
        required: true
        schema:
          type: string
          title: Workspace
      - name: job
        in: path
        required: true
        schema:
          type: string
          title: Job
      - name: name
        in: path
        required: true
        schema:
          type: string
          title: Name
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PlatformJobResultResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /apis/safe-synthesizer/v2/workspaces/{workspace}/jobs/{job}/results/{name}/download:
    get:
      tags:
      - Safe Synthesizer
      summary: Download Job Result
      operationId: download_job_result_apis_safe_synthesizer_v2_workspaces__workspace__jobs__job__results__name__download_get
      parameters:
      - name: workspace
        in: path
        required: true
        schema:
          type: string
          title: Workspace
      - name: job
        in: path
        required: true
        schema:
          type: string
          title: Job
      - name: name
        in: path
        required: true
        schema:
          type: string
          title: Name
      responses:
        '200':
          description: Successful Response
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        '404':
          description: Not Found
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /apis/safe-synthesizer/v2/workspaces/{workspace}/jobs/{name}:
    get:
      tags:
      - Safe Synthesizer
      summary: Get Job
      operationId: get_job_apis_safe_synthesizer_v2_workspaces__workspace__jobs__name__get
      parameters:
      - name: workspace
        in: path
        required: true
        schema:
          type: string
          title: Workspace
      - name: name
        in: path
        required: true
        schema:
          type: string
          title: Name
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SafeSynthesizerJob'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    delete:
      tags:
      - Safe Synthesizer
      summary: Delete Job
      operationId: delete_job_apis_safe_synthesizer_v2_workspaces__workspace__jobs__name__delete
      parameters:
      - name: workspace
        in: path
        required: true
        schema:
          type: string
          title: Workspace
      - name: name
        in: path
        required: true
        schema:
          type: string
          title: Name
      responses:
        '204':
          description: Successful Response
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /apis/safe-synthesizer/v2/workspaces/{workspace}/jobs/{name}/cancel:
    post:
      tags:
      - Safe Synthesizer
      summary: Cancel Job
      operationId: cancel_job_apis_safe_synthesizer_v2_workspaces__workspace__jobs__name__cancel_post
      parameters:
      - name: workspace
        in: path
        required: true
        schema:
          type: string
          title: Workspace
      - name: name
        in: path
        required: true
        schema:
          type: string
          title: Name
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SafeSynthesizerJob'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /apis/safe-synthesizer/v2/workspaces/{workspace}/jobs/{name}/logs:
    get:
      tags:
      - Safe Synthesizer
      summary: Get Job Logs
      operationId: get_job_logs_apis_safe_synthesizer_v2_workspaces__workspace__jobs__name__logs_get
      parameters:
      - name: workspace
        in: path
        required: true
        schema:
          type: string
          title: Workspace
      - name: name
        in: path
        required: true
        schema:
          type: string
          title: Name
      - name: limit
        in: query
        required: false
        schema:
          title: Limit
          type: integer
      - name: page_cursor
        in: query
        required: false
        schema:
          title: Page Cursor
          type: string
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PlatformJobLogPage'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /apis/safe-synthesizer/v2/workspaces/{workspace}/jobs/{name}/results:
    get:
      tags:
      - Safe Synthesizer
      summary: List Job Results
      operationId: list_job_results_apis_safe_synthesizer_v2_workspaces__workspace__jobs__name__results_get
      parameters:
      - name: workspace
        in: path
        required: true
        schema:
          type: string
          title: Workspace
      - name: name
        in: path
        required: true
        schema:
          type: string
          title: Name
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PlatformJobListResultResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /apis/safe-synthesizer/v2/workspaces/{workspace}/jobs/{name}/status:
    get:
      tags:
      - Safe Synthesizer
      summary: Get Job Status
      operationId: get_job_status_apis_safe_synthesizer_v2_workspaces__workspace__jobs__name__status_get
      parameters:
      - name: workspace
        in: path
        required: true
        schema:
          type: string
          title: Workspace
      - name: name
        in: path
        required: true
        schema:
          type: string
          title: Name
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PlatformJobStatusResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
components:
  schemas:
    ClassifyConfig:
      properties:
        enable_classify:
          title: Enable Classify
          description: Enable column classification.
          type: boolean
        entities:
          title: Entities
          description: List of entity types to classify.
          items:
            type: string
          type: array
        num_samples:
          title: Num Samples
          description: Number of column values to sample for classification.
          default: 3
          type: integer
        classify_model_provider:
          title: Classify Model Provider
          description: Name of the model provider in the Inference Gateway for column
            classification. The job compiler will resolve this to the appropriate
            endpoint URL.
          type: string
      type: object
      title: ClassifyConfig
      description: Configuration for column classification using an LLM.
    Column:
      properties:
        name:
          title: Name
          description: Column name.
          type: string
        position:
          anyOf:
          - type: integer
          - items:
              type: integer
            type: array
          title: Position
          description: Column position.
        condition:
          title: Condition
          description: Column condition.
          type: string
        value:
          title: Value
          description: Rename to value.
          type: string
        entity:
          anyOf:
          - type: string
          - items:
              type: string
            type: array
          title: Entity
          description: Column entity match.
        type:
          anyOf:
          - type: string
          - items:
              type: string
            type: array
          title: Type
          description: Column type match.
      type: object
      title: Column
      description: Rule matcher for selecting columns by name, position, condition,
        entity, or type.
    ColumnActions:
      properties:
        add:
          title: Add
          description: Columns to add.
          items:
            $ref: '#/components/schemas/Column'
          type: array
        drop:
          title: Drop
          description: Columns to drop.
          items:
            $ref: '#/components/schemas/Column'
          type: array
        rename:
          title: Rename
          description: Columns to rename.
          items:
            $ref: '#/components/schemas/Column'
          type: array
      type: object
      title: ColumnActions
      description: Container for column add, drop, and rename operations.
    DataParameters:
      properties:
        group_training_examples_by:
          title: Group Training Examples By
          description: Column to group training examples by. This is useful when you
            want the model to learn inter-record correlations for a given grouping
            of records.
          type: string
        order_training_examples_by:
          title: Order Training Examples By
          description: Column to order training examples by. This is useful when you
            want the model to learn sequential relationships for a given ordering
            of records. If you provide this parameter, you must also provide ``group_training_examples_by``.
          type: string
        max_sequences_per_example:
          anyOf:
          - type: string
            const: auto
          - type: integer
          title: Max Sequences Per Example
          description: If specified, adds at most this number of sequences per example.
            Supports 'auto', which resolves to 1 when differential privacy is enabled,
            None for time-series mode (each example fills the context window), and
            10 otherwise. If set to None, fills up the context window. Required for
            DP to limit contribution of each example.
          default: auto
        holdout:
          type: number
          title: Holdout
          description: Amount of records to hold out for evaluation. If this is a
            float between 0 and 1, that ratio of records is held out. If an integer
            greater than 1, that number of records is held out. If the value is equal
            to zero, no holdout will be performed. Must be >= 0.
          default: 0.05
        max_holdout:
          type: integer
          title: Max Holdout
          description: Maximum number of records to hold out. Overrides any behavior
            set by ``holdout``. Must be >= 0.
          default: 2000
        random_state:
          title: Random State
          description: Random state for holdout split to ensure reproducibility.
          type: integer
      type: object
      title: DataParameters
      description: Configuration for grouping, ordering, and splitting input data
        for training and evaluation.
    DatetimeFilter:
      additionalProperties: false
      properties:
        $gte:
          description: Filter for results greater than or equal to this datetime.
          title: $Gte
          format: date-time
          type: string
        $lte:
          description: Filter for results less than or equal to this datetime.
          title: $Lte
          format: date-time
          type: string
      title: DatetimeFilter
      type: object
    DifferentialPrivacyHyperparams:
      properties:
        dp_enabled:
          type: boolean
          title: dp_enabled
          description: Enable differentially-private training with DP-SGD.
          default: false
        epsilon:
          type: number
          title: epsilon
          description: Target privacy budget -- lower values provide stronger privacy.
            Must be > 0.
          default: 8.0
        delta:
          anyOf:
          - type: string
            const: auto
          - type: number
          title: delta
          description: Probability of accidentally leaking information. Should be
            much smaller than 1/n where n is the number of training records. Setting
            to 'auto' uses delta of 1/n^1.2. Must be in [0, 1) or 'auto'.
          default: auto
        per_sample_max_grad_norm:
          type: number
          title: per_sample_max_grad_norm
          description: Maximum L2 norm for per-sample gradient clipping. Must be >
            0.
          default: 1.0
      type: object
      title: DifferentialPrivacyHyperparams
      description: 'Hyperparameters for differential privacy during training.


        These parameters configure differential privacy (DP) training using DP-SGD
        algorithm.

        When enabled, they provide formal privacy guarantees by adding calibrated
        noise

        during training.'
    EvaluationParameters:
      properties:
        mia_enabled:
          type: boolean
          title: mia_enabled
          description: Enable membership inference attack evaluation for privacy assessment.
          default: true
        aia_enabled:
          type: boolean
          title: aia_enabled
          description: Enable attribute inference attack evaluation for privacy assessment.
          default: true
        sqs_report_columns:
          type: integer
          title: Sqs Report Columns
          description: Number of columns to include in statistical quality reports.
          default: 250
        sqs_report_rows:
          type: integer
          title: Sqs Report Rows
          description: Number of rows to include in statistical quality reports.
          default: 5000
        mandatory_columns:
          title: mandatory_columns
          description: Number of mandatory columns that must be used in evaluation.
          type: integer
        enabled:
          type: boolean
          title: enabled
          description: Enable or disable evaluation.
          default: true
        quasi_identifier_count:
          type: integer
          title: Quasi Identifier Count
          description: Number of quasi-identifiers to sample for privacy attacks.
          default: 3
        pii_replay_enabled:
          type: boolean
          title: pii_replay_enabled
          description: Enable PII Replay detection.
          default: true
        pii_replay_entities:
          title: Pii Replay Entities
          description: List of entities for PII Replay. If not provided, default entities
            will be used.
          items:
            type: string
          type: array
        pii_replay_columns:
          title: Pii Replay Columns
          description: List of columns for PII Replay. If not provided, only entities
            will be used.
          items:
            type: string
          type: array
      type: object
      title: EvaluationParameters
      description: 'Configuration for evaluating synthetic data quality and privacy.


        This class controls which evaluation metrics are computed and how they are
        configured.

        It includes privacy attack evaluations, statistical quality metrics, and downstream

        machine learning performance assessments.'
    FileStorageType:
      type: string
      enum:
      - fileset
      title: FileStorageType
    GenerateParameters:
      properties:
        num_records:
          type: integer
          title: num_records
          description: Number of records to generate.
          default: 1000
        temperature:
          type: number
          title: temperature
          description: Sampling temperature for controlling randomness (higher = more
            random).
          default: 0.9
        repetition_penalty:
          type: number
          title: repetition_penalty
          description: The value used to control the likelihood of the model repeating
            the same token. Must be > 0.
          default: 1.0
        top_p:
          type: number
          title: top_p
          description: Nucleus sampling probability for token selection. Must be in
            (0, 1].
          default: 1.0
        patience:
          type: integer
          title: patience
          description: Number of consecutive generations where the ``invalid_fraction_threshold``
            is reached before stopping generation. Must be >= 1.
          default: 3
        invalid_fraction_threshold:
          type: number
          title: invalid_fraction_threshold
          description: The fraction of invalid records that will stop generation after
            the ``patience`` limit is reached. Must be in [0, 1].
          default: 0.8
        structured_generation:
          allOf:
          - $ref: '#/components/schemas/StructuredGenerationParameters'
          description: Structured generation parameters controlling schema-constrained
            output.
        enforce_timeseries_fidelity:
          type: boolean
          title: enforce_timeseries_fidelity
          description: Enforce time-series fidelity by enforcing order, intervals,
            start and end times of the records.
          default: false
        validation:
          allOf:
          - $ref: '#/components/schemas/ValidationParameters'
          description: Validation parameters controlling validation logic and automatic
            fixes when parsing LLM output and converting to tabular data.
        attention_backend:
          title: attention_backend
          description: 'The attention backend for the vLLM engine. Common values:
            ''FLASHINFER'', ''FLASH_ATTN'', ''TRITON_ATTN'', ''FLEX_ATTENTION''. If
            ``None`` or ''auto'', vLLM will auto-select the best available backend.'
          default: auto
          type: string
      type: object
      title: GenerateParameters
      description: 'Configuration parameters for synthetic data generation.


        These parameters control how synthetic data is generated after the model is
        trained.

        They affect the quality, diversity, and validity of the generated synthetic
        records.'
    GlinerConfig:
      properties:
        enable_gliner:
          type: boolean
          title: Enable Gliner
          description: Enable GLiNER NER module.
          default: true
        enable_batch_mode:
          type: boolean
          title: Enable Batch Mode
          description: Enable GLiNER batch mode.
          default: true
        batch_size:
          type: integer
          title: Batch Size
          description: GLiNER batch size.
          default: 8
        chunk_length:
          type: integer
          title: Chunk Length
          description: GLiNER batch chunk length in characters.
          default: 512
        gliner_model:
          type: string
          title: Gliner Model
          description: GLiNER model name.
          default: nvidia/gliner-PII
      type: object
      title: GlinerConfig
      description: Configuration for the GLiNER named-entity recognition model.
    Globals:
      properties:
        locales:
          title: Locales
          description: List of locales.
          examples:
          - en_US
          items:
            type: string
          type: array
        seed:
          title: Seed
          description: Optional random seed.
          type: integer
          exclusiveMaximum: 2147483647.0
          exclusiveMinimum: -2147483647.0
        classify:
          allOf:
          - $ref: '#/components/schemas/ClassifyConfig'
          description: Column classification configuration.
          default:
            num_samples: 3
        ner:
          allOf:
          - $ref: '#/components/schemas/NERConfig'
          description: Named Entity Recognition configuration.
          default:
            ner_threshold: 0.3
            enable_regexps: false
            gliner:
              batch_size: 8
              chunk_length: 512
              enable_batch_mode: true
              enable_gliner: true
              gliner_model: nvidia/gliner-PII
        lock_columns:
          title: Lock Columns
          description: List of columns to preserve as immutable across all transformations.
          items:
            type: string
          type: array
      type: object
      title: Globals
      description: Global settings for the PII replacer including locales, seed, NER,
        and classification.
    HTTPValidationError:
      properties:
        detail:
          items:
            $ref: '#/components/schemas/ValidationError'
          type: array
          title: Detail
      type: object
      title: HTTPValidationError
    NERConfig:
      properties:
        ner_threshold:
          type: number
          title: Ner Threshold
          description: NER model threshold.
          default: 0.3
        enable_regexps:
          type: boolean
          title: Enable Regexps
          description: Enable NER regular expressions (experimental).
          default: false
        gliner:
          allOf:
          - $ref: '#/components/schemas/GlinerConfig'
          description: GLiNER NER configuration.
          default:
            enable_gliner: true
            enable_batch_mode: true
            batch_size: 8
            chunk_length: 512
            gliner_model: nvidia/gliner-PII
        ner_entities:
          title: Ner Entities
          description: List of entity types to recognize. If unset, classification
            entity types are used.
          items:
            type: string
          type: array
      type: object
