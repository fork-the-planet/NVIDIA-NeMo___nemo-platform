[project]
name = "nemo-safe-synthesizer-plugin"
version = "0.1.0"
description = "NeMo Safe Synthesizer plugin."
readme = "README.md"
requires-python = ">=3.11,<3.14"
authors = [{ name = "NVIDIA", email = "nemo@nvidia.com" }]
dependencies = [
    "datasets>=3.3.1,<=4.3.0",
    "fastapi>=0.115.8",
    "fsspec>=2024.10.0",
    "gunicorn>=23.0.0",
    "httpx>=0.27.2",
    "nemo-platform",
    "nemo-platform-plugin",
    "nemo-safe-synthesizer==0.1.2",
    "pydantic[email]>=2.9.2",
    "pydantic-settings>=2.2.1",
    "python-multipart~=0.0.9",
    "requests>=2.31.0",
    "typer>=0.9.0",
    "uvicorn>=0.32.1",
]

[project.entry-points."nemo.services"]
safe-synthesizer = "nemo_safe_synthesizer_plugin.service:SafeSynthesizerService"

[project.entry-points."nemo.cli"]
safe-synthesizer = "nemo_safe_synthesizer_plugin.cli:SafeSynthesizerCLI"

[project.entry-points."nemo.sdk"]
safe_synthesizer = "nemo_safe_synthesizer_plugin.sdk.resources:safe_synthesizer_sdk_resources"

[project.entry-points."nemo.skills"]
safe-synthesizer = "nemo_safe_synthesizer_plugin.skills:get_skills_path"

[project.optional-dependencies]
test = [
    "pytest>=8.0",
    "pytest-asyncio>=0.23",
    "httpx>=0.27",
    "fastapi>=0.115",
]

# Generated from [tool.bundle-package]; do not edit by hand.
nemo-platform-plugin = [
  "anthropic>=0.88.0",
  "fastapi>=0.115.4",
  "lark>=1.1.0",
  "openai>=1.109.1",
  "pydantic>=2.10.3",
  "pydantic-settings>=2.8.1",
  "pyyaml>=6.0.2",
  "typer>=0.20.0,<0.26",
]

[build-system]
requires = ["hatchling", "nmp-build-tools"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel.hooks.custom]
path = "hatch_build.py"

[tool.hatch.build.targets.wheel]
packages = ["src/nemo_safe_synthesizer_plugin"]

[tool.uv]
cache-keys = [{ file = "pyproject.toml" }]

[tool.uv.sources]
nemo-platform = { workspace = true }
nemo-platform-plugin = { workspace = true }
nemo-platform-sdk = { workspace = true }
nmp-build-tools = { workspace = true }

[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"
pythonpath = ["src"]
markers = [
    "e2e: End-to-end tests",
    "gpu_integration: Tests that require GPU dependencies or hardware",
    "integration: Service integration tests",
    "slow: Tests that take a long time to run",
]

# Opt this plugin into OpenAPI spec generation.
[tool.nemo.openapi]

[tool.bundle-package]
nemo-platform-plugin = { source = "../../packages/nemo_platform_plugin/src/nemo_platform_plugin", module = "nemo_platform_plugin" }
