  version: 0.0.0
paths:
  /apis/evaluator/v1/healthz:
    get:
      tags:
      - Evaluator Plugin
      summary: Healthz
      operationId: healthz_apis_evaluator_v1_healthz_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                additionalProperties: true
                type: object
                title: Response Healthz Apis Evaluator V1 Healthz Get
  /apis/evaluator/v1/hello/{name}:
    get:
      tags:
      - Evaluator Plugin Hello Routes
      summary: Hello
      description: Greet a name.
      operationId: hello_apis_evaluator_v1_hello__name__get
      parameters:
      - name: name
        in: path
        required: true
        schema:
          type: string
          title: Name
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HelloResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /apis/evaluator/v2/workspaces/{workspace}/agent-eval-results:
    get:
      tags:
      - Evaluator Plugin Agent Eval Results Routes
      summary: List Agent Eval Results By Workspace
      description: List agent-evaluation result records for a workspace.
      operationId: list_agent_eval_results_apis_evaluator_v2_workspaces__workspace__agent_eval_results_get
      parameters:
      - name: workspace
        in: path
        required: true
        schema:
          type: string
          title: Workspace
      - name: page
        in: query
        required: false
        schema:
          type: integer
          minimum: 1
          description: Page number.
          default: 1
          title: Page
        description: Page number.
      - name: page_size
        in: query
        required: false
        schema:
          type: integer
          maximum: 1000
          minimum: 1
          description: Page size.
          default: 100
          title: Page Size
        description: Page size.
      - name: sort
        in: query
        required: false
        schema:
          allOf:
          - $ref: '#/components/schemas/ResultSort'
          description: Sort field; prefix with '-' for descending.
          default: -created_at
        description: Sort field; prefix with '-' for descending.
      - in: query
        name: filter
        style: deepObject
        required: false
        explode: true
        schema:
          $ref: '#/components/schemas/ResultFilter'
        description: Filter by workspace, name, target, and timestamps.
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentEvalResultsPage'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
