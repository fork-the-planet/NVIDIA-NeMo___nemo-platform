openapi: 3.1.0
info:
  title: evaluator (plugin)
  version: 0.2.0
paths:
  /apis/evaluator/v1/healthz:
    get:
      tags:
      - Evaluator Plugin
      summary: Healthz
      operationId: healthz_apis_evaluator_v1_healthz_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                additionalProperties: true
                type: object
                title: Response Healthz Apis Evaluator V1 Healthz Get
  /apis/evaluator/v1/hello/{name}:
    get:
      tags:
      - Evaluator Plugin Hello Routes
      summary: Hello
      description: Greet a name.
      operationId: hello_apis_evaluator_v1_hello__name__get
      parameters:
      - name: name
        in: path
        required: true
        schema:
          type: string
          title: Name
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HelloResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /apis/evaluator/v2/workspaces/{workspace}/evaluate/jobs:
    post:
      tags:
      - Evaluator Plugin Jobs Routes
      summary: Create Job
      operationId: create_job_apis_evaluator_v2_workspaces__workspace__evaluate_jobs_post
      parameters:
      - name: workspace
        in: path
        required: true
        schema:
          type: string
          title: Workspace
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EvaluateJobRequest'
      responses:
        '201':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EvaluateJob'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    get:
      tags:
      - Evaluator Plugin Jobs Routes
      summary: List Jobs
      operationId: list_jobs_apis_evaluator_v2_workspaces__workspace__evaluate_jobs_get
      parameters:
      - name: workspace
        in: path
        required: true
        schema:
          type: string
          title: Workspace
      - name: page
        in: query
        required: false
        schema:
          type: integer
          exclusiveMinimum: 0
          description: Page number.
          default: 1
          title: Page
        description: Page number.
      - name: page_size
        in: query
        required: false
        schema:
          type: integer
          exclusiveMinimum: 0
          description: Page size.
          default: 10
          title: Page Size
        description: Page size.
      - name: sort
        in: query
        required: false
        schema:
          allOf:
          - $ref: '#/components/schemas/EvaluateJobsSortField'
          description: The field to sort by. To sort in decreasing order, use `-`
            in front of the field name.
          default: -created_at
        description: The field to sort by. To sort in decreasing order, use `-` in
          front of the field name.
      - in: query
        name: filter
        style: deepObject
        required: false
        explode: true
        schema:
          $ref: '#/components/schemas/EvaluateJobsListFilter'
        description: Filter jobs on various criteria.
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EvaluateJobsPage'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /apis/evaluator/v2/workspaces/{workspace}/evaluate/jobs/{job}/results/{name}:
    get:
      tags:
      - Evaluator Plugin Jobs Routes
      summary: Get Job Result
      operationId: get_job_result_apis_evaluator_v2_workspaces__workspace__evaluate_jobs__job__results__name__get
      parameters:
      - name: workspace
        in: path
        required: true
        schema:
          type: string
          title: Workspace
      - name: job
        in: path
        required: true
        schema:
          type: string
          title: Job
      - name: name
        in: path
        required: true
        schema:
          type: string
          title: Name
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PlatformJobResultResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /apis/evaluator/v2/workspaces/{workspace}/evaluate/jobs/{job}/results/{name}/download:
    get:
      tags:
      - Evaluator Plugin Jobs Routes
      summary: Download Job Result
      operationId: download_job_result_apis_evaluator_v2_workspaces__workspace__evaluate_jobs__job__results__name__download_get
      parameters:
      - name: workspace
        in: path
        required: true
        schema:
          type: string
          title: Workspace
      - name: job
        in: path
        required: true
        schema:
          type: string
          title: Job
      - name: name
        in: path
        required: true
        schema:
          type: string
          title: Name
      responses:
        '200':
          description: Successful Response
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        '404':
          description: Not Found
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /apis/evaluator/v2/workspaces/{workspace}/evaluate/jobs/{name}:
    get:
      tags:
      - Evaluator Plugin Jobs Routes
      summary: Get Job
      operationId: get_job_apis_evaluator_v2_workspaces__workspace__evaluate_jobs__name__get
      parameters:
      - name: workspace
        in: path
        required: true
        schema:
          type: string
          title: Workspace
      - name: name
        in: path
        required: true
        schema:
          type: string
          title: Name
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EvaluateJob'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    delete:
      tags:
      - Evaluator Plugin Jobs Routes
      summary: Delete Job
      operationId: delete_job_apis_evaluator_v2_workspaces__workspace__evaluate_jobs__name__delete
      parameters:
      - name: workspace
        in: path
        required: true
        schema:
          type: string
          title: Workspace
      - name: name
        in: path
        required: true
        schema:
          type: string
          title: Name
      responses:
        '204':
          description: Successful Response
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /apis/evaluator/v2/workspaces/{workspace}/evaluate/jobs/{name}/cancel:
    post:
      tags:
      - Evaluator Plugin Jobs Routes
      summary: Cancel Job
      operationId: cancel_job_apis_evaluator_v2_workspaces__workspace__evaluate_jobs__name__cancel_post
      parameters:
      - name: workspace
        in: path
        required: true
        schema:
          type: string
          title: Workspace
      - name: name
        in: path
        required: true
        schema:
          type: string
          title: Name
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EvaluateJob'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /apis/evaluator/v2/workspaces/{workspace}/evaluate/jobs/{name}/logs:
    get:
      tags:
      - Evaluator Plugin Jobs Routes
      summary: Get Job Logs
      operationId: get_job_logs_apis_evaluator_v2_workspaces__workspace__evaluate_jobs__name__logs_get
      parameters:
      - name: workspace
        in: path
        required: true
        schema:
          type: string
          title: Workspace
      - name: name
        in: path
        required: true
        schema:
          type: string
          title: Name
      - name: limit
        in: query
        required: false
        schema:
          title: Limit
          type: integer
      - name: page_cursor
        in: query
        required: false
        schema:
          title: Page Cursor
          type: string
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PlatformJobLogPage'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /apis/evaluator/v2/workspaces/{workspace}/evaluate/jobs/{name}/results:
    get:
      tags:
      - Evaluator Plugin Jobs Routes
      summary: List Job Results
      operationId: list_job_results_apis_evaluator_v2_workspaces__workspace__evaluate_jobs__name__results_get
      parameters:
      - name: workspace
        in: path
        required: true
        schema:
          type: string
          title: Workspace
      - name: name
        in: path
        required: true
        schema:
          type: string
          title: Name
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PlatformJobListResultResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /apis/evaluator/v2/workspaces/{workspace}/evaluate/jobs/{name}/status:
    get:
      tags:
      - Evaluator Plugin Jobs Routes
      summary: Get Job Status
      operationId: get_job_status_apis_evaluator_v2_workspaces__workspace__evaluate_jobs__name__status_get
      parameters:
      - name: workspace
        in: path
        required: true
        schema:
          type: string
          title: Workspace
      - name: name
        in: path
        required: true
        schema:
          type: string
          title: Name
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PlatformJobStatusResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /apis/evaluator/v2/workspaces/{workspace}/metrics:
    get:
      tags:
      - Evaluator Plugin Metrics Routes
      summary: List Metrics By Workspace
      description: List stored metrics for a specific workspace.
      operationId: list_metrics_apis_evaluator_v2_workspaces__workspace__metrics_get
      parameters:
      - name: workspace
        in: path
        required: true
        schema:
          type: string
          title: Workspace
      - name: page
        in: query
        required: false
        schema:
          type: integer
          minimum: 1
          description: Page number.
          default: 1
          title: Page
        description: Page number.
      - name: page_size
        in: query
        required: false
        schema:
          type: integer
          maximum: 1000
          minimum: 1
          description: Page size.
          default: 100
          title: Page Size
        description: Page size.
      - name: sort
        in: query
        required: false
        schema:
          allOf:
          - $ref: '#/components/schemas/MetricSort'
          description: The field to sort by. To sort in decreasing order, use `-`
            in front of the field name.
          default: created_at
        description: The field to sort by. To sort in decreasing order, use `-` in
          front of the field name.
      - in: query
        name: filter
        style: deepObject
        required: false
        explode: true
        schema:
          $ref: '#/components/schemas/MetricFilter'
        description: Filter metrics by workspace, name, metric_type, description,
          created_at, and updated_at.
      responses:
        '200':
          description: Return stored metrics for a workspace
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MetricsPage'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /apis/evaluator/v2/workspaces/{workspace}/metrics/{name}:
    post:
      tags:
      - Evaluator Plugin Metrics Routes
      summary: Create Metric
      description: Store a new metric, addressed by workspace/name.
      operationId: create_metric_apis_evaluator_v2_workspaces__workspace__metrics__name__post
      parameters:
      - name: workspace
        in: path
        required: true
        schema:
          type: string
          title: Workspace
      - name: name
        in: path
        required: true
        schema:
          type: string
          maxLength: 255
          pattern: ^[\w\-\.]+$
          title: Name
      - name: project
        in: query
        required: false
        schema:
          description: Optional project to associate with the metric.
          title: Project
          type: string
        description: Optional project to associate with the metric.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MetricInline'
      responses:
        '201':
          description: Store a new metric
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Metric'
        '409':
          description: Metric already exists
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    get:
      tags:
      - Evaluator Plugin Metrics Routes
      summary: Get Metric
      description: Get a stored metric by workspace and name.
      operationId: get_metric_apis_evaluator_v2_workspaces__workspace__metrics__name__get
      parameters:
      - name: workspace
        in: path
        required: true
        schema:
          type: string
          title: Workspace
      - name: name
        in: path
        required: true
        schema:
          type: string
          title: Name
      responses:
        '200':
          description: Return stored metric details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Metric'
        '404':
          description: Metric not found
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    delete:
      tags:
      - Evaluator Plugin Metrics Routes
      summary: Delete Metric
      description: Delete a stored metric by workspace and name.
      operationId: delete_metric_apis_evaluator_v2_workspaces__workspace__metrics__name__delete
      parameters:
      - name: workspace
        in: path
        required: true
        schema:
          type: string
          title: Workspace
      - name: name
        in: path
        required: true
        schema:
          type: string
          title: Name
      responses:
        '204':
          description: Delete a stored metric
        '404':
          description: Metric not found
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
components:
  schemas:
    Agent:
      properties:
        url:
          type: string
          title: Url
          description: Base URL of the agent endpoint.
        name:
          type: string
          title: Name
          description: Agent name / identifier.
        format:
          type: string
          enum:
          - generic
          - nemo_agent_toolkit
          title: Format
          description: Agent format that determines the execution path.
          default: generic
        api_key_secret:
          allOf:
          - $ref: '#/components/schemas/SecretRef'
          description: 'API key secret reference for the agent. Format: workspace/secret_name
            or secret_name within the job workspace.'
        body:
          title: Body
          description: Jinja template for the request payload. Required for generic
            agents.
          additionalProperties: true
          type: object
        response_path:
          title: Response Path
          description: JSONPath expression to extract the response text from the agent's
            response body. Required for generic agents.
          type: string
        trajectory_path:
          title: Trajectory Path
          description: JSONPath expression to extract the trajectory from the agent's
            response body. Optional.
          type: string
      additionalProperties: false
      type: object
      required:
      - url
      - name
      title: Agent
      description: "Agent definition for inference in online evaluation jobs.\n\n\
        An agent is an endpoint that accepts a request and returns a response,\npotentially\
        \ with a trajectory. Two formats are supported:\n\n- ``generic``: configurable\
        \ HTTP POST with Jinja-templated body and\n  JSONPath extraction for response\
        \ and trajectory.\n- ``nemo_agent_toolkit``: NeMo Agent Toolkit SSE streaming\
        \ protocol\n  (``/generate/full?filter_steps=none``)."
    BundledMetricOutputSpec:
      properties:
        name:
          type: string
          title: Name
        description:
          title: Description
          type: string
        value_json_schema:
          additionalProperties: true
          type: object
          title: Value Json Schema
      additionalProperties: false
      type: object
      required:
      - name
      - value_json_schema
      title: BundledMetricOutputSpec
      description: JSON-safe projection of a runtime metric output spec.
    CloudpickleMetricPayload:
      properties:
        kind:
          type: string
          const: cloudpickle
          title: Kind
          description: Payload format discriminator.
        python_version:
          type: string
          title: Python Version
          description: Python version the metric was pickled with (must match at execution).
        cloudpickle_version:
          type: string
          title: Cloudpickle Version
          description: cloudpickle version used to serialize the metric.
        pickle_protocol:
          type: integer
          title: Pickle Protocol
          description: Pickle protocol used.
        blob:
          type: string
          contentEncoding: base64
          contentMediaType: application/octet-stream
          title: Blob
          description: Base64-encoded cloudpickled metric object.
        digest:
          title: Digest
          description: SHA-256 digest of the payload bytes. Informational; recomputed
            server-side.
          type: string
      additionalProperties: false
      type: object
      required:
      - kind
      - python_version
      - cloudpickle_version
      - pickle_protocol
      - blob
      title: CloudpickleMetricPayload
      description: 'Wire schema for a cloudpickle-serialized metric payload.


        Mirrors the runtime ``CloudpickleMetricPayload`` so the API contract is

        explicit in the OpenAPI spec. The runtime bundle model serializes payloads

        polymorphically (typed as an abstract base), which renders as an opaque

        object in the spec; this concrete DTO documents the actual fields.'
    DatetimeFilter:
      additionalProperties: false
      properties:
        $gte:
          description: Filter for results greater than or equal to this datetime.
          title: $Gte
          format: date-time
          type: string
        $lte:
          description: Filter for results less than or equal to this datetime.
          title: $Lte
          format: date-time
          type: string
      title: DatetimeFilter
      type: object
    EvaluateInputSpec:
      properties:
        dataset:
          anyOf:
          - items:
              additionalProperties: true
              type: object
            type: array
            minItems: 1
          - $ref: '#/components/schemas/FilesetRef'
          title: Dataset
          description: Inline dataset rows or a persisted FilesetRef dataset source
            to evaluate.
        params:
          anyOf:
          - $ref: '#/components/schemas/RunConfig'
          - $ref: '#/components/schemas/RunConfigOnline'
          - $ref: '#/components/schemas/RunConfigOnlineModel'
          title: Params
          description: Optional evaluator SDK execution parameters.
        target:
          anyOf:
          - $ref: '#/components/schemas/Model'
          - $ref: '#/components/schemas/Agent'
          title: Target
          description: Optional model or agent target for online evaluation.
        prompt_template:
          anyOf:
          - type: string
          - additionalProperties: true
            type: object
          title: Prompt Template
          description: Optional prompt template for online target generation.
        field_mapping:
          allOf:
          - $ref: '#/components/schemas/FieldMapping'
          description: Optional mapping from canonical evaluator fields to dataset
            columns.
        metrics:
          items:
            anyOf:
            - $ref: '#/components/schemas/MetricInline'
            - $ref: '#/components/schemas/MetricRef'
          type: array
          minItems: 1
          title: Metrics
          description: Metrics to evaluate, given as inline metrics and/or references
            to stored metrics.
      additionalProperties: false
      type: object
      required:
      - dataset
      - metrics
      title: EvaluateInputSpec
      description: Submitter-facing SDK evaluation input for the evaluator plugin
        job.
    EvaluateJob:
      properties:
        id:
          title: Id
          type: string
        name:
          type: string
          title: Name
        description:
          title: Description
          type: string
        project:
          title: Project
          type: string
        workspace:
          title: Workspace
          type: string
        created_at:
          title: Created At
          type: string
          format: date-time
        updated_at:
          title: Updated At
          type: string
          format: date-time
        spec:
          $ref: '#/components/schemas/EvaluateSpec'
        status:
          $ref: '#/components/schemas/PlatformJobStatus'
        status_details:
          title: Status Details
          additionalProperties: true
          type: object
        error_details:
          title: Error Details
          additionalProperties: true
          type: object
        ownership:
          title: Ownership
          additionalProperties: true
          type: object
        custom_fields:
          title: Custom Fields
          additionalProperties: true
          type: object
      type: object
      required:
      - name
      - spec
      title: EvaluateJob
    EvaluateJobRequest:
      properties:
        name:
          title: Name
          type: string
        description:
          title: Description
          type: string
        project:
          title: Project
          type: string
        spec:
          $ref: '#/components/schemas/EvaluateInputSpec'
        ownership:
          title: Ownership
          additionalProperties: true
          type: object
        custom_fields:
          title: Custom Fields
          additionalProperties: true
          type: object
      type: object
      required:
      - spec
      title: EvaluateJobRequest
    EvaluateJobsListFilter:
      additionalProperties: false
      properties:
        created_at:
          allOf:
          - $ref: '#/components/schemas/DatetimeFilter'
          description: Jobs created at 'gte' datetime or 'lte' datetime.
        name:
          anyOf:
          - $ref: '#/components/schemas/StringFilter'
          - type: string
          description: Name of the job.
          title: Name
        workspace:
          description: Workspace of the job.
          title: Workspace
          type: string
        project:
          description: Project containing the job.
          title: Project
          type: string
        status:
          allOf:
          - $ref: '#/components/schemas/PlatformJobStatus'
          description: The current status.
        updated_at:
          allOf:
          - $ref: '#/components/schemas/DatetimeFilter'
          description: Jobs updated at 'gte' datetime or 'lte' datetime.
      title: EvaluateJobsListFilter
      type: object
    EvaluateJobsPage:
      properties:
        data:
          items:
            $ref: '#/components/schemas/EvaluateJob'
          type: array
          title: Data
        pagination:
          allOf:
          - $ref: '#/components/schemas/PaginationData'
          description: Pagination information.
        sort:
          title: Sort
          description: The field on which the results are sorted.
          type: string
        filter:
          title: Filter
          description: Filtering information.
          additionalProperties: true
          type: object
      type: object
      required:
      - data
      title: EvaluateJobsPage
    EvaluateJobsSortField:
      type: string
      enum:
      - created_at
      - -created_at
      - updated_at
      - -updated_at
      title: EvaluateJobsSortField
    EvaluateSpec:
      properties:
        dataset:
          anyOf:
          - items:
              additionalProperties: true
              type: object
            type: array
            minItems: 1
          - $ref: '#/components/schemas/FilesetRef'
          title: Dataset
          description: Inline dataset rows or a persisted FilesetRef dataset source
            to evaluate.
        params:
          anyOf:
          - $ref: '#/components/schemas/RunConfig'
          - $ref: '#/components/schemas/RunConfigOnline'
          - $ref: '#/components/schemas/RunConfigOnlineModel'
          title: Params
          description: Optional evaluator SDK execution parameters.
        target:
          anyOf:
          - $ref: '#/components/schemas/Model'
          - $ref: '#/components/schemas/Agent'
          title: Target
          description: Optional model or agent target for online evaluation.
        prompt_template:
          anyOf:
          - type: string
          - additionalProperties: true
            type: object
          title: Prompt Template
          description: Optional prompt template for online target generation.
        field_mapping:
          allOf:
          - $ref: '#/components/schemas/FieldMapping'
          description: Optional mapping from canonical evaluator fields to dataset
            columns.
        metrics:
          items:
            $ref: '#/components/schemas/MetricInline'
          type: array
          minItems: 1
          title: Metrics
          description: Inline metrics with all references resolved.
      additionalProperties: false
      type: object
      required:
      - dataset
      - metrics
      title: EvaluateSpec
      description: Canonical SDK evaluation spec with platform model and metric references
        resolved.
    FieldMapping:
      properties:
        input:
          title: Input
          description: Binding for the canonical 'input' evaluator field.
          type: string
          minLength: 1
          pattern: ^[^\[\]]*$
        output:
          title: Output
          description: Binding for the canonical 'output' evaluator field.
          type: string
          minLength: 1
