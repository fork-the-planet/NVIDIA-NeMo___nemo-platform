components:
  schemas:
    AgentEvalInputSpec:
      oneOf:
      - properties:
          target:
            not:
              type: 'null'
        required:
        - target
      - properties:
          trials:
            not:
              type: 'null'
        required:
        - trials
      properties:
        target:
          anyOf:
          - $ref: '#/components/schemas/ModelTargetInput'
          - $ref: '#/components/schemas/AgentTargetInput'
          - $ref: '#/components/schemas/CodexRunnerTarget'
          - $ref: '#/components/schemas/FabricRunnerTarget'
          title: Target
          description: 'What generates trials online: a Model or Agent endpoint, or
            an agent runner (e.g. Codex CLI). Endpoint targets carry their own request
            config (prompt template / inference params). Mutually exclusive with `trials`.'
        trials:
          title: Trials
          description: Precomputed trials to score directly (offline eval), instead
            of generating them from a `target`. Mutually exclusive with `target`.
          items:
            $ref: '#/components/schemas/AgentEvalTrialInput'
          type: array
        max_concurrent_tasks:
          type: integer
          minimum: 1.0
          title: Max Concurrent Tasks
          description: Maximum number of tasks evaluated concurrently. Distinct from
            a target's `params.parallelism`, which bounds concurrent inference requests
            *within* trial generation.
          default: 4
        fail_fast:
          type: boolean
          title: Fail Fast
          description: Stop the run on the first scoring failure when True.
          default: false
        benchmark:
          additionalProperties: true
          type: object
          title: Benchmark
          description: Benchmark metadata recorded with the run.
        tasks:
          items:
            $ref: '#/components/schemas/AgentEvalTaskInput'
          type: array
          minItems: 1
          title: Tasks
          description: Tasks to evaluate; at least one is required.
      additionalProperties: false
      type: object
      required:
      - tasks
      title: AgentEvalInputSpec
      description: 'Submitter-facing agent-evaluation input: tasks whose metrics may
        be inline or references.'
    AgentEvalResult:
      properties:
        id:
          type: string
          title: Id
          description: Unique identifier for the stored result record.
        name:
          type: string
          title: Name
          description: Result record name (equals the producing job's id).
        workspace:
          type: string
          title: Workspace
          description: Workspace the result belongs to.
        project:
          title: Project
          description: The project associated with this result.
          type: string
        job_id:
          type: string
          title: Job Id
          description: Identifier of the job run that produced this result.
        target_kind:
          title: Target Kind
          description: 'Target discriminator: ''model'', ''agent'', or a runner kind.'
          type: string
        target_name:
          title: Target Name
          description: Model/agent entity name, or the runner's model.
          type: string
        target_url:
          title: Target Url
          description: Endpoint URL, when the target is an HTTP model/agent.
          type: string
        scores:
          allOf:
          - $ref: '#/components/schemas/AggregatedMetricResult'
          description: Aggregated metric scores for the run.
        bundle_ref:
          type: string
          title: Bundle Ref
          description: Reference to the full result bundle in the Files service.
        created_at:
          type: string
          format: date-time
          title: Created At
          description: Timestamp the result was created.
        updated_at:
          type: string
          format: date-time
          title: Updated At
          description: Timestamp the result was last updated.
      type: object
      required:
      - id
      - name
      - workspace
      - job_id
      - scores
      - bundle_ref
      - created_at
      - updated_at
      title: AgentEvalResult
      description: API representation of a persisted agent-evaluation result record.
    AgentEvalResultsPage:
      properties:
        data:
          items:
            $ref: '#/components/schemas/AgentEvalResult'
          type: array
          title: Data
        pagination:
          allOf:
          - $ref: '#/components/schemas/PaginationData'
          description: Pagination information.
        sort:
          title: Sort
          description: The field on which the results are sorted.
          type: string
        filter:
          title: Filter
          description: Filtering information.
          additionalProperties: true
          type: object
      type: object
      required:
      - data
      title: AgentEvalResultsPage
    AgentEvalSpec:
      oneOf:
      - properties:
          target:
            not:
              type: 'null'
        required:
        - target
      - properties:
          trials:
            not:
              type: 'null'
        required:
        - trials
      properties:
        target:
          anyOf:
          - $ref: '#/components/schemas/ModelTargetOutput'
          - $ref: '#/components/schemas/AgentTargetOutput'
          - $ref: '#/components/schemas/CodexRunnerTarget'
          - $ref: '#/components/schemas/FabricRunnerTarget'
          title: Target
          description: 'What generates trials online: a Model or Agent endpoint, or
            an agent runner (e.g. Codex CLI). Endpoint targets carry their own request
            config (prompt template / inference params). Mutually exclusive with `trials`.'
        trials:
          title: Trials
          description: Precomputed trials to score directly (offline eval), instead
            of generating them from a `target`. Mutually exclusive with `target`.
          items:
            $ref: '#/components/schemas/AgentEvalTrialOutput'
          type: array
        max_concurrent_tasks:
          type: integer
          minimum: 1.0
          title: Max Concurrent Tasks
          description: Maximum number of tasks evaluated concurrently. Distinct from
            a target's `params.parallelism`, which bounds concurrent inference requests
            *within* trial generation.
          default: 4
        fail_fast:
          type: boolean
          title: Fail Fast
          description: Stop the run on the first scoring failure when True.
          default: false
        benchmark:
          additionalProperties: true
          type: object
          title: Benchmark
          description: Benchmark metadata recorded with the run.
        tasks:
          items:
            $ref: '#/components/schemas/AgentEvalTaskSpec'
          type: array
          minItems: 1
          title: Tasks
          description: Tasks to evaluate; at least one is required.
      additionalProperties: false
      type: object
      required:
      - tasks
      title: AgentEvalSpec
      description: 'Canonical agent-evaluation spec: tasks with all metric references
        resolved to inline.'
    AgentEvalTaskInput:
      properties:
        id:
          type: string
          title: Id
          description: Stable task identifier, unique within the task collection.
        intent:
          type: string
          title: Intent
          description: Human-readable description of the desired agent behavior.
        inputs:
          allOf:
          - $ref: '#/components/schemas/TaskInputs'
          description: The task's recognized input fields.
        reference:
          additionalProperties: true
          type: object
          title: Reference
          description: Grader-only ground truth (held-out tests, expected outputs,
            rubric data). Surfaced to metrics but never seeded into the agent's workspace
            or shown to the agent, so a metric can grade against artifacts the agent
            cannot influence.
        views:
          additionalProperties:
            $ref: '#/components/schemas/SemanticView'
          type: object
          title: Views
          description: Optional reporting views mapping this task's metric outputs
            into named semantic scores.
        metadata:
          items:
            $ref: '#/components/schemas/MetadataItem'
          type: array
          title: Metadata
          description: Key/value annotations for the task.
        metrics:
          items:
            anyOf:
            - $ref: '#/components/schemas/MetricInline'
            - $ref: '#/components/schemas/MetricRef'
          type: array
          title: Metrics
          description: Metrics that score this task, inline and/or references to stored
            metrics.
      additionalProperties: false
      type: object
      required:
      - id
      - intent
      title: AgentEvalTaskInput
      description: 'Submitter-facing task DTO: metrics may be inline bundles or stored-metric
        references.'
    AgentEvalTaskSpec:
      properties:
        id:
          type: string
          title: Id
          description: Stable task identifier, unique within the task collection.
        intent:
          type: string
          title: Intent
          description: Human-readable description of the desired agent behavior.
        inputs:
          allOf:
          - $ref: '#/components/schemas/TaskInputs'
          description: The task's recognized input fields.
        reference:
          additionalProperties: true
          type: object
          title: Reference
          description: Grader-only ground truth (held-out tests, expected outputs,
            rubric data). Surfaced to metrics but never seeded into the agent's workspace
            or shown to the agent, so a metric can grade against artifacts the agent
            cannot influence.
        views:
          additionalProperties:
            $ref: '#/components/schemas/SemanticView'
          type: object
          title: Views
          description: Optional reporting views mapping this task's metric outputs
            into named semantic scores.
        metadata:
          items:
            $ref: '#/components/schemas/MetadataItem'
          type: array
          title: Metadata
          description: Key/value annotations for the task.
        metrics:
          items:
            $ref: '#/components/schemas/MetricInline'
          type: array
          title: Metrics
          description: Inline metric bundles that score this task; reconstructed to
            runtime metrics at run time.
      additionalProperties: false
      type: object
      required:
      - id
      - intent
      title: AgentEvalTaskSpec
      description: 'Canonical task DTO: metrics fully resolved to inline bundles,
        reconstructed at run time.'
    AgentEvalTrialInput:
      properties:
        id:
          type: string
          title: Id
          description: Stable identifier for this trial.
        task_id:
          type: string
          title: Task Id
          description: Identifier of the AgentEvalTask this trial was produced for.
        status:
          allOf:
          - $ref: '#/components/schemas/AgentEvalTrialStatus'
          description: Lifecycle status of the trial.
        output:
          allOf:
          - $ref: '#/components/schemas/AgentOutput'
          description: Final agent output captured for the trial; required when status
            is completed.
        evidence:
          allOf:
