          type: number
          maximum: 2.0
          minimum: 0.0
        max_tokens:
          title: Max Tokens
          description: Max tokens to generate
          type: integer
          minimum: 1.0
        max_completion_tokens:
          title: Max Completion Tokens
          description: Max tokens to generate
          type: integer
          minimum: 1.0
        top_p:
          title: Top P
          description: Float value between 0 and 1; limits to the top tokens within
