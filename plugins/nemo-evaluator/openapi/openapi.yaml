          title: Updated At
      type: object
      required:
      - id
      - name
      - status
      - status_details
      - error_details
      - error_stack
      - created_at
      - updated_at
      title: PlatformJobTaskStatusResponse
    ReasoningParams:
      properties:
        end_token:
          title: End Token
          description: 'Configure the end token to trim reasoning context based on
            the model''s reasoning API. Example for Nemotron models: ''</think>'''
          type: string
        include_if_not_finished:
          title: Include If Not Finished
          description: Configure whether to include reasoning context if the model
            has not finished reasoning.
          type: boolean
        effort:
          title: Effort
          description: Option for OpenAI models to specify low, medium, or high reasoning
            effort.
          type: string
      type: object
      title: ReasoningParams
      description: Custom settings that control the model's reasoning behavior.
    ResultFilter:
      additionalProperties: false
      description: Traits shared by both result collections (used directly for agent-eval
        results).
      properties:
        workspace:
          title: Workspace
          type: string
        name:
          title: Name
          type: string
        job_id:
          title: Job Id
          type: string
        target_kind:
          title: Target Kind
          type: string
        target_name:
          title: Target Name
          type: string
        created_at:
          $ref: '#/components/schemas/DatetimeFilter'
        updated_at:
          $ref: '#/components/schemas/DatetimeFilter'
      title: ResultFilter
      type: object
    ResultSort:
      type: string
      enum:
      - name
      - -name
      - created_at
      - -created_at
      - updated_at
      - -updated_at
      title: ResultSort
      description: Sort fields for result queries (``-`` prefix sorts descending).
    RubricScoreStat:
      properties:
        label:
          type: string
          title: Label
          description: The label to use for the level of the rubric grading criteria.
        description:
          title: Description
          description: Describe the semantic meaning of each criteria for the given
            rubric.
          type: string
        value:
          anyOf:
          - type: number
          - type: integer
          title: Value
          description: The score value to assign for the criteria.
        count:
          type: integer
          title: Count
          description: The number of samples evaluated with the rubric level.
          default: 0
      type: object
      required:
      - label
      - value
      title: RubricScoreStat
      description: Rubric score with count statistics.
    RunConfig:
      properties:
        parallelism:
          type: integer
          minimum: 1.0
          title: Parallelism
          description: Parallelism to be used for the evaluation job. Typically, this
            represents the maximum number of concurrent requests made to the model.
          default: 8
        limit_samples:
          title: Limit Samples
          description: Limit number of evaluation samples, taking the first `limit`
            samples from the dataset.
          type: integer
          minimum: 1.0
      additionalProperties: false
      type: object
      title: RunConfig
      description: Job parameters.
    RunConfigOnline:
      properties:
        parallelism:
          type: integer
          minimum: 1.0
          title: Parallelism
          description: Parallelism to be used for the evaluation job. Typically, this
            represents the maximum number of concurrent requests made to the model.
          default: 8
        limit_samples:
          title: Limit Samples
          description: Limit number of evaluation samples, taking the first `limit`
            samples from the dataset.
          type: integer
          minimum: 1.0
        ignore_request_failure:
          type: boolean
          title: Ignore Request Failure
          description: If True, request failures will be ignored and the result will
            be marked as NaN. If False (default), request failures will raise an exception.
          default: false
        request_timeout:
          title: Request Timeout
          description: The timeout to be used for requests made to the model.
          type: integer
        max_retries:
          type: integer
          minimum: 0.0
          title: Max Retries
          description: Maximum number of retries for failed requests.
          default: 3
      additionalProperties: false
      type: object
      title: RunConfigOnline
      description: Job parameters for online evaluation.
    RunConfigOnlineModel:
      properties:
        parallelism:
          type: integer
          minimum: 1.0
          title: Parallelism
          description: Parallelism to be used for the evaluation job. Typically, this
            represents the maximum number of concurrent requests made to the model.
          default: 8
        limit_samples:
          title: Limit Samples
          description: Limit number of evaluation samples, taking the first `limit`
            samples from the dataset.
          type: integer
          minimum: 1.0
        ignore_request_failure:
          type: boolean
          title: Ignore Request Failure
          description: If True, request failures will be ignored and the result will
            be marked as NaN. If False (default), request failures will raise an exception.
          default: false
        request_timeout:
          title: Request Timeout
          description: The timeout to be used for requests made to the model.
          type: integer
        max_retries:
          type: integer
          minimum: 0.0
          title: Max Retries
          description: Maximum number of retries for failed requests.
          default: 3
        inference:
          allOf:
          - $ref: '#/components/schemas/InferenceParams'
          description: Custom settings that control the model's text generation behavior.
        system_prompt:
          title: System Prompt
          description: Initial instructions that define the model's role and behavior
            for the conversation.
          type: string
        reasoning:
          allOf:
          - $ref: '#/components/schemas/ReasoningParams'
          description: Custom settings that control the model's reasoning behavior.
        structured_output:
          title: Structured Output
          description: JSON schema to apply structured output for the model.
          additionalProperties: true
          type: object
      additionalProperties: false
      type: object
      title: RunConfigOnlineModel
      description: Job parameters for model online evaluation.
    SecretRef:
      type: string
      pattern: ^[A-Za-z0-9_-]+(/[A-Za-z0-9_-]+)?$
      title: SecretRef
      description: 'Reference to a platform secret or local environment variable.
        Format: ''secret_name'' (uses request workspace) or ''workspace/secret_name''
        (explicit workspace).'
    SemanticReducer:
      type: string
      enum:
      - single
      - all
      - any
      - mean
      - weighted_mean
      title: SemanticReducer
      description: Reduction strategy used to combine task-scoped view signals into
        one score.
    SemanticView:
      properties:
        reducer:
          allOf:
          - $ref: '#/components/schemas/SemanticReducer'
          description: Strategy used to reduce this view's signals into a single task-level
            score.
        signals:
          items:
            $ref: '#/components/schemas/ViewSignal'
          type: array
          minItems: 1
          title: Signals
          description: Ordered metric outputs contributing to this view; at least
            one is required.
      additionalProperties: false
      type: object
      required:
      - reducer
      - signals
      title: SemanticView
      description: Task-scoped reporting view that maps a task's own metric outputs
        into a named score.
    StringFilter:
      additionalProperties: false
      properties:
        $eq:
          description: Filter for results equal to this value.
          title: $Eq
          type: string
        $like:
          description: Filter for results matching this pattern.
          title: $Like
          type: string
        $in:
          description: Filter for results in this list of values.
          title: $In
          items:
            type: string
          type: array
        $nin:
          description: Filter for results not in this list of values.
          title: $Nin
          items:
            type: string
          type: array
      title: StringFilter
      type: object
    Task:
      properties:
        id:
          type: string
          title: Id
          description: Unique identifier for the stored task record.
        name:
          type: string
          title: Name
          description: "Task name \u2014 the stable task id, unique within its workspace."
        workspace:
          type: string
          title: Workspace
          description: Workspace the task belongs to.
        project:
          title: Project
          description: The project associated with this task.
          type: string
        intent:
          type: string
          title: Intent
          description: Human-readable description of the desired agent behavior.
        inputs:
          allOf:
          - $ref: '#/components/schemas/TaskInputs'
          description: The task's recognized input fields.
        metrics:
          items:
            $ref: '#/components/schemas/MetricRef'
          type: array
          title: Metrics
          description: References to the metrics that score this task; inline metrics
            submitted on create are normalized to (derived) stored metrics, so a stored
            task holds refs only.
        views:
          additionalProperties:
            $ref: '#/components/schemas/SemanticView'
          type: object
          title: Views
          description: Optional reporting views mapping metric outputs into named
            semantic scores.
        metadata:
          items:
            $ref: '#/components/schemas/MetadataItem'
          type: array
          title: Metadata
          description: Key/value annotations for the task.
        created_at:
          type: string
          format: date-time
          title: Created At
          description: Timestamp the task was created.
        updated_at:
          type: string
          format: date-time
          title: Updated At
          description: Timestamp the task was last updated.
      type: object
      required:
      - id
      - name
      - workspace
      - intent
      - created_at
      - updated_at
      title: Task
      description: "API representation of a stored agent-eval task.\n\nMaps to the\
        \ SDK :class:`~nemo_evaluator_sdk.agent_eval.tasks.AgentEvalTask` \u2014 the\
        \ task's stable\n``id`` is the record ``name`` (unique within its workspace).\
        \ Metrics are stored in their wire form\n(inline bundles and/or references\
        \ to stored metrics); references resolve to inline at run time."
    TaskFilter:
      additionalProperties: false
      description: Filter for task queries (top-level entity columns only; custom-field
        filtering is a follow-up).
      properties:
        workspace:
          description: Filter by workspace.
          title: Workspace
          type: string
        name:
          description: Filter by name.
          title: Name
          type: string
        created_at:
          allOf:
          - $ref: '#/components/schemas/DatetimeFilter'
          description: Filter by creation date.
        updated_at:
          allOf:
          - $ref: '#/components/schemas/DatetimeFilter'
          description: Filter by update date.
      title: TaskFilter
      type: object
    TaskInput:
      properties:
        intent:
          type: string
          title: Intent
          description: Human-readable description of the desired agent behavior.
        inputs:
          allOf:
          - $ref: '#/components/schemas/TaskInputs'
          description: The task's recognized input fields.
        metrics:
          items:
            anyOf:
            - $ref: '#/components/schemas/MetricInline'
            - $ref: '#/components/schemas/MetricRef'
          type: array
          title: Metrics
          description: "Metrics that score this task \u2014 inline bundles and/or\
            \ stored-metric refs."
        views:
          additionalProperties:
            $ref: '#/components/schemas/SemanticView'
          type: object
          title: Views
          description: Optional reporting views mapping metric outputs into named
            semantic scores.
        metadata:
          items:
            $ref: '#/components/schemas/MetadataItem'
          type: array
          title: Metadata
          description: Key/value annotations for the task.
      additionalProperties: false
      type: object
      required:
      - intent
      title: TaskInput
      description: "Create/replace body for a stored task (the name comes from the\
        \ path).\n\nThe authorable subset of :class:`Task` \u2014 the SDK ``AgentEvalTask``\
        \ shape minus server-owned\nfields (id, name, workspace, timestamps)."
    TaskInputs:
      properties:
        instruction:
          title: Instruction
          description: The agent's instruction (its prompt). Falls back to the task
            `intent` when unset.
          type: string
      additionalProperties: false
      type: object
      title: TaskInputs
      description: 'A task''s recognized input fields.


        ``extra="forbid"``: only the field below is accepted. ``instruction`` is the
        agent''s prompt; the

        runtime falls back to the task ``intent`` when it is unset.'
    TaskRef:
      type: string
      pattern: ^[\w\-.]+(/[\w\-.]+)?$
      title: TaskRef
      description: "Reference to a persisted task (format: ``workspace/name`` or ``name``).\n\
        \nSame shape and charset as :class:`MetricRef` \u2014 a taskset points at\
        \ its member tasks by reference\n(there are no inline tasks), so a stored\
        \ taskset only ever holds refs."
    TaskSort:
      type: string
      enum:
      - name
      - -name
      - created_at
      - -created_at
      - updated_at
      - -updated_at
      title: TaskSort
      description: Sort fields for task queries.
    TasksPage:
      properties:
        data:
          items:
            $ref: '#/components/schemas/Task'
          type: array
          title: Data
        pagination:
          allOf:
          - $ref: '#/components/schemas/PaginationData'
          description: Pagination information.
        sort:
          title: Sort
          description: The field on which the results are sorted.
          type: string
        filter:
          title: Filter
          description: Filtering information.
          additionalProperties: true
          type: object
      type: object
      required:
      - data
      title: TasksPage
    Taskset:
      properties:
        id:
          type: string
          title: Id
          description: Unique identifier for the stored taskset record.
        name:
          type: string
          title: Name
          description: "Taskset name \u2014 the stable id, unique within its workspace."
        workspace:
          type: string
          title: Workspace
          description: Workspace the taskset belongs to.
        project:
          title: Project
          description: The project associated with this taskset.
          type: string
        description:
          title: Description
          description: Human-readable description of the grouping.
          type: string
        tasks:
          items:
            $ref: '#/components/schemas/TaskRef'
          type: array
          title: Tasks
          description: References to the member tasks (set semantics; duplicates rejected).
        metadata:
          items:
            $ref: '#/components/schemas/MetadataItem'
          type: array
          title: Metadata
          description: Key/value annotations for the taskset.
        created_at:
          type: string
          format: date-time
          title: Created At
          description: Timestamp the taskset was created.
        updated_at:
          type: string
          format: date-time
          title: Updated At
          description: Timestamp the taskset was last updated.
      type: object
      required:
      - id
      - name
      - workspace
      - created_at
      - updated_at
      title: Taskset
      description: "API representation of a stored taskset \u2014 a flexible grouping\
        \ of tasks with metadata.\n\nMembers are referenced by ``workspace/name``\
        \ (there are no inline tasks). Membership is a set:\norder is not significant\
        \ and duplicate references are rejected."
    TasksetFilter:
      additionalProperties: false
      description: Filter for taskset queries (top-level entity columns only; custom-field
        filtering is a follow-up).
      properties:
        workspace:
          description: Filter by workspace.
          title: Workspace
          type: string
        name:
          description: Filter by name.
          title: Name
          type: string
        created_at:
          allOf:
          - $ref: '#/components/schemas/DatetimeFilter'
          description: Filter by creation date.
        updated_at:
          allOf:
          - $ref: '#/components/schemas/DatetimeFilter'
          description: Filter by update date.
      title: TasksetFilter
      type: object
    TasksetInput:
      properties:
        description:
          title: Description
          description: Human-readable description of the grouping.
          type: string
        tasks:
          items:
            $ref: '#/components/schemas/TaskRef'
          type: array
          title: Tasks
          description: References to the member tasks (set semantics; duplicates rejected).
        metadata:
          items:
            $ref: '#/components/schemas/MetadataItem'
          type: array
          title: Metadata
          description: Key/value annotations for the taskset.
      additionalProperties: false
      type: object
      title: TasksetInput
      description: "Create/replace body for a stored taskset (the name comes from\
        \ the path).\n\nThe authorable subset of :class:`Taskset` \u2014 minus server-owned\
        \ fields (id, name, workspace,\ntimestamps)."
    TasksetSort:
      type: string
      enum:
      - name
      - -name
      - created_at
      - -created_at
      - updated_at
      - -updated_at
      title: TasksetSort
      description: Sort fields for taskset queries.
    TasksetsPage:
      properties:
        data:
          items:
            $ref: '#/components/schemas/Taskset'
          type: array
          title: Data
        pagination:
          allOf:
          - $ref: '#/components/schemas/PaginationData'
          description: Pagination information.
        sort:
          title: Sort
          description: The field on which the results are sorted.
          type: string
        filter:
          title: Filter
          description: Filtering information.
          additionalProperties: true
          type: object
      type: object
      required:
      - data
      title: TasksetsPage
    ValidationError:
      properties:
        loc:
          items:
            anyOf:
            - type: string
            - type: integer
          type: array
          title: Location
        msg:
          type: string
          title: Message
        type:
          type: string
          title: Error Type
        input:
          title: Input
        ctx:
          type: object
          title: Context
          additionalProperties: true
      type: object
      required:
      - loc
      - msg
      - type
      title: ValidationError
    ViewSignal:
      properties:
        metric:
          type: string
          title: Metric
          description: Task-local metric type (metric.type) whose output feeds this
            signal.
        output:
          type: string
          title: Output
          description: Name of the metric output, as declared by the metric's output_spec().
        weight:
          title: Weight
          description: Relative weight for this signal when the view reducer is 'weighted_mean';
            unused otherwise.
          type: number
      additionalProperties: false
      type: object
      required:
      - metric
      - output
      title: ViewSignal
      description: Task-scoped metric output that contributes to a semantic view.
