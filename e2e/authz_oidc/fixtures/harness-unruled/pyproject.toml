[project]
name = "harness-unruled"
version = "0.0.1"
description = "E2E authz fixture plugin: one ruled route + one unruled route (deny_route containment / quarantine subject)."
requires-python = ">=3.11"
dependencies = []

[project.entry-points."nemo.services"]
harness-unruled = "harness_unruled.service:HarnessUnruledService"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/harness_unruled"]
