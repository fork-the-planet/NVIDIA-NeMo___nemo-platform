[project]
name = "harness-fixture"
version = "0.0.1"
description = "E2E authz fixture plugin: clean derivation with a SERVICE_PRINCIPAL-only route."
requires-python = ">=3.11"
dependencies = []

[project.entry-points."nemo.services"]
harness-fixture = "harness_fixture.service:HarnessFixtureService"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/harness_fixture"]
