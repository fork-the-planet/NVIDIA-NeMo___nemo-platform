# kind values for CPU-only GitHub Actions Kubernetes E2E runs.

k8s-nim-operator:
  enabled: false

rbac:
  k8sNimOperatorEnabled: false
  volcanoEnabled: false

postgresql:
  image:
    repository: docker.io/library/postgres

core:
  storage:
    accessModes:
      - ReadWriteOnce
    volumePermissionsImage: docker.io/library/busybox

ingress:
  enabled: false

httpRoute:
  enabled: true
  parentRefs:
    - name: nmp-e2e-gateway

platformConfig:
  inference_gateway:
    mock_provider_prefix: igw-mock-
  models:
    controller:
      backends:
        nim_operator:
          enabled: false
  # Wire a nemo-deployments k8s executor so deployment_mode=k8s agent
  # deployments (test_nemo_agents_k8s.py) run as real Deployment+Service
  # workloads. default_namespace is omitted so the executor uses its own pod
  # namespace (the Helm release namespace), landing the agent beside the platform.
  agents:
    deployments:
      k8s_executor: kind-k8s
      container_port: 8000
  deployments:
    default_executor: kind-k8s
    executors:
      - name: kind-k8s
        backend: k8s
        # No config needed: kubeconfig_path unset -> in-cluster ServiceAccount
        # auth; default_namespace unset -> POD_NAMESPACE (release namespace).
